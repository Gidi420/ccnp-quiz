  {id:'b140',type:'single',originalNum:'Q18',tag:'Virtualization',text:'What is a characteristic of VXLAN?',options:[{letter:'A',text:'It has a 12-bit network identifier'},{letter:'B',text:'It extends Layer 2 and Layer 3 overlay networks over a Layer 2 underlay'},{letter:'C',text:'It uses TCP for transport'},{letter:'D',text:'It uses VTEPs to encapsulate and de-encapsulate frames'}],correct:'D',feedback:{correct:'VXLAN uses VTEP (VXLAN Tunnel Endpoints) to encapsulate original Layer 2 Ethernet frames into UDP packets at the source and de-encapsulate them at the destination. VTEPs are the devices (physical or virtual) that perform this function.',wrong:'D is correct. VTEPs = the endpoints that encapsulate and de-encapsulate frames. Option A is wrong: VXLAN uses a 24-bit VNI (Virtual Network Identifier), not 12-bit — this gives 16 million segments vs VLAN\'s 4096. Option B is wrong: VXLAN overlays L2 over a L3 (IP/UDP) underlay, not a L2 underlay. Option C is wrong: VXLAN uses UDP (port 4789), not TCP.',correctAnswer:'D -- It uses VTEPs to encapsulate and de-encapsulate frames',trick:'VXLAN key facts: (1) VTEP = encaps/decaps frames. (2) VNI = 24-bit (16M segments). (3) UDP port 4789. (4) L2 overlay over L3 underlay. Common traps: "12-bit" VNI (wrong, it\'s 24-bit). "TCP transport" (wrong, it\'s UDP). "L2 underlay" (wrong, it\'s L3/IP underlay).'}},
  {id:'b141',type:'single',originalNum:'Q43',tag:'Automation',text:'Which method displays text directly into the active console with a synchronous EEM applet policy?',options:[{letter:'A',text:'event manager applet boom\nevent syslog pattern "UP"\naction 1.0 string "logging directly to console"'},{letter:'B',text:'event manager applet boom\nevent syslog pattern "UP"\naction 1.0 puts "logging directly to console"'},{letter:'C',text:'event manager applet boom\nevent syslog pattern "UP"\naction 1.0 gets "logging directly to console"'},{letter:'D',text:'event manager applet boom\nevent syslog pattern "UP"\naction 1.0 syslog priority direct msg "log directly to console"'}],correct:'B',feedback:{correct:'"action puts" in a synchronous EEM applet writes text directly to the active console/TTY. It is the EEM equivalent of the Tcl "puts" command. In synchronous mode, the applet runs in the context of the triggering CLI session, so "puts" writes directly to that terminal.',wrong:'B is correct. "puts" = write to console (like Tcl puts). "string" (A) is not a valid EEM action verb for console output. "gets" (C) reads input, not writes output. "syslog priority direct" (D) would send to syslog, not directly to the console terminal.',correctAnswer:'B -- action 1.0 puts "logging directly to console"',trick:'EEM console output = "puts". Synchronous EEM = runs in the triggering session = puts goes to that console. syslog = goes to logging, not directly to console. puts = PUT text to Screen. gets = GET input from screen.'}},
  {id:'b142',type:'single',originalNum:'Q2',tag:'Routing',text:'When the "deny" statement is used within a route map that is used for policy-based routing, how is the traffic that matches the deny route-map line treated?',options:[{letter:'A',text:'An additional sequential route-map line is needed to policy route this traffic.'},{letter:'B',text:'Traffic is routed to the null 0 interface of the router and discarded.'},{letter:'C',text:'Traffic is returned to the normal forwarding behavior of the router.'},{letter:'D',text:'An additional sequential route-map line is needed to divert the traffic to the router\'s normal forwarding behavior.'}],correct:'C',feedback:{correct:'In PBR (Policy-Based Routing), a route-map "deny" statement means the traffic matching that permit/deny clause will NOT be policy-routed. Instead, it bypasses PBR and is forwarded using the normal routing table lookup — the standard forwarding behavior.',wrong:'C is correct. Route-map deny in PBR = traffic falls through to normal routing (not discarded, not null0). null0 (B) is the result of a route being explicitly pointed there, not from a PBR deny. A and D are wrong — no additional route-map lines are needed; the deny simply passes traffic back to normal routing.',correctAnswer:'C -- Traffic is returned to the normal forwarding behavior of the router',trick:'PBR route-map: PERMIT = apply the set clause (policy route it). DENY = skip PBR, use normal routing table. This is the opposite of ACLs! In ACLs, deny = block. In PBR, deny = let normal routing handle it. Think: PBR deny = "not my problem, use the routing table."'}},
  {id:'b143',type:'single',originalNum:'Q6',tag:'SD-Access',text:'How does the Cisco SD-Access control plane simplify traditional routing environments?',options:[{letter:'A',text:'Separation of EID and RLOC reduces the size of routing tables.'},{letter:'B',text:'Routers query all routes to the map server.'},{letter:'C',text:'Routing adjacencies are no longer required.'},{letter:'D',text:'Full routing tables are shared and ensure that all routers know all paths within the underlay fabric and overlay.'}],correct:'A',feedback:{correct:'SD-Access uses LISP which separates Endpoint Identifiers (EIDs — what the endpoint is) from Routing Locators (RLOCs — where it is). Routers only need to know RLOC routes (the underlay), not every EID prefix, dramatically reducing routing table size compared to traditional networks.',wrong:'A is correct. EID/RLOC separation = smaller routing tables. Routers only learn RLOC routes (underlay topology), not all endpoint EID prefixes. Option B is wrong — routers do not query all routes; they only query the map server when they need to reach a specific EID. Option C is wrong — routing adjacencies still exist in the underlay. Option D is the opposite of what LISP does.',correctAnswer:'A -- Separation of EID and RLOC reduces the size of routing tables',trick:'LISP key concept: EID = WHO (endpoint identity, like a name). RLOC = WHERE (routing locator, like an address). Routers only store RLOC routes. EID-to-RLOC mapping is looked up on demand from the map server. Result: smaller routing tables = simplified routing.'}},
  {id:'b144',type:'single',originalNum:'Q28',tag:'Virtualization',text:'How does a Type 2 hypervisor function?',options:[{letter:'A',text:'It enables other operating systems to run on it.'},{letter:'B',text:'It runs directly on a physical server and includes its own operating system.'},{letter:'C',text:'It runs on a virtual server and includes its own operating system.'},{letter:'D',text:'It is installed as an application on an already installed operating system.'}],correct:'D',feedback:{correct:'A Type 2 hypervisor is installed as a software application on top of an existing host operating system. Examples include VMware Workstation, VirtualBox, and Parallels. The host OS manages hardware resources and the hypervisor runs as a process on top.',wrong:'D is correct. Type 2 = application on top of host OS. Type 1 (bare metal) = runs directly on hardware with its own OS (B describes Type 1). Option A describes what a hypervisor does generally (runs other OSes) but not how Type 2 functions specifically. Option C (runs on virtual server) is incorrect.',correctAnswer:'D -- installed as an application on an already installed operating system',trick:'Type 1 = bare metal = runs ON hardware directly. Type 2 = on top of host OS = runs INSIDE an OS like an app. Examples: Type 1 = ESXi, Hyper-V. Type 2 = VirtualBox, VMware Workstation. Host OS = unique to Type 2. No host OS = Type 1.'}},
  {id:'b145',type:'single',originalNum:'Q37',tag:'SD-Access',text:'What is a characteristic of the overlay network in the Cisco SD-Access architecture?',options:[{letter:'A',text:'It consists of a group of physical routers and switches that are used to maintain the network'},{letter:'B',text:'It provides multicast support to enable Layer 2 flooding capability in the Underlay'},{letter:'C',text:'It provides isolation among the virtual networks and independence from the physical network'},{letter:'D',text:'It uses a traditional routed access design to provide performance and high availability to the network'}],correct:'C',feedback:{correct:'The SD-Access overlay network uses VXLAN tunnels to create virtual networks (VNs) that are isolated from each other and independent from the physical underlay topology. Traffic between VNs requires policy authorization, providing microsegmentation without depending on the physical network layout.',wrong:'C is correct. Overlay = virtual layer on top = isolated VNs + independent from physical. Option A describes the UNDERLAY (physical devices maintain physical connectivity). Option B is wrong — multicast support for flooding is an underlay feature. Option D describes a traditional network design, not SD-Access overlay.',correctAnswer:'C -- isolation among virtual networks and independence from the physical network',trick:'SD-Access layers: UNDERLAY = physical (IS-IS routing, physical devices). OVERLAY = virtual (VXLAN tunnels, VNs, SGTs). Overlay = "floats above" the physical. Isolation = VNs cannot talk without policy. Independence = overlay topology doesn\'t care about physical topology.'}},
  {id:'b146',type:'single',originalNum:'Q6',tag:'Security',text:'Which characteristic applies to the endpoint security aspect of the Cisco Threat Defense architecture?',options:[{letter:'A',text:'cloud-based analysis of threats'},{letter:'B',text:'user context analysis'},{letter:'C',text:'outbound URL analysis and data transfer controls'},{letter:'D',text:'detect and block ransomware in email attachments'}],correct:'C',feedback:{correct:'Outbound URL analysis and data transfer controls are endpoint security features — the endpoint\'s outbound web traffic is inspected and data transfer is controlled to prevent exfiltration. This directly applies to the endpoint security aspect of Cisco Threat Defense.',wrong:'C is correct. Outbound URL analysis and data transfer controls = endpoint security (controls what the endpoint can reach and send). Detect/block ransomware in email (D) is an email security function handled by Cisco ESA/Secure Email Gateway, not the endpoint security component. Cloud-based threat analysis (A) is a platform-level feature. User context analysis (B) is an identity/ISE function.',correctAnswer:'C -- outbound URL analysis and data transfer controls',trick:'Endpoint security = what the endpoint DOES outbound (URLs it visits, data it transfers). Email ransomware detection = email gateway (not endpoint security). Cloud analysis = backend platform. User context = ISE/identity. Focus on what happens at/from the endpoint device itself.'}},
  {id:'b147',type:'single',originalNum:'Q10',tag:'Security',text:'The login method is configured on the VTY lines of a router with these parameters: the first method for authentication is TACACS, and if TACACS is unavailable, login is allowed without any provided credentials. Which configuration accomplishes this task?',options:[{letter:'A',text:'aaa new-model\naaa authentication login VTY group tacacs+ none\naaa session-id common\n\nline vty 0 4\n password 7 0202039485748\n\n(no username configured)'},{letter:'B',text:'aaa new-model\naaa authentication login default group tacacs+ none\naaa session-id common\n\nline vty 0 4\n password 7 0202039485748'},{letter:'C',text:'aaa new-model\naaa authentication login default group tacacs+\naaa session-id common\n\nline vty 0 4\n transport input none\n R1#'},{letter:'D',text:'aaa new-model\naaa authentication login telnet group tacacs+ none\naaa session-id common\n\nline vty 0 4'}],correct:'B',feedback:{correct:'"aaa authentication login default group tacacs+ none" creates the default method list that automatically applies to all VTY lines. "tacacs+" is tried first; if the TACACS+ server is unreachable, "none" allows login without credentials. The default list applies without needing an explicit "login authentication" command on the VTY.',wrong:'B is correct. "default" method list = applies to all lines automatically. "none" = allow login without credentials if TACACS is down. Option A uses a custom method list named "VTY" — it would need "login authentication VTY" on the VTY lines to take effect, and no username is configured. Option C has no "none" fallback and "transport input none" blocks remote access. Option D uses a custom list named "telnet" with no application to VTY lines.',correctAnswer:'B -- aaa authentication login default group tacacs+ none',trick:'AAA method list "default" = applies automatically everywhere. Custom list names (VTY, telnet) need explicit application: "login authentication <list-name>" on the line. "none" = no credentials needed if all servers fail. Always use "default" unless you need per-line customization.'}},
  {id:'b148',type:'single',originalNum:'Q44',tag:'Routing',text:'Refer to the exhibit. A web server at 10.1.1.100/24 is connected to Gi0/0 (inside). Gi0/1 (outside) is 172.16.1.3/31 facing the Internet. The web server listens only on TCP port 8080. Which command allows Internet users to access the web server on HTTP port 80?',options:[{letter:'A',text:'ip nat outside source static tcp 10.1.1.100 8080 10.1.1.100 80'},{letter:'B',text:'ip nat outside source static tcp 10.1.1.100 80 10.1.1.100 8080'},{letter:'C',text:'ip nat inside source static tcp 10.1.1.100 8080 10.1.1.100 80'},{letter:'D',text:'ip nat inside source static tcp 10.1.1.100 80 10.1.1.100 8080'}],correct:'C',feedback:{correct:'"ip nat inside source static tcp" translates inside addresses. The server\'s real (local) address is 10.1.1.100:8080. Internet users connect to port 80 (global). The command maps local port 8080 → global port 80: ip nat inside source static tcp 10.1.1.100 8080 10.1.1.100 80.',wrong:'C is correct. Syntax: "ip nat inside source static tcp [local-ip] [local-port] [global-ip] [global-port]". Local=8080 (server listens here). Global=80 (what users connect to). Option D has ports reversed (local=80, global=8080 — backward). Options A and B use "outside source" which translates external-to-external addresses, not inside servers.',correctAnswer:'C -- ip nat inside source static tcp 10.1.1.100 8080 10.1.1.100 80',trick:'Static NAT PAT syntax: "ip nat inside source static tcp [real-ip] [real-port] [public-ip] [public-port]". Real port = 8080 (server). Public port = 80 (users). Order: inside first, outside second. "inside source" = server is on the inside. "outside source" = for translating outside addresses (less common).'}},
  {id:'b149',critical:true,type:'multi',originalNum:'Q24',tag:'Automation',text:'Drag and drop the Cisco Catalyst Center (formerly DNA Center) northbound API characteristics from the list onto the right. Which three items apply? (Choose three)\n\n1. referred to as Intent API\n2. multivendor focus\n3. uses JSON exclusively\n4. RESTful API based on HTTP methods\n5. supports NETCONF, SSH, SNMP, and others',options:[{letter:'A',text:'referred to as Intent API'},{letter:'B',text:'multivendor focus'},{letter:'C',text:'uses JSON exclusively'},{letter:'D',text:'RESTful API based on HTTP methods'},{letter:'E',text:'supports NETCONF, SSH, SNMP, and others'}],correct:['A','C','D'],feedback:{correct:'The Catalyst Center (DNA Center) northbound API is: (1) called the Intent API, (3) uses JSON exclusively as its data format, and (4) is a RESTful API based on HTTP methods (GET, POST, PUT, DELETE). Sorted ascending by number: 1, 3, 4 = answer 134.',wrong:'A(1), C(3), D(4) are correct = answer 134. Multivendor focus (B/2) is not a northbound API characteristic — northbound is for north-facing apps/scripts, not device vendors. NETCONF/SSH/SNMP (E/5) are SOUTHBOUND protocols (controller talking to devices). The northbound API is purely REST+JSON.',correctAnswer:'A, C, D -- Intent API + JSON + RESTful HTTP (sorted: 134)',trick:'Catalyst Center Northbound API = Intent API = REST + JSON. Southbound = NETCONF/YANG to devices. Northbound = REST API facing UP to apps/automation scripts. JSON = the data format. RESTful = uses HTTP methods. "Multivendor" and "NETCONF/SSH/SNMP" are southbound concepts.'}},
  {id:'b150',type:'single',originalNum:'Q31',tag:'Automation',text:'What is a characteristic of Catalyst Center Northbound APIs?',options:[{letter:'A',text:'They enable automation of network infrastructure based on intent'},{letter:'B',text:'They simplify the management of network infrastructure devices'},{letter:'C',text:'They utilize RESTCONF'},{letter:'D',text:'They utilize multivendor support APIs'}],correct:'A',feedback:{correct:'Catalyst Center Northbound APIs (the Intent API) enable automation of network infrastructure based on intent — you express what you want the network to do (intent), and Catalyst Center translates that into device configurations. This is the defining characteristic of intent-based networking.',wrong:'A is correct. Northbound = intent-based automation (apps and scripts tell Catalyst Center what they intend). Option B is wrong — simplifying device management is what southbound APIs do (Catalyst Center managing devices). Option C is wrong — RESTCONF is not used for Catalyst Center northbound (it uses REST/HTTP but not the RESTCONF standard). Option D is wrong — multivendor support is a southbound concern.',correctAnswer:'A -- They enable automation of network infrastructure based on intent',trick:'Catalyst Center Northbound API = Intent API = intent-based. "Intent" = you say WHAT you want, not HOW. Southbound = HOW (talking to devices). Northbound = WHAT (apps expressing intent). RESTCONF ≠ Catalyst Center northbound (that is YANG/NETCONF territory). Multivendor = southbound.'}},
  {id:'b151',critical:true,type:'single',originalNum:'Q5',tag:'Security',text:'Which feature is offered by the Secure Endpoint solution?',options:[{letter:'A',text:'TrustSec'},{letter:'B',text:'File Sandboxing'},{letter:'C',text:'DNS Protection'},{letter:'D',text:'NetFlow'}],correct:'B',feedback:{correct:'Cisco Secure Endpoint (formerly AMP for Endpoints) provides File Sandboxing — unknown files are detonated in a secure isolated environment to observe their behavior before being classified as malicious or safe. This is a core feature of the endpoint malware protection solution.',wrong:'B is correct. File Sandboxing = Secure Endpoint (runs unknown files in a safe environment). TrustSec (A) = SGT-based network segmentation by ISE. DNS Protection (C) = Cisco Umbrella (cloud DNS security). NetFlow (D) = traffic flow telemetry, used by Stealthwatch/Secure Network Analytics.',correctAnswer:'B -- File Sandboxing',trick:'Secure Endpoint = analyze and block malware at the ENDPOINT. File Sandboxing = cornerstone feature (runs suspicious files safely). Umbrella = DNS protection. TrustSec = network segmentation tags. NetFlow = traffic visibility. Endpoint security = what happens ON the device.'}},
  {id:'b152',type:'multi',originalNum:'Q8',tag:'Virtualization',text:'Which two characteristics apply to Type 1 hypervisors? (Choose two)',options:[{letter:'A',text:'They provide a platform for running bare metal operating systems.'},{letter:'B',text:'They provide a platform for running guest operating systems.'},{letter:'C',text:'They can be used to create and manage virtual storage.'},{letter:'D',text:'They are widely available to license for free.'},{letter:'E',text:'They are a software layer that runs on top of a virtual server.'}],correct:['B','C'],feedback:{correct:'Type 1 hypervisors (bare-metal) run directly on hardware and provide a platform for guest operating systems (B). They can also create and manage virtual storage (C) as part of their infrastructure management capabilities. Examples include VMware ESXi, Microsoft Hyper-V, and Cisco UCS.',wrong:'B and C are correct. Type 1 hypervisors host GUEST operating systems (B) — the VMs running on top. They manage virtual storage (C). Option A is wrong — Type 1 runs on bare metal hardware, it does not run bare metal OSes (that is a circular definition). Type 1 hypervisors are generally NOT free (D) — ESXi licenses are expensive. Type 1 runs on physical hardware, not on top of a virtual server (E describes Type 2 on a VM host).',correctAnswer:'B and C -- runs guest OSes + manages virtual storage',trick:'Type 1 = bare metal = runs directly on hardware. It hosts GUEST OSes (VMs). Type 2 = runs on host OS as an application. Common trap: "bare metal OS" (A) ≠ Type 1 feature. Type 1 IS the bare metal platform. Guest OS = the VMs on top. Type 1 also manages storage/networking resources.'}},
  {id:'b153',type:'dragdrop',originalNum:'Q17',tag:'Automation',text:'Drag and drop the characteristics onto the orchestration tools they describe. Answer format: [Ansible items][Puppet items] sorted ascending (e.g. 1324 means Ansible=13, Puppet=24).\n\n1. uses playbooks\n2. uses a pull model\n3. procedural\n4. declarative',items:[{num:1,text:'uses playbooks'},{num:2,text:'uses a pull model'},{num:3,text:'procedural'},{num:4,text:'declarative'}],groups:[{label:'Ansible',correct:[1,3]},{label:'Puppet',correct:[2,4]}],feedback:{correct:'Ansible: uses playbooks (YAML-based play files) and is procedural (tasks execute step-by-step in order). Puppet: uses a pull model (agents pull config from Puppet master) and is declarative (you define the desired state, Puppet figures out how to get there). Answer: 1324.',wrong:'Ansible=1(playbooks)+3(procedural)=13. Puppet=2(pull model)+4(declarative)=24. Combined: 1324. Ansible is PUSH (master pushes to nodes) and PROCEDURAL. Puppet is PULL (agents pull from master) and DECLARATIVE. Do not confuse pull/push with procedural/declarative.',correctAnswer:'Ansible: 1,3 (playbooks + procedural) | Puppet: 2,4 (pull model + declarative) = 1324',trick:'Ansible = A for Active push + plAybooks + procedural. Puppet = P for Pull + declarative (Puppet shows desired state, system catches up). Chef = push + procedural + cookbooks. Puppet and Chef use agents. Ansible is agentless (push via SSH).'}},
  {id:'b154',type:'dragdrop',originalNum:'Q20',tag:'Automation',text:'Drag and drop the configuration management tools from the left onto the configuration styles they use on the right. Answer format: [Procedural tools][Declarative tools] sorted ascending (e.g. 312 means Procedural=3, Declarative=12).\n\n1. Puppet\n2. Saltstack\n3. Chef',items:[{num:1,text:'Puppet'},{num:2,text:'Saltstack'},{num:3,text:'Chef'}],groups:[{label:'Procedural',correct:[3]},{label:'Declarative',correct:[1,2]}],feedback:{correct:'Chef is Procedural — you write "recipes" and "cookbooks" that define step-by-step instructions (how to get to the desired state). Puppet and Saltstack are Declarative — you define the desired end state and the tool figures out how to achieve it. Answer: 312 (Procedural=3, Declarative=12).',wrong:'Chef=Procedural(3). Puppet=Declarative(1). Saltstack=Declarative(2). Combined: 312. Procedural = HOW (step-by-step instructions). Declarative = WHAT (desired state, tool figures out the how). Chef uses cookbooks/recipes → step-by-step → procedural. Puppet uses manifests → define desired state → declarative. Saltstack uses state files → declare desired state → declarative.',correctAnswer:'Procedural: Chef(3) | Declarative: Puppet(1) + Saltstack(2) = 312',trick:'Procedural = HOW = step-by-step = Chef (cookbooks = recipes = instructions). Declarative = WHAT = desired state = Puppet + Saltstack. Memory: Chef COOKS step by step. Puppet and Salt declare what they WANT the system to look like.'}},
  {id:'b155',type:'single',originalNum:'Q9',tag:'SD-Access',text:'Which technology is used to provide Layer 2 and Layer 3 logical networks in the Cisco SD-Access architecture?',options:[{letter:'A',text:'overlay network'},{letter:'B',text:'easy virtual network'},{letter:'C',text:'VPN routing/forwarding'},{letter:'D',text:'underlay network'}],correct:'A',feedback:{correct:'In Cisco SD-Access, the overlay network provides the Layer 2 and Layer 3 logical (virtual) networks. The overlay uses VXLAN to encapsulate traffic and LISP for control-plane routing, creating virtual segments on top of the physical underlay.',wrong:'A is correct. Overlay = logical L2/L3 networks built on top of the physical underlay using VXLAN+LISP. Underlay (D) = the physical IP network that carries the overlay traffic — it only provides IP connectivity, not logical networks. EVN (B) is a VRF-lite technology, not SD-Access specific. VRF (C) is used within the overlay but is not the technology that provides it.',correctAnswer:'A -- overlay network',trick:'SD-Access has TWO planes: Underlay = physical IP fabric (just gets packets from A to B). Overlay = logical virtual networks (L2+L3 segments) built on top using VXLAN. Think: Overlay = the logical tent pitched on top of the underlay ground.'}},
  {id:'b156',type:'single',originalNum:'Q29',tag:'Automation',text:'Refer to the exhibit. An engineer must create a manually triggered EEM applet to enable the R2 router interface and assign an IP address to it. What is required to complete this configuration?\n\nR2(config)#event manager applet script_1\nR2(config-applet)#action 1 cli command \'enable\'\nR2(config-applet)#action 2 cli command \'config t\'\nR2(config-applet)#action 3 cli command \'interface ge0/0\'\nR2(config-applet)#action 4 cli command \'ip add 172.16.1.1 255.255.255.0\'\nR2(config-applet)#action 5 cli command \'no sh\'\nR2(config-applet)#action 6 cli command \'end\'\nR2(config-applet)#exit',options:[{letter:'A',text:'R2(config-applet)# event oir'},{letter:'B',text:'R2(config-applet)# event none sync yes'},{letter:'C',text:'R2(config)# event manager session cli username'},{letter:'D',text:'R2(config-applet)#action 4 cli command "ip add 172.16.1.1 0.0.0.255"'}],correct:'B',feedback:{correct:'"event none" makes an EEM applet manually triggered (it has no automatic trigger). "sync yes" tells the applet to run synchronously. Together, "event none sync yes" is the correct event statement for a manually triggered EEM applet that can be run with "action run" or "event manager run script_1".',wrong:'B is correct. "event none sync yes" = manually triggered EEM applet. "event oir" (A) triggers on OIR (Online Insertion Removal) hardware events — not manual. "event manager session cli username" (C) is needed when the EEM applet runs CLI commands (required separately, but not the missing event trigger). Option D uses wildcard mask instead of subnet mask — wrong for "ip address" command.',correctAnswer:'B -- R2(config-applet)# event none sync yes',trick:'EEM manually triggered = "event none". "sync yes" = synchronous execution. To run it: "event manager run script_1". "event oir" = hardware insertion/removal trigger. "event none" = NO automatic trigger = manual only. Also need "event manager session cli username" separately to allow CLI actions.'}},
  {id:'b157',type:'single',originalNum:'Q38',tag:'Automation',text:'Refer to the exhibit. After running the code in the exhibit, which step reduces the amount of data that the NETCONF server returns to the NETCONF client, to only the interface\'s configuration?\n\nimport ncclient\n\nwith ncclient.manager.connect(host=\'192.168.1.1\', port=830, username=\'root\',\n                             password=\'test123!\', allow_agent=False) as m:\n    print(m.get_config(\'running\').data_xml)',options:[{letter:'A',text:'Use the JSON library to parse the data returned by the NETCONF server for the interface\'s configuration'},{letter:'B',text:'Create a JSON filter as a string and pass it to the get_config() method as an argument'},{letter:'C',text:'Use the txml library to parse the data returned by the NETCONF server for the interface\'s configuration'},{letter:'D',text:'Create an XML filter as a string and pass it to the get_config() method as an argument'}],correct:'D',feedback:{correct:'NETCONF uses XML natively. To filter the data returned by get_config() to only the interface configuration, you create an XML filter string (a subtree or XPath filter) and pass it as the "filter" argument to get_config(). Example: m.get_config("running", filter=("subtree", xml_filter)). NETCONF does not use JSON filters.',wrong:'D is correct. NETCONF = XML protocol. To limit returned data, pass an XML filter (subtree or XPath) as an argument to get_config(). JSON is not used in NETCONF — that is RESTCONF. Parsing the full response after the fact (A, C) does not reduce data at the server level. txml is not a standard library.',correctAnswer:'D -- Create an XML filter as a string and pass it to get_config() as an argument',trick:'NETCONF = XML. RESTCONF = JSON. To filter NETCONF data at the source: pass XML filter to get_config(filter=...). Subtree filter = XML snippet matching the data you want. JSON filter = wrong protocol (that\'s RESTCONF). Always filter at the server, not parse after the fact.'}},
  {id:'b158',type:'single',originalNum:'Q64',tag:'SD-Access',text:'Which action is a LISP ITR responsible for?',options:[{letter:'A',text:'responding to map-request messages'},{letter:'B',text:'finding EID-to-RLOC mappings'},{letter:'C',text:'accepting registration requests from ETRs'},{letter:'D',text:'forwarding user data traffic'}],correct:'B',feedback:{correct:'The LISP Ingress Tunnel Router (ITR) is responsible for finding EID-to-RLOC mappings by sending map-requests to the Map Resolver. When a packet arrives destined for an EID, the ITR looks up (or queries) the mapping to find the RLOC (the destination VTEP/router), then encapsulates and forwards the packet.',wrong:'B is correct. ITR = Ingress = receives traffic FROM local site, looks up EID-to-RLOC mappings (sends map-request), then encapsulates and forwards. ETR (Egress Tunnel Router) = responds to map-requests (A) and registers EIDs with the Map Server (C). ITR does NOT forward raw user data — it encapsulates it first. The Map Server/Resolver handles registration requests from ETRs.',correctAnswer:'B -- finding EID-to-RLOC mappings',trick:'LISP roles: ITR = Ingress = sends map-REQUEST to find EID→RLOC. ETR = Egress = responds to map-requests + registers with Map Server. Map Server = stores registrations. Map Resolver = answers map-requests. ITR job = LOOK UP the mapping (not respond, not register, not just forward raw traffic).'}},
  {id:'b159',type:'single',originalNum:'Q-JSON',tag:'Automation',text:'Which data is properly formatted with JSON?\n\nOption A:\n{\n  \'name\': Peter,\n  \'age\': 25,\n  \'likesJson\': true,\n  \'characteristics\': [\'small\',\'strong\',\'18\'],\n}\n\nOption B:\n{\n  \'name\': \'Peter\'\n  \'age\': \'25\'\n  \'likesJson\': true\n  \'characteristics\': [\'small\',\'strong\',18]\n}\n\nOption C:\n{\n  \'name\': \'Peter\',\n  \'age\': \'25\',\n  \'likesJson\': true,\n  \'characteristics\': [\'small\',\'strong\',18]\n}\n\nOption D:\n{\n  \'name\': \'Peter\',\n  \'age\': \'25\',\n  \'likesJson\': true,\n  \'characteristics\': [\'small\',\'strong\',\'18\'],\n}',options:[{letter:'A',text:'Option A'},{letter:'B',text:'Option B'},{letter:'C',text:'Option C'},{letter:'D',text:'Option D'}],correct:'C',feedback:{correct:'Option C is correct. Key JSON rules: (1) No trailing comma after the last element — C has no trailing comma after the characteristics array. (2) Numbers should not be quoted when they are integers — C correctly leaves 18 unquoted. (3) Strings must be quoted. Option A: "Peter" is unquoted and has a trailing comma after }. Option B: missing commas between fields. Option D: trailing comma after the last element (invalid JSON).',wrong:'C is correct. JSON rules: no trailing commas, numbers must be unquoted integers. Option A fails: value "Peter" is not quoted, trailing comma after }. Option B fails: missing commas between key-value pairs. Option D fails: trailing comma after characteristics array (last element in object). C has no trailing comma and 18 is correctly an unquoted number.',correctAnswer:'C -- no trailing comma, 18 correctly unquoted',trick:'JSON pitfalls: NO trailing commas (unlike Python dicts). Keys and string values must be quoted. Numbers stay unquoted. Booleans (true/false) are lowercase and unquoted. If the last item in {} or [] has a comma after it = INVALID JSON. C is the only option without a trailing comma error.'}},
  {id:'b160',type:'single',originalNum:'Q80',tag:'Automation',text:'What is the API keys option for REST API authentication?',options:[{letter:'A',text:'a one-time encrypted token'},{letter:'B',text:'a username that is stored in the local router database'},{letter:'C',text:'a credential that is transmitted unencrypted'},{letter:'D',text:'a predetermined string that is passed from client to server'}],correct:'D',feedback:{correct:'An API key is a predetermined (pre-generated) static string that the client passes to the server with each API request, typically in a header or query parameter. The server validates the key to authenticate the client. It is not a one-time token, not a username, and not inherently unencrypted.',wrong:'D is correct. API key = predetermined static string passed from client to server. It is NOT a one-time token (that is OTP/OAuth tokens). It is NOT inherently unencrypted — API keys should be sent over HTTPS. It is NOT tied to a local router username database.',correctAnswer:'D -- a predetermined string that is passed from client to server',trick:'API key = STATIC pre-shared string (like a password for the API). Client sends it every request. Server validates it. Think: API key = a house key you copy and give to a friend. One-time token = OTP. Username/password = Basic Auth. API key = pre-agreed static string.'}},
  {id:'b161',type:'multi',originalNum:'Q54',tag:'Automation',text:'Which two solutions are used for backing up a Cisco DNA Center Assurance database? (Choose two)',options:[{letter:'A',text:'local server'},{letter:'B',text:'non-linux server'},{letter:'C',text:'NFS share'},{letter:'D',text:'bare metal server'},{letter:'E',text:'remote server'}],correct:['C','E'],feedback:{correct:'Cisco DNA Center supports two backup destinations for the Assurance database: NFS share (Network File System — a shared remote storage mount) and remote server (an SFTP/remote server). These are the supported external storage options for backup.',wrong:'C (NFS share) and E (remote server) are correct. Local server (A) is not supported as a backup destination for DNA Center Assurance — the backup must go to external storage. Non-linux server (B) is not a valid option. Bare metal server (D) is not a backup target type — it refers to hardware, not a backup destination.',correctAnswer:'C and E -- NFS share and remote server',trick:'DNA Center Assurance backup destinations: NFS share (network file system mount) OR remote server (SFTP). Not local, not bare metal. Think: DNA Center backup needs to go OUTSIDE the appliance — NFS or SFTP remote server.'}},
  {id:'b162',critical:true,type:'single',originalNum:'Q47',tag:'Automation',text:'What is one benefit of implementing a data modeling language?',options:[{letter:'A',text:'accuracy of the operations performed'},{letter:'B',text:'machine-oriented logic and language-facilitated processing'},{letter:'C',text:'conceptual representation to simplify interpretation'},{letter:'D',text:'uses XML style of data formatting'}],correct:'C',feedback:{correct:'A data modeling language (like YANG) provides a conceptual representation of the data structure, which simplifies interpretation by humans and machines. The model abstracts the complexity of the underlying data, making it easier to understand and work with network configuration and state data.',wrong:'C is correct. Data modeling languages provide a conceptual representation that simplifies interpretation — they define the structure/schema of data in a human-readable, format-agnostic way. They do not inherently improve operation accuracy (A), use machine-oriented logic (B), or mandate XML formatting (D) — YANG can be encoded as XML or JSON.',correctAnswer:'C -- conceptual representation to simplify interpretation',trick:'Data modeling language benefit = CONCEPTUAL representation = abstract blueprint of data that is easy to interpret. YANG defines WHAT the data looks like (schema), not HOW it is encoded (XML vs JSON). Think: a blueprint simplifies understanding a building without needing to see every brick.'}},
  {id:'b163',critical:true,type:'dragdrop',originalNum:'Q50',tag:'Automation',text:'Drag and drop the code snippets from the bottom onto the blanks in the Python script to print the device model to the screen and write JSON data to a file. Not all options are used.\n\nimport json\n\ndata = {\n  "measurement": "ifHCInOctets",\n  "maxDataPoints": 30,\n  "policy": "default",\n  "params": None,\n  "devices": [\n    {"model": "Cisco Nexus 3550", "ipv4": "172.16.16.249"}\n  ]\n}\n\n[BLANK1](data["devices"][0]["model"])\nwith [BLANK2]("data.json", "[BLANK3]") as file:\n    json.[BLANK4](data, file, indent=4)',items:[{num:1,text:'dumps'},{num:2,text:'print'},{num:3,text:'dump'},{num:4,text:'open'},{num:5,text:'r'},{num:6,text:'w'}],groups:[{label:'[BLANK1](data["devices"][0]["model"]) — print model to screen',correct:[2]},{label:'with [BLANK2]("data.json", ...) as file — open the file',correct:[4]},{label:'"[BLANK3]" — file open mode for writing',correct:[6]},{label:'json.[BLANK4](data, file, indent=4) — write JSON to file object',correct:[3]}],feedback:{correct:'BLANK1=print (outputs to screen). BLANK2=open (opens the file). BLANK3=w (write mode). BLANK4=dump (writes Python object as JSON to a file object). Correct answer: 2463.',wrong:'2463 is the correct answer. print()=display to screen. open()=open file. "w"=write mode. json.dump()=writes JSON directly to a FILE OBJECT (not a string). json.dumps()=returns a JSON STRING (no file object). Use dump() when writing to a file, dumps() when you need a string.',correctAnswer:'BLANK1=print(2) | BLANK2=open(4) | BLANK3=w(6) | BLANK4=dump(3) = 2463',trick:'dump vs dumps: dump(obj, file) → writes to file. dumps(obj) → returns string. "s" in dumps = string. Here we write to a file object, so json.dump(). File mode "w" = write (creates/overwrites). "r" = read only. print() = display. open() = open file handle.'}},
  {id:'b164',critical:true,type:'single',originalNum:'Q1',tag:'Automation',text:'Which framework is used for third-party authorization?',options:[{letter:'A',text:'SOAP'},{letter:'B',text:'API keys'},{letter:'C',text:'OAuth'},{letter:'D',text:'custom tokens'}],correct:'C',feedback:{correct:'OAuth (Open Authorization) is the standard framework used for third-party authorization. It allows an application to obtain limited access to a user\'s account on another service without exposing credentials. For example, "Sign in with Google" uses OAuth to grant a third-party app authorization.',wrong:'C is correct. OAuth = third-party authorization framework (delegate access without sharing passwords). SOAP (A) = a messaging protocol, not an auth framework. API keys (B) = static tokens for API access, not a third-party auth framework. Custom tokens (D) = application-specific, not a standardized third-party framework.',correctAnswer:'C -- OAuth',trick:'OAuth = Open Authorization = third-party access delegation. You authorize APP A to access your data on SERVICE B without giving APP A your SERVICE B password. Examples: "Login with Google/GitHub." Not to be confused with OpenID Connect (authentication) — OAuth is specifically AUTHORIZATION.'}},
  {id:'b165',critical:true,type:'single',originalNum:'Q44',tag:'SD-Access',text:'What occurs when a Cisco SD-Access fabric is connected to a traditional campus network?',options:[{letter:'A',text:'A fabric intermediate node is used to connect the fabric with the traditional campus network.'},{letter:'B',text:'All clients must be migrated to new IP addresses that match the IP pool within the fabric.'},{letter:'C',text:'Traditional campus clients are seen as fabric clients when a Layer 2 border node is used for the VLAN segment.'},{letter:'D',text:'Only Layer 3 connectivity is supported between the fabric and the traditional campus network.'}],correct:'C',feedback:{correct:'When an SD-Access fabric connects to a traditional campus network using a Layer 2 border node for the same VLAN segment, traditional campus clients are treated as fabric clients. The L2 border node extends the fabric\'s VLAN into the traditional campus, so those clients appear as endpoints within the fabric.',wrong:'C is correct. L2 border node = extends fabric VLAN to traditional network = traditional clients appear as fabric clients. Option A is wrong — there is no "fabric intermediate node" role; the border node is what connects to external networks. Option B is wrong — IP migration is not required. Option D is wrong — L2 connectivity IS supported via the L2 border node.',correctAnswer:'C -- traditional campus clients are seen as fabric clients when a Layer 2 border node is used',trick:'SD-Access border node types: L3 border = connects to external L3 networks (IP routing). L2 border = extends fabric VLAN into traditional campus (clients appear as fabric endpoints). L2 border = seamless extension, no IP changes needed, traditional clients = fabric clients.'}},
  {id:'b166',type:'multi',originalNum:'Q24',tag:'SD-Access',text:'Which two nodes comprise a collapsed core in a two-tier Cisco SD-Access design? (Choose two)',options:[{letter:'A',text:'core nodes'},{letter:'B',text:'border nodes'},{letter:'C',text:'distribution nodes'},{letter:'D',text:'edge nodes'},{letter:'E',text:'extended nodes'}],correct:['B','D'],feedback:{correct:'In a two-tier SD-Access design, the collapsed core is formed by border nodes and edge nodes. The distribution and core layers are collapsed into the border node, which connects the fabric to external networks, while edge nodes connect end devices. This simplifies the design compared to the three-tier model.',wrong:'B (border nodes) and D (edge nodes) are correct. In two-tier SD-Access, the core/distribution is collapsed — border nodes handle the collapsed core/distribution function and edge nodes handle access. Distribution nodes (C) are a separate tier in three-tier design. Core nodes (A) are also three-tier. Extended nodes (E) are for non-fabric devices extending the fabric edge.',correctAnswer:'B and D -- border nodes and edge nodes',trick:'SD-Access tiers: Three-tier = edge + distribution + core/border. Two-tier (collapsed core) = border nodes (collapsed core+distribution) + edge nodes (access). Collapsed = fewer tiers = simpler. Border=external connections. Edge=endpoint connections. No separate distribution or core layer in two-tier.'}},
  {id:'b167',type:'single',originalNum:'Q16',tag:'Security',text:'Which architectural component enables a zero-trust security model?',options:[{letter:'A',text:'data plane'},{letter:'B',text:'plug-and-play'},{letter:'C',text:'control plane'},{letter:'D',text:'management plane'}],correct:'C',feedback:{correct:'The control plane enables a zero-trust security model by enforcing policy decisions about which traffic is allowed and where. In SD-Access and similar architectures, the control plane (using LISP, TrustSec, and policy enforcement) ensures that trust is never assumed and every flow is verified and authorized.',wrong:'C is correct. The control plane enforces policy and makes forwarding decisions based on identity and context — the foundation of zero-trust (never trust, always verify). The data plane (A) just forwards packets per control plane decisions. Plug-and-play (B) is a device onboarding feature, not a security model. The management plane (D) handles device administration, not per-flow security policy.',correctAnswer:'C -- control plane',trick:'Zero-trust = never trust, always verify. The CONTROL PLANE enforces who can talk to whom (policy decisions). Data plane = forwards packets (mechanism). Management plane = admin access. Control plane = the BRAIN that decides based on identity/context = zero-trust enforcement.'}},
  {id:'b168',type:'single',originalNum:'Q37',tag:'Switching',text:'Which behavior can be expected when the HSRP version is changed from 1 to 2?',options:[{letter:'A',text:'Each HSRP group reinitializes because the virtual MAC address has changed'},{letter:'B',text:'Each HSRP group reinitializes because the multicast address has changed'},{letter:'C',text:'No changes occur because version 1 and 2 use the same virtual MAC OUI'},{letter:'D',text:'No changes occur because the standby router is upgraded before the active router'}],correct:'A',feedback:{correct:'When HSRP is changed from version 1 to version 2, each HSRP group reinitializes because the virtual MAC address format changes. HSRPv1 uses MAC OUI 00:00:0c:07:ac:XX while HSRPv2 uses 00:00:0c:9f:fX:XX. This MAC change causes the group to go through the HSRP state machine again.',wrong:'A is correct. Changing HSRP version changes the virtual MAC address format — this causes each group to reinitialize. Additionally, HSRPv2 changes the multicast address from 224.0.0.2 (v1) to 224.0.0.102 (v2), but the primary reason for reinitialization is the MAC change. Option C is wrong — the MAC OUI is different between v1 and v2.',correctAnswer:'A -- each HSRP group reinitializes because the virtual MAC address has changed',trick:'HSRPv1 MAC = 00:00:0c:07:ac:XX. HSRPv2 MAC = 00:00:0c:9f:fX:XX. Different OUI = MAC change = group reinitializes. Also: v1 multicast=224.0.0.2, v2 multicast=224.0.0.102. Version change = disruption (MAC changes). Plan maintenance window when switching HSRP versions.'}},
  {id:'b169',type:'single',originalNum:'Q39',tag:'Multicast',text:'Which multicast operational mode sends a prune message to the source when there are no connected members or downstream neighbors?',options:[{letter:'A',text:'IGMPv2'},{letter:'B',text:'PIM sparse mode'},{letter:'C',text:'IGMPv3'},{letter:'D',text:'PIM dense mode'}],correct:'D',feedback:{correct:'PIM Dense Mode (PIM-DM) uses a flood-and-prune mechanism. It initially floods multicast traffic to all routers, then routers that have no connected members or downstream neighbors send prune messages back toward the source to stop receiving the traffic.',wrong:'D is correct. PIM-DM = flood first, then prune. Prune messages go TOWARD the source when there are no receivers. PIM Sparse Mode (B) uses an explicit join model with a Rendezvous Point — it does NOT flood and prune to the source. IGMP (A, C) is used between hosts and their local router, not between routers toward the source.',correctAnswer:'D -- PIM dense mode',trick:'PIM-DM = Dense = flood EVERYTHING then PRUNE back what nobody wants. Prune = sent toward source. PIM-SM = Sparse = join explicitly toward RP (no flooding). Dense = assume everyone wants it. Sparse = assume nobody wants it until they ask.'}},
  {id:'b170',type:'single',originalNum:'Q39',tag:'Security',text:'What is MACsec?',options:[{letter:'A',text:'technology that makes wired networks at least as secure as wireless networks'},{letter:'B',text:'Layer 4 security protocol'},{letter:'C',text:'technology that allows guest access to wireless networks without using a PSK'},{letter:'D',text:'open-source link encryption technology'}],correct:'A',feedback:{correct:'MACsec (IEEE 802.1AE) is a Layer 2 security standard that provides hop-by-hop encryption on wired Ethernet links. It makes wired networks at least as secure as wireless networks (which require WPA2/WPA3) by encrypting and authenticating traffic at the MAC sublayer.',wrong:'A is correct. MACsec = Layer 2 link security for wired Ethernet (makes wired as secure as wireless). It is Layer 2, not Layer 4 (B). It is NOT for wireless guest access — that is Open Auth or WebAuth (C). MACsec is an IEEE standard (802.1AE), not open-source link encryption (D).',correctAnswer:'A -- technology that makes wired networks at least as secure as wireless networks',trick:'MACsec = MAC Security = IEEE 802.1AE = Layer 2 hop-by-hop encryption on WIRED links. Goal: make wired as secure as wireless (which already encrypts over the air). Uses AES-GCM encryption. Operates at Layer 2 (not Layer 3 like IPsec). Think: MACsec = "WPA2 for wired Ethernet."'}},
  {id:'b171',critical:true,type:'single',originalNum:'Q40',tag:'Security',text:'What is a common capability of a zero-trust network?',options:[{letter:'A',text:'Honeypot'},{letter:'B',text:'insecure managed devices'},{letter:'C',text:'Macrosegmentation'},{letter:'D',text:'flow analytic'}],correct:'D',feedback:{correct:'Flow analytics is a common capability of zero-trust networks. It continuously monitors and analyzes network traffic flows to detect anomalies, verify that behavior matches expected patterns, and identify potential threats — all key to the zero-trust principle of "never trust, always verify."',wrong:'D is correct. Flow analytics = continuous monitoring and verification of traffic behavior = core zero-trust capability. Macrosegmentation (C) is a traditional perimeter security concept, not zero-trust (zero-trust uses microsegmentation). Honeypots (A) are deception tools, not a zero-trust core capability. Insecure managed devices (B) are the opposite of zero-trust goals.',correctAnswer:'D -- flow analytic',trick:'Zero-trust = never trust, always verify = need VISIBILITY into all flows. Flow analytics = watch everything, detect anomalies, verify behavior continuously. Zero-trust also uses: microsegmentation (not MACRO), identity verification, least privilege. Flow analytics gives you the "always verify" data.'}},
  {id:'b172',type:'single',originalNum:'Q77',tag:'Automation',text:'Which technology does REST-API security use?',options:[{letter:'A',text:'HTTPS and SSL'},{letter:'B',text:'HTTP and SSH'},{letter:'C',text:'combination of XML encryption and signatures'},{letter:'D',text:'built-in protocols known as Web Services Security'}],correct:'B',feedback:{correct:'REST API security uses HTTP as the application-layer protocol combined with SSH (Secure Shell) for secure transport and CLI access on network devices. REST APIs communicate over HTTP, and SSH provides the secure channel for device interaction.',wrong:'B is correct. REST API = HTTP protocol + SSH for secure device access. Option A is partially correct (HTTPS is common for REST), but the exam distinguishes REST (HTTP+SSH) from SOAP/WS-Security. Option C (XML encryption) and D (Web Services Security/WS-Security) are SOAP-specific security mechanisms, not REST.',correctAnswer:'B -- HTTP and SSH',trick:'REST = HTTP (stateless, lightweight). For network device REST APIs, SSH provides the secure channel. SOAP uses XML + WS-Security (C, D). REST does NOT use built-in encryption like SOAP/WS-Security — REST relies on HTTPS/SSH at the transport layer. SOAP=heavyweight+WS-Security. REST=lightweight+HTTP+SSH.'}},
  {id:'b173',type:'single',originalNum:'Q23',tag:'Multicast',text:'What is the default behavior of a router in PIM sparse mode?',options:[{letter:'A',text:'The router assumes that all other routers want to forward multicast packets.'},{letter:'B',text:'The router assumes RFC-5015 operation mode.'},{letter:'C',text:'The router assumes that other routers do not want to forward multicast packets.'},{letter:'D',text:'The router automatically becomes an Auto-RP.'}],correct:'C',feedback:{correct:'PIM Sparse Mode (PIM-SM) assumes that multicast receivers are sparse — it defaults to assuming that routers do NOT want to forward multicast traffic. Traffic is only forwarded toward routers that have explicitly joined the multicast group via (*,G) joins toward the Rendezvous Point.',wrong:'C is correct. PIM-SM default = assume nobody wants multicast = only forward if explicitly requested via join messages. This is the opposite of PIM Dense Mode (which assumes everyone wants it and floods first). RFC-5015 (B) defines Bidirectional PIM, not the default behavior. Auto-RP (D) is a Cisco-proprietary RP discovery mechanism, not a default router behavior.',correctAnswer:'C -- the router assumes that other routers do not want to forward multicast packets',trick:'PIM-SM = Sparse = receivers are rare = assume NO interest by default. Routers must JOIN explicitly (send (*,G) join toward RP). PIM-DM = Dense = assume EVERYONE wants it, flood then prune. Sparse = opt-in. Dense = opt-out.'}},
  {id:'b174',type:'single',originalNum:'Q33',tag:'SD-Access',text:'Which function do transit control plane nodes have in a SD-Access network?',options:[{letter:'A',text:'site aggregate prefix registration'},{letter:'B',text:'layer 2 border handoff'},{letter:'C',text:'site-local control-plane signaling'},{letter:'D',text:'IP-based transit peer network'}],correct:'A',feedback:{correct:'In SD-Access, transit control plane nodes are responsible for site aggregate prefix registration. They register the summarized (aggregate) prefixes of the fabric site with the LISP Map Server, allowing the control plane to track which EIDs (endpoints) belong to which site.',wrong:'A is correct. Transit control plane nodes = register site aggregate prefixes with the LISP Map Server. Layer 2 border handoff (B) is performed by border nodes (L2 handoff to external L2 networks). Site-local control-plane signaling (C) is handled by the local fabric control plane node. IP-based transit peer network (D) describes the transit network type, not the function of the control plane node.',correctAnswer:'A -- site aggregate prefix registration',trick:'SD-Access control plane node roles: Local CP node = handles EID registration for the local fabric site. Transit CP node = handles SITE AGGREGATE prefix registration (summarized prefixes for the transit between sites). Border node = connects fabric to external networks (L2 or L3 handoff).'}},
  {id:'b175',critical:true,type:'single',originalNum:'Q25',tag:'Automation',text:'What is the purpose of a data modeling language?',options:[{letter:'A',text:'to specify the rules for transcoding between text and binary data encodings'},{letter:'B',text:'to describe the structure and meaning of exchanged data'},{letter:'C',text:'to standardize the procedures that are executed when parsing sent and received data'},{letter:'D',text:'to establish a framework to process data by using an object-oriented programming approach'}],correct:'B',feedback:{correct:'A data modeling language (such as YANG) describes the structure and meaning (semantics) of data exchanged between systems. It defines what fields exist, their types, constraints, and relationships — essentially a schema that gives meaning to the data.',wrong:'B is correct. Data modeling language = describes STRUCTURE and MEANING of data (schema + semantics). It does not define transcoding rules between encodings (A) — that is the serialization format\'s job. It does not standardize parsing procedures (C) — parsers are implementation-specific. It is not an OOP framework (D).',correctAnswer:'B -- to describe the structure and meaning of exchanged data',trick:'Data modeling = WHAT the data IS (structure + meaning/semantics). YANG = defines fields, types, constraints, relationships. The MODEL is format-agnostic — it can be encoded as XML or JSON. Think: YANG is the blueprint, XML/JSON is the material used to build it.'}},
  {id:'b176',type:'multi',originalNum:'Q16',tag:'Security',text:'Which two security mechanisms are used by Cisco Threat Defense to gain visibility into the most dangerous cyber threats? (Choose two)',options:[{letter:'A',text:'file reputation'},{letter:'B',text:'VLAN segmentation'},{letter:'C',text:'virtual private networks'},{letter:'D',text:'dynamic enforce policy'},{letter:'E',text:'Traffic Telemetry'}],correct:['A','E'],feedback:{correct:'Cisco Threat Defense uses file reputation (analyzing files against known threat intelligence to classify them as malicious or safe) and Traffic Telemetry (collecting and analyzing network flow data to detect anomalies and threats). These two mechanisms provide visibility into dangerous cyber threats.',wrong:'A (file reputation) and E (Traffic Telemetry) are correct. File reputation = checks files against threat intel databases. Traffic Telemetry = monitors network flows for anomalies. VLAN segmentation (B) is a network isolation technique, not a visibility mechanism. VPNs (C) encrypt traffic but do not provide threat visibility. Dynamic enforce policy (D) is an enforcement action, not a visibility mechanism.',correctAnswer:'A and E -- file reputation and Traffic Telemetry',trick:'Cisco Threat Defense VISIBILITY mechanisms: File Reputation (know if a file is malicious before it runs) + Traffic Telemetry (see what is flowing in the network). Visibility = seeing threats. Enforcement = blocking threats. VLAN/VPN = segmentation/encryption, not threat visibility tools.'}},
  {id:'b177',type:'single',originalNum:'Q23',tag:'SD-WAN',text:'Which role does SD-WAN Validator (formerly vBond) perform in the Cisco Catalyst SD-WAN solution?',options:[{letter:'A',text:'It distributes data plane traffic policies.'},{letter:'B',text:'It exchanges the routing table with the vSmart controller.'},{letter:'C',text:'It onboards devices into the Cisco Catalyst SD-WAN fabric during first-time boot-up.'},{letter:'D',text:'It is responsible for enforcing policies.'}],correct:'C',feedback:{correct:'The SD-WAN Validator (vBond) is the orchestrator of the SD-WAN fabric. Its primary role is to onboard new WAN Edge devices during their first-time boot-up by authenticating them and directing them to the vManage and vSmart controllers. vBond requires a public IP for this reason.',wrong:'C is correct. vBond = orchestration = onboards devices at first boot. Data plane traffic policies (A) are distributed by vSmart (the control plane controller). Routing table exchange (B) happens between vSmart and vEdge routers via OMP. Policy enforcement (D) is done by vEdge routers based on policies from vSmart.',correctAnswer:'C -- onboards devices into the Cisco Catalyst SD-WAN fabric during first-time boot-up',trick:'vBond = the RECEPTIONIST of SD-WAN. New device shows up? vBond authenticates it and points it to vManage + vSmart. Think: vBond = first point of contact = onboarding. vSmart = control plane = policies + routing. vManage = management plane = config + monitoring. vEdge = data plane = forwards traffic.'}},
  {id:'b178',type:'multi',originalNum:'Q41',tag:'Routing',text:'Which two conditions occur when the primary route processor fails on a switch that is using dual route processors with stateful switchover? (Choose two)',options:[{letter:'A',text:'The standby route processor initialization is started when the primary router processor fails.'},{letter:'B',text:'The standby route processor is fully initialized and state information is maintained.'},{letter:'C',text:'Data forwarding can continue along known paths until routing protocol information is restored.'},{letter:'D',text:'User sessions are immediately recreated on the new active route processor.'},{letter:'E',text:'Data forwarding is stopped until the routing protocols reconverge after the switchover.'}],correct:['B','C'],feedback:{correct:'With Stateful Switchover (SSO), the standby route processor is ALREADY fully initialized and has synchronized state information before the failure occurs (B). When the primary fails, the standby takes over instantly without re-initializing, and NSF (Non-Stop Forwarding) allows the data plane to continue forwarding along known paths while routing protocols reconverge (C).',wrong:'B and C are correct. SSO = standby is pre-initialized + state synchronized BEFORE failure. NSF = forwarding continues during reconvergence. Option A is wrong — the standby does NOT start initialization at failure time; it is already initialized (that is the whole point of SSO). Option D is wrong — sessions are maintained, not recreated. Option E is wrong — with NSF, forwarding is NOT stopped during reconvergence.',correctAnswer:'B and C -- standby is fully initialized with state maintained + data forwarding continues along known paths',trick:'SSO = Stateful Switchover = standby is READY BEFORE failure (fully synced). Contrast with RPR (Route Processor Redundancy) where standby must re-initialize on failure. SSO + NSF = uninterrupted forwarding. SSO = control plane redundancy. NSF = data plane continuity during reconvergence. Key: SSO standby is already initialized — no cold start on failover.'}},
  {id:'b179',type:'single',originalNum:'Q42',tag:'Automation',text:'What is a benefit of YANG modules?',options:[{letter:'A',text:'avoidance of ecosystem fragmentation by having fixed modules that cannot be changed'},{letter:'B',text:'tightly coupled models with encoding to improve performance'},{letter:'C',text:'single protocol and model coupling to simplify maintenance and support'},{letter:'D',text:'easier multivendor interoperability provided by common or industry models'}],correct:'D',feedback:{correct:'YANG modules provide easier multivendor interoperability because vendors and standards bodies (like IETF and OpenConfig) publish common/industry YANG models. When devices from different vendors support the same standard YANG models, management tools can interact with all of them using the same data model.',wrong:'D is correct. YANG = common/industry models = multivendor interoperability. Vendors implement standard YANG models (IETF, OpenConfig) so any NMS can manage any vendor\'s device with the same model. Option A is wrong — YANG modules CAN be changed/extended (augmentation). Option B is wrong — YANG is decoupled from encoding (works with XML or JSON). Option C is wrong — YANG supports multiple protocols (NETCONF, RESTCONF), not a single protocol.',correctAnswer:'D -- easier multivendor interoperability provided by common or industry models',trick:'YANG benefit = INTEROPERABILITY. Standard YANG models (IETF/OpenConfig) = same model works across Cisco, Juniper, Arista, etc. YANG is encoding-agnostic (XML or JSON). YANG is protocol-agnostic (NETCONF or RESTCONF). The KEY benefit = write one script using standard YANG = works on any vendor that supports the same model.'}},
  {id:'b180',type:'single',originalNum:'Q38',tag:'Routing',text:'Which behavior can be expected when the HSRP version is changed from 1 to 2?',options:[{letter:'A',text:'Each HSRP group reinitializes because the multicast address has changed'},{letter:'B',text:'No changes occur because version 1 and 2 use the same virtual MAC OUI'},{letter:'C',text:'Each HSRP group reinitializes because the virtual MAC address has changed'},{letter:'D',text:'No changes occur because the standby router is upgraded before the active router'}],correct:'C',feedback:{correct:'When HSRP version is changed from 1 to 2, each HSRP group reinitializes because the virtual MAC address format changes. HSRPv1 uses 0000.0c07.acXX and HSRPv2 uses 0000.0c9f.fXXX — a different OUI and format. This MAC change causes groups to briefly reinitialize.',wrong:'C is correct. Changing HSRP v1→v2 changes the virtual MAC address format (different OUI), causing group reinitialization. Option B is wrong — v1 and v2 do NOT use the same OUI (v1=0000.0c07.acXX, v2=0000.0c9f.fXXX). Option A is wrong — multicast address does change (v1=224.0.0.2, v2=224.0.0.102) but this is not the PRIMARY reason for reinitializing — the MAC change is. Option D is wrong — there is no such upgrade order guarantee.',correctAnswer:'C -- each HSRP group reinitializes because the virtual MAC address has changed',trick:'HSRPv1 virtual MAC: 0000.0c07.ac[group] (group 0-255). HSRPv2 virtual MAC: 0000.0c9f.f[group] (group 0-4095). Different OUI = different MAC = ARP cache changes = groups reinitialize. Also: v1 multicast=224.0.0.2, v2 multicast=224.0.0.102. Changing versions = brief disruption due to MAC change.'}},
  {id:'b181',type:'multi',originalNum:'Q39',tag:'Security',text:'An engineer modifies the existing ISE guest portal URL to use a static FQDN. Users immediately report that they receive certificate errors when they are redirected to the new page. Which two additional configuration steps are needed to implement the change? (Choose two)',options:[{letter:'A',text:'Manually configure the hosts file on each user device'},{letter:'B',text:'Create and sign a new CSR that contains the static FQDN entry'},{letter:'C',text:'Disable HTTPS on the WLC under the Management menu'},{letter:'D',text:'Add a new DNS record to resolve the FQDN to the PSN IP address'},{letter:'E',text:'Add the FQDN entry under the WLC virtual interface'}],correct:['B','D'],feedback:{correct:'When changing the ISE guest portal to use a static FQDN: (B) A new Certificate Signing Request (CSR) must be created with the new FQDN as the Common Name/SAN and signed so the certificate matches the URL — without this, browsers show certificate errors. (D) A DNS record must be added so the FQDN resolves to the ISE PSN IP address, allowing clients to reach the portal.',wrong:'B and D are correct. New FQDN = new certificate needed (CSR with FQDN in CN/SAN) + DNS record to resolve FQDN to PSN IP. Hosts file on each device (A) is impractical and not the correct approach. Disabling HTTPS (C) would remove security entirely — wrong. FQDN under WLC virtual interface (E) is for WLC web redirect, not for ISE portal FQDN — ISE handles its own portal certificate.',correctAnswer:'B and D -- create/sign new CSR with FQDN + add DNS record resolving FQDN to PSN IP',trick:'ISE FQDN portal change = TWO things needed: (1) Certificate with new FQDN in CN/SAN (create CSR → sign → install on ISE PSN). (2) DNS record: FQDN → PSN IP. Without DNS = cannot resolve. Without cert = certificate error (CN mismatch). Both are required. WLC virtual interface FQDN is for WLC-initiated redirects, not for ISE portal URL.'}},
  {id:'b182',type:'single',originalNum:'Q7',tag:'SD-Access',text:'Which function does a Cisco SD-Access extended node perform?',options:[{letter:'A',text:'performs tunneling between fabric and nonfabric devices to route traffic over unknown networks'},{letter:'B',text:'in charge of establishing Layer 3 adjacencies with nonfabric unmanaged node'},{letter:'C',text:'provides fabric extension to nonfabric devices through remote registration and configuration'},{letter:'D',text:'used to extend the fabric connecting to downstream nonfabric enabled Layer 2 switches'}],correct:'D',feedback:{correct:'An SD-Access extended node extends the fabric edge to downstream nonfabric-enabled Layer 2 switches. It connects to a fabric edge node and allows Layer 2 switches that do not support SD-Access (such as access layer switches without SDA capability) to participate in the fabric by connecting through the extended node.',wrong:'D is correct. Extended node = connects fabric edge to downstream L2 switches (non-SDA capable). It extends the fabric boundary outward. Option A describes tunneling — that is the fabric edge or border node function. Option B (L3 adjacencies with nonfabric nodes) describes a border node function. Option C (remote registration) is closer to the fabric edge or Cisco DNA Center PnP function.',correctAnswer:'D -- used to extend the fabric connecting to downstream nonfabric enabled Layer 2 switches',trick:'SD-Access node roles: Edge node = connects endpoints directly. Border node = connects fabric to external networks. Control plane node = LISP map server. Extended node = hangs off edge node = allows non-SDA L2 switches to connect into the fabric. Think: Extended = reach further out to legacy L2 switches.'}},
  {id:'b183',type:'single',originalNum:'Q21',tag:'SD-Access',text:'Which device is responsible for finding EID-to-RLOC mappings when traffic is sent to a LISP-capable site?',options:[{letter:'A',text:'egress tunnel router'},{letter:'B',text:'ingress tunnel router'},{letter:'C',text:'map server'},{letter:'D',text:'map resolver'}],correct:'B',feedback:{correct:'The Ingress Tunnel Router (ITR) is responsible for finding EID-to-RLOC mappings. When a packet arrives destined for an EID outside the local site, the ITR sends a Map-Request to the Map Resolver to find the RLOC (the remote ETR\'s address), then encapsulates and forwards the packet.',wrong:'B is correct. ITR = Ingress = traffic enters the LISP site here → ITR looks up EID-to-RLOC mapping (sends Map-Request). ETR = Egress = traffic exits the LISP site, responds to Map-Requests. Map Server = stores EID-to-RLOC registrations from ETRs. Map Resolver = answers Map-Requests sent by ITRs (but the LOOKUP is initiated by the ITR, not the Map Resolver).',correctAnswer:'B -- ingress tunnel router',trick:'LISP lookup flow: ITR receives packet → sends Map-Request to Map Resolver → Map Resolver returns RLOC → ITR encapsulates + forwards to ETR. ITR = the one who NEEDS the mapping. ETR = the one who HAS the mapping (registered it with Map Server). Map Resolver = the phone book. ITR = the one who calls the phone book.'}},
  {id:'b37',critical:true,type:'single',originalNum:'Q72',tag:'SD-Access',text:'What is a characteristic of Cisco Catalyst Center southbound APIs?',options:[{letter:'A',text:'simplifies management of network devices'},{letter:'B',text:'implements monitoring by using the SOAP protocol'},{letter:'C',text:'utilizes REST API'},{letter:'D',text:'enables orchestration and automation of network devices based on intent'}],correct:'A',feedback:{correct:'Cisco Catalyst Center southbound APIs communicate downward to network devices to simplify their management. Southbound interfaces handle the controller-to-device communication layer.',wrong:'Southbound = controller talking DOWN to devices = simplifies device management. REST API is used for northbound APIs (apps talking TO Catalyst Center). SOAP is not used. Intent-based orchestration is a northbound/platform feature.',correctAnswer:'A -- simplifies management of network devices',trick:'Northbound = apps talk TO Catalyst Center (REST). Southbound = Catalyst Center talks TO devices (simplifies management). South = below = devices.'}}
];

var ENARSI_BUILTIN=[
  {id:'e0',type:'single',tag:'OSPF',text:'Refer to the exhibit. OSPF adjacency failed on device CSR103.ap.com, GigabitEthernet2.\n\nshow ip ospf interface GigabitEthernet2:\n  Cryptographic authentication enabled\n  Sending SA: Key 1, Algorithm HMAC-SHA-256 - key chain ospf\n  Rollover in progress, 1 neighbor(s) using the old key(s):\n    key id 1 algorithm MD5\n\n%OSPF-5-ADJCHG: Nbr 172.16.100.5 on GigabitEthernet2 from FULL to DOWN, Dead timer expired\n\nWhich configuration resolves the issue?',options:[{letter:'A',text:'Option A:\nrouter ospf 1\n area 1 authentication message-digest\ninterface GigabitEthernet 2\n ip ospf message-digest-key 1 md5 cisco'},{letter:'B',text:'Option B:\ninterface GigabitEthernet 2\n ip ospf message-digest-key 1 md5 cisco\n ip ospf authentication message-digest'},{letter:'C',text:'Option C:\ninterface GigabitEthernet 2\n ip ospf key 1 cisco\n ip ospf authentication'},{letter:'D',text:'Option D:\nkey chain ospf\n key 1\n  key-string 7 02050D480809\n  cryptographic-algorithm hmac-sha-1\ninterface GigabitEthernet2\n ip ospf authentication key-chain ospf'}],correct:'B',feedback:{correct:'The neighbor (172.16.100.5) uses MD5 (old key). Configure the local interface with matching MD5 using ip ospf message-digest-key + ip ospf authentication message-digest.',wrong:'The neighbor still uses MD5 while local router uses SHA-256 key chain. Must configure matching MD5 on the interface to restore adjacency.',correctAnswer:'B -- int GigabitEthernet 2 / ip ospf message-digest-key 1 md5 cisco / ip ospf authentication message-digest'}},
  {id:'e1',type:'single',tag:'Redistribution',text:'Refer to the exhibit. OSPF AREA 0 between R2-R1. EIGRP 100 between R1-R3. R3 networks: 192.168.8.0/21, 192.168.7.0/24, 192.168.200.0/24, 192.168.15.0/24.\n\nR1 redistributes EIGRP into OSPF using route-map FROM->EIGRP which references ACL 10:\n  Standard IP access list 10\n    10 permit 192.168.16.0, wildcard bits 0.0.3.255\n    11 permit 192.168.0.0, wildcard bits 0.0.7.255\n    20 deny any\n\nR2 cannot access 192.168.7.0/24 and 192.168.15.0/24 subnets. Which configuration resolves the issue?',options:[{letter:'A',text:'R1(config)#ip access-list standard 10\nR1(config-std-nacl)#no 10 permit\nR1(config-std-nacl)#no 11 permit\nR1(config-std-nacl)#10 permit 192.168.0.0 0.0.3.255\nR1(config-std-nacl)#11 permit 192.168.8.0 0.0.3.255'},{letter:'B',text:'R1(config)#ip access-list standard 10\nR1(config-std-nacl)#no 10 permit\nR1(config-std-nacl)#no 11 permit\nR1(config-std-nacl)#10 permit 192.168.0.0 0.0.7.255\nR1(config-std-nacl)#11 permit 192.168.8.0 0.0.3.255'},{letter:'C',text:'R1(config)#ip access-list standard 10\nR1(config-std-nacl)#no 10 permit\nR1(config-std-nacl)#no 11 permit\nR1(config-std-nacl)#10 permit 192.168.0.0 0.0.3.255\nR1(config-std-nacl)#11 permit 192.168.8.0 0.0.7.255'},{letter:'D',text:'R1(config)#ip access-list standard 10\nR1(config-std-nacl)#no 10 permit\nR1(config-std-nacl)#no 11 permit\nR1(config-std-nacl)#10 permit 192.168.4.0 0.0.3.255\nR1(config-std-nacl)#11 permit 192.168.12.0 0.0.3.255'}],correct:'D',feedback:{correct:'192.168.7.0 falls in 192.168.4.0-7.255 (wildcard 0.0.3.255). 192.168.15.0 falls in 192.168.12.0-15.255 (wildcard 0.0.3.255). Option D covers both ranges precisely.',wrong:'Wildcard 0.0.3.255 = /22 block. .7.0 is in .4.0-.7.255. .15.0 is in .12.0-.15.255. The original ACL entries do not cover these ranges.',correctAnswer:'D -- 192.168.4.0 0.0.3.255 + 192.168.12.0 0.0.3.255'}},
  {id:'e2',type:'single',tag:'Automation',text:'Refer to the exhibit. A network administrator has developed a Python script on the local Linux machine and is trying to transfer it to the router. However, the transfer fails.\n\nadmin@linux:~$ scp script.py admin@198.51.100.64:script.py\nPassword:\nAdministratively disabled.\nadmin@linux:~$ Connection to 198.51.100.64 closed by remote host.\n\nWhich action resolves this issue?',options:[{letter:'A',text:'The SSH service must be enabled with the crypto key generate rsa command'},{letter:'B',text:'The Python interpreter must first be enabled with the guestshell enable command'},{letter:'C',text:'The SSH access must be allowed on the VTY lines using the transport input ssh command'},{letter:'D',text:'The SCP service must be enabled with the ip scp server enable command'}],correct:'D',feedback:{correct:'"Administratively disabled" means SCP server is not enabled on the router. SSH works fine (authentication succeeded). Enable SCP with: ip scp server enable.',wrong:'SSH is already working (authentication succeeded). SCP is a separate service built on top of SSH that must be explicitly enabled.',correctAnswer:'D -- ip scp server enable'}},
  {id:'e3',type:'single',tag:'Security',text:'The network administrator configured CoPP so that all routing protocol traffic toward the router CPU is limited to 1 mbps. All traffic that exceeds this limit must be dropped. The router is running BGP and OSPF. Management traffic for Telnet and SSH must be limited to 500 kbps. No traffic is filtering through CoPP, resulting in high CPU utilization. Which configuration resolves the issue?\n\nExisting config:\naccess-list 100 permit tcp any any eq 179\naccess-list 100 permit tcp any any range 22 23\naccess-list 100 permit ospf any any\nclass-map CM-ROUTING\n match access-group 100\nclass-map CM-MGMT\n match access-group 100\npolicy-map PM-COPP\n class CM-ROUTING\n  police 1000000 conform-action transmit\n class CM-MGMT\n  police 500000 conform-action transmit\ncontrol-plane\n service-policy output PM-COPP',options:[{letter:'A',text:'Option A:\nno access-list 100\naccess-list 100 permit tcp any any eq 179\naccess-list 100 permit ospf any any\naccess-list 101 permit tcp any any range 22 23\nclass-map CM-MGMT\n no match access-group 100\n match access-group 101'},{letter:'B',text:'Option B:\nno access-list 100\naccess-list 100 permit tcp any any eq 179\naccess-list 100 permit ospf any any\naccess-list 101 permit tcp any any range 22 23\nclass-map CM-MGMT\n no match access-group 100\n match access-group 101\ncontrol-plane\n no service-policy output PM-COPP\n service-policy input PM-COPP'},{letter:'C',text:'Option C:\nno access-list 100\naccess-list 100 permit tcp any any eq 179\naccess-list 100 permit tcp any any range eq 22\naccess-list 100 permit tcp any any range eq 23\naccess-list 100 permit ospf any any'},{letter:'D',text:'Option D:\ncontrol-plane\n no service-policy output PM-COPP\n service-policy input PM-COPP'}],correct:'B',feedback:{correct:'Two fixes needed: (1) Separate ACLs so CM-ROUTING and CM-MGMT do not overlap. (2) CoPP must use "service-policy input" on the control-plane — not output.',wrong:'CoPP polices traffic destined TO the CPU = inbound. "service-policy output" does nothing for CoPP. Also both class-maps matching the same ACL causes overlap.',correctAnswer:'B -- separate ACLs + change service-policy from output to input'}},
  {id:'e4',type:'multi',tag:'MPLS',text:'What are two functions of MPLS Layer 3 VPNs? (Choose two)',options:[{letter:'A',text:'BGP is used for signaling customer VPNv4 routes between PE nodes.'},{letter:'B',text:'It is used for transparent point-to-multipoint connectivity between Ethernet links/sites.'},{letter:'C',text:'LDP and BGP can be used for Pseudowire signaling.'},{letter:'D',text:'A packet with node segment ID is forwarded along with shortest path to destination.'},{letter:'E',text:'Customer traffic is encapsulated in a VPN label when it is forwarded in MPLS network.'}],correct:['A','E'],feedback:{correct:'A: MP-BGP carries VPNv4 routes between PE routers. E: Customer traffic uses dual labels — outer (transport) and inner (VPN label).',wrong:'B=L2VPN/VPLS (transparent Ethernet). C=L2 Pseudowires use LDP/BGP. D=Segment Routing node SID concept.',correctAnswer:'A and E'}},
  {id:'e5',type:'single',tag:'MPLS',text:'Which MPLS value is combined with the IP prefix to convert to a VPNv4 prefix?',options:[{letter:'A',text:'8-byte Route Distinguisher'},{letter:'B',text:'16-byte Route Distinguisher'},{letter:'C',text:'8-byte Route Target'},{letter:'D',text:'16-byte Route Target'}],correct:'A',feedback:{correct:'The Route Distinguisher (RD) is 8 bytes (64 bits). Prepending it to a 32-bit IPv4 prefix creates a 96-bit VPNv4 prefix unique across VRFs.',wrong:'Route Target (RT) controls VRF import/export policy — it does NOT form VPNv4 addresses. The RD is 8 bytes, not 16.',correctAnswer:'A -- 8-byte Route Distinguisher'}},
  {id:'e6',type:'single',tag:'Security',text:'Refer to the exhibit. A CoPP policy is implemented to allow specific control traffic, but the traffic is not matching as expected and is getting unexpected behavior.\n\nip access-list extended CoPP-ICMP\n permit icmp any any echo\nip access-list extended CoPP-BGP\n permit tcp any eq bgp any established\nip access-list extended CoPP-EIGRP\n permit eigrp any host 224.0.0.10\nClass-map match-all CoPP-CLASS\n match access-group name CoPP-ICMP\n match access-group name CoPP-BGP\n match access-group name CoPP-EIGRP\n\nWhich action resolves the issue?',options:[{letter:'A',text:'Use match-any instruction in class-map'},{letter:'B',text:'Use default class to match ICMP traffic'},{letter:'C',text:'Create a separate class-map against each ACL'},{letter:'D',text:'Create a separate class-map for ICMP traffic'}],correct:'A',feedback:{correct:'match-all requires ALL conditions to match simultaneously (a packet being ICMP AND BGP AND EIGRP is impossible). Change to match-any so any one matching ACL classifies the packet.',wrong:'match-all = AND logic. No packet matches all three protocols at once. Use match-any for OR logic.',correctAnswer:'A -- change class-map to match-any'}},
