var BUILTIN=[
  {id:'b0',type:'dragdrop',originalNum:'Q22',tag:'LISP',text:'Drag and drop the LISP components onto the function they perform. Tap a chip to select it, then tap a slot to place it. Not all options are used.',items:[{num:1,text:'accepts LISP encapsulated map requests'},{num:2,text:'None (unused option)'},{num:3,text:'learns of EID prefix mapping entries from an ETR'},{num:4,text:'receives traffic from LISP sites and sends it to non-LISP sites'},{num:5,text:'receives packets from site-facing interfaces'}],groups:[{label:'LISP map server',correct:[1]},{label:'LISP route reflector',correct:[2]},{label:'LISP map resolver',correct:[3]},{label:'LISP proxy ETR',correct:[4]},{label:'LISP ITR',correct:[5]}],feedback:{correct:'All correct! Map server=encapsulated requests, route reflector=None/unused, map resolver=learns EID from ETR, proxy ETR=LISP to non-LISP, ITR=site-facing interfaces.',wrong:'map server=accepts encapsulated requests | route reflector=None(unused) | map resolver=learns EID from ETR | proxy ETR=LISP-to-non-LISP | ITR=site-facing interfaces.',correctAnswer:'map server=1 | route reflector=2 | map resolver=3 | proxy ETR=4 | ITR=5'}},
  {id:'b1',type:'dragdrop',originalNum:'Q1',tag:'QoS',text:'Drag and drop the QoS descriptions onto the correct component. Tap a chip to select, then tap a slot.',items:[{num:1,text:'causes TCP retransmission when traffic is dropped'},{num:2,text:'buffers excessive traffic'},{num:3,text:'introduces no delay and jitter'},{num:4,text:'introduces delay and jitter'},{num:5,text:'drops excessive traffic'},{num:6,text:'typically delays, rather than drops traffic'}],groups:[{label:'Traffic Policing',correct:[1,3,5]},{label:'Traffic Shaping',correct:[2,4,6]}],feedback:{correct:'Traffic Policing: drops immediately (TCP retransmit, no delay, drops excess). Traffic Shaping: buffers (adds delay/jitter, delays rather than drops).',wrong:'Policing(1,3,5)=drops immediately. Shaping(2,4,6)=buffers/delays.',correctAnswer:'Policing:1,3,5 | Shaping:2,4,6'}},
  {id:'b2',type:'single',originalNum:'Q9',tag:'BGP',text:'An engineer must ensure all traffic leaving AS 200 chooses Link 2 as the exit point. AS 100: R1,R2. AS 200: R3,R4. Link 1: R1-R3. Link 2: R2-R4. Which configuration accomplishes this?',options:[{letter:'A',text:'R3(config-router)#neighbor 10.1.1.1 weight 200'},{letter:'B',text:'R3(config-router)#bgp default local-preference 200'},{letter:'C',text:'R4(config-router)#bgp default local-preference 200'},{letter:'D',text:'R4(config-router)#neighbor 10.2.2.2 weight 200'}],correct:'C',feedback:{correct:'Local-preference propagates via iBGP to all AS 200 routers. Setting it on R4 (Link 2) makes R3 also prefer Link 2.',wrong:'Local-preference spreads within the AS via iBGP. Weight is local to one router only.',correctAnswer:'C -- R4(config-router)#bgp default local-preference 200'}},
  {id:'b3',type:'single',originalNum:'Q25',tag:'NETCONF',text:'An engineer must configure R1 to allow only NETCONF connections from the management VLAN (172.16.2.0/24). The ACL "netconfacl" already exists. Which command completes this?',options:[{letter:'A',text:'R1(config)# netconf-yang ssh ipv4 access-list name netconfacl'},{letter:'B',text:'R1(config-if)# ip access-group netconfacl out'},{letter:'C',text:'R1(config)# ip http secure-server\nR1(config)# ip http accounting commands 12 default'},{letter:'D',text:'R1(config-if)# ip access-group netconfacl in'}],correct:'A',feedback:{correct:'netconf-yang ssh ipv4 access-list name binds an ACL to the NETCONF management plane.',wrong:'netconf-yang ssh ipv4 access-list name is the correct IOS-XE command. Interface ACLs are data plane only.',correctAnswer:'A -- netconf-yang ssh ipv4 access-list name netconfacl'}},
  {id:'b4',type:'single',originalNum:'Q48',tag:'SD-WAN',text:'Which technology provides an overlay fabric to connect remote locations utilizing commodity data paths and improves network performance, boosts security and reduces costs?',options:[{letter:'A',text:'InfiniBand'},{letter:'B',text:'VXLAN'},{letter:'C',text:'VTEP'},{letter:'D',text:'SD-WAN'}],correct:'D',feedback:{correct:'SD-WAN provides WAN overlay over commodity internet with path selection, encryption, and cost reduction.',wrong:'SD-WAN is for WAN overlay. VXLAN=DC overlay. VTEP=VXLAN component. InfiniBand=HPC.',correctAnswer:'D -- SD-WAN'}},
  {id:'b5',type:'single',originalNum:'Q54',tag:'Automation',text:'Why would an engineer use YANG?',options:[{letter:'A',text:'to translate JSON into an equivalent XML syntax'},{letter:'B',text:'to access data using SNMP'},{letter:'C',text:'to model data for NETCONF'},{letter:'D',text:'to transport data between a controller and a network device'}],correct:'C',feedback:{correct:'YANG is a data modeling language defining structure and constraints of data managed by NETCONF.',wrong:'YANG models data structure for NETCONF. Not transport. Not translation.',correctAnswer:'C -- to model data for NETCONF'}},
  {id:'b6',type:'single',originalNum:'Q65',tag:'Security',text:'An engineer must configure EXEC authorization that first checks a AAA server then local username. If both fail, user is denied. Which configuration?',options:[{letter:'A',text:'aaa authorization exec default local group radius none'},{letter:'B',text:'aaa authorization exec default group radius local none'},{letter:'C',text:'aaa authorization exec default local group tacacs+'},{letter:'D',text:'aaa authorization exec default group radius local'}],correct:'D',feedback:{correct:'"group radius local" = RADIUS first, then local. No "none" = implicit deny if all methods fail.',wrong:'Method order = checking order. Without "none", failure = deny. Option B adds "none" allowing access on failure.',correctAnswer:'D -- aaa authorization exec default group radius local'}},
  {id:'b7',type:'single',originalNum:'Q66',tag:'SD-WAN',text:'Which action is the vSmart controller responsible for in an SD-WAN deployment?',options:[{letter:'A',text:'distribute security information for tunnel establishment between vEdge routers'},{letter:'B',text:'onboard vEdge nodes into the SD-WAN fabric'},{letter:'C',text:'gather telemetry data from vEdge routers'},{letter:'D',text:'manage, maintain, and gather configuration and status for nodes within the SD-WAN fabric'}],correct:'A',feedback:{correct:'vSmart (control plane) distributes OMP routes and IPsec keys for tunnel establishment.',wrong:'vSmart=security/routing(A). vBond=onboarding(B). vManage=telemetry+config(C,D).',correctAnswer:'A -- distribute security information for tunnel establishment'}},
  {id:'b8',type:'single',originalNum:'Q68',tag:'SD-Access',text:'In a Cisco SD-Access solution, what is the role of the Identity Services Engine?',options:[{letter:'A',text:'It manages the LISP EID database.'},{letter:'B',text:'It is used to analyze endpoint to app flows and monitor fabric status.'},{letter:'C',text:'It is leveraged for dynamic endpoint to group mapping and policy definition.'},{letter:'D',text:'It provides GUI management and abstraction via apps that share context.'}],correct:'C',feedback:{correct:'ISE authenticates endpoints, assigns SGTs, and defines group-based access policies.',wrong:'ISE=identity+SGT+policy(C). DNA Center=fabric+GUI(D). Flow analysis=Stealthwatch.',correctAnswer:'C -- dynamic endpoint to group mapping and policy definition'}},
  {id:'b9',type:'single',originalNum:'Q74',tag:'SD-WAN',text:'Which function is performed by vSmart in the Cisco SD-WAN architecture?',options:[{letter:'A',text:'redistribution between OMP and other routing protocols'},{letter:'B',text:'facilitation of NAT detection and traversal'},{letter:'C',text:'execution of localized policies'},{letter:'D',text:'aggregation and distribution of VPN routing information'}],correct:'D',feedback:{correct:'vSmart aggregates VPN routing from all vEdges via OMP and distributes it across the overlay.',wrong:'vSmart=aggregates+distributes VPN routing(D). NAT=vBond(B). Localized policies=vEdge(C). OMP-IGP redistribution=vEdge(A).',correctAnswer:'D -- aggregation and distribution of VPN routing information'}},
  {id:'b10',type:'single',originalNum:'Q78',tag:'Routing',text:'When using BFD in a network design, which consideration must be made?',options:[{letter:'A',text:'BFD is used with first hop routing protocols to provide subsecond convergence.'},{letter:'B',text:'BFD is used with dynamic routing protocols to provide subsecond convergence.'},{letter:'C',text:'BFD is used with NSF and graceful to provide subsecond convergence.'},{letter:'D',text:'BFD is more CPU-intensive than using reduced hold timers with routing protocols.'}],correct:'B',feedback:{correct:'BFD works with dynamic routing protocols for sub-second failure detection in the forwarding plane.',wrong:'BFD pairs with routing protocols. Less CPU-intensive than reduced timers. Not FHRP. Not NSF.',correctAnswer:'B -- BFD is used with dynamic routing protocols'}},
  {id:'b11',type:'multi',originalNum:'ACL-FTP',tag:'Security',text:'Which two commands are required on R1 to block FTP and allow all other traffic from Branch 2? (Choose two)',options:[{letter:'A',text:'Option A:\ninterface GigabitEthernet0/0\nip address 10.0.0.1 255.255.255.0\nip access-group 101 out'},{letter:'B',text:'Option B:\ninterface GigabitEthernet0/0\nip address 10.0.101.1 255.255.255.0\nip access-group 101 in'},{letter:'C',text:'Option C:\naccess-list 101 deny tcp 10.0.2.0 0.0.0.255 host 10.0.101.3 eq ftp-data\naccess-list 101 permit ip any any'},{letter:'D',text:'Option D:\naccess-list 101 deny tcp 10.0.2.0 0.0.0.255 host 10.0.101.3 eq ftp\naccess-list 101 deny tcp 10.0.2.0 0.0.0.255 host 10.0.101.3 eq ftp-data\naccess-list 101 permit ip any any'},{letter:'E',text:'Option E:\naccess-list 101 deny tcp 10.0.2.0 0.0.0.255 host 10.0.101.3 eq ftp\naccess-list 101 permit ip any any'}],correct:['A','D'],feedback:{correct:'Option A applies ACL outbound correctly. Option D blocks BOTH ftp(21) AND ftp-data(20).',wrong:'Need ftp(21) AND ftp-data(20). D blocks both. C only ftp-data. E only ftp control.',correctAnswer:'A and D'}},
  {id:'b12',type:'matching',originalNum:'Q16',tag:'Virtualization',text:'Match the virtual components to their descriptions.',pairs:[{component:'VMX',description:'configuration file containing settings for a virtual machine such as guest OS'},{component:'vNIC',description:'component of a virtual machine responsible for sending packets to the hypervisor'},{component:'OVA',description:'zip file connecting a virtual machine configuration file and a virtual disk'},{component:'VMDK',description:'file containing a virtual machine disk drive'}],feedback:{correct:'VMX=config file, vNIC=virtual NIC, OVA=zip archive, VMDK=virtual disk.',wrong:'VMX=config | vNIC=virtual NIC | OVA=zip | VMDK=disk.',correctAnswer:'VMX=config | vNIC=NIC | OVA=zip | VMDK=disk'}},
  {id:'b13',type:'multi',originalNum:'Q6',tag:'Security',text:'Which two characteristics apply to the endpoint security aspect of the Cisco Threat Defense architecture? (Choose two)',options:[{letter:'A',text:'blocking of fileless malware in real time'},{letter:'B',text:'outbound URL analysis and data transfer controls'},{letter:'C',text:'cloud-based analysis of threats'},{letter:'D',text:'user context analysis'},{letter:'E',text:'detect and block ransomware in email attachments'}],correct:['B','E'],feedback:{correct:'Endpoint security: outbound URL analysis/data transfer controls(B) + email ransomware detection(E).',wrong:'B=URL analysis(endpoint). E=email ransomware(endpoint). A=network/AMP. C=cloud. D=identity.',correctAnswer:'B and E'}},
  {id:'b14',type:'single',originalNum:'JSON-1',tag:'Automation',text:'Which JSON syntax is valid?',options:[{letter:'A',text:'{"switch":{"name":"dist1","interfaces":["gig1","gig2","gig3"]}}'},{letter:'B',text:'{"switch":"name":"dist1","interfaces":["gig1","gig2","gig3"]}'},{letter:'C',text:'{/"switch/":{/"name/":"dist1",/"interfaces/":["gig1","gig2","gig3"]}}'},{letter:'D',text:"{'switch':('name':'dist1','interfaces':['gig1','gig2','gig3'])}"}],correct:'A',feedback:{correct:'A: correct double quotes, {} objects, [] arrays.',wrong:'JSON = double quotes, {} objects, [] arrays. No slashes. No single quotes.',correctAnswer:'A -- {"switch":{"name":"dist1","interfaces":["gig1","gig2","gig3"]}}'}},
  {id:'b15',type:'single',originalNum:'JSON-2',tag:'Automation',text:'Which JSON syntax is derived from a data structure with a "Person" key containing a list of two people, each with First Name, Last Name, and a Hobbies array?',options:[{letter:'A',text:"Option A: {'Person': [{'First Name': 'Johnny', 'Last Name': 'Table', 'Hobbies': ['Running', 'Video games']}, {'First Name': 'Billy', 'Last Name': 'Smith', 'Hobbies': ['Napping', 'Reading']}]}"},{letter:'B',text:"Option B: {[{'First Name': 'Johnny', 'Last Name': 'Table', 'Hobbies': 'Running', 'Hobbies': 'Video games'}, ...]}"},{letter:'C',text:"Option C: {'Person': [{'First Name':'Johnny', 'Last Name': 'Table', 'Hobbies': 'Running', 'Video games'}, ...]}"},{letter:'D',text:"Option D: {[{'First Name': 'Johnny', 'Last Name': 'Table', 'Hobbies': ['Running', 'Video games']}, ...]}"}],correct:'A',feedback:{correct:'A: "Person" key at top level, Hobbies as proper array.',wrong:'D is missing "Person" wrapper. B duplicates Hobbies key. C lists Hobbies as flat properties.',correctAnswer:'A -- Person key wrapping objects with Hobbies arrays'}},
  {id:'b16',type:'multi',originalNum:'Q76',tag:'Security',text:'Which two new security capabilities are introduced by using a next-generation firewall at the Internet edge? (Choose two)',options:[{letter:'A',text:'integrated intrusion prevention'},{letter:'B',text:'DVPN'},{letter:'C',text:'application-level inspection'},{letter:'D',text:'stateful packet inspection'},{letter:'E',text:'NAT'}],correct:['A','C'],feedback:{correct:'NGFWs add integrated IPS(A) and application-level inspection(C) beyond traditional firewalls.',wrong:'A=IPS(new in NGFW). C=App inspection(new in NGFW). D+E=traditional FW features. B=VPN tech.',correctAnswer:'A and C'}},
  {id:'b17',type:'single',originalNum:'Q-vBond',tag:'SD-WAN',text:'What is the function of vBond in a Cisco SD-WAN deployment?',options:[{letter:'A',text:'pushing of configuration toward SD-WAN routers'},{letter:'B',text:'initiating connections with SD-WAN routers automatically'},{letter:'C',text:'onboarding of SDWAN routers into the SD-WAN overlay'},{letter:'D',text:'gathering telemetry data from SD-WAN routers'}],correct:'C',feedback:{correct:'vBond is the orchestration plane controller. It authenticates and onboards vEdge routers into the SD-WAN overlay, and facilitates NAT traversal so devices can find each other across the internet.',wrong:'vBond handles onboarding/orchestration (C). Pushing config = vManage (A). Gathering telemetry = vManage (D). vBond initiates the onboarding process but it is the vEdge that initiates the connection to vBond, not the other way around (B).',correctAnswer:'C -- onboarding of SDWAN routers into the SD-WAN overlay',trick:'vBond = BOND -- it bonds/connects new devices to the fabric. Think of it as the bouncer that lets vEdge routers in.'}},
  {id:'b18',type:'single',originalNum:'Q-DTLS',tag:'SD-WAN',text:'Which protocol is used to encrypt control plane traffic between SD-WAN controllers and SD-WAN endpoints?',options:[{letter:'A',text:'DTLS'},{letter:'B',text:'IPsec'},{letter:'C',text:'PGP'},{letter:'D',text:'HTTPS'}],correct:'A',feedback:{correct:'DTLS (Datagram Transport Layer Security) is used to encrypt control plane traffic between SD-WAN controllers (vSmart, vBond, vManage) and vEdge routers. IPsec is used for data plane encryption between vEdge routers.',wrong:'The correct answer is A. DTLS encrypts the control plane (OMP sessions between controllers and vEdge). IPsec encrypts the data plane tunnels between vEdge routers. PGP and HTTPS are not used in SD-WAN control plane encryption.',correctAnswer:'A -- DTLS (Datagram Transport Layer Security)',trick:'DTLS = Directors (controllers) talking to vEdge = control plane. IPsec = Interstate highway between vEdges = data plane. D for Directors, I for Interstate.'}},
  {id:'b19',type:'single',originalNum:'Q-MACsec',tag:'Security',text:'What is a characteristic of MACsec?',options:[{letter:'A',text:'802.1AE is built between the host and switch using the MKA protocol, which negotiates encryption keys based on the master session key from a successful 802.1X session'},{letter:'B',text:'802.1AE is built between the host and switch using the MKA protocol using keys generated via the Diffie-Hellman algorithm (anonymous encryption mode)'},{letter:'C',text:'802.1AE is negotiated using Cisco AnyConnect NAM and the SAP protocol'},{letter:'D',text:'802.1AE provides encryption and authentication services'}],correct:'A',feedback:{correct:'MACsec (802.1AE) uses the MKA (MACsec Key Agreement) protocol to negotiate encryption keys. The keys are derived from the master session key (MSK) established during a successful 802.1X authentication session.',wrong:'The correct answer is A. MACsec uses MKA with keys from 802.1X authentication (MSK), not Diffie-Hellman. Diffie-Hellman would be anonymous mode which is not standard MACsec. AnyConnect NAM can initiate 802.1X but SAP is not the negotiation protocol. MACsec does provide encryption and authentication but that describes what it does, not how it works.',correctAnswer:'A -- MKA protocol with keys from successful 802.1X session',trick:'MACsec = 802.1AE. MKA = MACsec Key Agreement. Keys come from the 802.1X MSK (Master Session Key). Remember: 802.1X authenticates → MSK born → MKA uses MSK to negotiate encryption.'}},
  {id:'b20',type:'single',originalNum:'Q-Python1',tag:'Automation',text:'A network engineer must use a Python script to convert data received from a network device. Which type of data is printed to the console when the script runs? The script defines a vlan() function that splits lines by newline, skips empty lines, splits each line by \'=>\' into key-value pairs, stores them in a dictionary called vlan_list_dict, and returns it. The main() function calls vlan() and prints the result.',options:[{letter:'A',text:'a tuple list'},{letter:'B',text:'list of strings'},{letter:'C',text:'list of lists'},{letter:'D',text:'dictionary with a key-value pair'}],correct:'D',feedback:{correct:'The vlan() function creates vlan_list_dict = {} which is a dictionary, stores key-value pairs in it using vlan_list_dict[k] = v, and returns it. print_vlan() then prints this dictionary to the console.',wrong:'The correct answer is D. The code explicitly creates a dictionary {} and populates it with k,v pairs split by "=>". It is not a list, tuple, or list of lists. The variable name vlan_list_dict and the k=key v=value pattern are the giveaways.',correctAnswer:'D -- dictionary with a key-value pair',trick:'vlan_list_dict = {} → curly braces = dictionary! Split by "=>" into k,v = key-value pairs. The variable name even says "dict". {} = dict, [] = list, () = tuple.'}},
  {id:'b21',type:'single',originalNum:'Q-Hypervisor',tag:'Virtualization',text:'A server running Linux is providing support for virtual machines along with DNS and DHCP services for a small business. Which technology does this represent?',options:[{letter:'A',text:'Type 1 hypervisor'},{letter:'B',text:'hardware pass-through'},{letter:'C',text:'Type 2 hypervisor'},{letter:'D',text:'container'}],correct:'C',feedback:{correct:'A Type 2 hypervisor (hosted hypervisor) runs on top of an existing operating system like Linux. It supports VMs while the host OS continues running other services like DNS and DHCP. Examples include VMware Workstation and Microsoft Virtual PC.',wrong:'The correct answer is C. A Type 1 hypervisor runs directly on bare metal hardware with no host OS underneath. Type 2 runs on top of an OS — the Linux server here is the host OS. Containers share the host OS kernel and are not hypervisors.',correctAnswer:'C -- Type 2 hypervisor (runs on top of host OS)',trick:'Type 1 = bare metal (no OS underneath). Type 2 = hosted on top of an OS. Linux still running DNS/DHCP = host OS is alive = Type 2.'}},
  {id:'b22',type:'single',originalNum:'Q-LISP-ETR',tag:'LISP',text:'Which LISP device is responsible for publishing EID-to-RLOC mappings for a site?',options:[{letter:'A',text:'ITR'},{letter:'B',text:'MS'},{letter:'C',text:'ETR'},{letter:'D',text:'MR'}],correct:'C',feedback:{correct:'The ETR (Egress Tunnel Router) is responsible for publishing/registering EID-to-RLOC mappings for its site to the Map Server. The ETR registers the EIDs it is responsible for so other sites can find them.',wrong:'The correct answer is C -- ETR. The ITR (A) looks up mappings to forward traffic. The Map Server (B) stores the mappings. The Map Resolver (D) answers queries from ITRs. Only the ETR publishes/registers the mappings for its site.',correctAnswer:'C -- ETR (Egress Tunnel Router)',trick:'ETR = Egress = Exit point of the site = registers/publishes EIDs. ITR = Ingress = looks up mappings. MS = stores mappings. MR = answers ITR queries.'}},
  {id:'b23',type:'single',originalNum:'Q-TACACS-key',tag:'Security',text:'An engineer configured TACACS+ to authenticate remote users but the configuration is not working. The debug output shows: "Invalid AUTHEN packet (check keys)". Which configuration must be applied to enable access?',options:[{letter:'A',text:'R1(config)#tacacs-server prod\nR1(config-server-tacacs)#port 1020'},{letter:'B',text:'R1(config)#tacacs-server prod\nR1(config-server-tacacs)#key cisco123'},{letter:'C',text:'R1(config)#aaa authorization exec default group tacacs+ local'},{letter:'D',text:'R1(config)#ip tacacs source-interface Gig0/0'}],correct:'B',feedback:{correct:'The debug output clearly states "Invalid AUTHEN packet (check keys)" which means the encryption key configured on the router does not match the key on the TACACS+ server. Configuring the correct key with "key cisco123" resolves the mismatch.',wrong:'The correct answer is B. "Check keys" in the debug output is the direct clue -- the shared secret key is mismatched between the router and TACACS+ server. Wrong port (A) would cause connection failure not a key error. Authorization config (C) is unrelated to authentication key errors. Source interface (D) is unrelated to key mismatches.',correctAnswer:'B -- tacacs-server key cisco123 (key mismatch indicated by "check keys")',trick:'"Check keys" in the debug = key mismatch. The debug message tells you exactly what is wrong — shared secret on router does not match the TACACS+ server.'}},
  {id:'b24',type:'single',originalNum:'Q-HSRP',tag:'Switching',text:'Which configuration causes traffic from PC-1 to the internet to use the link between CoreSW-1 and CoreSW-2 when both switches are up? CoreSW-1 is the STP root for VLAN 10 (priority 24576). CoreSW-2 has Bridge ID priority 32778. Both run HSRP with standby 10 ip 192.168.1.254. PC-1 is at 192.168.1.1.',options:[{letter:'A',text:'CoreSW-2(config)# interface vlan 10\nCoreSW-2(config-if)# standby 10 priority 100'},{letter:'B',text:'CoreSW-1(config)# interface vlan 10\nCoreSW-1(config-if)# standby 10 priority 100'},{letter:'C',text:'CoreSW-1(config)# interface vlan 10\nCoreSW-1(config-if)# standby 10 priority 90'},{letter:'D',text:'CoreSW-2(config)# interface vlan 10\nCoreSW-2(config-if)# standby 10 priority 110'}],correct:'D',feedback:{correct:'To route PC-1 traffic through the CoreSW-1 to CoreSW-2 link, CoreSW-2 must be the HSRP active router. HSRP active = highest priority (default 100). Setting CoreSW-2 priority to 110 makes it the HSRP active gateway, so PC-1 sends traffic to CoreSW-2, which then uses the link to CoreSW-1 to reach the internet.',wrong:'The correct answer is D. To force traffic through the CoreSW-1 to CoreSW-2 link, CoreSW-2 must be the HSRP active router, which requires the highest priority. Setting CoreSW-2 to 110 (above the default 100) achieves this. Options A and B set priority to 100 (same as default, no change). Option C lowers CoreSW-1 priority but CoreSW-2 still needs to be explicitly set higher.',correctAnswer:'D -- CoreSW-2 standby 10 priority 110 (makes CoreSW-2 HSRP active)',trick:'HSRP active = highest priority wins. To send PC-1 traffic through the CoreSW-1↔CoreSW-2 link, make CoreSW-2 the HSRP active router by setting its priority above 100.'}},
  {id:'b25',type:'single',originalNum:'Q-TLOC',tag:'SD-WAN',text:'What is a TLOC in a Cisco SD-WAN deployment?',options:[{letter:'A',text:'identifier that represents a specific service offered by nodes within the Cisco SD-WAN overlay'},{letter:'B',text:'component set by the administrator to differentiate similar nodes that offer a common service'},{letter:'C',text:'value that identifies a specific tunnel within the Cisco SD-WAN overlay'},{letter:'D',text:'attribute that acts as a next hop for network prefixes'}],correct:'D',feedback:{correct:'A TLOC (Transport Location) is an attribute that acts as a next hop for network prefixes in the SD-WAN overlay. It identifies a specific attachment point to the WAN transport and consists of three elements: system IP, color, and encapsulation.',wrong:'TLOC = Transport Location = next hop attribute for prefixes. It is made up of system IP + color + encapsulation. It is not a tunnel identifier and not a service identifier.',correctAnswer:'D -- attribute that acts as a next hop for network prefixes',trick:'TLOC = Transport LOCation = next hop attribute. Made of 3 parts: system IP + color + encapsulation. Think of it as the WAN attachment point that prefixes point to.'}},
  {id:'b26',type:'single',originalNum:'Q-CatCenter',tag:'SD-Access',text:'Which feature does Cisco Catalyst Center Assurance provide?',options:[{letter:'A',text:'application policy configuration'},{letter:'B',text:'data correlation and analysis'},{letter:'C',text:'software upgrade and management'},{letter:'D',text:'device onboarding and configuration'}],correct:'B',feedback:{correct:'Cisco Catalyst Center Assurance provides data correlation and analysis. It collects telemetry from network devices, correlates it, and provides insights into network health, performance and root cause analysis.',wrong:'Assurance = monitoring and correlation of telemetry data. Application policy and device onboarding are separate Catalyst Center modules, not Assurance.',correctAnswer:'B -- data correlation and analysis',trick:'Assurance = analytics and monitoring. Policy = separate module. Onboarding = separate module. Assurance just WATCHES and CORRELATES.'}},
  {id:'b27',type:'single',originalNum:'Q-NGFW-DC',tag:'Security',text:'What does a next-generation firewall that is deployed at the data center protect against?',options:[{letter:'A',text:'DMZ web server vulnerabilities'},{letter:'B',text:'zero-day attacks'},{letter:'C',text:'signature-based malware'},{letter:'D',text:'DDoS'}],correct:'B',feedback:{correct:'An NGFW at the data center protects against zero-day attacks through advanced threat protection, application awareness and intrusion prevention. Zero-day attacks are unknown threats that traditional firewalls cannot detect.',wrong:'NGFWs are valued for zero-day protection via advanced inspection. DMZ vulnerabilities are a web/application concern. Signature-based malware is handled by traditional AV. DDoS requires dedicated mitigation solutions.',correctAnswer:'B -- zero-day attacks',trick:'NGFW at the data center = zero-day protection via advanced inspection. Signature-based = traditional AV. DDoS = dedicated scrubbing centers. NGFW shines on unknown/zero-day threats.'}},
  {id:'b28',type:'single',originalNum:'Q-NGFW-multicontext',tag:'Security',text:'Which next generation firewall feature supports separate security services for multiple departments?',options:[{letter:'A',text:'multicontext mode with specific logical or physical interface allocation within each context and grouped into security zones'},{letter:'B',text:'state sharing mode to trade the user data sessions and replication to the neighbor firewall using a failover link'},{letter:'C',text:'virtual switch mode to provide traffic inspection capabilities for the flows entering the firewall and dropping packets based on policy configuration'},{letter:'D',text:'Layer 3 mode with resource tracking capabilities and automatic configuration synchronization between the nodes and security zones'}],correct:'A',feedback:{correct:'Multicontext mode divides a single physical NGFW into multiple virtual firewalls, each with its own interfaces, policies and security zones. This enables separate security services per department on one physical device.',wrong:'Multicontext mode = multiple virtual firewalls on one device = separate policies per department. State sharing (B) is for high availability failover. Virtual switch mode (C) is a transparent inspection mode. Layer 3 mode (D) is basic routing mode not multi-tenancy.',correctAnswer:'A -- multicontext mode with logical/physical interface allocation per context',trick:'Multicontext = one box, many virtual firewalls. Like VRFs but for firewalls. Each context = own interfaces + policies = own department security.'}},
  {id:'b29',type:'single',originalNum:'Q-NTP-broadcast',tag:'Network Services',text:'R1 is configured with: ntp server 192.168.1.1, ntp server 172.16.10.1, interface GigabitEthernet 0/1 with ip address 192.168.100.1 255.255.255.248 and ntp broadcast. What is the result of the configuration?',options:[{letter:'A',text:'It enables NTP in client mode'},{letter:'B',text:'It allows interface g0/1 to receive NTP broadcast packets'},{letter:'C',text:'It allows interface g0/1 to send and receive NTP broadcast packets'},{letter:'D',text:'It allows interface g0/1 to send NTP broadcast packets'}],correct:'D',feedback:{correct:'The "ntp broadcast" command under an interface makes that interface send NTP broadcast packets to clients on that segment. The ntp server commands make R1 a client to upstream servers, while the interface command makes R1 broadcast time to others on that subnet.',wrong:'"ntp broadcast" under an interface = SEND broadcasts outward. To RECEIVE broadcasts you use "ntp broadcast client". The ntp server commands handle upstream client sync separately.',correctAnswer:'D -- allows interface g0/1 to send NTP broadcast packets',trick:'"ntp broadcast" under an interface = SEND broadcasts. "ntp broadcast client" = RECEIVE broadcasts. "ntp server" = upstream sync. Interface command = outbound only.'}},
  {id:'b30',type:'single',originalNum:'Q-data-modeling',tag:'Automation',text:'What is the purpose of data modeling languages?',options:[{letter:'A',text:'to translate encoded data for interoperability between different CPU architectures'},{letter:'B',text:'to provide a framework to describe data flow patterns in networks'},{letter:'C',text:'to describe a data schema convertible into any data encoding format'},{letter:'D',text:'to specify algorithms necessary to decode binary-encoded protocol data units'}],correct:'C',feedback:{correct:'Data modeling languages like YANG describe a data schema -- the structure, types and constraints of data -- that can then be encoded in different formats such as XML or JSON. The model is format-agnostic; the encoding is separate.',wrong:'Data modeling languages define the SCHEMA of data which can be converted into XML, JSON or other formats. They do not describe flow patterns, CPU interoperability, or decoding algorithms.',correctAnswer:'C -- to describe a data schema convertible into any data encoding format',trick:'Data modeling = SCHEMA definition. YANG describes the structure. The schema can be encoded as XML or JSON. Model is agnostic to encoding format.'}},
  {id:'b31',type:'single',originalNum:'Q-vManage',tag:'SD-WAN',text:'What is a characteristic of SD-WAN Manager?',options:[{letter:'A',text:'It requires a public IP address to allow WAN Edge devices to discover fabric components.'},{letter:'B',text:'It uses NETCONF to configure vSmart devices to build the overlay network data plane.'},{letter:'C',text:'It supports protocols such as OSPF to integrate with legacy network devices.'},{letter:'D',text:'It leverages the overlay management protocol to interface with WAN Edge devices.'}],correct:'B',feedback:{correct:'SD-WAN Manager (vManage) uses NETCONF to communicate with and configure vSmart controllers and other SD-WAN components. It is the centralized management plane that pushes configurations via NETCONF/YANG.',wrong:'vManage uses NETCONF to configure SD-WAN components. Public IP is required by vBond not vManage. OMP is used between vSmart and vEdge routers not by vManage. OSPF integration is done on vEdge routers not vManage.',correctAnswer:'B -- uses NETCONF to configure vSmart devices',trick:'vManage = management plane = uses NETCONF to configure. vSmart = control plane = uses OMP with vEdge. vBond = orchestration = needs public IP.'}},
  {id:'b32',type:'single',originalNum:'Q-API-replay',tag:'Automation / Security',text:'How can an engineer prevent basic replay attacks from people who try to brute force a system via REST API?',options:[{letter:'A',text:'Use HTTPS'},{letter:'B',text:'Add OAuth to the request in the API header'},{letter:'C',text:'Add a timestamp to the request in the API header'},{letter:'D',text:'Use a password hash'}],correct:'C',feedback:{correct:'Adding a timestamp to the API request header prevents replay attacks because each request is time-bound. If an attacker captures and replays a request the timestamp will be expired and the server will reject it.',wrong:'A timestamp prevents replay attacks by making each request time-limited. HTTPS encrypts traffic but does not prevent replaying captured requests. OAuth handles authorization not replay prevention. Password hashing protects stored credentials not API replay attacks.',correctAnswer:'C -- add a timestamp to the request in the API header',trick:'Timestamp = replay prevention. Each request has an expiry window. Replay = stale timestamp = rejected. HTTPS = encryption only, not replay prevention.'}}
