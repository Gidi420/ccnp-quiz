<script>
(function(){
  var c=document.createElement('canvas');c.width=180;c.height=180;
  var ctx=c.getContext('2d');
  // rounded rect background gradient
  var g=ctx.createLinearGradient(0,0,180,180);
  g.addColorStop(0,'#2563eb');g.addColorStop(1,'#7c3aed');
  var r=38;ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(180-r,0);
  ctx.quadraticCurveTo(180,0,180,r);ctx.lineTo(180,180-r);
  ctx.quadraticCurveTo(180,180,180-r,180);ctx.lineTo(r,180);
  ctx.quadraticCurveTo(0,180,0,180-r);ctx.lineTo(0,r);
  ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();
  ctx.fillStyle=g;ctx.fill();
  // nodes: top=90,38  left=38,108  right=142,108  bottom=90,150
  var nodes=[[90,38],[38,108],[142,108],[90,150]];
  // draw connecting lines
  var edges=[[0,1],[0,2],[1,2],[1,3],[2,3]];
  ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=3;ctx.lineCap='round';
  edges.forEach(function(e){
    ctx.beginPath();ctx.moveTo(nodes[e[0]][0],nodes[e[0]][1]);
    ctx.lineTo(nodes[e[1]][0],nodes[e[1]][1]);ctx.stroke();
  });
  // draw nodes
  var radii=[13,11,11,9];
  var inner=[6,5,5,4];
  var colors=['#2563eb','#4f46e5','#4f46e5','#7c3aed'];
  nodes.forEach(function(n,i){
    // glow
    ctx.beginPath();ctx.arc(n[0],n[1],radii[i]+4,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fill();
    // white ring
    ctx.beginPath();ctx.arc(n[0],n[1],radii[i],0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
    // colored dot
    ctx.beginPath();ctx.arc(n[0],n[1],inner[i],0,Math.PI*2);
    ctx.fillStyle=colors[i];ctx.fill();
  });
  document.getElementById('ati').href=c.toDataURL('image/png');
})();
</script>

<style>
:root{
  --bg:#f0f4ff;--surface:#fff;--surface2:#f8faff;--border:#dde3f0;
  --accent:#2563eb;--accent2:#7c3aed;--accent-light:#eff3ff;
  --green:#059669;--green-light:#ecfdf5;--green-border:#6ee7b7;
  --red:#dc2626;--red-light:#fef2f2;--red-border:#fca5a5;
  --yellow:#d97706;--yellow-light:#fffbeb;
  --purple:#7c3aed;--purple-light:#f3e8ff;--purple-border:#d8b4fe;
  --orange:#ea580c;--orange-light:#fff7ed;
  --text:#111827;--text2:#374151;--muted:#6b7280;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:#fff;border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;box-shadow:var(--shadow);}
.header-left{display:flex;align-items:center;gap:11px;}
.logo{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0;}
.header h1{font-size:16px;font-weight:800;letter-spacing:-.3px;}
.header h1 span{color:var(--accent);}
.header-right{display:flex;align-items:center;gap:10px;}
.progress-wrap{display:flex;align-items:center;gap:6px;}
.progress-bar-outer{width:90px;height:5px;background:var(--border);border-radius:99px;overflow:hidden;}
.progress-bar-inner{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s ease;}
.progress-label{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;white-space:nowrap;}
.hint-toggle{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;position:relative;z-index:400;padding:4px 8px;border-radius:8px;transition:background .15s;}
.hint-toggle:hover{background:var(--surface2);}
.hint-label{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;}
.toggle-track{width:32px;height:17px;background:var(--border);border-radius:99px;position:relative;transition:background .2s;flex-shrink:0;}
.toggle-track.on{background:var(--accent);}
.toggle-thumb{width:13px;height:13px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle-track.on .toggle-thumb{left:17px;}
.tab-bar{background:#fff;border-bottom:1px solid var(--border);display:flex;position:sticky;top:101px;z-index:290;}
.tab-btn{flex:1;padding:10px 5px;background:none;border:none;border-bottom:2px solid transparent;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-btn:hover:not(.active){color:var(--text2);background:var(--surface2);}
.quiz-container{max-width:760px;margin:0 auto;padding:18px 14px 80px;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.score-banner{display:none;background:#fff;border:1px solid var(--border);border-radius:16px;padding:26px;text-align:center;margin-bottom:22px;box-shadow:var(--shadow-md);animation:fadeIn .5s ease;}
.score-banner.visible{display:block;}
.score-num{font-size:52px;font-weight:800;line-height:1;}
.score-label{font-size:15px;color:var(--muted);margin-top:6px;font-weight:600;}
.score-sub{font-size:12px;color:var(--muted);margin-top:5px;font-family:'JetBrains Mono',monospace;}
.score-actions{display:flex;gap:9px;justify-content:center;margin-top:16px;flex-wrap:wrap;}
.restart-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:9px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:opacity .2s;}
.restart-btn:hover{opacity:.85;}
.question-card{background:#fff;border:1.5px solid var(--border);border-radius:13px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow);transition:border-color .3s;animation:slideUp .25s ease;}
.question-card.answered-correct{border-color:var(--green);}
.question-card.answered-wrong{border-color:var(--red);}
.question-card.critical{border:2.5px solid #dc2626;box-shadow:0 0 0 4px rgba(220,38,38,0.10),var(--shadow);}
.question-card.critical.answered-correct{border-color:var(--green);box-shadow:0 0 0 4px rgba(5,150,105,0.10),var(--shadow);}
.question-card.critical.answered-wrong{border-color:var(--red);box-shadow:0 0 0 4px rgba(220,38,38,0.15),var(--shadow);}
.critical-badge{display:inline-flex;align-items:center;gap:6px;background:#fef2f2;border:1.5px solid #fca5a5;color:#dc2626;font-size:11px;font-weight:800;padding:4px 12px;border-radius:99px;letter-spacing:.2px;margin-bottom:10px;width:fit-content;}
.q-meta{display:flex;align-items:center;gap:7px;margin-bottom:11px;flex-wrap:wrap;}
.q-num{background:var(--accent-light);border:1px solid #c7d7ff;border-radius:5px;padding:2px 8px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--accent);font-weight:700;}
.q-tag{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);text-transform:uppercase;}
.multi-tag{background:var(--yellow-light);border-color:#fde68a;color:var(--yellow);}
.dd-tag{background:var(--purple-light);border-color:var(--purple-border);color:var(--purple);}
.question-text{font-size:15px;font-weight:600;line-height:1.65;margin-bottom:16px;color:var(--text);}
.kw-hint{border-bottom:1.5px dashed var(--accent);color:var(--accent);cursor:help;position:relative;display:inline;}
.kw-tooltip{display:none;position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;font-size:11px;font-weight:600;padding:5px 9px;border-radius:7px;white-space:nowrap;z-index:999;box-shadow:var(--shadow-md);pointer-events:none;min-width:max-content;max-width:220px;white-space:normal;text-align:center;}
.kw-tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1e293b;}
.kw-hint.open .kw-tooltip{display:block;}
.kw-hint{pointer-events:auto;}
.question-text .kw-hint{cursor:help;}
.options{display:flex;flex-direction:column;gap:8px;}
.option{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;cursor:pointer;transition:border-color .15s,background .15s,transform .1s;user-select:none;}
.option:hover:not(.disabled){border-color:var(--accent);background:var(--accent-light);transform:translateX(2px);}
.option.selected{border-color:var(--accent);background:var(--accent-light);}
.option.correct{border-color:var(--green)!important;background:var(--green-light)!important;}
.option.wrong{border-color:var(--red)!important;background:var(--red-light)!important;}
.option.disabled{cursor:default;}
.option-letter{width:23px;height:23px;min-width:23px;border:1.5px solid var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--muted);transition:all .15s;}
.option.selected .option-letter{border-color:var(--accent);color:var(--accent);background:#fff;}
.option.correct .option-letter{border-color:var(--green);color:var(--green);background:#fff;}
.option.wrong .option-letter{border-color:var(--red);color:var(--red);background:#fff;}
.option-text{font-size:13px;line-height:1.5;flex:1;color:var(--text2);}
.option-icon{font-size:13px;margin-left:auto;min-width:15px;text-align:right;}
.post-actions{display:flex;align-items:center;gap:8px;margin-top:13px;flex-wrap:wrap;}
.submit-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:8px;padding:9px 22px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:opacity .2s,transform .1s;}
.submit-btn:hover{opacity:.88;transform:translateY(-1px);}
.submit-btn:disabled{opacity:.35;cursor:default;transform:none;}
.trick-btn{visibility:hidden;width:0;overflow:hidden;padding:0;border:none;background:transparent;}
.trick-btn.visible{visibility:visible;width:auto;overflow:visible;display:inline-flex;background:var(--orange-light);border:1.5px solid #fed7aa;color:var(--orange);border-radius:8px;padding:9px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;align-items:center;gap:4px;}
.trick-btn:hover{background:#ffedd5;border-color:var(--orange);}
.trick-btn.visible{display:flex;}
.trick-box{display:none;margin-top:9px;background:var(--orange-light);border:1.5px solid #fed7aa;border-radius:9px;padding:11px 14px;animation:fadeIn .3s ease;}
.trick-box.visible{display:block;}
.trick-label{font-size:9px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;font-family:'JetBrains Mono',monospace;}
.trick-text{font-size:13px;color:#7c2d12;line-height:1.6;font-weight:600;}
.feedback{margin-top:11px;border-radius:11px;display:none;animation:fadeIn .35s ease;overflow:hidden;}
.feedback.correct,.feedback.wrong{display:block;}
.fb-header{display:flex;align-items:center;gap:7px;padding:9px 14px;font-weight:700;font-size:13px;border-radius:11px 11px 0 0;}
.feedback.correct .fb-header{background:var(--green-light);color:var(--green);border:1px solid var(--green-border);border-bottom:none;}
.feedback.wrong .fb-header{background:var(--red-light);color:var(--red);border:1px solid var(--red-border);border-bottom:none;}
.fb-body{padding:12px 14px;border-left:1px solid;border-right:1px solid;border-bottom:1px solid;border-radius:0 0 11px 11px;}
.feedback.correct .fb-body{background:#f0fdf6;border-color:var(--green-border);}
.feedback.wrong .fb-body{background:#fff5f5;border-color:var(--red-border);}
.exp-label{font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;}
.feedback.correct .exp-label{color:var(--green);}
.feedback.wrong .exp-label{color:var(--red);}
.exp-text{color:var(--text2);font-size:13px;line-height:1.7;}
.correct-pill{display:inline-block;margin-top:8px;background:var(--green-light);border:1px solid var(--green-border);color:var(--green);border-radius:5px;padding:2px 9px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;}
.dd-pool-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-family:'JetBrains Mono',monospace;}
.dd-pool{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.dd-chip{display:inline-flex;align-items:center;background:var(--accent-light);border:1.5px solid #c7d7ff;border-radius:7px;padding:7px 10px;font-size:12px;cursor:pointer;user-select:none;transition:all .15s;color:var(--text2);}
.dd-chip:hover{border-color:var(--accent);}
.dd-chip.selected-chip{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3);}
.dd-chip.placed{opacity:.28;cursor:default;pointer-events:none;}
.dd-targets{display:flex;flex-direction:column;gap:9px;}
.dd-bucket{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;}
.dd-bucket-label{background:var(--yellow-light);border-bottom:1px solid #fde68a;padding:6px 12px;font-size:11px;font-weight:700;color:var(--yellow);}
.dd-slots{display:flex;flex-direction:column;gap:5px;padding:8px;}
.dd-slot{min-height:36px;border:1.5px dashed var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s;padding:5px 8px;text-align:center;}
.dd-slot:hover:not(.locked){border-color:var(--accent);background:var(--accent-light);}
.dd-slot.slot-filled{border-style:solid;border-color:#c7d7ff;background:var(--accent-light);cursor:pointer;}
.dd-slot.correct-slot{border-color:var(--green)!important;border-style:solid!important;background:var(--green-light)!important;color:var(--green)!important;font-weight:600;}
.dd-slot.wrong-slot{border-color:var(--red)!important;border-style:solid!important;background:var(--red-light)!important;color:var(--red)!important;}
.dd-slot.locked{cursor:default;}
.match-row{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
.match-lbl{font-family:'JetBrains Mono',monospace;color:var(--accent);font-weight:700;font-size:11px;min-width:48px;}
.match-sel{flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text);font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;outline:none;transition:border-color .15s;}
.match-sel:focus{border-color:var(--accent);}
.match-sel.c-match{border-color:var(--green);background:var(--green-light);}
.match-sel.w-match{border-color:var(--red);background:var(--red-light);}
.final-wrap{text-align:center;padding:12px 0 40px;}
.final-btn{background:linear-gradient(135deg,var(--green),#047857);color:#fff;border:none;border-radius:11px;padding:13px 38px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:opacity .2s,transform .1s;}
.final-btn:hover{opacity:.88;transform:translateY(-2px);}
/* CHEAT SHEET */
.cs-hero{background:linear-gradient(135deg,var(--accent-light),#f3e8ff);border:1.5px solid #c7d7ff;border-radius:13px;padding:18px 20px;margin-bottom:16px;}
.cs-hero h2{font-size:18px;font-weight:800;margin-bottom:4px;color:var(--accent);}
.cs-hero p{font-size:12px;color:var(--text2);line-height:1.6;}
.cs-search-wrap{position:relative;margin-bottom:16px;}
.cs-search-wrap::before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;}
.cs-search{width:100%;padding:10px 12px 10px 36px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;background:#fff;transition:border-color .15s;box-shadow:var(--shadow);}
.cs-search:focus{border-color:var(--accent);}
.cs-cat{margin-bottom:20px;}
.cs-cat-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.cs-cat-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);font-family:'JetBrains Mono',monospace;}
.cs-cat-count{font-size:10px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:1px 7px;font-family:'JetBrains Mono',monospace;}
.cs-table{width:100%;border-collapse:collapse;background:#fff;border-radius:11px;overflow:hidden;box-shadow:var(--shadow);border:1.5px solid var(--border);}
.cs-table thead tr{background:var(--surface2);}
.cs-table thead th{padding:8px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:'JetBrains Mono',monospace;border-bottom:1px solid var(--border);}
.cs-table tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
.cs-table tbody tr:last-child{border-bottom:none;}
.cs-table tbody tr:hover{background:var(--surface2);}
.cs-table tbody tr.hidden{display:none;}
.cs-td-kw{padding:10px 14px;font-size:12px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace;white-space:nowrap;width:30%;}
.cs-td-val{padding:10px 14px;font-size:13px;color:var(--text2);font-weight:600;width:35%;}
.cs-td-hint{padding:10px 14px;font-size:12px;color:var(--muted);font-style:italic;width:35%;}
@media(max-width:600px){.cs-td-hint{display:none;}}
/* UPLOAD */
.upload-sec{background:#fff;border:1.5px solid var(--border);border-radius:13px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px;}
.upload-sec h2{font-size:15px;font-weight:700;margin-bottom:5px;}
.upload-sec p{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:12px;}
.tmpl-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px;font-family:'JetBrains Mono',monospace;font-size:10.5px;line-height:1.8;color:var(--text2);margin-bottom:11px;overflow-x:auto;white-space:pre;}
.paste-area{width:100%;min-height:130px;padding:11px;font-size:12px;font-family:'JetBrains Mono',monospace;border:1.5px solid var(--border);border-radius:8px;resize:vertical;outline:none;color:var(--text);background:var(--surface2);transition:border-color .15s;line-height:1.6;}
.paste-area:focus{border-color:var(--accent);}
.parse-btn{margin-top:9px;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:opacity .2s;}
.parse-btn:hover{opacity:.88;}
.parse-st{margin-top:9px;font-size:12px;font-weight:600;min-height:16px;}
.parse-st.ok{color:var(--green);}
.parse-st.err{color:var(--red);}
.qli{display:flex;align-items:center;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:12px;gap:8px;}
.qli-critical{border-color:#fca5a5;background:#fff9f9;}
.practice-filter-bar{display:flex;align-items:center;gap:8px;padding:10px 0 14px;flex-wrap:wrap;}
.pf-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;padding:6px 16px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;}
.pf-btn:hover{border-color:var(--accent);color:var(--accent);}
.pf-btn.active{background:#fef2f2;border-color:#fca5a5;color:#dc2626;}
.pf-btn.active:first-child{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.pf-count{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.qli-text{flex:1;color:var(--text2);}
.qli-tag{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);background:var(--accent-light);border-radius:4px;padding:2px 6px;white-space:nowrap;}
.del-btn{background:none;border:none;color:var(--red);font-size:14px;cursor:pointer;padding:2px 5px;border-radius:5px;transition:background .15s;flex-shrink:0;}
.del-btn:hover{background:var(--red-light);}
/* INSIGHTS TAB */
.ins-hero{background:linear-gradient(135deg,var(--accent-light),#f3e8ff);border:1.5px solid #c7d7ff;border-radius:13px;padding:18px 20px;margin-bottom:16px;}
.ins-hero h2{font-size:18px;font-weight:800;color:var(--accent);margin-bottom:4px;}
.ins-hero p{font-size:12px;color:var(--text2);line-height:1.6;}
.ins-empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px;font-weight:600;}
.ins-empty span{display:block;font-size:36px;margin-bottom:10px;}
.ins-stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
.ins-stat{flex:1;min-width:80px;background:#fff;border:1.5px solid var(--border);border-radius:11px;padding:12px 10px;text-align:center;box-shadow:var(--shadow);}
.ins-stat-num{font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1;}
.ins-stat-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}
.ins-section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);font-family:'JetBrains Mono',monospace;margin:18px 0 10px;}
.ins-tag-row{background:#fff;border:1.5px solid var(--border);border-radius:11px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);}
.ins-tag-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.ins-tag-name{font-size:13px;font-weight:800;color:var(--text);flex:1;}
.ins-tag-counts{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
.ins-bar-track{height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:8px;}
.ins-bar-fill{height:100%;border-radius:99px;transition:width .4s;}
.ins-study{font-size:12px;color:var(--text2);line-height:1.6;background:var(--surface2);border-radius:7px;padding:9px 11px;border-left:3px solid var(--accent);}
.ins-study strong{color:var(--text);display:block;margin-bottom:3px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;}
.ins-wrong-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--red);font-family:'JetBrains Mono',monospace;margin:18px 0 10px;}
.ins-wrong-row{background:#fff;border:1.5px solid var(--red-border);border-radius:10px;padding:11px 14px;margin-bottom:7px;}
.ins-wrong-q{font-size:12px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:5px;}
.ins-wrong-meta{display:flex;gap:7px;flex-wrap:wrap;}
.ins-pill{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;border-radius:5px;padding:2px 7px;}
.ins-pill-red{color:var(--red);background:var(--red-light);border:1px solid var(--red-border);}
.ins-pill-blue{color:var(--accent);background:var(--accent-light);}
.ins-clear-btn{margin-top:18px;background:var(--red-light);color:var(--red);border:1.5px solid var(--red-border);border-radius:8px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
.ins-clear-btn:hover{background:var(--red);color:#fff;}
/* ALL QUESTIONS TAB */
.allq-hero{background:linear-gradient(135deg,var(--accent-light),#f3e8ff);border:1.5px solid #c7d7ff;border-radius:13px;padding:18px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.allq-hero h2{font-size:18px;font-weight:800;color:var(--accent);margin:0;}
.allq-stats{display:flex;gap:10px;flex-wrap:wrap;}
.allq-stat{background:#fff;border:1.5px solid #c7d7ff;border-radius:9px;padding:7px 14px;text-align:center;}
.allq-stat-num{font-size:20px;font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace;line-height:1;}
.allq-stat-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.allq-search-wrap{position:relative;margin-bottom:14px;}
.allq-search-wrap::before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;}
.allq-search{width:100%;padding:10px 12px 10px 36px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;background:#fff;transition:border-color .15s;box-shadow:var(--shadow);}
.allq-search:focus{border-color:var(--accent);}
.allq-filter-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;}
.allq-filter{background:var(--surface2);border:1.5px solid var(--border);color:var(--muted);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;}
.allq-filter.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.allq-row{background:#fff;border:1.5px solid var(--border);border-radius:11px;padding:13px 16px;margin-bottom:9px;transition:box-shadow .15s;}
.allq-row:hover{box-shadow:var(--shadow-md);}
.allq-row.hidden{display:none;}
.allq-row-top{display:flex;align-items:flex-start;gap:10px;}
.allq-num{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:#fff;background:var(--accent);border-radius:5px;padding:2px 7px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.allq-type-pill{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--purple);background:var(--purple-light);border:1px solid var(--purple-border);border-radius:5px;padding:2px 7px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.allq-tag-pill{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-light);border-radius:5px;padding:2px 7px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.allq-question{font-size:13px;font-weight:600;color:var(--text);line-height:1.55;flex:1;}
/* PWA */
.pwa-sec{background:linear-gradient(135deg,var(--accent-light),#f3e8ff);border:1.5px solid #c7d7ff;border-radius:13px;padding:20px;box-shadow:var(--shadow);}
.pwa-sec h2{font-size:15px;font-weight:700;margin-bottom:7px;color:var(--accent);}
.pwa-sec p{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:8px;}
.pwa-steps{list-style:none;padding:0;margin-bottom:11px;}
.pwa-steps li{font-size:12px;color:var(--text2);padding:4px 0 4px 21px;position:relative;line-height:1.5;}
.pwa-steps li::before{content:attr(data-n);position:absolute;left:0;font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace;}
.next-btn{background:linear-gradient(135deg,var(--green),#047857);color:#fff;border:none;border-radius:9px;padding:11px 28px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:opacity .2s,transform .1s;}
.next-btn:hover{opacity:.88;transform:translateY(-1px);}
.next-wrap{text-align:center;padding:16px 0 8px;}
.single-progress{text-align:center;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:16px;font-family:'JetBrains Mono',monospace;}
.quiz-setup-card{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:40px 28px;text-align:center;box-shadow:var(--shadow-md);max-width:420px;margin:48px auto;}
.quiz-setup-card h2{font-size:20px;font-weight:800;margin-bottom:8px;color:var(--text);}
.quiz-setup-card p{font-size:14px;color:var(--muted);margin-bottom:28px;font-weight:600;}
.setup-options{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.setup-opt{background:var(--accent-light);border:1.5px solid #c7d7ff;color:var(--accent);border-radius:10px;padding:14px 18px;font-size:17px;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;min-width:64px;}
.setup-opt:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.setup-opt.selected{background:var(--accent);color:#fff;border-color:var(--accent);}
.category-section{margin-top:24px;text-align:left;}
.category-section label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:10px;}
.category-chips{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;}
.cat-chip{background:var(--surface2);border:1.5px solid var(--border);color:var(--text2);border-radius:99px;padding:5px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;}
.cat-chip:hover{border-color:var(--accent);color:var(--accent);}
.cat-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.cat-count{font-size:10px;opacity:.75;margin-left:3px;}
.exam-bar{background:#fff;border-bottom:1px solid var(--border);padding:7px 18px;display:flex;align-items:center;justify-content:center;gap:6px;position:sticky;top:59px;z-index:295;box-shadow:none;}
.exam-bar-label{font-size:11px;font-weight:700;color:var(--muted);margin-right:4px;}
.exam-btn{background:var(--surface2);border:1.5px solid var(--border);color:var(--muted);border-radius:99px;padding:5px 18px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;letter-spacing:.3px;}
.exam-btn:hover{border-color:var(--accent);color:var(--accent);}
.exam-btn.active[data-exam="enarsi"]{background:var(--accent);border-color:var(--accent);color:#fff;}
.exam-btn.active[data-exam="encore"]{background:var(--accent2);border-color:var(--accent2);color:#fff;}
@keyframes slideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@media(max-width:600px){
  .header{padding:8px 11px;}
  .quiz-container{padding:13px 10px 70px;}
  .progress-bar-outer{width:70px;}
  .header h1{font-size:13px;}
  .hint-label{display:none;}
  .cs-grid{grid-template-columns:1fr;}
  .tab-btn{font-size:10px;}
}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo">NP</div>
    <h1>CCNP <span>Quiz</span></h1>
  </div>
  <div class="header-right">
    <div class="hint-toggle" onclick="toggleHints()" title="Hover Hints">
      <span class="hint-label">Hint Mode</span>
      <div class="toggle-track" id="hintTrack"><div class="toggle-thumb"></div></div>
    </div>
  </div>
</div>
<div class="exam-bar">
  <span class="exam-bar-label">Exam:</span>
  <button class="exam-btn active" data-exam="enarsi" onclick="switchExam('enarsi')">ENARSI</button>
  <button class="exam-btn" data-exam="encore" onclick="switchExam('encore')">ENCORE</button>
</div>
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('practice',this)">&#x1F4DA; Action</button>
  <button class="tab-btn" onclick="switchTab('quiz',this)">&#x1F3AF; Quiz Mode</button>
  <button class="tab-btn" onclick="switchTab('cheat',this)">&#x26A1; Cheat Sheet</button>
  <button class="tab-btn" onclick="switchTab('allq',this)">&#x1F4CB; All Questions</button>
  <button class="tab-btn" onclick="switchTab('insights',this)">&#x1F4CA; Insights</button>
</div>
<div class="quiz-container">
  <div class="tab-content active" id="tab-practice">
    <div class="practice-filter-bar">
      <button class="pf-btn active" id="pfAll" onclick="setPracticeFilter('all')">All Questions</button>
      <button class="pf-btn" id="pfCritical" onclick="setPracticeFilter('critical')">🔴 Critical Only</button>
      <span class="pf-count" id="pfCount"></span>
    </div>
    <div id="practiceBody"></div>
  </div>
  <div class="tab-content" id="tab-quiz">
    <div class="score-banner" id="scoreBanner">
      <div class="score-num" id="scoreNum">--</div>
      <div class="score-label">Questions Correct</div>
      <div class="score-sub" id="scoreSub"></div>
      <div class="score-actions"><button class="restart-btn" onclick="restartQuizMode()">&#x21A9; Restart Quiz</button></div>
    </div>
    <div id="quizSetup">
      <div class="quiz-setup-card">
        <h2>&#x1F3AF; Quiz Mode</h2>
        <p>How many questions?</p>
        <div class="setup-options">
          <button class="setup-opt" onclick="selectQuizCount(5,this)">5</button>
          <button class="setup-opt" onclick="selectQuizCount(10,this)">10</button>
          <button class="setup-opt" onclick="selectQuizCount(15,this)">15</button>
          <button class="setup-opt" onclick="selectQuizCount(20,this)">20</button>
          <button class="setup-opt" onclick="selectQuizCount(0,this)">All</button>
        </div>
        <div class="category-section">
          <label>Filter by category</label>
          <div class="category-chips" id="categoryChips"></div>
        </div>
        <div style="margin-top:22px;">
          <button class="restart-btn" onclick="startQuiz()" style="width:100%;padding:14px;font-size:15px;">Start Quiz &#x2192;</button>
        </div>
      </div>
    </div>
    <div id="quizBody"></div>
  </div>
  <div class="tab-content" id="tab-insights">
    <div id="insightsBody"></div>
  </div>
  <div class="tab-content" id="tab-allq">
    <div id="allqBody"></div>
  </div>
  <div class="tab-content" id="tab-cheat">
    <div class="cs-hero">
      <h2>&#x26A1; Cheat Sheet</h2>
      <p>High-probability keyword associations for the exam. Enable <strong>Hints</strong> in the header to see these highlighted inside questions.</p>
    </div>
    <div class="cs-search-wrap"><input class="cs-search" id="csSearch" placeholder="Search keywords, associations..." oninput="filterCS(this.value)"></div>
    <div id="csBody"></div>
  </div>
</div>
<script>
var ASSOC=[
  {cat:'SD-WAN Controllers',kw:'vSmart',assoc:'Control Plane — distributes OMP routes & IPsec keys for tunnels'},
  {cat:'SD-WAN Controllers',kw:'vBond',assoc:'Orchestration Plane — onboards vEdge, NAT detection & traversal'},
  {cat:'SD-WAN Controllers',kw:'vManage',assoc:'Management Plane — GUI, config, telemetry, monitoring'},
  {cat:'SD-WAN Controllers',kw:'vEdge',assoc:'Data Plane — forwards traffic, runs localized policies'},
  {cat:'SD-WAN Controllers',kw:'OMP',assoc:'Overlay Management Protocol — SD-WAN control plane routing'},
  {cat:'BGP Attributes',kw:'local-preference',assoc:'iBGP — propagates to ALL routers in AS (higher = preferred exit)'},
  {cat:'BGP Attributes',kw:'Weight',assoc:'BGP — LOCAL to one router only, not advertised to peers'},
  {cat:'BGP Attributes',kw:'MED',assoc:'BGP — influences INBOUND traffic from neighbouring AS'},
  {cat:'BGP Attributes',kw:'AS-path',assoc:'BGP — shorter path preferred; used for loop prevention'},
  {cat:'Automation & APIs',kw:'YANG',assoc:'Data MODELING language for NETCONF and RESTCONF'},
  {cat:'Automation & APIs',kw:'NETCONF',assoc:'XML config protocol — uses YANG models, TCP/SSH port 830'},
  {cat:'Automation & APIs',kw:'RESTCONF',assoc:'REST/HTTP version of NETCONF — uses YANG, JSON or XML'},
  {cat:'Automation & APIs',kw:'SNMP',assoc:'Legacy monitoring — UDP, community strings, MIB database'},
  {cat:'Automation & APIs',kw:'gRPC',assoc:'High-speed streaming telemetry (Google) — used with model-driven telemetry'},
  {cat:'Automation & APIs',kw:'OpenConfig',assoc:'Vendor-neutral YANG model standard for network devices'},
  {cat:'QoS',kw:'Traffic Policing',assoc:'DROPS excess packets immediately — causes TCP retransmission, no delay added'},
  {cat:'QoS',kw:'Traffic Shaping',assoc:'BUFFERS excess packets — adds delay/jitter, avoids drops'},
  {cat:'QoS',kw:'DSCP',assoc:'Layer 3 QoS marking — 6-bit field in IP ToS byte'},
  {cat:'QoS',kw:'LLQ',assoc:'Low Latency Queue — strict priority queue, used for voice/video'},
  {cat:'QoS',kw:'CBWFQ',assoc:'Class-Based WFQ — minimum bandwidth guarantee per traffic class'},
  {cat:'Security',kw:'ISE',assoc:'SD-Access — endpoint identity, SGT assignment, policy definition'},
  {cat:'Security',kw:'NGFW',assoc:'Next-Gen Firewall — adds integrated IPS + application inspection'},
  {cat:'Security',kw:'SGT',assoc:'Scalable Group Tag — SD-Access group-based policy label (number)'},
  {cat:'Security',kw:'TACACS+',assoc:'AAA — TCP 49, separates Auth/Authz/Accounting, Cisco proprietary'},
  {cat:'Security',kw:'RADIUS',assoc:'AAA — UDP 1812/1813, combines Auth+Authz, IETF standard'},
  {cat:'Security',kw:'BFD',assoc:'Bidirectional Forwarding Detection — sub-second failure detection with routing protocols'},
  {cat:'SD-Access & LISP',kw:'LISP',assoc:'Location/ID Separation Protocol — maps EID (what) to RLOC (where)'},
  {cat:'SD-Access & LISP',kw:'EID',assoc:'LISP Endpoint Identifier — the endpoint address (what it is)'},
  {cat:'SD-Access & LISP',kw:'RLOC',assoc:'LISP Routing Locator — the router address (where it is)'},
  {cat:'SD-Access & LISP',kw:'ITR',assoc:'LISP Ingress Tunnel Router — receives packets from site-facing interfaces'},
  {cat:'SD-Access & LISP',kw:'ETR',assoc:'LISP Egress Tunnel Router — registers EID prefixes with map server'},
  {cat:'SD-Access & LISP',kw:'Map Server',assoc:'LISP — accepts encapsulated map requests from ITRs'},

  'e48':'OSPF-4-FLOOD_WAR: SW2 originates LSA, SW1 floods it back with age=3600 (MaxAge). Cause: duplicate IP address — SW1 thinks SW2\'s LSA is its own stale copy and flushes it. Fix: resolve the duplicate IP.',

  'e51':'10.10.10.8/30 subnet: hosts = .9 and .10, broadcast = .11. R2 configured 10.10.10.11/30 = the broadcast address — invalid for a host. OSPF can\'t form adjacency. Fix: change R2 to 10.10.10.9/30.',

  'e55':'"configure replace nvram:startup-config" completely replaces the running-config with the startup-config — a full rollback. Unlike "copy startup running" which merges, configure replace does a diff and applies only the needed changes.',

  'e57':'ABR with "area X stub no-summary" = totally stubby area. Blocks Type 3, 4, 5 LSAs. R3 only receives Type 1 (router) and Type 2 (network) LSAs plus a single default route. "no-summary" can only be on the ABR.',

  'e59':'"redistribute ospf 1" in BGP only redistributes OSPF internal routes (O, O IA) by default. EIGRP routes redistributed into OSPF appear as O E2 (external). To also send these into BGP: "redistribute ospf 1 match external 1 external 2".',
  'e60':'OSPF stuck in EXSTART/EXCHANGE = MTU mismatch between neighbors. DBD packets are rejected because one side sees oversized packets it cannot process. Fix: match MTU on both interfaces, or use "ip ospf mtu-ignore" on both ends. DR/BDR election status does NOT cause EXSTART stall.',
  'e61':'AAA with TACACS+ + local fallback needs TWO things: (1) method list that includes "group tacacs+" then "local" (so local is used when TACACS+ unreachable), AND (2) "login authentication <list>" applied to the VTY lines. Without applying the list to VTY, the router uses the default method ignoring your TACACS+ config.',
  'e62':'DoS attack debug shows source IP flooding an interface. Fix: "ip access-group ACL in" on the affected interface blocking the attacker\'s source IP. Apply the ACL on the interface where attack traffic arrives (Gi0/0). Block the attacker (172.17.132.95), NOT the router\'s own IP (192.168.1.1).',
  'e63':'EIGRP summary-address won\'t advertise without a component subnet in the topology table. If loopback interfaces are not covered by any EIGRP "network" statement, they won\'t appear in EIGRP — and the summary won\'t be generated. If a loopback has an unusual name (not "Loopback"), redistribute it as connected so EIGRP can include it.',
  'e64':'To redistribute BGP routes into OSPFv3 so IPv6 hosts in the OSPF domain can reach BGP prefixes: under "router ospfv3 1 / address-family ipv6 unicast", add "redistribute bgp X". This makes BGP-learned IPv6 prefixes appear as external OSPFv3 routes (OE2) in the IPv6 routing table.',
  'e65':'AAA method list must be APPLIED to the line to take effect. If "aaa authentication login telnet group TAC-SERV" defines a list named "telnet", VTY lines need "login authentication telnet" to use it. Without this VTY command, VTY uses the DEFAULT method — ignoring TAC-SERV entirely.',

var QUESTIONS=[],activeOrder=[],userAnswers={},submitted={},ddState={},correctness={};
var hintsEnabled=false;
var currentQIdx=0;
var currentMode='practice';
var currentExam='enarsi';

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function customKey(){return currentExam==='encore'?'ccnp_custom':'enarsi_custom';}
function historyKey(){return currentExam==='encore'?'ccnp_history':'enarsi_history';}
function loadCustom(){try{return JSON.parse(localStorage.getItem(customKey())||'[]');}catch(e){return[];}}
function saveCustom(qs){localStorage.setItem(customKey(),JSON.stringify(qs));}
function buildBank(){QUESTIONS=(currentExam==='encore'?ENCORE_BUILTIN:ENARSI_BUILTIN).concat(loadCustom());}
function loadHistory(){try{return JSON.parse(localStorage.getItem(historyKey())||'{}');}catch(e){return{};}}
function saveHistory(h){localStorage.setItem(historyKey(),JSON.stringify(h));}
function recordResult(qid,ok){
  var h=loadHistory();
  if(!h[qid])h[qid]={correct:0,wrong:0};
  if(ok)h[qid].correct++;else h[qid].wrong++;
  saveHistory(h);
}
// A question is critical if hardcoded OR if history shows ≥3 wrong answers
// or if you've gotten it wrong more than correct with at least 2 wrong
function isQuestionCritical(q){
  if(q.critical) return true;
  var h=loadHistory();
  var rec=h[q.id];
  if(!rec) return false;
  return rec.wrong>=3 || (rec.wrong>=2 && rec.wrong>rec.correct);
}

function toggleHints(){
  hintsEnabled=!hintsEnabled;
  document.getElementById('hintTrack').classList.toggle('on',hintsEnabled);
  if(currentMode==='practice') renderCurrentPractice();
}

function applyHints(text){
  if(!hintsEnabled) return escH(text);
  var kws=ASSOC.map(function(a){return a.kw;}).sort(function(a,b){return b.length-a.length;});
  var out=escH(text);
  kws.forEach(function(kw){
    var entry=ASSOC.find(function(a){return a.kw===kw;});
    if(!entry) return;
    var re=new RegExp('(?<![\\w-])('+escRe(kw)+')(?![\\w-])','gi');
    out=out.replace(re,function(m){
      return '<span class="kw-hint">'+m+'<span class="kw-tooltip">'+escH(entry.assoc)+'</span></span>';
    });
  });
  return out;
}

function renderInsights(){
  buildBank();
  var body=document.getElementById('insightsBody');
  var h=loadHistory();
  var qids=Object.keys(h);

  var html='<div class="ins-hero"><h2>&#x1F4CA; Insights</h2><p>Tracks every answer you submit and shows where to focus your study time.</p></div>';

  if(qids.length===0){
    html+='<div class="ins-empty"><span>&#x1F4DD;</span>No data yet — answer some questions first and your performance analysis will appear here.</div>';
    body.innerHTML=html;
    return;
  }

  // overall stats
  var totalAnswered=0,totalCorrect=0,totalWrong=0;
  qids.forEach(function(id){totalCorrect+=h[id].correct;totalWrong+=h[id].wrong;totalAnswered+=h[id].correct+h[id].wrong;});
  var pct=Math.round(totalCorrect/totalAnswered*100);

  html+='<div class="ins-stats">';
  html+='<div class="ins-stat"><div class="ins-stat-num" style="color:var(--accent)">'+totalAnswered+'</div><div class="ins-stat-label">Attempts</div></div>';
  html+='<div class="ins-stat"><div class="ins-stat-num" style="color:var(--green)">'+totalCorrect+'</div><div class="ins-stat-label">Correct</div></div>';
  html+='<div class="ins-stat"><div class="ins-stat-num" style="color:var(--red)">'+totalWrong+'</div><div class="ins-stat-label">Wrong</div></div>';
  html+='<div class="ins-stat"><div class="ins-stat-num" style="color:'+(pct>=70?'var(--green)':'var(--red)')+'">'+pct+'%</div><div class="ins-stat-label">Accuracy</div></div>';
  html+='</div>';

  // per-tag breakdown
  var tagStats={};
  QUESTIONS.forEach(function(q){
    var rec=h[q.id];if(!rec)return;
    var tag=q.tag||'Other';
    if(!tagStats[tag])tagStats[tag]={correct:0,wrong:0};
    tagStats[tag].correct+=rec.correct;
    tagStats[tag].wrong+=rec.wrong;
  });

  var tags=Object.keys(tagStats).sort(function(a,b){
    var ra=tagStats[a],rb=tagStats[b];
    var pa=ra.correct/(ra.correct+ra.wrong),pb=rb.correct/(rb.correct+rb.wrong);
    return pa-pb; // weakest first
  });

  if(tags.length){
    html+='<div class="ins-section-title">&#x1F4CC; Performance by Topic</div>';
    tags.forEach(function(tag){
      var s=tagStats[tag];
      var tot=s.correct+s.wrong;
      var p=Math.round(s.correct/tot*100);
      var color=p>=80?'var(--green)':p>=50?'var(--yellow)':'var(--red)';
      var guide=(currentExam==='encore'?STUDY_GUIDE:ENARSI_STUDY_GUIDE)[tag]||'Review '+tag+' concepts and practice related questions.';
      html+='<div class="ins-tag-row">';
      html+='<div class="ins-tag-top"><span class="ins-tag-name">'+tag+'</span><span class="ins-tag-counts">'+s.correct+'/'+tot+' correct &nbsp;|&nbsp; '+p+'%</span></div>';
      html+='<div class="ins-bar-track"><div class="ins-bar-fill" style="width:'+p+'%;background:'+color+'"></div></div>';
      html+='<div class="ins-study"><strong>&#x1F4DA; What to study</strong>'+guide+'</div>';
      html+='</div>';
    });
  }

  // critical questions panel — hardcoded + history-based
  var critList=[];
  QUESTIONS.forEach(function(q){
    var rec=h[q.id]||{correct:0,wrong:0};
    var hardcoded=!!q.critical;
    var histBased=(rec.wrong>=3)||(rec.wrong>=2&&rec.wrong>rec.correct);
    if(hardcoded||histBased) critList.push({q:q,rec:rec,hardcoded:hardcoded,histBased:histBased});
  });
  critList.sort(function(a,b){return (b.rec.wrong||0)-(a.rec.wrong||0);});

  if(critList.length){
    html+='<div class="ins-wrong-title" style="color:#dc2626">&#x1F534; Critical Questions ('+critList.length+')</div>';
    html+='<p style="font-size:12px;color:var(--muted);margin:-6px 0 12px">These show a red frame when you encounter them. Hardcoded = flagged as duplicate uploads. Auto = flagged from your answer history.</p>';
    critList.forEach(function(m){
      html+='<div class="ins-wrong-row" style="border-left:3px solid #dc2626">';
      html+='<div class="ins-wrong-q">'+m.q.text.slice(0,120)+(m.q.text.length>120?'…':'')+'</div>';
      html+='<div class="ins-wrong-meta">';
      if(m.rec.wrong)html+='<span class="ins-pill ins-pill-red">&#x274C; '+m.rec.wrong+' wrong</span>';
      if(m.rec.correct)html+='<span class="ins-pill" style="color:var(--green);background:var(--green-light)">&#x2713; '+m.rec.correct+' correct</span>';
      if(!m.rec.wrong&&!m.rec.correct)html+='<span class="ins-pill" style="color:var(--muted);background:var(--surface2)">Not attempted yet</span>';
      if(m.q.tag)html+='<span class="ins-pill ins-pill-blue">'+m.q.tag+'</span>';
      html+='<span class="ins-pill" style="color:#dc2626;background:#fef2f2;font-weight:700">'+(m.hardcoded&&m.histBased?'Hardcoded + Auto':m.hardcoded?'Hardcoded':'Auto-flagged')+'</span>';
      html+='</div></div>';
    });
  }

  // most-missed questions
  var missed=[];
  QUESTIONS.forEach(function(q){
    var rec=h[q.id];if(!rec||rec.wrong===0)return;
    missed.push({q:q,wrong:rec.wrong,correct:rec.correct});
  });
  missed.sort(function(a,b){return b.wrong-a.wrong;});

  if(missed.length){
    html+='<div class="ins-wrong-title">&#x26A0; Most Missed Questions</div>';
    missed.slice(0,10).forEach(function(m){
      html+='<div class="ins-wrong-row">';
      html+='<div class="ins-wrong-q">'+m.q.text.slice(0,120)+(m.q.text.length>120?'…':'')+'</div>';
      html+='<div class="ins-wrong-meta">';
      html+='<span class="ins-pill ins-pill-red">&#x274C; '+m.wrong+' wrong</span>';
      if(m.correct)html+='<span class="ins-pill" style="color:var(--green);background:var(--green-light)">&#x2713; '+m.correct+' correct</span>';
      if(m.q.tag)html+='<span class="ins-pill ins-pill-blue">'+m.q.tag+'</span>';
      if(m.q.originalNum)html+='<span class="ins-pill" style="color:var(--muted);background:var(--surface2)">'+m.q.originalNum+'</span>';
      html+='</div></div>';
    });
  }

  html+='<button class="ins-clear-btn" onclick="clearHistory()">&#x1F5D1; Reset All Stats</button>';
  body.innerHTML=html;
}

function buildQ(q,num){
  var tag='';
  if(q.type==='dragdrop') tag='<span class="q-tag dd-tag">Tap to Place</span>';
  if(q.type==='multi') tag='<span class="q-tag multi-tag">Choose Two</span>';
  var critBadge=isQuestionCritical(q)?'<div class="critical-badge">🔴 CRITICAL — You\'ve struggled with this one</div>':'';
  var html=critBadge+'<div class="q-meta"><span class="q-num">Question '+num+'</span><span class="q-tag">'+escH(q.tag)+'</span>'+tag+'</div>'+
           '<div class="question-text">'+applyHints(q.text)+'</div>';
  if(q.type==='single'||q.type==='multi') html+=buildMC(q);
  else if(q.type==='matching') html+=buildMatch(q);
  else if(q.type==='dragdrop') html+=buildDD(q);
  html+='<div class="feedback" id="fb-'+q.id+'"></div>';
  html+='<div class="trick-box" id="tb-'+q.id+'"><div class="trick-label">&#x1F9E0; Memory Trick</div><div class="trick-text" id="tt-'+q.id+'"></div></div>';
  return html;
}

function buildMC(q){
  var opts=shuffle(q.options);var html='<div class="options">';
  opts.forEach(function(o,i){
    var d=String.fromCharCode(65+i);
    html+='<div class="option" data-qid="'+q.id+'" data-letter="'+o.letter+'">'+
          '<div class="option-letter">'+d+'</div>'+
          '<div class="option-text">'+escH(o.text)+'</div>'+
          '<div class="option-icon"></div></div>';
  });
  html+='</div>';
  var fn=q.type==='single'?"submitSingle('"+q.id+"')"  :"submitMulti('"+q.id+"')";
  html+='<div class="post-actions">'+
        '<button class="submit-btn" id="sb-'+q.id+'" onclick="'+fn+'" disabled>Check Answer</button>'+
        '<button class="trick-btn" id="tr-'+q.id+'" onclick="showTrick(\''+q.id+'\')">&#x1F9E0; Trick</button>'+
        '</div>';
  return html;
}

function buildMatch(q){
  var descs=q.pairs.map(function(p){return p.description;});
  var comps=q.pairs.map(function(p){return p.component;});
  var shuf=shuffle(descs);
  var html='<div style="margin-bottom:11px;">';
  comps.forEach(function(c){
    html+='<div class="match-row"><div class="match-lbl">'+escH(c)+'</div>'+
          '<select class="match-sel" id="ms-'+q.id+'-'+c+'"><option value="">-- select --</option>';
    shuf.forEach(function(d,i){html+='<option value="'+i+'">'+escH(d)+'</option>';});
    html+='</select></div>';
  });
  html+='</div><input type="hidden" id="msh-'+q.id+'" value=\''+JSON.stringify(shuf)+'\'>';
  html+='<div class="post-actions">'+
        '<button class="submit-btn" id="sb-'+q.id+'" onclick="submitMatch(\''+q.id+'\')">Check Answers</button>'+
        '<button class="trick-btn" id="tr-'+q.id+'" onclick="showTrick(\''+q.id+'\')">&#x1F9E0; Trick</button>'+
        '</div>';
  return html;
}

function buildDD(q){
  ddState[q.id]={selected:null,slots:{}};
  q.groups.forEach(function(g,gi){ddState[q.id].slots[gi]=[];});
  var items=shuffle(q.items);
  var html='<div class="dd-pool-label">&#x1F449; Tap a description chip, then tap a slot to place it</div>'+
           '<div class="dd-pool" id="pool-'+q.id+'">';
  items.forEach(function(it){
    html+='<div class="dd-chip" id="chip-'+q.id+'-'+it.num+'" onclick="chipClick(\''+q.id+'\','+it.num+')">'+escH(it.text)+'</div>';
  });
  html+='</div><div class="dd-targets">';
  q.groups.forEach(function(g,gi){
    html+='<div class="dd-bucket"><div class="dd-bucket-label">'+escH(g.label)+'</div><div class="dd-slots">';
    for(var s=0;s<g.correct.length;s++){
      html+='<div class="dd-slot" id="sl-'+q.id+'-'+gi+'-'+s+'" onclick="slotClick(\''+q.id+'\','+gi+','+s+')">tap to place</div>';
    }
    html+='</div></div>';
  });
  html+='</div><div class="post-actions">'+
        '<button class="submit-btn" id="sb-'+q.id+'" onclick="submitDD(\''+q.id+'\')">Check Answers</button>'+
        '<button class="trick-btn" id="tr-'+q.id+'" onclick="showTrick(\''+q.id+'\')">&#x1F9E0; Trick</button>'+
        '</div>';
  return html;
}

function chipClick(qid,num){
  if(submitted[qid]) return;
  var st=ddState[qid],chip=document.getElementById('chip-'+qid+'-'+num);
  if(!chip||chip.classList.contains('placed')) return;
  if(st.selected===num){st.selected=null;chip.classList.remove('selected-chip');}
  else{
    if(st.selected!==null){var p=document.getElementById('chip-'+qid+'-'+st.selected);if(p)p.classList.remove('selected-chip');}
    st.selected=num;chip.classList.add('selected-chip');
  }
}
function slotClick(qid,gi,si){
  if(submitted[qid]) return;
  var st=ddState[qid],slot=document.getElementById('sl-'+qid+'-'+gi+'-'+si);
  var q=QUESTIONS.find(function(x){return x.id===qid;});
  if(slot.classList.contains('slot-filled')){
    var en=parseInt(slot.dataset.itemNum);
    slot.classList.remove('slot-filled');slot.dataset.itemNum='';slot.innerHTML='tap to place';
    var arr=st.slots[gi];var idx=arr.indexOf(en);if(idx!==-1)arr.splice(idx,1);
    var rc=document.getElementById('chip-'+qid+'-'+en);if(rc)rc.classList.remove('placed','selected-chip');
    return;
  }
  if(st.selected===null) return;
  var num=st.selected;
  if(st.slots[gi].length>=q.groups[gi].correct.length) return;
  st.slots[gi].push(num);slot.dataset.itemNum=num;slot.classList.add('slot-filled');
  var itText=q.items.find(function(it){return it.num===num;});
  slot.innerHTML='<span style="font-size:12px;color:var(--text);font-weight:500">'+escH(itText?itText.text:'')+'</span>';
  var chip=document.getElementById('chip-'+qid+'-'+num);
  if(chip){chip.classList.remove('selected-chip');chip.classList.add('placed');}
  st.selected=null;
}

function submitSingle(qid){
  if(submitted[qid]) return;submitted[qid]=true;
  var q=QUESTIONS.find(function(x){return x.id===qid;});
  var ans=userAnswers[qid],ok=ans===q.correct;
  document.querySelectorAll('.option[data-qid="'+qid+'"]').forEach(function(o){
    o.classList.add('disabled');
    if(o.dataset.letter===q.correct){o.classList.add('correct');o.querySelector('.option-icon').textContent='✓';}
    else if(o.dataset.letter===ans&&!ok){o.classList.add('wrong');o.querySelector('.option-icon').textContent='✕';}
  });
  showFB(qid,ok,q.feedback);
  document.getElementById('sb-'+qid).style.display='none';
  revealTrickBtn(qid);
  document.getElementById('card-'+qid).classList.add(ok?'answered-correct':'answered-wrong');
  updateProgress();postSubmit(qid,ok);
}
function submitMulti(qid){
  if(submitted[qid]) return;submitted[qid]=true;
  var q=QUESTIONS.find(function(x){return x.id===qid;});
  var sel=userAnswers[qid]||[];
  var ok=q.correct.length===sel.length&&q.correct.every(function(c){return sel.indexOf(c)!==-1;});
  document.querySelectorAll('.option[data-qid="'+qid+'"]').forEach(function(o){
    o.classList.add('disabled');
    if(q.correct.indexOf(o.dataset.letter)!==-1){o.classList.add('correct');o.querySelector('.option-icon').textContent='✓';}
    else if(sel.indexOf(o.dataset.letter)!==-1){o.classList.add('wrong');o.querySelector('.option-icon').textContent='✕';}
  });
  showFB(qid,ok,q.feedback);
  document.getElementById('sb-'+qid).style.display='none';
  revealTrickBtn(qid);
  document.getElementById('card-'+qid).classList.add(ok?'answered-correct':'answered-wrong');
  updateProgress();postSubmit(qid,ok);
}
function submitMatch(qid){
  if(submitted[qid]) return;submitted[qid]=true;
  var q=QUESTIONS.find(function(x){return x.id===qid;});
  var shuf=JSON.parse(document.getElementById('msh-'+qid).value);
  var ok=true;
  q.pairs.forEach(function(p){
    var el=document.getElementById('ms-'+qid+'-'+p.component);if(!el)return;
    var chosen=shuf[parseInt(el.value)];
    if(chosen===p.description)el.classList.add('c-match');
    else{el.classList.add('w-match');ok=false;}
    el.disabled=true;
  });
  showFB(qid,ok,q.feedback);
  document.getElementById('sb-'+qid).style.display='none';
  revealTrickBtn(qid);
  document.getElementById('card-'+qid).classList.add(ok?'answered-correct':'answered-wrong');
  updateProgress();postSubmit(qid,ok);
}
function submitDD(qid){
  if(submitted[qid]) return;submitted[qid]=true;
  var q=QUESTIONS.find(function(x){return x.id===qid;});
  var st=ddState[qid];var allOk=true;
  q.groups.forEach(function(g,gi){
    var placed=st.slots[gi]||[];
    var ok=g.correct.length===placed.length&&g.correct.every(function(n){return placed.indexOf(n)!==-1;});
    if(!ok)allOk=false;
    for(var s=0;s<g.correct.length;s++){
      var sl=document.getElementById('sl-'+qid+'-'+gi+'-'+s);
      if(sl){sl.classList.add('locked');sl.classList.add(ok?'correct-slot':'wrong-slot');}
    }
  });
  q.items.forEach(function(it){
    var chip=document.getElementById('chip-'+qid+'-'+it.num);if(!chip)return;
    chip.classList.remove('selected-chip');chip.style.pointerEvents='none';
    var found=q.groups.some(function(g,gi){return(st.slots[gi]||[]).indexOf(it.num)!==-1;});
    if(!found)chip.style.opacity='0.35';
  });
  showFB(qid,allOk,q.feedback);
  document.getElementById('sb-'+qid).style.display='none';
  revealTrickBtn(qid);
  document.getElementById('card-'+qid).classList.add(allOk?'answered-correct':'answered-wrong');
  updateProgress();postSubmit(qid,allOk);
}

function cleanExplanation(text){
  // Remove hardcoded letter from "The correct answer is C -- Foo" → "The correct answer is Foo"
  text=text.replace(/([Tt]he correct answer is\s+)[A-E]\s*--\s*/g,'$1');
  // Remove hardcoded letter from "The correct answer is C." → "The correct answer."
  text=text.replace(/([Tt]he correct answer is\s+)[A-E]([.,]?\s*)/g,'The correct answer$2');
  return text;
}
function showFB(qid,ok,feedback){
  var el=document.getElementById('fb-'+qid);
  el.className='feedback '+(ok?'correct':'wrong');
  var body=cleanExplanation(ok?feedback.correct:feedback.wrong);
  var pillText='';
  if(!ok){
    var q=QUESTIONS.find(function(x){return x.id===qid;});
    if(q&&q.type==='single'&&q.options){
      var co=q.options.find(function(o){return o.letter===q.correct;});
      if(co)pillText=co.text;
    }else if(q&&q.type==='multi'&&q.options){
      var cos=q.options.filter(function(o){return q.correct.indexOf(o.letter)!==-1;});
      if(cos.length)pillText=cos.map(function(o){return o.text;}).join(' + ');
    }else if(feedback.correctAnswer){
      pillText=feedback.correctAnswer;
    }
  }
  var pill=pillText?'<br><span class="correct-pill">&#x2713; '+escH(pillText)+'</span>':'';
  el.innerHTML='<div class="fb-header">'+(ok?'&#x2713; Correct!':'&#x2717; Incorrect')+'</div>'+
               '<div class="fb-body"><div class="exp-label">Explanation</div>'+
               '<div class="exp-text">'+escH(body)+pill+'</div></div>';
}

function parseAndAdd(){
  var raw=document.getElementById('pasteArea').value.trim();
  var status=document.getElementById('parseStatus');
  if(!raw){status.className='parse-st err';status.textContent='Nothing to parse.';return;}
  var blocks=raw.split(/\n---\n?/).map(function(b){return b.trim();}).filter(Boolean);
  var results=[],errors=[];
  blocks.forEach(function(block,bi){
    try{
      var lines=block.split('\n').map(function(l){return l.trim();});
      function get(k){var l=lines.find(function(x){return x.indexOf(k+':')===0;});return l?l.slice(k.length+1).trim():'';}
      var qText=get('QUESTION'),tag=get('TAG')||'General',type=get('TYPE').toLowerCase();
      var expC=get('EXPLANATION_CORRECT'),expW=get('EXPLANATION_WRONG'),label=get('CORRECT_ANSWER_LABEL'),trick=get('TRICK');
      if(!qText)throw new Error('Missing QUESTION');
      var qobj;
      if(type==='dragdrop'){
        var items=[];for(var n=1;n<=20;n++){var iv=get('ITEM'+n);if(!iv)break;items.push({num:n,text:iv});}
        if(items.length<2)throw new Error('Need ITEM1, ITEM2...');
        var groups=[];for(var g=1;g<=20;g++){var gl=get('GROUP'+g+'_LABEL');if(!gl)break;var gi=get('GROUP'+g+'_ITEMS');if(!gi)throw new Error('Missing GROUP'+g+'_ITEMS');groups.push({label:gl,correct:gi.split(',').map(function(s){return parseInt(s.trim());})});}
        if(!groups.length)throw new Error('Need GROUP1_LABEL + GROUP1_ITEMS');
        qobj={id:'c_'+Date.now()+'_'+bi,type:'dragdrop',originalNum:'Custom',tag:tag,text:qText,items:items,groups:groups,feedback:{correct:expC||'Correct!',wrong:expW||'Incorrect.',correctAnswer:label||''}};
      }else{
        var cr=get('CORRECT');if(!cr)throw new Error('Missing CORRECT');
        var opts=lines.filter(function(l){return /^[A-E]\.\s/.test(l);});if(opts.length<2)throw new Error('Need 2+ options');
        var options=opts.map(function(l){return{letter:l[0],text:l.slice(3).trim()};});
        var ca=cr.split(',').map(function(s){return s.trim().toUpperCase();});
        qobj={id:'c_'+Date.now()+'_'+bi,type:ca.length>1?'multi':'single',originalNum:'Custom',tag:tag,text:qText,options:options,correct:ca.length>1?ca:ca[0],feedback:{correct:expC||'Correct!',wrong:expW||'Incorrect.',correctAnswer:label||cr}};
      }
      if(trick)qobj.trick=trick;
      results.push(qobj);
    }catch(e){errors.push('Block '+(bi+1)+': '+e.message);}
  });
  if(!results.length){status.className='parse-st err';status.textContent='No valid questions. '+errors.join(' | ');return;}
  saveCustom(loadCustom().concat(results));
  document.getElementById('pasteArea').value='';
  status.className='parse-st ok';
  status.textContent='Added '+results.length+' question(s)!'+(errors.length?' ('+errors.length+' skipped)':'');
  renderQuiz();renderQList();renderCS();
}

  {id:'b4',critical:true,type:'single',originalNum:'Q48',tag:'SD-WAN',text:'Which technology provides an overlay fabric to connect remote locations utilizing commodity data paths and improves network performance, boosts security and reduces costs?',options:[{letter:'A',text:'InfiniBand'},{letter:'B',text:'VXLAN'},{letter:'C',text:'VTEP'},{letter:'D',text:'SD-WAN'}],correct:'D',feedback:{correct:'SD-WAN provides WAN overlay over commodity internet with path selection, encryption, and cost reduction.',wrong:'SD-WAN is for WAN overlay. VXLAN=DC overlay. VTEP=VXLAN component. InfiniBand=HPC.',correctAnswer:'D -- SD-WAN'}},
  {id:'b5',type:'single',originalNum:'Q54',tag:'Automation',text:'Why would an engineer use YANG?',options:[{letter:'A',text:'to translate JSON into an equivalent XML syntax'},{letter:'B',text:'to access data using SNMP'},{letter:'C',text:'to model data for NETCONF'},{letter:'D',text:'to transport data between a controller and a network device'}],correct:'C',feedback:{correct:'YANG is a data modeling language defining structure and constraints of data managed by NETCONF.',wrong:'YANG models data structure for NETCONF. Not transport. Not translation.',correctAnswer:'C -- to model data for NETCONF'}},
  {id:'b6',type:'single',originalNum:'Q65',tag:'Security',text:'An engineer must configure EXEC authorization that first checks a AAA server then local username. If both fail, user is denied. Which configuration?',options:[{letter:'A',text:'aaa authorization exec default local group radius none'},{letter:'B',text:'aaa authorization exec default group radius local none'},{letter:'C',text:'aaa authorization exec default local group tacacs+'},{letter:'D',text:'aaa authorization exec default group radius local'}],correct:'D',feedback:{correct:'"group radius local" = RADIUS first, then local. No "none" = implicit deny if all methods fail.',wrong:'Method order = checking order. Without "none", failure = deny. Option B adds "none" allowing access on failure.',correctAnswer:'D -- aaa authorization exec default group radius local'}},
  {id:'b7',critical:true,type:'single',originalNum:'Q66',tag:'SD-WAN',text:'Which action is the vSmart controller responsible for in an SD-WAN deployment?',options:[{letter:'A',text:'distribute security information for tunnel establishment between vEdge routers'},{letter:'B',text:'onboard vEdge nodes into the SD-WAN fabric'},{letter:'C',text:'gather telemetry data from vEdge routers'},{letter:'D',text:'manage, maintain, and gather configuration and status for nodes within the SD-WAN fabric'}],correct:'A',feedback:{correct:'vSmart (control plane) distributes OMP routes and IPsec keys for tunnel establishment.',wrong:'vSmart=security/routing(A). vBond=onboarding(B). vManage=telemetry+config(C,D).',correctAnswer:'A -- distribute security information for tunnel establishment'}},
  {id:'b8',critical:true,type:'single',originalNum:'Q68',tag:'SD-Access',text:'In a Cisco SD-Access solution, what is the role of the Identity Services Engine?',options:[{letter:'A',text:'It manages the LISP EID database.'},{letter:'B',text:'It is used to analyze endpoint to app flows and monitor fabric status.'},{letter:'C',text:'It is leveraged for dynamic endpoint to group mapping and policy definition.'},{letter:'D',text:'It provides GUI management and abstraction via apps that share context.'}],correct:'C',feedback:{correct:'ISE authenticates endpoints, assigns SGTs, and defines group-based access policies.',wrong:'ISE=identity+SGT+policy(C). DNA Center=fabric+GUI(D). Flow analysis=Stealthwatch.',correctAnswer:'C -- dynamic endpoint to group mapping and policy definition'}},
  {id:'b9',critical:true,type:'single',originalNum:'Q74',tag:'SD-WAN',text:'Which function is performed by vSmart in the Cisco SD-WAN architecture?',options:[{letter:'A',text:'redistribution between OMP and other routing protocols'},{letter:'B',text:'facilitation of NAT detection and traversal'},{letter:'C',text:'execution of localized policies'},{letter:'D',text:'aggregation and distribution of VPN routing information'}],correct:'D',feedback:{correct:'vSmart aggregates VPN routing from all vEdges via OMP and distributes it across the overlay.',wrong:'vSmart=aggregates+distributes VPN routing(D). NAT=vBond(B). Localized policies=vEdge(C). OMP-IGP redistribution=vEdge(A).',correctAnswer:'D -- aggregation and distribution of VPN routing information'}},
  {id:'b10',type:'single',originalNum:'Q78',tag:'Routing',text:'When using BFD in a network design, which consideration must be made?',options:[{letter:'A',text:'BFD is used with first hop routing protocols to provide subsecond convergence.'},{letter:'B',text:'BFD is used with dynamic routing protocols to provide subsecond convergence.'},{letter:'C',text:'BFD is used with NSF and graceful to provide subsecond convergence.'},{letter:'D',text:'BFD is more CPU-intensive than using reduced hold timers with routing protocols.'}],correct:'B',feedback:{correct:'BFD works with dynamic routing protocols for sub-second failure detection in the forwarding plane.',wrong:'BFD pairs with routing protocols. Less CPU-intensive than reduced timers. Not FHRP. Not NSF.',correctAnswer:'B -- BFD is used with dynamic routing protocols'}},
  {id:'b11',type:'multi',originalNum:'ACL-FTP',tag:'Security',text:'Which two commands are required on R1 to block FTP and allow all other traffic from Branch 2? (Choose two)',options:[{letter:'A',text:'Option A:\ninterface GigabitEthernet0/0\nip address 10.0.0.1 255.255.255.0\nip access-group 101 out'},{letter:'B',text:'Option B:\ninterface GigabitEthernet0/0\nip address 10.0.101.1 255.255.255.0\nip access-group 101 in'},{letter:'C',text:'Option C:\naccess-list 101 deny tcp 10.0.2.0 0.0.0.255 host 10.0.101.3 eq ftp-data\naccess-list 101 permit ip any any'},{letter:'D',text:'Option D:\naccess-list 101 deny tcp 10.0.2.0 0.0.0.255 host 10.0.101.3 eq ftp\naccess-list 101 deny tcp 10.0.2.0 0.0.0.255 host 10.0.101.3 eq ftp-data\naccess-list 101 permit ip any any'},{letter:'E',text:'Option E:\naccess-list 101 deny tcp 10.0.2.0 0.0.0.255 host 10.0.101.3 eq ftp\naccess-list 101 permit ip any any'}],correct:['A','D'],feedback:{correct:'Option A applies ACL outbound correctly. Option D blocks BOTH ftp(21) AND ftp-data(20).',wrong:'Need ftp(21) AND ftp-data(20). D blocks both. C only ftp-data. E only ftp control.',correctAnswer:'A and D'}},
  {id:'b12',type:'matching',originalNum:'Q16',tag:'Virtualization',text:'Match the virtual components to their descriptions.',pairs:[{component:'VMX',description:'configuration file containing settings for a virtual machine such as guest OS'},{component:'vNIC',description:'component of a virtual machine responsible for sending packets to the hypervisor'},{component:'OVA',description:'zip file connecting a virtual machine configuration file and a virtual disk'},{component:'VMDK',description:'file containing a virtual machine disk drive'}],feedback:{correct:'VMX=config file, vNIC=virtual NIC, OVA=zip archive, VMDK=virtual disk.',wrong:'VMX=config | vNIC=virtual NIC | OVA=zip | VMDK=disk.',correctAnswer:'VMX=config | vNIC=NIC | OVA=zip | VMDK=disk'}},
  {id:'b13',critical:true,type:'multi',originalNum:'Q6',tag:'Security',text:'Which two characteristics apply to the endpoint security aspect of the Cisco Threat Defense architecture? (Choose two)',options:[{letter:'A',text:'blocking of fileless malware in real time'},{letter:'B',text:'outbound URL analysis and data transfer controls'},{letter:'C',text:'cloud-based analysis of threats'},{letter:'D',text:'user context analysis'},{letter:'E',text:'detect and block ransomware in email attachments'}],correct:['B','E'],feedback:{correct:'Endpoint security: outbound URL analysis/data transfer controls(B) + email ransomware detection(E).',wrong:'B=URL analysis(endpoint). E=email ransomware(endpoint). A=network/AMP. C=cloud. D=identity.',correctAnswer:'B and E'}},
  {id:'b14',type:'single',originalNum:'JSON-1',tag:'Automation',text:'Which JSON syntax is valid?',options:[{letter:'A',text:'{"switch":{"name":"dist1","interfaces":["gig1","gig2","gig3"]}}'},{letter:'B',text:'{"switch":"name":"dist1","interfaces":["gig1","gig2","gig3"]}'},{letter:'C',text:'{/"switch/":{/"name/":"dist1",/"interfaces/":["gig1","gig2","gig3"]}}'},{letter:'D',text:"{'switch':('name':'dist1','interfaces':['gig1','gig2','gig3'])}"}],correct:'A',feedback:{correct:'A: correct double quotes, {} objects, [] arrays.',wrong:'JSON = double quotes, {} objects, [] arrays. No slashes. No single quotes.',correctAnswer:'A -- {"switch":{"name":"dist1","interfaces":["gig1","gig2","gig3"]}}'}},
  {id:'b15',critical:true,type:'single',originalNum:'JSON-2',tag:'Automation',text:'Which JSON syntax is derived from a data structure with a "Person" key containing a list of two people, each with First Name, Last Name, and a Hobbies array?',options:[{letter:'A',text:"Option A: {'Person': [{'First Name': 'Johnny', 'Last Name': 'Table', 'Hobbies': ['Running', 'Video games']}, {'First Name': 'Billy', 'Last Name': 'Smith', 'Hobbies': ['Napping', 'Reading']}]}"},{letter:'B',text:"Option B: {[{'First Name': 'Johnny', 'Last Name': 'Table', 'Hobbies': 'Running', 'Hobbies': 'Video games'}, ...]}"},{letter:'C',text:"Option C: {'Person': [{'First Name':'Johnny', 'Last Name': 'Table', 'Hobbies': 'Running', 'Video games'}, ...]}"},{letter:'D',text:"Option D: {[{'First Name': 'Johnny', 'Last Name': 'Table', 'Hobbies': ['Running', 'Video games']}, ...]}"}],correct:'A',feedback:{correct:'A: "Person" key at top level, Hobbies as proper array.',wrong:'D is missing "Person" wrapper. B duplicates Hobbies key. C lists Hobbies as flat properties.',correctAnswer:'A -- Person key wrapping objects with Hobbies arrays'}},
  {id:'b16',type:'multi',originalNum:'Q76',tag:'Security',text:'Which two new security capabilities are introduced by using a next-generation firewall at the Internet edge? (Choose two)',options:[{letter:'A',text:'integrated intrusion prevention'},{letter:'B',text:'DVPN'},{letter:'C',text:'application-level inspection'},{letter:'D',text:'stateful packet inspection'},{letter:'E',text:'NAT'}],correct:['A','C'],feedback:{correct:'NGFWs add integrated IPS(A) and application-level inspection(C) beyond traditional firewalls.',wrong:'A=IPS(new in NGFW). C=App inspection(new in NGFW). D+E=traditional FW features. B=VPN tech.',correctAnswer:'A and C'}},
  {id:'b17',type:'single',originalNum:'Q-vBond',tag:'SD-WAN',text:'What is the function of vBond in a Cisco SD-WAN deployment?',options:[{letter:'A',text:'pushing of configuration toward SD-WAN routers'},{letter:'B',text:'initiating connections with SD-WAN routers automatically'},{letter:'C',text:'onboarding of SDWAN routers into the SD-WAN overlay'},{letter:'D',text:'gathering telemetry data from SD-WAN routers'}],correct:'C',feedback:{correct:'vBond is the orchestration plane controller. It authenticates and onboards vEdge routers into the SD-WAN overlay, and facilitates NAT traversal so devices can find each other across the internet.',wrong:'vBond handles onboarding/orchestration (C). Pushing config = vManage (A). Gathering telemetry = vManage (D). vBond initiates the onboarding process but it is the vEdge that initiates the connection to vBond, not the other way around (B).',correctAnswer:'C -- onboarding of SDWAN routers into the SD-WAN overlay',trick:'vBond = BOND -- it bonds/connects new devices to the fabric. Think of it as the bouncer that lets vEdge routers in.'}},
  {id:'b18',type:'single',originalNum:'Q-DTLS',tag:'SD-WAN',text:'Which protocol is used to encrypt control plane traffic between SD-WAN controllers and SD-WAN endpoints?',options:[{letter:'A',text:'DTLS'},{letter:'B',text:'IPsec'},{letter:'C',text:'PGP'},{letter:'D',text:'HTTPS'}],correct:'A',feedback:{correct:'DTLS (Datagram Transport Layer Security) is used to encrypt control plane traffic between SD-WAN controllers (vSmart, vBond, vManage) and vEdge routers. IPsec is used for data plane encryption between vEdge routers.',wrong:'The correct answer is A. DTLS encrypts the control plane (OMP sessions between controllers and vEdge). IPsec encrypts the data plane tunnels between vEdge routers. PGP and HTTPS are not used in SD-WAN control plane encryption.',correctAnswer:'A -- DTLS (Datagram Transport Layer Security)',trick:'DTLS = Directors (controllers) talking to vEdge = control plane. IPsec = Interstate highway between vEdges = data plane. D for Directors, I for Interstate.'}},
  {id:'b19',type:'single',originalNum:'Q-MACsec',tag:'Security',text:'What is a characteristic of MACsec?',options:[{letter:'A',text:'802.1AE is built between the host and switch using the MKA protocol, which negotiates encryption keys based on the master session key from a successful 802.1X session'},{letter:'B',text:'802.1AE is built between the host and switch using the MKA protocol using keys generated via the Diffie-Hellman algorithm (anonymous encryption mode)'},{letter:'C',text:'802.1AE is negotiated using Cisco AnyConnect NAM and the SAP protocol'},{letter:'D',text:'802.1AE provides encryption and authentication services'}],correct:'A',feedback:{correct:'MACsec (802.1AE) uses the MKA (MACsec Key Agreement) protocol to negotiate encryption keys. The keys are derived from the master session key (MSK) established during a successful 802.1X authentication session.',wrong:'The correct answer is A. MACsec uses MKA with keys from 802.1X authentication (MSK), not Diffie-Hellman. Diffie-Hellman would be anonymous mode which is not standard MACsec. AnyConnect NAM can initiate 802.1X but SAP is not the negotiation protocol. MACsec does provide encryption and authentication but that describes what it does, not how it works.',correctAnswer:'A -- MKA protocol with keys from successful 802.1X session',trick:'MACsec = 802.1AE. MKA = MACsec Key Agreement. Keys come from the 802.1X MSK (Master Session Key). Remember: 802.1X authenticates → MSK born → MKA uses MSK to negotiate encryption.'}},
  {id:'b20',type:'single',originalNum:'Q-Python1',tag:'Automation',text:'A network engineer must use a Python script to convert data received from a network device. Which type of data is printed to the console when the script runs? The script defines a vlan() function that splits lines by newline, skips empty lines, splits each line by \'=>\' into key-value pairs, stores them in a dictionary called vlan_list_dict, and returns it. The main() function calls vlan() and prints the result.',options:[{letter:'A',text:'a tuple list'},{letter:'B',text:'list of strings'},{letter:'C',text:'list of lists'},{letter:'D',text:'dictionary with a key-value pair'}],correct:'D',feedback:{correct:'The vlan() function creates vlan_list_dict = {} which is a dictionary, stores key-value pairs in it using vlan_list_dict[k] = v, and returns it. print_vlan() then prints this dictionary to the console.',wrong:'The correct answer is D. The code explicitly creates a dictionary {} and populates it with k,v pairs split by "=>". It is not a list, tuple, or list of lists. The variable name vlan_list_dict and the k=key v=value pattern are the giveaways.',correctAnswer:'D -- dictionary with a key-value pair',trick:'vlan_list_dict = {} → curly braces = dictionary! Split by "=>" into k,v = key-value pairs. The variable name even says "dict". {} = dict, [] = list, () = tuple.'}},
  {id:'b21',type:'single',originalNum:'Q-Hypervisor',tag:'Virtualization',text:'A server running Linux is providing support for virtual machines along with DNS and DHCP services for a small business. Which technology does this represent?',options:[{letter:'A',text:'Type 1 hypervisor'},{letter:'B',text:'hardware pass-through'},{letter:'C',text:'Type 2 hypervisor'},{letter:'D',text:'container'}],correct:'C',feedback:{correct:'A Type 2 hypervisor (hosted hypervisor) runs on top of an existing operating system like Linux. It supports VMs while the host OS continues running other services like DNS and DHCP. Examples include VMware Workstation and Microsoft Virtual PC.',wrong:'The correct answer is C. A Type 1 hypervisor runs directly on bare metal hardware with no host OS underneath. Type 2 runs on top of an OS — the Linux server here is the host OS. Containers share the host OS kernel and are not hypervisors.',correctAnswer:'C -- Type 2 hypervisor (runs on top of host OS)',trick:'Type 1 = bare metal (no OS underneath). Type 2 = hosted on top of an OS. Linux still running DNS/DHCP = host OS is alive = Type 2.'}},
  {id:'b22',critical:true,type:'single',originalNum:'Q-LISP-ETR',tag:'LISP',text:'Which LISP device is responsible for publishing EID-to-RLOC mappings for a site?',options:[{letter:'A',text:'ITR'},{letter:'B',text:'MS'},{letter:'C',text:'ETR'},{letter:'D',text:'MR'}],correct:'C',feedback:{correct:'The ETR (Egress Tunnel Router) is responsible for publishing/registering EID-to-RLOC mappings for its site to the Map Server. The ETR registers the EIDs it is responsible for so other sites can find them.',wrong:'The correct answer is C -- ETR. The ITR (A) looks up mappings to forward traffic. The Map Server (B) stores the mappings. The Map Resolver (D) answers queries from ITRs. Only the ETR publishes/registers the mappings for its site.',correctAnswer:'C -- ETR (Egress Tunnel Router)',trick:'ETR = Egress = Exit point of the site = registers/publishes EIDs. ITR = Ingress = looks up mappings. MS = stores mappings. MR = answers ITR queries.'}},
  {id:'b23',critical:true,type:'single',originalNum:'Q-TACACS-key',tag:'Security',text:'An engineer configured TACACS+ to authenticate remote users but the configuration is not working. The debug output shows: "Invalid AUTHEN packet (check keys)". Which configuration must be applied to enable access?',options:[{letter:'A',text:'R1(config)#tacacs-server prod\nR1(config-server-tacacs)#port 1020'},{letter:'B',text:'R1(config)#tacacs-server prod\nR1(config-server-tacacs)#key cisco123'},{letter:'C',text:'R1(config)#aaa authorization exec default group tacacs+ local'},{letter:'D',text:'R1(config)#ip tacacs source-interface Gig0/0'}],correct:'B',feedback:{correct:'The debug output clearly states "Invalid AUTHEN packet (check keys)" which means the encryption key configured on the router does not match the key on the TACACS+ server. Configuring the correct key with "key cisco123" resolves the mismatch.',wrong:'The correct answer is B. "Check keys" in the debug output is the direct clue -- the shared secret key is mismatched between the router and TACACS+ server. Wrong port (A) would cause connection failure not a key error. Authorization config (C) is unrelated to authentication key errors. Source interface (D) is unrelated to key mismatches.',correctAnswer:'B -- tacacs-server key cisco123 (key mismatch indicated by "check keys")',trick:'"Check keys" in the debug = key mismatch. The debug message tells you exactly what is wrong — shared secret on router does not match the TACACS+ server.'}},
