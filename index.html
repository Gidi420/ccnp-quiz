  {id:'e7',type:'single',tag:'OSPF',text:'Refer to the exhibit. An OSPF neighbor relationship between R2 and R3 is showing stuck in EXCHANGE/EXSTART state. The neighbor is established between R1 and R2. The network engineer can ping from R2 to R3 and vice versa, but the neighbor is still down.\n\nR2# show ip ospf neighbor:\n  192.168.99.2  EXCHANGE  Serial0/1\n\nR3# show ip ospf neighbor:\n  192.168.99.1  EXSTART   Serial0/1\n\nTopology: R2 (S0/1 192.168.99.1/30) --- R3 (S0/1 192.168.99.2/30)\n           R2 (G0/0 10.1.11.1/30) --- R1 (G0/0 10.1.11.2/30)\n\nWhich action resolves the issue?',options:[{letter:'A',text:'Match MTU on both router interfaces or ignore MTU'},{letter:'B',text:'Restore the Layer 2/Layer 3 connectivity issue in the ISP network'},{letter:'C',text:'Administrative "shut then no shut" both router interfaces'},{letter:'D',text:'Enable OSPF on the interface, which is required'}],correct:'A',feedback:{correct:'OSPF stuck in EXCHANGE/EXSTART is the classic symptom of MTU mismatch. DBD packets cannot be processed if one side has a larger MTU. Fix with matching MTU or "ip ospf mtu-ignore".',wrong:'Ping works so L3 connectivity is fine. EXCHANGE/EXSTART deadlock = MTU mismatch preventing DBD packet exchange.',correctAnswer:'A -- match MTU on both interfaces or use ip ospf mtu-ignore'}},
  {id:'e8',type:'single',tag:'MPLS',text:'Which list defines the contents of an MPLS label?',options:[{letter:'A',text:'20-bit label; 3-bit traffic class; 1-bit bottom stack; 8-bit TTL'},{letter:'B',text:'32-bit label; 3-bit flow label; 1-bit bottom stack; 8-bit hop limit'},{letter:'C',text:'20-bit label; 3-bit flow label; 1-bit bottom stack; 8-bit hop limit'},{letter:'D',text:'32-bit label; 3-bit traffic class; 1-bit bottom stack; 8-bit TTL'}],correct:'A',feedback:{correct:'MPLS label = 32 bits total: [20-bit label value] + [3-bit TC/EXP] + [1-bit S, bottom of stack] + [8-bit TTL].',wrong:'"Flow label" and "hop limit" are IPv6 fields, not MPLS. The label value field is 20 bits. Total MPLS label is 32 bits (20+3+1+8).',correctAnswer:'A -- 20-bit label, 3-bit TC, 1-bit S, 8-bit TTL'}},
  {id:'e9',type:'single',tag:'OSPF',text:'Refer to the exhibit. An engineer is trying to block the route to 192.168.2.2 from the routing table by using the configuration shown. The route is still present in the routing table as an OSPF route. Which action blocks the route?\n\nRouter#show access-lists\nStandard IP access list 1\n 10 permit 192.168.2.2 (1 match)\n\nRouter#show route-map\nroute-map RM-OSPF-DL, permit, sequence 10\n  Match clauses: ip address (access-lists): 1\n  Set clauses:\n  Policy routing matches: 0 packets, 0 bytes\n\nRouter#show running-config | section ospf\nrouter ospf 1\n network 192.168.1.1 0.0.0.0 area 0\n network 192.168.12.0 0.0.0.255 area 0\n distribute-list route-map RM-OSPF-DL in',options:[{letter:'A',text:'Add this statement to the route map "route-map RM-OSPF-DL deny 20"'},{letter:'B',text:'Use a prefix list instead of an access list in the route map'},{letter:'C',text:'Change sequence 10 in the route-map command from permit to deny'},{letter:'D',text:'Use an extended access list instead of a standard access list'}],correct:'C',feedback:{correct:'In a distribute-list route-map, PERMIT = install the route, DENY = filter it out. Current config PERMITS 192.168.2.2 (ACL 1 matches it, route-map permits it). Change to deny.',wrong:'The route-map currently ALLOWS 192.168.2.2 into the routing table. To block it, change the route-map action from permit to deny.',correctAnswer:'C -- change route-map sequence 10 from permit to deny'}},
  {id:'e10',type:'single',tag:'Security',text:'Refer to the exhibit. A company is evaluating multiple NMS tools. Trending graphs generated by SNMP data appear to have multiple gaps. An engineer noticed the relevant output. What solves the gaps?\n\nR1#show policy-map control-plane\n Control Plane\n  Class-map: NMS (match-all)\n   500461 packets, 24038351 bytes\n   5 minute offered rate 1390000 bps, drop rate 0 bps\n   police:\n     cir 50000 bps, bc 5000 bytes\n     conformed  50444 packets, 24031001 bytes; actions: transmit\n     exceeded  990012 packets, 94030134 bytes; actions: drop\n     conformed 4000 bps, exceed 0 bps',options:[{letter:'A',text:'Remove the class map NMS from being part of control plane policing'},{letter:'B',text:'Remove the exceed-rate command in the class map'},{letter:'C',text:'Configure the CIR rate to a lower value that accommodates all the NMS tools'},{letter:'D',text:'Separate the NMS class map in multiple class maps based on the specific protocols with appropriate CoPP Actions'}],correct:'D',feedback:{correct:'990012 packets exceeded and dropped vs 50444 conformed — CoPP drops ~95% of SNMP traffic. A single overly restrictive CIR causes the gaps. Separate per-protocol class-maps with appropriate rates.',wrong:'Lower CIR would make gaps worse. Removing from CoPP = no protection. The fix is granular per-protocol policing, not a single class for all NMS traffic.',correctAnswer:'D -- separate NMS into per-protocol class-maps with appropriate CoPP actions'}},
  {id:'e11',type:'single',tag:'DNA Center',text:'An engineer failed to run diagnostic commands on devices using Cisco DNA Center. Which action in Cisco DNA Center resolves the issue?',options:[{letter:'A',text:'Enable Secure Shell'},{letter:'B',text:'Enable Command Runner'},{letter:'C',text:'Enable APIs'},{letter:'D',text:'Enable CDP'}],correct:'B',feedback:{correct:'Command Runner is the Cisco DNA Center feature that allows engineers to run read-only CLI diagnostic commands on network devices from the GUI.',wrong:'SSH is configured on the devices themselves, not in DNA Center. Command Runner must be enabled in DNA Center to run CLI commands.',correctAnswer:'B -- Enable Command Runner in DNA Center'}},
  {id:'e12',type:'single',tag:'Redistribution',text:'Refer to the exhibit. R1 is the border router between OSPF (R1-R2-R3) and EIGRP 100 (R1-R4). The subnet 172.16.2.48/28 exists as an outside EIGRP route (tagged). An engineer must troubleshoot why this subnet is not being redistributed into the OSPF domain. Which configuration on R1 advertises this subnet into the OSPF domain?',options:[{letter:'A',text:'Option A:\nroute-map CCNP permit 10\n match route-type level-2\nrouter ospf 10\n redistribute eigrp 100 subnets route-map CCNP'},{letter:'B',text:'Option B:\nroute-map CCNP deny 10\n match tag 200\nroute-map CCNP permit 20\nrouter ospf 10\n redistribute eigrp 100 subnets route-map CCNP'},{letter:'C',text:'Option C:\nroute-map CCNP permit 10\n match tag 200\nrouter ospf 10\n redistribute eigrp 100 subnets route-map CCNP'},{letter:'D',text:'Option D:\nroute-map CCNP permit 10\n match route-type internal\nrouter ospf 10\n redistribute eigrp 100 subnets route-map CCNP'}],correct:'C',feedback:{correct:'The outside EIGRP route 172.16.2.48/28 carries tag 200. Route-map CCNP permitting routes with tag 200 allows these routes to be redistributed into OSPF.',wrong:'level-2 is IS-IS terminology. "internal" would only permit EIGRP internal routes. Option B DENIES tag 200. Correct: permit routes matching tag 200.',correctAnswer:'C -- route-map CCNP permit 10 / match tag 200 / redistribute eigrp 100 subnets'}},
  {id:'e13',type:'single',tag:'QoS',text:'Refer to the exhibit. Packets from 209.165.200.215 must be sent with IP precedence 1, and packets from 209.165.200.216 must be sent with IP precedence 5. Which action resolves the issue?\n\naccess-list 1 permit 209.165.200.215\naccess-list 2 permit 209.165.200.216\ninterface Ethernet 1\n ip policy route-map Texas\nroute-map Texas permit 10\n match ip address 1\n set ip precedence priority\n set ip next-hop 209.165.200.217\nroute-map Texas permit 20\n match ip address 2\n set ip next-hop 209.165.200.218',options:[{letter:'A',text:'set ip precedence immediate in route-map Texas permit 10'},{letter:'B',text:'set ip precedence priority in route-map Texas permit 20'},{letter:'C',text:'set ip precedence critical in route-map Texas permit 10'},{letter:'D',text:'set ip precedence critical in route-map Texas permit 20'}],correct:'D',feedback:{correct:'209.165.200.216 matches ACL 2 in permit 20. It needs precedence 5 = "critical". Permit 20 currently only sets next-hop — add "set ip precedence critical" there.',wrong:'IP precedence: 1=priority, 2=immediate, 5=critical. .215 (permit 10) already has priority(1) set. .216 (permit 20) needs critical(5) — it has no precedence set yet.',correctAnswer:'D -- set ip precedence critical in route-map Texas permit 20'}},
  {id:'e14',type:'single',tag:'DNA Center',text:'Refer to the exhibit. The AP status from Cisco DNA Center Assurance Dashboard shows physical connectivity issues from access switch interface G1/0/14.\n\nDNA Center Alert: AP "AP0081.C424.3CE2" went down.\nStatus: Open\nDescription: This AP is no longer connected to a WLC. Previously connected to switch BLD0-FL/R9-ACCESS, port GigabitEthernet1/10/14.\n\nWhich command generates the diagnostic data to resolve the physical connectivity issues?',options:[{letter:'A',text:'verify cable-diagnostics tdr interface GigabitEthernet1/0/14'},{letter:'B',text:'show cable-diagnostics tdr interface GigabitEthernet1/0/14'},{letter:'C',text:'test cable-diagnostics tdr interface GigabitEthernet1/0/14'},{letter:'D',text:'check cable-diagnostics tdr interface GigabitEthernet1/0/14'}],correct:'C',feedback:{correct:'"test cable-diagnostics tdr" initiates the TDR (Time Domain Reflectometry) test to GENERATE cable diagnostic data. "show cable-diagnostics tdr" displays results AFTER the test.',wrong:'"verify" and "check" are not valid Cisco IOS commands for TDR. "show" reads results after the test — you need "test" to first generate the data.',correctAnswer:'C -- test cable-diagnostics tdr interface GigabitEthernet1/0/14'}},
  {id:'e15',type:'single',tag:'MPLS',text:'Which statement describes the operation of a device in an MPLS L3VPN?',options:[{letter:'A',text:'CE routers perform MPLS label switching to forward packets across the provider backbone'},{letter:'B',text:'PE routers advertise MPLS transport labels directly to CE routers via LDP'},{letter:'C',text:'P routers provide connectivity between PE devices by performing MPLS label switching'},{letter:'D',text:'CE routers exchange VPNv4 prefixes with remote PE routers using MP-BGP'}],correct:'C',feedback:{correct:'P (Provider core) routers perform MPLS label switching to forward packets between PE devices. They have no VRF knowledge — they only swap labels.',wrong:'CE routers do not run MPLS. PE routers exchange VPNv4 routes via MP-BGP with other PEs (not CEs). P routers forward using labels, not VRF routing.',correctAnswer:'C -- P routers connect PE devices by MPLS label switching through the provider backbone'}},
  {id:'e16',type:'single',tag:'EIGRP',text:'Refer to the exhibit. R1 has a multipoint GRE tunnel interface with multiple EIGRP neighbors, but some neighbors are not receiving all routes. Which action resolves the issue?',options:[{letter:'A',text:'Configure EIGRP stub on R1'},{letter:'B',text:'Configure next-hop-self on the tunnel interface'},{letter:'C',text:'Disable EIGRP split horizon on the tunnel interface'},{letter:'D',text:'Enable EIGRP route summarization on the tunnel interface'}],correct:'C',feedback:{correct:'On multipoint (NBMA/mGRE) interfaces, EIGRP split-horizon prevents routes learned from one neighbor from being advertised back out the same interface to other neighbors. Disabling split-horizon allows hub to re-advertise spoke routes to other spokes.',wrong:'Stub only reduces query scope. Next-hop-self fixes next-hop reachability but not split-horizon blocking. Summarization aggregates routes, not the root cause.',correctAnswer:'C -- disable ip split-horizon eigrp on the multipoint interface'}},
  {id:'e17',type:'single',tag:'Security',text:'An interface is configured with uRPF strict mode (ip verify unicast source reachable-via rx). Legitimate packets arriving from asymmetric paths are being dropped. Which command resolves the issue without removing uRPF entirely?',options:[{letter:'A',text:'ip verify unicast source reachable-via any'},{letter:'B',text:'ip verify unicast source reachable-via rx allow-default'},{letter:'C',text:'no ip verify unicast source reachable-via rx'},{letter:'D',text:'ip verify unicast source reachable-via rx allow-self-ping'}],correct:'A',feedback:{correct:'"reachable-via any" is loose mode uRPF — it only checks that the source IP exists somewhere in the routing table, regardless of which interface it arrived on. This allows asymmetric routing.',wrong:'"allow-default" permits packets matching only the default route. "no ip verify" removes uRPF entirely. Loose mode (reachable-via any) is the correct fix for asymmetric routing.',correctAnswer:'A -- ip verify unicast source reachable-via any (loose mode, allows asymmetric paths)'}},
  {id:'e18',type:'single',tag:'BGP',text:'Refer to the exhibit. Cisco DNA Center Assurance shows BGP_ADJCHANGE events for a BGP peer. Routes from neighbor 10.140.212.5 are being repeatedly withdrawn and re-advertised, causing instability. Which configuration resolves the issue?\n\nrouter bgp 65001\n neighbor 10.140.212.5 remote-as 65002',options:[{letter:'A',text:'router bgp 65001\n neighbor 10.140.212.5 route-map Dampening out\nroute-map Dampening permit 10\n set dampening 15 750 2000 60'},{letter:'B',text:'router bgp 65001\n bgp dampening\n neighbor 10.140.212.5 soft-reconfiguration inbound'},{letter:'C',text:'router bgp 65001\n neighbor 10.140.212.5 route-map Dampening in\nroute-map Dampening permit 10\n set dampening 15 750 2000 60'},{letter:'D',text:'router bgp 65001\n neighbor 10.140.212.5 route-map Dampening in\nroute-map Dampening deny 10'}],correct:'C',feedback:{correct:'BGP route dampening applied inbound via route-map penalizes flapping routes by suppressing them after repeated withdrawals. The set dampening parameters define half-life, reuse, suppress, and max-suppress timers.',wrong:'Dampening must be applied inbound (on received routes). Outbound does not affect received route stability. A deny route-map would drop all routes, not dampen them.',correctAnswer:'C -- neighbor route-map Dampening in with set dampening parameters'}},
  {id:'e19',type:'multi',tag:'MPLS',text:'Which two features provide MPLS traffic protection by offering an alternate path when a link or node fails? (Choose two.)',options:[{letter:'A',text:'IP Loop Free Alternate (LFA)'},{letter:'B',text:'BGP Multipath'},{letter:'C',text:'MPLS Traffic Engineering (TE) with RSVP'},{letter:'D',text:'OSPF Graceful Restart'},{letter:'E',text:'MPLS Fast Reroute (FRR)'}],correct:['A','E'],feedback:{correct:'LFA (Loop Free Alternate) pre-computes a backup next-hop that avoids the protected link/node. FRR (Fast Reroute) provides sub-50ms switchover to a pre-established backup LSP.',wrong:'BGP multipath is load balancing, not failover protection. TE/RSVP provides bandwidth reservation but FRR is the protection mechanism. Graceful restart maintains adjacency during restart, not link failure.',correctAnswer:'A and E -- LFA provides pre-computed backup next-hops; FRR provides sub-50ms switchover'}},
  {id:'e20',type:'single',tag:'Security',text:'Refer to the exhibit. An engineer is unable to access privileged EXEC mode on a router. The IP SLA log shows the TACACS server is unreachable. The current config shows:\n\naaa new-model\naaa authentication login default group tacacs+ local\naaa authorization exec default group tacacs+ local\ntacacs-server host 10.1.1.1\n\nline vty 0 4\n login authentication default\n authorization exec default\n\nWhich additional configuration resolves the privileged EXEC access issue when TACACS is unavailable?',options:[{letter:'A',text:'username admin privilege 15 secret Cisco@123'},{letter:'B',text:'enable password Cisco@123'},{letter:'C',text:'aaa authentication enable default group tacacs+ enable'},{letter:'D',text:'aaa authorization exec default group tacacs+ if-authenticated'}],correct:'B',feedback:{correct:'When TACACS is unreachable, the local fallback is used for authentication. But without "enable password", the local users cannot escalate to privilege 15. Adding "enable password" allows fallback privilege escalation.',wrong:'A local username with privilege 15 requires "authorization exec" to assign the privilege level — but with TACACS down, exec authorization falls back to local which needs the privilege level set.',correctAnswer:'B -- enable password Cisco@123 provides privilege EXEC access when TACACS is unreachable'}},
  {id:'e21',type:'single',tag:'Security',text:'Refer to the exhibit. After implementing CoPP, routing protocol neighbors are flapping. The show policy-map control-plane output shows routing protocol traffic being dropped. Which action resolves the issue?\n\nService-policy input: CoPP-Policy\n Class-map: Routing-Protocols (match-all)\n   police:\n     cir 64000 bps, bc 4000 bytes\n     conformed: transmit\n     exceeded: drop',options:[{letter:'A',text:'Remove the police statement from the Routing-Protocols class-map'},{letter:'B',text:'Set the exceed-action to transmit and apply the service-policy in the input direction'},{letter:'C',text:'Increase the CIR to 512000 bps in the Routing-Protocols class-map'},{letter:'D',text:'Move the CoPP policy to the output direction'}],correct:'B',feedback:{correct:'CoPP should allow routing protocol bursts by setting exceed-action to transmit. This prevents drops of legitimate routing traffic during bursts. CoPP is always applied in the input direction to the control plane.',wrong:'Removing policing removes protection entirely. Increasing CIR may still drop bursts. Output direction does not protect the control plane from inbound traffic.',correctAnswer:'B -- set exceed-action transmit; ensure service-policy is applied input direction'}},
  {id:'e22',type:'single',tag:'BGP',text:'Refer to the exhibit. AS111 is connected to ISP-1 (AS100) and ISP-2 (AS200). AS1000 customer routes are received through both ISPs.\n\nAS111 config:\nrouter bgp 111\n neighbor 195.1.1.1 remote-as 100\n neighbor 195.1.1.1 allowas-in\n neighbor 195.1.2.2 remote-as 200\n neighbor 195.1.2.2 allowas-in\n\nAS111 is receiving its own routes from AS200 causing a loop in the network. Which configuration provides loop prevention?',options:[{letter:'A',text:'Option A:\nrouter bgp 111\n neighbor 195.1.1.1 as-override\n neighbor 195.1.2.2 allowas-in'},{letter:'B',text:'Option B:\nrouter bgp 111\n neighbor 195.1.2.2 as-override\n no neighbor 195.1.1.1 allowas-in'},{letter:'C',text:'Option C:\nrouter bgp 111\n neighbor 195.1.1.1 as-override\n neighbor 195.1.2.2 as-override'},{letter:'D',text:'Option D:\nrouter bgp 111\n no neighbor 195.1.1.1 allowas-in\n no neighbor 195.1.2.2 allowas-in'}],correct:'D',feedback:{correct:'Removing "allowas-in" restores BGP\'s built-in loop prevention: AS111 will reject routes that contain AS111 in the AS_PATH, preventing its own routes from being re-installed.',wrong:'as-override replaces the customer AS in the path (used by providers for overlapping customer ASNs). The issue here is allowas-in allows AS111 to accept routes with its own AS in the path.',correctAnswer:'D -- remove allowas-in from both neighbors to re-enable BGP AS_PATH loop prevention'}},
  {id:'e23',type:'single',tag:'EIGRP',text:'Refer to the exhibit. DNA Center Device 360 shows the following syslog for R1:\n\nDUAL_NBRCHANGE — Jan 11 15:41:03.038: EIGRP-IPv4 88: Neighbor 172.16.33.2 (GigabitEthernet2.10) is down; authentication mode changed\n\nR1 lost its directly connected EIGRP peer 172.16.33.2 (SW1). Which configuration resolves the issue?',options:[{letter:'A',text:'Option A:\nkey chain EIGRP\n key 1\n  key-string Cisco\n!\ninterface GigabitEthernet2.10\n ip authentication mode eigrp 88 md5\n ip authentication key-chain eigrp 88 EIGRP'},{letter:'B',text:'Option B:\nkey chain EIGRP\n key 1\n  key-string Cisco\n!\ninterface GigabitEthernet2\n ip authentication mode eigrp 88 md5\n ip authentication key-chain eigrp 88 EIGRP'},{letter:'C',text:'Option C:\nkey chain EIGRP\n key 1\n  key-string Cisco\n!\ninterface GigabitEthernet2.10\n ip authentication mode eigrp 88 md5\n ip authentication key-chain eigrp 88 Cisco'},{letter:'D',text:'Option D:\nkey chain EIGRP\n key 1\n  key-string Cisco\n!\ninterface GigabitEthernet2\n ip authentication mode eigrp 88 md5\n ip authentication key-chain eigrp 88 Cisco'}],correct:'A',feedback:{correct:'The neighbor 172.16.33.2 is on GigabitEthernet2.10 (the subinterface). Authentication must be configured on Gi2.10 with key-chain name "EIGRP" matching the key chain defined.',wrong:'Option B uses Gi2 (parent) instead of Gi2.10 (subinterface). Options C and D reference key-chain "Cisco" but the key chain is named "EIGRP".',correctAnswer:'A -- configure EIGRP MD5 auth on GigabitEthernet2.10 with key-chain name EIGRP'}},
  {id:'e24',type:'single',tag:'DNA Center',text:'While working with software images, an engineer observes that Cisco Catalyst Center (formerly DNA Center) cannot upload its software image directly from the device. Why is the image not uploading?',options:[{letter:'A',text:'The device has lost connectivity to Cisco Catalyst Center'},{letter:'B',text:'The software image for the device is in bundle mode'},{letter:'C',text:'The software image for the device is in install mode'},{letter:'D',text:'The device must be resynced to Cisco Catalyst Center'}],correct:'C',feedback:{correct:'Cisco Catalyst Center SWIM cannot directly import images from devices running in install mode (individual sub-packages). The image must be uploaded manually or obtained from cisco.com.',wrong:'Bundle mode (single consolidated image) allows direct import. Connectivity issues would show as device unreachable. Resync updates inventory but does not resolve image upload limitations.',correctAnswer:'C -- install mode prevents Catalyst Center from directly uploading the image from the device'}},
  {id:'e25',type:'single',tag:'Security',text:'Refer to the exhibit. R1 (198A:0:200C::1/64) is connected via Gi0/0 to R2 (201A:0:205C::1/64).\n\nWhich configuration denies Telnet traffic to router 2 from 198A:0:200C::1/64?',options:[{letter:'A',text:'ipv6 access-list Deny_Telnet\n sequence 10 deny tcp host 198A:0:200C::1/64 host 201A:0:205C::1/64\n!\nint Gi0/0\n ipv6 access-map Deny_Telnet in'},{letter:'B',text:'ipv6 access-list Deny_Telnet\n sequence 10 deny tcp host 198A:0:200C::1/64 host 201A:0:205C::1/64\n!\nint Gi0/0\n ipv6 traffic-filter Deny_Telnet in'},{letter:'C',text:'ipv6 access-list Deny_Telnet\n sequence 10 deny tcp host 198A:0:200C::1/64 host 201A:0:205C::1/64 eq telnet\n!\nint Gi0/0\n ipv6 access-map Deny_Telnet in'},{letter:'D',text:'ipv6 access-list Deny_Telnet\n sequence 10 deny tcp host 198A:0:200C::1/64 host 201A:0:205C::1/64 eq telnet\n!\nint Gi0/0\n ipv6 traffic-filter Deny_Telnet in'}],correct:'D',feedback:{correct:'"eq telnet" restricts the deny to Telnet port 23 only. "ipv6 traffic-filter" is the correct command to apply an IPv6 ACL to an interface (like "ip access-group" for IPv4).',wrong:'"ipv6 access-map" is not a valid interface command for IPv6 ACLs — use "ipv6 traffic-filter". Without "eq telnet", all TCP from that host is denied, not just Telnet.',correctAnswer:'D -- deny tcp with eq telnet + ipv6 traffic-filter on interface'}},
  {id:'e26',type:'single',tag:'Redistribution',text:'Refer to the exhibit. An engineer troubleshoots connectivity from users at segment 172.16.3.16/28 to the server farm at 192.168.5.16/28. R1 is the OSPF/RIP boundary router. R3 shows 192.168.5.0/24 [120/15] in its routing table. R4 has no route to 192.168.5.0/24.\n\nR1 config:\nrouter ospf 1\n redistribute rip subnets\n network 192.168.250.0 0.0.0.255 area 0\nrouter rip\n version 2\n redistribute ospf 1 metric 15\n network 172.16.0.0\n\nWhich configuration resolves the issue on router R1?',options:[{letter:'A',text:'router ospf 1\n redistribute rip metric 16'},{letter:'B',text:'router rip\n redistribute ospf 1 metric 14'},{letter:'C',text:'router ospf 1\n redistribute rip metric 14'},{letter:'D',text:'router rip\n redistribute ospf 1 metric 16'}],correct:'B',feedback:{correct:'R3 learns OSPF routes at RIP metric 15. When R3 advertises to R4, metric becomes 16 (RIP infinity — unreachable). Reducing the redistribution metric to 14 means R4 learns routes at metric 15, which is still valid.',wrong:'Metric 16 in RIP is infinity (unreachable). Redistributing into OSPF is not the issue — the problem is OSPF routes in RIP domain have too-high metric reaching R4.',correctAnswer:'B -- redistribute ospf 1 metric 14 so R4 (2 hops from R1) sees metric 15, still valid in RIP'}},
  {id:'e27',type:'single',tag:'Redistribution',text:'Refer to the exhibit. R1 prefix-lists and route-map:\n\nip prefix-list ccnp1 seq 5 permit 10.1.48.0/24 le 24\nip prefix-list ccnp2 seq 5 permit 10.1.80.0/24 le 32\nip prefix-list ccnp3 seq 5 permit 10.1.64.0/24 le 24\n\nroute-map ospf-to-eigrp permit 10\n match ip address prefix-list ccnp1\n set tag 30\nroute-map ospf-to-eigrp permit 20\n match ip address prefix-list ccnp2\n set tag 20\nroute-map ospf-to-eigrp permit 30\n match ip address prefix-list ccnp3\n set tag 10\n\nAn engineer wanted to set a tag of 30 to route 10.1.80.65/32 but it failed. How is the issue fixed?',options:[{letter:'A',text:'Modify route-map ospf-to-eigrp permit 30 and match prefix-list ccnp2.'},{letter:'B',text:'Modify route-map ospf-to-eigrp permit 10 and match prefix-list ccnp2.'},{letter:'C',text:'Modify prefix-list ccnp3 to add 10.1.64.0/20 le 24'},{letter:'D',text:'Modify prefix-list ccnp3 to add 10.1.64.0/20 ge 32'}],correct:'B',feedback:{correct:'10.1.80.65/32 matches ccnp2 (10.1.80.0/24 le 32), so it hits permit 20 (tag 20) before reaching permit 30. Change permit 10 to match ccnp2 so the route hits sequence 10 first and gets tag 30.',wrong:'Route-map processing is sequential and stops at first match. 10.1.80.65/32 already matches at permit 20 — it never reaches permit 30. Option C/D affect unrelated ccnp3 prefix-list.',correctAnswer:'B -- modify permit 10 to match ccnp2; route hits sequence 10 (tag 30) before sequence 20'}},
  {id:'e28',type:'single',tag:'MPLS',text:'Refer to the exhibit. The output of "show tag-switching tdp bindings" displays several TIB entries with remote bindings showing "tag: imp-null".\n\nWhat does the imp-null tag represent in the MPLS VPN cloud?',options:[{letter:'A',text:'Include the EXP bit'},{letter:'B',text:'Exclude the EXP bit'},{letter:'C',text:'Impose the label'},{letter:'D',text:'Pop the label'}],correct:'D',feedback:{correct:'"imp-null" (implicit null, label value 3) signals the upstream LSR to pop the label before forwarding — this is Penultimate Hop Popping (PHP). The penultimate router removes the label so the egress LSR receives an unlabeled packet.',wrong:'EXP bits are the 3-bit TC field in the MPLS label — unrelated to imp-null. "Impose" means pushing a label onto the stack. imp-null means POP the outermost label.',correctAnswer:'D -- imp-null (implicit null / label 3) instructs the upstream LSR to pop the label (PHP)'}},
  {id:'e29',type:'single',tag:'Security',text:'Refer to the exhibit. The current router configuration is:\n\nenable secret 5 <password>\nusername cisco privilege 15 secret 5 <password>\nusername operator password 7 <password>\nline vty 0 4\n session-timeout 240\n password 7 <password>\n transport input telnet\n\nThe authentication is not working as desired and the user drops into user-exec mode. Which configuration resolves the issue?',options:[{letter:'A',text:'Option A:\naaa new-model\naaa authentication login default local\naaa authorization exec default local\n!\nline vty 0 4\n login authentication default\n authorization exec default'},{letter:'B',text:'Option B:\naaa new-model\naaa authentication login default local\naaa authorization priv default 15\n!\nline vty 0 4\n login authentication default\n authorization exec priv15'},{letter:'C',text:'Option C:\naaa new-model\naaa authentication login local\naaa authorization exec local\n!\nline vty 0 4\n login authentication local\n authorization exec default'},{letter:'D',text:'Option D:\naaa new-model\naaa authentication common-id default\naaa authorization exec default local\n!\nline vty 0 4\n login authentication default\n authorization exec default'}],correct:'A',feedback:{correct:'"aaa authorization exec default local" uses the local database to determine exec privilege level — the user "cisco privilege 15" gets priv-exec. "login authentication default" and "authorization exec default" wire the line to use these AAA lists.',wrong:'"aaa authorization priv" is not a standard IOS command. Option C uses a named method list "local" without defining it properly. Option D uses "common-id" which is not a valid authentication method.',correctAnswer:'A -- aaa authorization exec default local assigns privilege level from local user database'}},
  {id:'e30',type:'single',tag:'OSPF',text:'Network operations report issues with receiving too many external routes, which caused CPU spike on routers with smaller memories. Which action resolves the issue?',options:[{letter:'A',text:'Configure the area range command when redistributing on ASBR'},{letter:'B',text:'Configure the area range command when redistributing on ABR'},{letter:'C',text:'Configure the summary-address command when redistributing on ABR'},{letter:'D',text:'Configure the summary-address command when redistributing on ASBR'}],correct:'D',feedback:{correct:'"summary-address" is configured on the ASBR to summarize external routes before injecting them into OSPF. This reduces the number of LSAs flooded, lowering CPU and memory load on all routers.',wrong:'"area range" is for ABRs to summarize intra-area routes between OSPF areas. Using it on an ASBR or applying summary-address on an ABR does not address external route summarization.',correctAnswer:'D -- configure summary-address on the ASBR to summarize external routes redistributed into OSPF'}},
  {id:'e31',type:'single',tag:'Routing',text:'Refer to the exhibit. R1 is in the RIP domain advertising 1.0.0.0/24. R2 redistributes between RIP, OSPF Area 0, and EIGRP AS 1. R3 is in both OSPF and EIGRP. R3 is learning the 1.0.0.0/24 route through OSPF instead of EIGRP. Which action causes R3 to choose EIGRP to reach the 1.0.0.0/24 network?',options:[{letter:'A',text:'Configure EIGRP administrative distance to 120.'},{letter:'B',text:'Configure EIGRP administrative distance to 110.'},{letter:'C',text:'Configure OSPF administrative distance to 120.'},{letter:'D',text:'Configure OSPF administrative distance to 200.'}],correct:'D',feedback:{correct:'OSPF AD=110, EIGRP external AD=170. R3 picks OSPF (lower AD). Setting OSPF AD to 200 makes EIGRP external (170) win. Use "distance ospf external 200" under router ospf.',wrong:'Setting EIGRP AD to 120 still loses to OSPF 110. Setting EIGRP to 110 is a tie. Setting OSPF to 120 still beats EIGRP external at 170. Only raising OSPF above 170 makes EIGRP win.',correctAnswer:'D -- configure OSPF administrative distance to 200 so EIGRP external (170) is preferred'}},
  {id:'e32',type:'single',tag:'Routing',text:'Refer to the exhibit. R1 connects management server (via G0/3) to a 2 Mbps link (G0/0, 10.0.0.0/30) and a 5 Mbps link (G0/1, 10.0.0.4/30) to the network. An engineer must route the management server traffic to the network 10.0.250.0 over the 2 Mbps link. Which configuration accomplishes this task on R1?',options:[{letter:'A',text:'Option A:\nroute-map advrt permit 10\n match ip address 110\n set ip next-hop 10.0.0.2\n!\naccess-list 110 permit ip host 10.0.1.3 10.0.250.0 0.0.0.3\n!\ninterface GigabitEthernet0/3\n ip policy route-map advrt'},{letter:'B',text:'Option B:\nroute-map advrt permit 10\n match ip address 110\n set ip next-hop 10.0.0.1\n!\naccess-list 110 permit ip host 10.0.1.3 10.0.250.0 0.0.0.3\n!\ninterface GigabitEthernet0/3\n ip policy route-map advrt'},{letter:'C',text:'Option C:\ninterface GigabitEthernet0/0\n bandwidth 20000'},{letter:'D',text:'Option D:\ninterface GigabitEthernet0/1\n bandwidth 20000'}],correct:'A',feedback:{correct:'PBR: ACL 110 matches management server traffic to 10.0.250.0/30. Route-map sets next-hop to 10.0.0.2 (R2 on the 2 Mbps link). Applied inbound on G0/3 where management server connects.',wrong:'Option B sets next-hop to 10.0.0.1 which is R1\'s own interface — invalid next-hop. Options C/D change interface bandwidth which affects EIGRP metric but does not force traffic over a specific link.',correctAnswer:'A -- PBR with next-hop 10.0.0.2 applied on G0/3 forces management server traffic over the 2 Mbps link'}},
  {id:'e33',type:'single',tag:'Security',text:'Refer to the exhibit. R2 configuration:\n\nusername admin privilege 15 secret 5 <hash>\naaa new-model\naaa authentication login default group radius group tacacs+ local\n!\nradius-server host 192.168.5.10\nradius-server key 0 P!cX54$VgQ\n\nA network administrator is troubleshooting an authentication failure issue during login into R2 using a RADIUS server user account. The network administrator can ping the RADIUS server, but the user access by SSH is denied on R2. Which action resolves the issue?',options:[{letter:'A',text:'Remove "local" from the aaa authentication command.'},{letter:'B',text:'Configure the username in RADIUS server database.'},{letter:'C',text:'Enable AAA authorization to allow SSH connections.'},{letter:'D',text:'Modify the aaa command to replace TACACS+ with RADIUS.'}],correct:'B',feedback:{correct:'RADIUS server is reachable (ping succeeds) but actively denying the login. This means the username does not exist in the RADIUS database. The router tries RADIUS, gets a reject (not a timeout), and does not fall through to local.',wrong:'Removing "local" removes the last fallback but doesn\'t fix RADIUS rejection. TACACS+ is already secondary. The issue is the user is not in the RADIUS server database, not an AAA command syntax problem.',correctAnswer:'B -- add the username/password to the RADIUS server database so authentication succeeds'}},
  {id:'e34',type:'single',tag:'MPLS',text:'Which protocol must be secured with MD-5 authentication across the MPLS cloud to prevent hackers from introducing bogus routers?',options:[{letter:'A',text:'MP-BGP'},{letter:'B',text:'LSP'},{letter:'C',text:'RSVP'},{letter:'D',text:'LDP'}],correct:'D',feedback:{correct:'LDP (Label Distribution Protocol) is used between LSRs to exchange label bindings. LDP supports MD5 authentication (via "mpls ldp neighbor X password") to prevent unauthorized LSRs from joining and poisoning the label space.',wrong:'MP-BGP is used for VPN route exchange between PEs, not for MPLS label distribution between P routers. LSP is a label-switched path (not a protocol). RSVP is for traffic engineering, not standard label distribution.',correctAnswer:'D -- LDP uses MD5 authentication to prevent bogus routers from injecting false label bindings'}},
  {id:'e35',type:'single',tag:'MPLS',text:'Which technique removes the outermost label of an MPLS-tagged packet before the packet is forwarded to an adjacent LER?',options:[{letter:'A',text:'label swap'},{letter:'B',text:'explicit-null'},{letter:'C',text:'label imposition'},{letter:'D',text:'PHP'}],correct:'D',feedback:{correct:'PHP (Penultimate Hop Popping) = the second-to-last router (penultimate LSR) pops the outermost MPLS label before forwarding to the egress LER. The LER receives an unlabeled packet, saving one lookup.',wrong:'Label swap = replace top label with a new one (normal LSR operation). Explicit-null = label 0, used to preserve EXP bits to egress. Label imposition = pushing a label onto the stack at ingress.',correctAnswer:'D -- PHP removes the outermost label at the penultimate LSR before forwarding to the LER'}},
  {id:'e36',type:'single',tag:'Security',text:'Refer to the exhibit. Switch configuration:\n\nline con 0\n logging synchronous\nline aux 0\nline vty 0 4\n password cisco@123\n login\n transport input ssh telnet\n\nAn engineer must block access to the console ports for all corporate remote Cisco devices based on the recent corporate security policy but the security team still can connect through the console port. Which configuration on the console port resolves the issue?',options:[{letter:'A',text:'no exec'},{letter:'B',text:'transport input telnet'},{letter:'C',text:'exec 0 0'},{letter:'D',text:'login and password'}],correct:'A',feedback:{correct:'"no exec" on line con 0 prevents exec sessions from being established on the console line, blocking remote access (e.g., via reverse Telnet from a terminal server) while still allowing the physical console connection.',wrong:'"transport input telnet" restricts VTY transport but has no effect on console. "exec 0 0" sets immediate timeout which disconnects all sessions. "login and password" adds authentication but does not block access.',correctAnswer:'A -- no exec on line con 0 prevents exec sessions, blocking remote console access'}},
  {id:'e37',type:'multi',tag:'Routing',text:'What are the two goals of micro BFD sessions? (Choose two)',options:[{letter:'A',text:'The high bandwidth member link of a link aggregation group must run BFD.'},{letter:'B',text:'Run the BFD session with 3×3 ms hello timer.'},{letter:'C',text:'Continuity for each member link of a link aggregation group must be verified.'},{letter:'D',text:'Any member link on a link aggregation group must run BFD.'},{letter:'E',text:'Each member link of a link aggregation group must run BFD.'}],correct:['C','E'],feedback:{correct:'Micro BFD runs individual BFD sessions on each LAG member link. Goal 1: each member link must run its own BFD session (E). Goal 2: continuity for each member link must be verified independently (C).',wrong:'A is wrong (only high-bandwidth links). B is wrong (3×3ms is a BFD timing config, not a micro BFD goal). D says "any" link which is imprecise — it must be EACH link.',correctAnswer:'CE -- each LAG member link runs BFD + verify continuity of each member link'}},
  {id:'e38',type:'single',tag:'MPLS',text:'What is LDP used for in an LSR?',options:[{letter:'A',text:'to allow for a system-wide exchange of labels across MPLS network'},{letter:'B',text:'to create a database of label bindings that allow for hop-by-hop forwarding'},{letter:'C',text:'to communicate the routes known for a specific interface'},{letter:'D',text:'to create a label across the PE routers for end-to-end path assignment'}],correct:'B',feedback:{correct:'LDP (Label Distribution Protocol) in an LSR creates and maintains the Label Information Base (LIB) — a database of FEC-to-label bindings exchanged with neighbors, enabling hop-by-hop label switching.',wrong:'A is vague and describes MPLS generally. C describes routing protocols, not LDP. D describes RSVP-TE or segmented LSPs — LDP builds hop-by-hop paths, not end-to-end PE-to-PE tunnels.',correctAnswer:'B -- LDP creates a label binding database (LIB) in each LSR for hop-by-hop forwarding'}},
  {id:'e39',type:'single',tag:'DNA Center',text:'An engineer creates a Cisco DNA Center cluster with three nodes, but all the services are running on one host node. Which action resolves this issue?',options:[{letter:'A',text:'Click system updates, and upgrade to the latest version of Cisco DNA Center.'},{letter:'B',text:'Enable service distribution from the Systems 360 page.'},{letter:'C',text:'Click the master host node with all the services and select services to be moved to other hosts.'},{letter:'D',text:'Restore the link on the switch interface that is connected to a cluster link on the Cisco DNA Center.'}],correct:'B',feedback:{correct:'In DNA Center, "Enable service distribution" from the System 360 page redistributes microservices across all nodes in the cluster. This is the standard procedure when services are not balanced across cluster nodes.',wrong:'Upgrading does not redistribute services. There is no UI to manually select which services move to which node. Restoring a cluster link would help if nodes can\'t communicate, but the symptom here is service concentration, not connectivity.',correctAnswer:'B -- enable service distribution from Systems 360 to redistribute services across all cluster nodes'}},
  {id:'e40',type:'single',tag:'OSPF',text:'Refer to the exhibit. Router R1 and R2 OSPF configuration:\n\nRouter R1:\nip prefix-list filter-area-13 seq 5 deny 10.16.3.0/24\nip prefix-list filter-area-13 seq 10 permit 0.0.0.0/0 le 32\nrouter ospf 1\n area 13 filter-list prefix filter-area-34 in\n\nRouter R2:\nip prefix-list filter-area-0 seq 5 permit 10.16.1.0/23 le 24\nip prefix-list filter-area-0 seq 10 deny 0.0.0.0/0 le 32\nrouter ospf 2\n area 0 filter-list prefix filter-area-0 out\n\nR1 should receive 10.16.2.0/24 from R2. Which action resolves the issue?',options:[{letter:'A',text:'Add prefix-list seq 1 on R1 to permit 10.16.0.0/22.'},{letter:'B',text:'Add prefix-list seq 1 on R1 to permit 10.16.2.0/24.'},{letter:'C',text:'Modify prefix-list seq 5 on R2 to permit 10.16.0.0/22.'},{letter:'D',text:'Modify prefix-list seq 5 on R2 to permit 10.16.0.0/23.'}],correct:'C',feedback:{correct:'R2\'s outbound filter "permit 10.16.1.0/23 le 24" covers 10.16.0.0–10.16.1.255 only — 10.16.2.0/24 is outside this range and hits seq 10 (deny all). Changing to 10.16.0.0/22 covers 10.16.0.0–10.16.3.255, permitting 10.16.2.0/24.',wrong:'Adding entries on R1 cannot fix what R2 is blocking outbound. Option D (10.16.0.0/23) still only covers 10.16.0.0–10.16.1.255. Only expanding to /22 includes 10.16.2.x range.',correctAnswer:'C -- modify R2\'s prefix-list seq 5 to permit 10.16.0.0/22 le 24 to include 10.16.2.0/24'}},
  {id:'e41',type:'multi',tag:'Routing',text:'What are the two benefits of using BFD? (Choose two)',options:[{letter:'A',text:'synchronous path determination'},{letter:'B',text:'subsecond failure detection'},{letter:'C',text:'supports all routing protocols'},{letter:'D',text:'supports UDLD failure'},{letter:'E',text:'forwarding path failure detection'}],correct:['B','E'],feedback:{correct:'BFD provides subsecond failure detection (B) and detects forwarding path failures (E) in the data plane, allowing routing protocols to converge much faster than using their own hello/dead timers.',wrong:'A (synchronous path determination) is not a BFD function. C is wrong — BFD requires specific protocol integration (OSPF, EIGRP, BGP etc). D is wrong — UDLD is a separate L2 protocol for unidirectional link detection.',correctAnswer:'BE -- subsecond failure detection + forwarding path failure detection'}},
  {id:'e42',type:'single',tag:'OSPF',text:'Refer to the exhibit. Debug output on R1:\n\nOSPFv3: Rcv hello from 10.1.1.1 area 10 from FastEthernet0/1 FE80::C801:FFF:FE94:1C\nOSPFv3: Hello from FE80::C801:FFF:FE94:1C with mismatched NSSA option bit\nOSPFv3: Send hello to FF02::5 area 10 on FastEthernet0/1\n\nR1 is not forming adjacency on a point-to-point interface. Which action resolves the issue?',options:[{letter:'A',text:'The area numbers must be configured the same on each router.'},{letter:'B',text:'The no-summary command must be included in the area configuration on R1.'},{letter:'C',text:'The no-summary command must be included in the area configuration on R2.'},{letter:'D',text:'The area types must be configured the same on each router.'}],correct:'D',feedback:{correct:'"Mismatched NSSA option bit" means one router has area 10 configured as NSSA and the other does not. All routers in an OSPF area must have the same area type. Configure both routers with the same area type.',wrong:'The area number is the same (both say area 10). The no-summary command creates a totally-stubby NSSA — that\'s a mismatch between no-summary and summary variants, but the root cause is still area type mismatch.',correctAnswer:'D -- configure the same area type (NSSA or standard) on both routers in area 10'}},
  {id:'e43',type:'single',tag:'Security',text:'Refer to the exhibit. R1 configuration has "ip verify unicast source reachable-via rx" on Fa0/0 and Fa0/1, and ACL 100 denying ICMP echo-reply. Host A (gateway R2) and Host B (gateway R3) connect through SW1 to R1. Host C connects to R1 Fa0/2. Host A successfully pings host C, but host B fails to ping host C. Which action resolves this issue?',options:[{letter:'A',text:'Disable auto-summary in RIP and EIGRP.'},{letter:'B',text:'Change the first statement in access list 100 to permit access.'},{letter:'C',text:'Redistribute EIGRP 100 into RIP on R1.'},{letter:'D',text:'Enable loose mode uRPF.'}],correct:'D',feedback:{correct:'uRPF strict mode requires the source IP to be reachable via the same interface the packet arrived on. Host B\'s traffic arrives on Fa0/0 but R1 routes to Host B\'s network via Fa0/1 (asymmetric). uRPF drops the packet. Loose mode only checks if the source is in the routing table, any interface.',wrong:'Auto-summary affects route aggregation. ACL 100 denies echo-reply (pings from R1 to hosts), not pings from hosts through R1. Redistributing EIGRP into RIP doesn\'t fix the RPF check failure.',correctAnswer:'D -- enable loose mode uRPF ("ip verify unicast source reachable-via any") to handle asymmetric routing'}},
  {id:'e44',type:'single',tag:'Security',text:'Refer to the exhibit. Output of "show ip ssh" on R1:\n\nSSH Disabled - version 1.99\n%Please create RSA keys to enable SSH (and of at least 768 bits for SSH V2).\nAuthentication timeout: 120 secs; Authentication retries: 3\nMinimum expected Diffie Hellman key size: 1024 bits\nIOS Keys in SECSH format (ssh-rsa, base64 encoded): NONE\n\nAn engineer is trying to connect to a device with SSH but cannot connect. The engineer connects by using the console and finds the displayed output when troubleshooting. Which command must be used in configuration mode to enable SSH on the device?',options:[{letter:'A',text:'crypto key generate rsa'},{letter:'B',text:'ip ssh enable'},{letter:'C',text:'no ip ssh disable'},{letter:'D',text:'ip ssh version 2'}],correct:'A',feedback:{correct:'The output explicitly states "Please create RSA keys to enable SSH" and shows "IOS Keys: NONE". The "crypto key generate rsa" command creates the RSA key pair needed to enable the SSH server.',wrong:'"ip ssh enable" is not a valid IOS command. "no ip ssh disable" is not standard. "ip ssh version 2" sets the SSH version but cannot enable SSH without the RSA key pair existing first.',correctAnswer:'A -- crypto key generate rsa creates the RSA key pair required to enable SSH'}},
  {id:'e45',type:'single',tag:'Routing',text:'Refer to the exhibit. An ASBR is configured with:\nrouter ospf 1\n redistribute eigrp 1 subnets route-map EIGRP->OSPF\nrouter eigrp 1\n network 10.0.106.0 0.0.0.255\nroute-map EIGRP->OSPF permit 10\n match ip address WAN_PREFIXES\nroute-map EIGRP->OSPF permit 20\n match ip address LOCAL_PREFIXES\nroute-map EIGRP->OSPF permit 30\n match ip address VPN_PREFIXES\nip prefix-list LOCAL_PREFIXES seq 5 permit 172.16.0.0/12 le 24\nip prefix-list VPN_PREFIXES seq 5 permit 192.168.0.0/16 le 24\nip prefix-list WAN_PREFIXES seq 5 permit 10.0.0.0/8 le 24\n\nThe network administrator configured redistribution on an ASBR to reach all WAN networks but failed. Which action resolves the issue?',options:[{letter:'A',text:'The route map must have the keyword prefix-list to evaluate the prefix list entries'},{letter:'B',text:'The OSPF process must have a metric when redistributing prefixes from EIGRP'},{letter:'C',text:'The route map EIGRP->OSPF must have the 10.0.106.0/24 entry to exist in one of the three prefix lists to pass'},{letter:'D',text:'EIGRP must redistribute the 10.0.106.0/24 route instead of using the network statement'}],correct:'A',feedback:{correct:'"match ip address WAN_PREFIXES" treats WAN_PREFIXES as an ACL name, not a prefix-list. IOS requires the keyword "prefix-list" to match against named prefix-lists: "match ip address prefix-list WAN_PREFIXES".',wrong:'OSPF redistribution from EIGRP does not require a default metric when using route-maps. The 10.0.106.0/24 network statement is valid. The issue is missing the "prefix-list" keyword in the route-map match statement.',correctAnswer:'A -- add keyword "prefix-list" to match ip address statement in the route-map'}},
  {id:'e46',type:'single',tag:'BGP',text:'Refer to the exhibit. R1 is in AS 1000 (EIGRP 1000) with R3. R4 is in AS 400, R7 is in AS 700. R1 BGP table shows routes from AS700 (77.77.x.x) with "?" origin (incomplete). R1 should have BGP routes as "i" (IGP origin). Which configuration resolves the issue?',options:[{letter:'A',text:'Option A:\nR7:\nroute-map RC permit 10\n match ip address 1\n set origin igp'},{letter:'B',text:'Option B:\nR7:\nroute-map RC permit 10\n match ip address 1\n set metric 1'},{letter:'C',text:'Option C:\nR1:\nroute-map RC permit 10\n match ip address 1\n set origin igp'},{letter:'D',text:'Option D:\nR1:\nroute-map RC permit 10\n match ip address 1\n set metric 1'}],correct:'C',feedback:{correct:'Apply an inbound route-map on R1 from R7 that sets origin to IGP. Since R1 receives these routes from R7, applying "set origin igp" inbound on R1\'s BGP session with R7 changes the "?" to "i" in R1\'s BGP table.',wrong:'Setting metric does not change the origin code. The origin change must use "set origin igp". Option C applies the route-map at R1 inbound, which directly modifies what R1 sees in its BGP table.',correctAnswer:'C -- R1 applies inbound route-map with set origin igp on the session with R7'}},
  {id:'e47',type:'single',tag:'EIGRP',text:'Refer to the exhibit. R1-R2 in EIGRP AS 1. R3 in OSPF Area 0, R2 in OSPF+EIGRP. R3 redistributes OSPF 10.10.10.0/24 into EIGRP. R2 EIGRP topology shows:\nIP-EIGRP (AS 1): Topology entry for 10.10.10.0/24\n State is Passive, 1 Successor(s)\n  from 10.20.20.3 (FastEthernet0/1)\n  Route is External\n  Originating router is 10.1.1.1\nR1 config: router eigrp 1 / router-id 10.1.1.1\n\nR1 has no connectivity to the prefix 10.10.10.0/24. Which action enables receipt of prefixes on R1?',options:[{letter:'A',text:'R3 is advertising the 10.20.20.0/24 prefix with a TTL of 1. R3 must set the TTL to 2 for this prefix.'},{letter:'B',text:'R1 does not have a neighbor relationship with R2. The EIGRP process should be cleared on R1.'},{letter:'C',text:'Duplicate router IDs on R1 and R3. R1 should modify its router ID.'},{letter:'D',text:'R1 is not receiving the next-hop IP address of R3. R2 must enable the network 10.20.20.0/24 within EIGRP.'}],correct:'C',feedback:{correct:'The EIGRP topology shows "Originating router is 10.1.1.1" — this is R1\'s own EIGRP router-id. R1 rejects the external route because it appears self-originated (duplicate router-ID with R3). Fix: change R1 or R3\'s EIGRP router-id.',wrong:'EIGRP does not use TTL in this context. R1 does have a neighbor (topology shows route via 10.20.20.3). The issue is the originating router-id in the external route matching R1\'s own router-id.',correctAnswer:'C -- duplicate EIGRP router-IDs cause R1 to reject the external route as self-originated'}},
  {id:'e48',type:'single',tag:'OSPF',text:'Refer to the exhibit. Area 0: R1-R2-R3-R4. Area 5: SW1-SW2. Flood sequence shows:\n1) SW2 originates LSA Seq#N, age 1\n2) SW1 flushes LSA Seq#N, age 3600 (back to SW2)\n3) SW2 originates LSA Seq#N+1, age 1\n4) SW1 flushes LSA Seq#N+1, age 3600\n\nAn error message "OSPF-4-FLOOD_WAR" is received on SW2 from SW1. SW2 is repeatedly receiving its own link-state advertisement and SW1 flushes it from the network. Which action resolves the issue?',options:[{letter:'A',text:'Change area 5 to a normal area from a nonstub area'},{letter:'B',text:'Resolve different subnet mask issue on the link'},{letter:'C',text:'Configure Layer 3 port channel on interfaces between switches'},{letter:'D',text:'Resolve duplicate IP address issue in the network'}],correct:'D',feedback:{correct:'OSPF-4-FLOOD_WAR occurs when a router receives its own LSA being flushed (MaxAge=3600) by another router repeatedly. A duplicate IP address on the segment causes SW1 to confuse SW2\'s identity, flooding SW2\'s LSA back with MaxAge, triggering the flood war.',wrong:'Area type does not cause flood wars. Subnet mask mismatch prevents adjacency formation entirely. Port channel configuration does not resolve LSA flooding loops. Duplicate IP is the classic cause of this flood war pattern.',correctAnswer:'D -- resolve duplicate IP address; duplicate IPs cause OSPF flood wars'}},
  {id:'e49',type:'single',tag:'BGP',text:'Refer to the exhibit. R1 configuration:\nipv6 prefix-list PRE-PEND-PREFIX permit 2001:db8:0:a::/64\nroute-map PRE-PEND permit 10\n match ipv6 address prefix-list PRE-PEND-PREFIX\n set as-path prepend 65412\nrouter bgp 65412\n address-family ipv6\n  neighbor 2001:db8:0:20::2 route-map PRE-PEND out\n\nR1 has a route map configured, which results in a loss of partial IPv6 prefixes for the BGP neighbor, resulting in service degradation. How can the full service be restored?',options:[{letter:'A',text:'The neighbor requires a soft reconfiguration, and this will clear the policy without resetting the BGP TCP connection.'},{letter:'B',text:'The prefix-list requires all prefixes that R1 is advertising to be added to it, and this will allow additional prefixes to be advertised.'},{letter:'C',text:'The route map requires a deny 20 statement without set conditions, and this will allow additional prefixes to be advertised.'},{letter:'D',text:'The route map requires a permit 20 statement without set conditions, and this will allow additional prefixes to be advertised.'}],correct:'D',feedback:{correct:'The route-map "PRE-PEND" has only one sequence (permit 10) matching a specific prefix. All other prefixes hit the implicit deny at the end of the route-map and are blocked outbound. Adding "route-map PRE-PEND permit 20" with no match/set allows remaining prefixes to pass through unchanged.',wrong:'Soft reconfiguration clears the policy session but does not fix the implicit deny. Adding all prefixes to the prefix-list makes them get AS-path prepended, not just permitted. A deny 20 would block even more prefixes.',correctAnswer:'D -- add permit 20 without match or set conditions to allow all remaining prefixes'}},
  {id:'e50',type:'multi',tag:'BGP',text:'Refer to the exhibit. R1 BGP configuration:\nrouter bgp 65001\n bgp router-id 10.100.1.50\n neighbor R2 peer-group\n neighbor R4 peer-group\n neighbor 10.1.1.2 remote-as 65001\n neighbor 10.1.1.2 peer-group R2\n neighbor 10.1.1.14 remote-as 65001\n neighbor 10.1.1.14 peer-group R4\n\nWhile troubleshooting a BGP route reflector configuration, an engineer notices that reflected routes are missing from neighboring routers. Which two BGP configurations are needed to resolve the issue? (Choose two)',options:[{letter:'A',text:'neighbor 10.1.1.14 route-reflector-client'},{letter:'B',text:'neighbor R2 route-reflector-client'},{letter:'C',text:'neighbor 10.1.1.2 allowas-in'},{letter:'D',text:'neighbor R4 route-reflector-client'},{letter:'E',text:'neighbor 10.1.1.2 route-reflector-client'}],correct:['B','D'],feedback:{correct:'R1 is the route reflector. Neighbors are organized in peer-groups R2 and R4. Applying route-reflector-client to the peer-groups (not individual IPs) is the correct approach: "neighbor R2 route-reflector-client" and "neighbor R4 route-reflector-client" affect all members of each peer-group.',wrong:'A and E configure route-reflector-client on individual IP addresses rather than the peer-groups. Since R1 uses peer-groups, the correct configuration is on the peer-group names. C (allowas-in) is unrelated to route reflection.',correctAnswer:'BD -- apply route-reflector-client to peer-groups R2 and R4'}},
  {id:'e51',type:'single',tag:'OSPF',text:'Refer to the exhibit. Interface configurations:\nR1: interface GigabitEthernet 0/0\n ip address 10.10.10.10 255.255.255.252\n ospfv3 1 ipv4 area 0\nR2: interface GigabitEthernet 0/0\n ip address 10.10.10.11 255.255.255.252\n ospfv3 10 ipv4 area 0\n ospfv3 network broadcast\n\nAn engineer is troubleshooting an OSPF adjacency issue between directly connected routers R1 and R2. Which configuration resolves the issue?',options:[{letter:'A',text:'R1(config-if)#ospfv3 network broadcast'},{letter:'B',text:'R2(config-if)#ip address 10.10.10.9 255.255.255.252'},{letter:'C',text:'R1(config-if)#ospfv3 10 ipv4 area 0'},{letter:'D',text:'R2(config-if)#no ospfv3 network broadcast'}],correct:'B',feedback:{correct:'In the subnet 10.10.10.8/30: network=.8, valid hosts=.9 and .10, broadcast=.11. R2 is configured with 10.10.10.11/30 which is the broadcast address — an invalid host IP. Change R2 to 10.10.10.9/30 to use a valid host address in the same subnet as R1 (10.10.10.10).',wrong:'OSPFv3 process IDs (1 vs 10) are locally significant and do not need to match. Network broadcast is the default on GigabitEthernet. The real issue is R2 has the broadcast address (.11) of the /30 subnet configured as its host IP.',correctAnswer:'B -- change R2 IP from 10.10.10.11 (broadcast address) to 10.10.10.9 (valid host)'}},
  {id:'e52',type:'single',tag:'MPLS',text:'What does the PE router convert the IPv4 prefix to within an MPLS VPN?',options:[{letter:'A',text:'48-bit route combining the IP and PE router-id'},{letter:'B',text:'VPN-IPv4 prefix combined with the 64-bit route distinguisher'},{letter:'C',text:'eBGP path association between the PE and CE sessions'},{letter:'D',text:'prefix that combines the ASN, PE router-id, and IP prefix'}],correct:'B',feedback:{correct:'In MPLS L3VPN, the PE prepends the 64-bit (8-byte) Route Distinguisher (RD) to the 32-bit IPv4 prefix, creating a 96-bit VPN-IPv4 (VPNv4) address. This makes the address globally unique across all customer VRFs and is advertised via MP-BGP between PEs.',wrong:'48-bit is not a standard MPLS VPN address format. eBGP is used between PE and CE for routing, not for address conversion. The RD does not include ASN + router-id as separate components in the prefix itself.',correctAnswer:'B -- VPN-IPv4 = 64-bit Route Distinguisher + 32-bit IPv4 prefix = 96-bit VPNv4 address'}},
  {id:'e53',type:'single',tag:'BGP',text:'Refer to the exhibit. R2 is a route reflector, R1 and R3 are route reflector clients. R2 BGP table shows 172.16.25.0/24 via next-hop 209.165.200.225. R3 "show ip bgp summary" shows 0 prefixes received from R2. R2 learns the route to 172.16.25.0/24 from R1 but does not advertise it to R3. What is the reason the route is not advertised?',options:[{letter:'A',text:'Route reflector setup requires full BGP mesh between the routers'},{letter:'B',text:'In route reflector setup only classification prefixes are advertised from one client to another'},{letter:'C',text:'In route reflector setup only classful prefixes are advertised to other clients'},{letter:'D',text:'R2 does not have a route to the next hop, so R2 does not advertise the prefix to the clients'}],correct:'D',feedback:{correct:'R2 has the route in its BGP table but cannot mark it as valid/best because it lacks a route to the next-hop (209.165.200.225) in its IP routing table. BGP will not advertise routes that are not valid/best to neighbors, even as a route reflector.',wrong:'Route reflection eliminates the need for full mesh between clients. There is no restriction on prefix classification or classful prefixes in route reflection. The issue is next-hop reachability on the route reflector itself.',correctAnswer:'D -- R2 lacks a route to the next-hop; BGP requires next-hop reachability to mark route valid and advertise it'}},
  {id:'e54',type:'single',tag:'Security',text:'Refer to the exhibit. R1 debug output:\n*Jan 15 19:45:17.027: TPLUS: Queuing AAA Authentication request 20 for processing\n*Jan 15 19:45:17.031: TPLUS: Using server 172.20.32.1\n*Jan 15 19:45:17.035: TPLUS(00000014)/0/NB_WAIT/68937BB0: Started 5 sec timeout\n*Jan 15 19:45:17.035: TPLUS(00000014)/0/NB_WAIT/68937BB0: timed out\n\nR2 telnet to R1:\nTrying 192.168.1.1 ... Open\n% Authorization failed.\n[Connection to 192.168.1.1 closed by foreign host]\n\nA network engineer is troubleshooting an AAA authentication issue. When an engineer tries to open a telnet connection to R1 it opens the connection but shows a %Authorization failed error and closes silently. Which action resolves the issue?',options:[{letter:'A',text:'Resolve TACACS+ server host IP authentication misconfiguration on the R1 router'},{letter:'B',text:'Resolve TACACS+ server reachability from the R1 router'},{letter:'C',text:'Configure the TACACS+ server host IP on the R1 router'},{letter:'D',text:'Configure authorization commands in the TACACS+ server for the R1 router'}],correct:'B',feedback:{correct:'The debug shows "NB_WAIT timed out" — the TACACS+ server at 172.20.32.1 is not responding within 5 seconds (server unreachable). The connection opens because authentication fell to local, but authorization also fails because TACACS+ is unreachable. Fix: restore TACACS+ server reachability.',wrong:'The server IP is correctly configured (it is being attempted at 172.20.32.1). Authorization commands in the TACACS+ server would only matter if the server responds. The root cause is the server is unreachable (NB_WAIT timeout), not a configuration error.',correctAnswer:'B -- restore TACACS+ server reachability; NB_WAIT timeout indicates server is unreachable'}},
  {id:'e55',type:'single',tag:'DNA Center',text:'Refer to the exhibit. Cisco DNA Center Compliance Summary shows "Startup vs Running Configuration: Out Of Sync". After an engineer updates the configuration on the device, they noticed unexpected behavior. Which command resolves the issue by completely replacing the running configuration with the startup configuration?',options:[{letter:'A',text:'configure replace nvram:startup-config'},{letter:'B',text:'configure replace nvram:private-config'},{letter:'C',text:'copy running-config startup-config'},{letter:'D',text:'copy system:running-config nvram:startup-config'}],correct:'A',feedback:{correct:'"configure replace nvram:startup-config" performs a diff-based replacement of the running-config with the startup-config, reverting all changes made since the last save. Unlike copy commands that merge, "configure replace" removes any commands in running-config not present in the target file.',wrong:'"private-config" stores encrypted passwords, not the main startup config. "copy running-config startup-config" saves the current (problematic) running config to startup — the opposite direction. "configure replace" is the correct rollback command.',correctAnswer:'A -- configure replace nvram:startup-config rolls back running-config to startup-config'}},
  {id:'e56',type:'single',tag:'Routing',text:'Refer to the exhibit. EIGRP domain (R4, R3, R1, R2); OSPF domain (R5, R6). R1 connects EIGRP to OSPF via 10 Mbps links. R2 connects EIGRP to OSPF via 1 Gbps links. Traffic from 192.168.5.32/28 (OSPF) to 172.16.3.16/28 (EIGRP) is using the slowest links (via R1). An engineer is troubleshooting suboptimal communication. Which configuration resolves the suboptimal routing issue?',options:[{letter:'A',text:'R2(config-router)#router ospf 1\nR2(config-router)#default-metric 10\nR1(config-router)#router ospf 1\nR1(config-router)#default-metric 1'},{letter:'B',text:'R2(config-router)#router ospf 1\nR2(config-router)#default-metric 1\nR1(config-router)#router ospf 1\nR1(config-router)#default-metric 10'},{letter:'C',text:'R2(config-router)#router eigrp 1\nR2(config-router)#default-metric 1\nR1(config-router)#router eigrp 1\nR1(config-router)#default-metric 10'},{letter:'D',text:'R2(config-router)#router ospf 1\nR2(config-router)#default-metric 10\nR2(config-router)#router ospf 1\nR1(config-router)#default-metric 10'}],correct:'B',feedback:{correct:'OSPF prefers lower metric. Setting R2 default-metric=1 (low, preferred) and R1 default-metric=10 (high, not preferred) under "router ospf 1" causes OSPF routers to prefer R2\'s redistributed EIGRP routes, routing through the faster 1 Gbps links.',wrong:'Option A sets R2 to metric 10 and R1 to metric 1 — this makes R1 preferred (still using slow links). Options C/D change EIGRP or set both to 10. The goal is to prefer R2 (1 Gbps), so R2 must have the LOWER metric under ospf.',correctAnswer:'B -- R2 default-metric 1 (preferred), R1 default-metric 10 (not preferred) routes through faster R2 path'}},
  {id:'e57',type:'single',tag:'OSPF',text:'Refer to the exhibit. Customer A OSPF Network: R1 in OSPFv2 Area 0 connects to R2 (ABR). R2 connects to R3 in OSPFv2 Area 1. An engineer must ensure that R3 sees only type 1 and 2 LSAs in area 1. Which command must the engineer apply on R2?',options:[{letter:'A',text:'area 1 stub nssa'},{letter:'B',text:'area 1 nssa no-summary'},{letter:'C',text:'area 1 stub no-summary'},{letter:'D',text:'area 1 stub'}],correct:'C',feedback:{correct:'"area 1 stub no-summary" on the ABR (R2) creates a totally-stubby area. This blocks Type 3 (inter-area summary), Type 4 (ASBR summary), and Type 5 (external) LSAs from entering Area 1, leaving only Type 1 (router LSAs) and Type 2 (network LSAs). A default Type 3 route is injected instead.',wrong:'"area 1 stub" allows Type 3 summary LSAs to enter (not totally stubby — routers still see inter-area summaries). "area 1 nssa" allows external routes via Type 7 LSAs. Only "stub no-summary" on the ABR limits Area 1 to Type 1 and 2 only.',correctAnswer:'C -- area 1 stub no-summary on ABR R2 creates totally-stubby area with only Type 1 and 2 LSAs'}},
  {id:'e58',type:'single',tag:'BGP',text:'Refer to the exhibit. R1 configuration:\nrouter bgp 200\n neighbor 192.168.200.6 remote-as 100\n neighbor 192.168.200.6 update-source Loopback0\nip route 192.168.200.6 255.255.255.255 192.168.100.1\n\nR1#show ip bgp neighbor 192.168.200.6:\nBGP neighbor is 192.168.200.6, remote AS 100, external link\n BGP state = Idle\n remote router ID 0.0.0.0\n Connections established 0; dropped 0\n No active TCP connection\n\nThe BGP neighbor is not coming up. Which action resolves the issue?',options:[{letter:'A',text:'Configure the ebgp-multihop 2 command on R1 toward the neighbor'},{letter:'B',text:'Configure a valid router ID on the neighbor that shows an invalid router ID of 0.0.0.0'},{letter:'C',text:'Enable synchronization between the neighbors to bring the neighborship up'},{letter:'D',text:'The route map on eBGP sessions must allow the prefixes from the neighbor'}],correct:'A',feedback:{correct:'eBGP uses TTL=1 by default. R1 is using Loopback0 as update-source, but the loopback is not directly connected to 192.168.200.6 (a static route points via 192.168.100.1). The packet must traverse at least 2 hops. "ebgp-multihop 2" raises TTL to 2, allowing the TCP session to establish.',wrong:'Remote router ID 0.0.0.0 and state=Idle means TCP never established — this is because TTL=1 drops the packet, not a router-id problem. Synchronization is a legacy BGP feature unrelated to session establishment. Route maps affect route advertisement, not session formation.',correctAnswer:'A -- neighbor 192.168.200.6 ebgp-multihop 2 raises TTL to allow eBGP via loopback'}},
  {id:'e59',type:'single',tag:'BGP',text:'Refer to the exhibit. R2 is in BGP AS65500. R2 BGP config:\nrouter bgp 65500\n neighbor 209.165.201.2 remote-as 65500\n address-family ipv4\n  bgp redistribute-internal\n  redistribute ospf 1\n  neighbor 209.165.201.2 activate\n\nR2 routing table shows EIGRP routes as O E2 (redistributed from EIGRP into OSPF on R1). Users in BGP AS65500 cannot access IPv4 resources in the EIGRP AS 100. Which action resolves the issue?',options:[{letter:'A',text:'Redistribute OSPF external routes into BGP'},{letter:'B',text:'Redistribute internal routes into BGP'},{letter:'C',text:'Redistribute EIGRP routes into OSPF'},{letter:'D',text:'Redistribute BGP routes into OSPF'}],correct:'A',feedback:{correct:'"redistribute ospf 1" in BGP only redistributes OSPF internal routes (O, O IA) by default. EIGRP routes appear as O E2 (external) in R2\'s routing table. To include them: use "redistribute ospf 1 match internal external 1 external 2" to also redistribute OSPF external routes into BGP.',wrong:'"bgp redistribute-internal" redistributes iBGP routes into the IGP — not relevant here. EIGRP routes are already redistributed into OSPF (that\'s why they appear as O E2). Redistributing BGP into OSPF is the wrong direction.',correctAnswer:'A -- add "match external" to redistribute ospf into BGP to include O E2 routes from EIGRP'}},
  {id:'e60',type:'single',tag:'OSPF Troubleshooting',text:'An OSPF adjacency between two routers is stuck in the EXSTART/EXCHANGE state. Both routers are in the same area and can ping each other successfully. Which issue is the most likely cause?',options:[{letter:'A',text:'Duplicate OSPF router IDs exist between the two routers.'},{letter:'B',text:'There is an MTU mismatch on the link between the two OSPF routers.'},{letter:'C',text:'The OSPF area types are mismatched (one is stub, the other is not).'},{letter:'D',text:'The OSPF hello and dead timers are mismatched between the routers.'}],correct:'B',feedback:{correct:'OSPF EXSTART/EXCHANGE stuck = MTU mismatch. The routers cannot complete DBD (Database Description) exchange because one side rejects oversized packets. Fix: match interface MTU on both sides, or apply "ip ospf mtu-ignore" on both interfaces.',wrong:'Duplicate router-IDs cause instability but typically do not produce an EXSTART stall. Area-type mismatch and hello/dead timer mismatch prevent forming neighbors entirely (stay in INIT or DOWN), not in EXSTART.',correctAnswer:'B -- MTU mismatch causes OSPF to stall in EXSTART; DBD packets get dropped due to size differences'}},
  {id:'e61',type:'multi',tag:'Security',text:'An engineer must configure TACACS+ authentication on a router so that if the TACACS+ server is unreachable, authentication falls back to local credentials. Which two configurations must be applied? (Choose two.)',options:[{letter:'A',text:'aaa authentication login VTY group TACACS+ local'},{letter:'B',text:'aaa authentication login VTY local group TACACS+'},{letter:'C',text:'aaa group server tacacs+ TACACS+\n server name ISE1'},{letter:'D',text:'line vty 0 4\n login authentication VTY'}],correct:['A','D'],feedback:{correct:'Two things are required: (A) define a method list with TACACS+ first then local as fallback, AND (D) apply that method list to the VTY lines. Without applying the list to VTY, the router ignores your method list and uses the default method.',wrong:'Option B has "local" before "group TACACS+" — this tries local first, defeating the purpose of TACACS+. Option C only defines the server group but does not create the method list or apply it.',correctAnswer:'A and D -- define method list with group then local fallback, apply it to VTY lines'}},
  {id:'e62',type:'single',tag:'Security',text:'Refer to the exhibit. Debug output:\nNov 30 19:19:29.595: IP: tableid=0, s=172.17.132.95 (GigabitEthernet0/0), d=192.168.1.1 (FastEthernet0/0), routed via RIB\nNov 30 19:19:29.595: IP: s=172.17.132.95, d=192.168.1.1, len 92, rcvd 3\n[repeated many times within the same second]\n\nUsers are experiencing slow response times from critical application servers. The engineer determined there is a DoS attack on GigabitEthernet0/0. Which action must the engineer take to resolve the issue?',options:[{letter:'A',text:'Configure an access group on GigabitEthernet0/0 to block traffic from 192.168.1.1.'},{letter:'B',text:'Configure QoS on FastEthernet0/0 to restrict bandwidth usage for 172.17.132.95 and 192.168.1.1.'},{letter:'C',text:'Restrict CoPP traffic on the management interface from 172.17.132.95 and 192.168.1.1.'},{letter:'D',text:'Configure an access group on GigabitEthernet0/0 to block traffic from 172.17.132.95.'}],correct:'D',feedback:{correct:'The DoS attacker is 172.17.132.95 flooding traffic in on GigabitEthernet0/0. Apply an inbound ACL on Gi0/0 blocking source 172.17.132.95. Block the ATTACKER\'s IP, not 192.168.1.1 (which is the router\'s own interface IP receiving the traffic).',wrong:'Option A blocks 192.168.1.1 which is the router\'s own interface — wrong target. QoS restricts bandwidth but does not block the attack. CoPP protects the control plane but does not stop transit DoS traffic.',correctAnswer:'D -- ip access-group blocking source 172.17.132.95 inbound on GigabitEthernet0/0'}},
  {id:'e63',type:'single',tag:'EIGRP',text:'Refer to the exhibit. R1 config:\ninterface Loopback0  ip address 100.1.1.1 255.255.255.255\ninterface Loopback10  ip address 10.100.1.10 255.255.255.255\ninterface Loopback20  ip address 10.100.1.20 255.255.255.255\ninterface Loopback30  ip address 10.100.1.30 255.255.255.255\ninterface Loopback40  ip address 10.100.1.40 255.255.255.253\ninterface Loopback50  ip address 10.100.1.50 255.255.255.255\ninterface FastEthernet0/0  ip summary-address eigrp 100 10.100.1.0 255.255.255.0 5 leak-map LOOPBACK50\nrouter eigrp 100  network 10.1.1.0 0.0.0.3  network 10.1.1.12 0.0.0.3  no auto-summary\nip prefix-list LOOPBACK50 seq 5 permit 10.100.1.50/32\nroute-map LOOPBACK50 permit 10  match ip address prefix-list LOOPBACK50\n\nAn engineer configured summarization for the R1 loopback addresses and failed. Which action permits the successful advertisement of the R1 loopback addresses?',options:[{letter:'A',text:'Configure EIGRP 100 with a network statement for loopback 0 and configure and redistribute the static route for loopback 50.'},{letter:'B',text:'Configure EIGRP 100 with a network statement for loopback 0 and redistribute the connected route for loopback 50.'},{letter:'C',text:'Configure EIGRP 100 with a network statement for loopback 0 and remove the leak map for loopback 50.'},{letter:'D',text:'Configure a 100.1.1.1 permit statement in the prefix list LOOPBACK50 and redistribute the connected route for loopback 50.'}],correct:'B',feedback:{correct:'Loopback0 (100.1.1.1/32) is outside the EIGRP network statements (which only cover 10.1.1.x), so it needs its own network statement. Loopback50 needs to be redistributed as connected because it may not be captured by the existing network statements, ensuring the leak-map can work properly.',wrong:'Option A uses a static route for Loopback50 — it\'s a connected interface, not a static route. Option C removes the leak-map so only the summary is sent, losing the Loopback50 specific route. Option D adds the wrong IP to the prefix-list.',correctAnswer:'B -- add network statement for Loopback0 range + redistribute connected for Loopback50'}},
  {id:'e64',type:'single',tag:'BGP',text:'Refer to the exhibit. SW100 in AS65300 cannot receive BGP routes advertised from R1 in AS65100. R1 redistributes BGP into OSPFv3. SW100 is connected to the OSPFv3 domain and can see OSPFv3 internal routes but cannot reach the BGP prefixes. Which action resolves the issue?',options:[{letter:'A',text:'Configure redistribute ospf under the BGP IPv6 address family on R1.'},{letter:'B',text:'Configure the BGP neighbor with the next-hop-self attribute on R1.'},{letter:'C',text:'Configure static routes on SW100 pointing to the BGP prefixes.'},{letter:'D',text:'Configure redistribute bgp under OSPFv3 IPv6 address family on R1.'}],correct:'D',feedback:{correct:'To make BGP-learned IPv6 routes visible in the OSPFv3 domain, configure "redistribute bgp X" under "router ospfv3 1 / address-family ipv6 unicast" on R1. This injects BGP routes as OSPFv3 external (OE2) routes so SW100 can reach them.',wrong:'Redistributing OSPF into BGP is the wrong direction. next-hop-self is used in iBGP to resolve next-hop reachability — not applicable here. Static routes are not scalable and don\'t leverage the existing routing protocols.',correctAnswer:'D -- redistribute bgp under router ospfv3 address-family ipv6 on R1'}},
  {id:'e65',type:'single',tag:'Security',text:'Refer to the exhibit. R1 config:\naaa new-model\ntacacs server ISE1\n address ipv4 192.168.1.5\n key Cisco123\naaa group server tacacs+ TAC-SERV\n server name ISE1\naaa authentication login telnet group TAC-SERV\n\nISE is configured with IP 192.168.1.5 and a network device pointing to R1 (192.168.1.1) with shared secret Cisco123. The administrator cannot authenticate to R1 based on ISE. Which configuration fixes the issue?',options:[{letter:'A',text:'tacacs-server host 192.168.1.5 key Cisco123'},{letter:'B',text:'ip tacacs-server host 192.168.1.5 key Cisco123'},{letter:'C',text:'line vty 0 4\n login authentication TAC-SERV'},{letter:'D',text:'line vty 0 4\n login authentication telnet'}],correct:'D',feedback:{correct:'The AAA method list is named "telnet" (aaa authentication login telnet group TAC-SERV). The VTY lines must reference this specific list name with "login authentication telnet". Without this, VTY lines use the DEFAULT method — ignoring the TAC-SERV group entirely.',wrong:'Options A and B use legacy "tacacs-server host" syntax which is not compatible with the new "tacacs server" syntax already used. Option C applies "TAC-SERV" but the method list is named "telnet", not "TAC-SERV".',correctAnswer:'D -- line vty 0 4 / login authentication telnet applies the correctly-named method list'}},
  {id:'e66',type:'single',tag:'Security',text:'Refer to the exhibit. Show radius server details:\nGlobal RADIUS shared secret: *******\nRetransmission count: 5 / Timeout: 10\nmyradius.network.users.com: auth port 1814, acct port 1813\n10.1.1.1: auth port 1814, acct port 1813, RADIUS shared secret: ******\n10.2.2.3: auth port 1814, acct port 1813, RADIUS shared secret: *******\n\nAAA server 10.1.1.1 is configured with the default authentication and accounting settings on the server, but the switch cannot communicate with the server. Which action resolves this issue?',options:[{letter:'A',text:'Correct the timeout value.'},{letter:'B',text:'Match the authentication port.'},{letter:'C',text:'Correct the shared secret.'},{letter:'D',text:'Match the accounting port.'}],correct:'C',feedback:{correct:'Server 10.1.1.1 has its own per-server RADIUS key (6 asterisks vs 7 asterisks for the global key). This per-server key does not match the key configured on the RADIUS server (10.1.1.1). Fix: update the per-server key on the switch to match the secret configured on 10.1.1.1.',wrong:'All servers use the same port 1814 — port is not the distinguishing issue for 10.1.1.1. The timeout is global. The accounting port matches between all servers. The unique problem for 10.1.1.1 is the mismatched per-server shared secret.',correctAnswer:'C -- the per-server RADIUS key for 10.1.1.1 does not match what the RADIUS server expects'}},
  {id:'e67',type:'single',tag:'Security',text:'A network engineer configured an IPv6 ACL named ACL-BLOCK on a router but traffic is not being filtered on interface GigabitEthernet0/0. The ACL is syntactically correct and matches the intended traffic. Which action would fix the issue?',options:[{letter:'A',text:'Apply the ACL to the VTY lines using ipv6 access-class ACL-BLOCK in.'},{letter:'B',text:'Apply the ACL to the interface using ipv6 traffic-filter ACL-BLOCK in under interface GigabitEthernet0/0.'},{letter:'C',text:'Apply the ACL to the interface using ip access-group ACL-BLOCK in under interface GigabitEthernet0/0.'},{letter:'D',text:'Apply the ACL to the VTY lines using ipv6 traffic-filter ACL-BLOCK in under line vty.'}],correct:'B',feedback:{correct:'"ipv6 traffic-filter ACL in" (or out) is the correct command to apply an IPv6 ACL to a physical routed interface. Without this interface-level application, the ACL has no effect on traffic traversing the interface.',wrong:'"ipv6 access-class" applies IPv6 ACLs to VTY lines (management access), not to routed interfaces. "ip access-group" applies IPv4 ACLs — it cannot filter IPv6 traffic. "ipv6 traffic-filter" under line vty is not valid.',correctAnswer:'B -- ipv6 traffic-filter applies IPv6 ACLs to physical interfaces; ipv6 access-class is VTY only'}},
