  {id:'e68',type:'single',tag:'Security',text:'A network engineer must configure the router HTTP server so that the NOC team authenticates via AAA and the server is limited to 3 simultaneous connections. Which combination of commands must be configured?',options:[{letter:'A',text:'ip http authentication local\nip http max-connections 3'},{letter:'B',text:'ip http authentication aaa\nip http max-connections 3'},{letter:'C',text:'ip http authentication aaa\nip http server'},{letter:'D',text:'ip http authentication local\nip http server'}],correct:'B',feedback:{correct:'"ip http authentication aaa" enables AAA-based authentication (TACACS+/RADIUS) for HTTP access. "ip http max-connections 3" limits concurrent HTTP sessions to 3. Both commands together enforce who can access (via AAA) and how many sessions are allowed.',wrong:'"ip http authentication local" uses only local usernames, bypassing AAA. "ip http server" only enables HTTP but does not set authentication or session limits. You need both authentication aaa AND max-connections 3.',correctAnswer:'B -- ip http authentication aaa + ip http max-connections 3'}},
  {id:'e69',type:'single',tag:'MPLS',text:'Which Layer 3 VPN attribute installs customer routes in the VRF?',options:[{letter:'A',text:'RD (Route Distinguisher)'},{letter:'B',text:'RT (Route Target)'},{letter:'C',text:'Extended community'},{letter:'D',text:'MPLS label'}],correct:'B',feedback:{correct:'Route Target (RT) is the BGP extended community attribute that controls which routes are imported into (installed in) a VRF. The import RT on a VRF installs any received BGP route tagged with that RT. RD makes VPN-IPv4 prefixes unique but does not control import/export.',wrong:'RD (Route Distinguisher) makes prefixes globally unique in the BGP table but does not determine which routes go into which VRF. Extended community is the generic category — RT is the specific type. MPLS labels are used for forwarding, not route installation decisions.',correctAnswer:'B -- Route Target import attribute installs customer routes into the VRF'}},
  {id:'e70',type:'single',tag:'BGP',text:'Refer to the exhibit. BGP AS65101 contains RA (TACACS server 192.168.1.1) and RB. BGP AS65201 contains RD, RC, RE, RF (Enterprise). RE prefix-list "Customer": seq 5 deny 192.168.1.1/32 / seq 10 permit 0.0.0.0/0 le 32. RC prefix-list "Customer": seq 10 permit 0.0.0.0/0 le 32.\n\nEnterprise users fail to authenticate with TACACS server 192.168.1.1 when the direct fiber link fails between RB and RD. AS65101 users authenticate successfully. Which configuration resolves the issue?',options:[{letter:'A',text:'RC(config)# ip prefix-list Customer seq 5 permit 192.168.30.1/32'},{letter:'B',text:'RC(config)#router bgp 65101\nRC(config-router)#neighbor 10.0.0.18 prefix-list Customer in'},{letter:'C',text:'RF(config)#no ip prefix-list Customer seq 5 deny 192.168.1.1/32'},{letter:'D',text:'RF(config)#router bgp 65201\nRF(config-router)# neighbor 10.0.0.17 prefix-list Customer out'}],correct:'C',feedback:{correct:'RE\'s prefix-list "Customer" has "seq 5 deny 192.168.1.1/32" — this blocks the TACACS server route from being advertised via BGP to AS65201. When RB-RD direct link fails and traffic must reroute, AS65201 cannot receive the route to 192.168.1.1. Removing the deny allows the TACACS route to propagate.',wrong:'Option A adds a permit for 192.168.30.1 (enterprise prefix, not TACACS). Option B applies Customer in wrong direction/router. Option D filters outbound from RF which would restrict what RF sends, not what it receives.',correctAnswer:'C -- remove the deny for 192.168.1.1/32 from the prefix-list to allow TACACS server route via backup path'}},
  {id:'e71',type:'single',tag:'Security',text:'Refer to the exhibit. Debug output:\nusername: USER55 / password: ****\nAug 26 12:39:23.813: TPLUS: Queuing AAA Authentication request 4950\nAug 26 12:39:23.813: TPLUS: Authentication continue packet generated for 4950\nAug 26 12:39:23.813: TPLUS(00001356)/0/WRITE/3A72C8D0: Started 5 sec timeout\n...\nAug 26 12:40:01.241: TAC+: Using previously set server 192.168.1.3\nAug 26 12:40:01.249: TAC+: Opened TCP/IP handle 0x3BE31D1C to 192.168.1.3/49\nAug 26 12:40:01.250: TAC+: 192.168.1.3 (3653537180) AUTHOR/START queued\nAug 26 12:40:01.449: TAC+: (3653537180) AUTHOR/START processed\nAug 26 12:40:01.449: TAC+: (-641430116): received author response status = FAIL\n\nA network administrator logs into the router using TACACS+ username and password credentials, but the administrator cannot run any privileged commands. Which action resolves the issue?',options:[{letter:'A',text:'Configure TACACS+ synchronization with the Active Directory admin group.'},{letter:'B',text:'Configure the username from a local database.'},{letter:'C',text:'Configure full access for the username from TACACS+ server.'},{letter:'D',text:'Configure an authorized IP address for this user to access this router.'}],correct:'C',feedback:{correct:'Authentication SUCCEEDED (the password was accepted) but AUTHORIZATION FAILED (AUTHOR/START → FAIL). The TACACS+ server denied exec/privileged access for USER55. The fix must be on the TACACS+ server: configure USER55\'s account with a shell profile granting full/privileged access.',wrong:'The TACACS+ server IS reachable (TCP connection opened to 192.168.1.3/49, AUTHOR/START processed). Using local database would bypass TACACS+ entirely. IP authorization is not the issue — the user successfully connected.',correctAnswer:'C -- TACACS+ server must grant full access for USER55; authentication succeeded but authorization was denied'}},
  {id:'e72',type:'single',tag:'OSPFv3',text:'Refer to the exhibit. R1 config:\nrouter ospfv3 1\n router-id 10.1.1.1\n address-family ipv4 unicast\n  passive-interface Loopback0\n address-family ipv6 unicast\n  passive-interface Loopback0\ninterface Loopback0\n ip address 10.1.1.1 255.255.255.255\n ipv6 address 2001:DB8::1/64\n ospfv3 10 ipv4 area 10\n ospfv3 10 ipv6 area 0\ninterface GigabitEthernet2\n ip address 10.10.10.1 255.255.255.0\n ipv6 enable\n ospfv3 10 ipv4 area 10\n ospfv3 10 ipv6 area 0\n\nAn administrator must configure the router with OSPF for IPv4 and IPv6 networks under a single process. The OSPF adjacencies are not established and did not meet the requirement. Which action resolves the issue?',options:[{letter:'A',text:'Replace OSPF process 10 on the interfaces with OSPF process 1 for the IPv4 address, and remove process 10 from the global configuration.'},{letter:'B',text:'Replace OSPF process 10 on the interfaces with OSPF process 1, and remove process 10 from the global configuration.'},{letter:'C',text:'Replace OSPF process 10 on the interfaces with OSPF process 1, and configure an additional router ID with IPv6 address.'},{letter:'D',text:'Replace OSPF process 10 on the interfaces with OSPF process 1 for the IPv6 address, and remove process 10 from the global configuration.'}],correct:'B',feedback:{correct:'The global config uses "router ospfv3 1" (process 1) but the interfaces use "ospfv3 10" (process 10). These are two separate OSPFv3 processes that do not communicate with each other. Fix: change all interface commands from ospfv3 10 to ospfv3 1 to match the global process, then remove the unused process 10.',wrong:'All interface commands (both IPv4 and IPv6) must be changed to process 1 — not just one address family. An additional router-ID with IPv6 is not needed; OSPFv3 only requires one router-ID (an IPv4-format address).',correctAnswer:'B -- change interface ospfv3 process from 10 to 1 (both ipv4 and ipv6) to match global router ospfv3 1'}},
  {id:'e73',type:'single',tag:'DMVPN',text:'A network engineer is troubleshooting a DMVPN Phase 2 network with EIGRP. Spoke routers can communicate with the hub but cannot communicate directly with each other. The hub has the following configuration on the tunnel interface:\ninterface Tunnel0\n ip address 10.0.0.1 255.255.255.0\n tunnel mode gre multipoint\n ip nhrp map multicast dynamic\n ip nhrp network-id 1\n no ip split-horizon eigrp 100\n\nWhich action resolves the spoke-to-spoke communication issue if the "no ip split-horizon eigrp 100" command is missing?',options:[{letter:'A',text:'Enable NHRP redirect on the hub tunnel interface.'},{letter:'B',text:'Configure static NHRP mappings on all spoke routers.'},{letter:'C',text:'Change DMVPN to Phase 3 to allow spoke-to-spoke communication.'},{letter:'D',text:'Add "no ip split-horizon eigrp 100" on the hub tunnel interface.'}],correct:'D',feedback:{correct:'In DMVPN Phase 2 with EIGRP, the hub\'s split-horizon prevents spoke routes learned on the tunnel from being re-advertised back out the same tunnel interface to other spokes. "no ip split-horizon eigrp 100" on the hub tunnel interface disables this, allowing spokes to learn each other\'s routes and communicate directly.',wrong:'NHRP redirect is for Phase 3, not a fix for Phase 2 EIGRP. Static NHRP mappings help with overlay connectivity but do not solve the routing (split-horizon) issue. Phase 3 is an alternative but changing the design is unnecessary when a single command fixes it.',correctAnswer:'D -- no ip split-horizon eigrp 100 on hub tunnel allows hub to re-advertise spoke routes to other spokes'}},
  {id:'e74',type:'single',tag:'MPLS',text:'An engineer must configure an MPLS L3VPN hub-and-spoke topology where all spoke-to-spoke traffic must pass through the hub site. Which configuration ensures this requirement is met?',options:[{letter:'A',text:'Configure the same route target import and export on all VRFs (hub and spokes).'},{letter:'B',text:'Configure the hub VRF to import all spoke route targets and configure the same export RT on hub and spokes.'},{letter:'C',text:'Configure different route target import and export values between the hub VRF and spoke VRFs.'},{letter:'D',text:'Configure MPLS TE tunnels from each spoke to the hub to force traffic through the hub.'}],correct:'C',feedback:{correct:'Hub-and-spoke MPLS VPN requires different RTs on hub vs spokes: Hub exports a "hub-RT" and imports all "spoke-RTs". Each spoke exports its own "spoke-RT" and imports only the "hub-RT". Spokes can only see hub routes, not other spoke routes — forcing all traffic through the hub.',wrong:'Using the same RT everywhere creates full-mesh connectivity (all sites see each other directly). Making hub and spokes share the same export RT allows spokes to receive each other\'s routes, enabling direct spoke-to-spoke traffic without the hub.',correctAnswer:'C -- hub imports spoke RTs, spokes import only hub RT; different RTs per role enforce hub-and-spoke policy'}}
];
