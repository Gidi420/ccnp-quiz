  {id:'b24',type:'single',originalNum:'Q-HSRP',tag:'Switching',text:'Which configuration causes traffic from PC-1 to the internet to use the link between CoreSW-1 and CoreSW-2 when both switches are up? CoreSW-1 is the STP root for VLAN 10 (priority 24576). CoreSW-2 has Bridge ID priority 32778. Both run HSRP with standby 10 ip 192.168.1.254. PC-1 is at 192.168.1.1.',options:[{letter:'A',text:'CoreSW-2(config)# interface vlan 10\nCoreSW-2(config-if)# standby 10 priority 100'},{letter:'B',text:'CoreSW-1(config)# interface vlan 10\nCoreSW-1(config-if)# standby 10 priority 100'},{letter:'C',text:'CoreSW-1(config)# interface vlan 10\nCoreSW-1(config-if)# standby 10 priority 90'},{letter:'D',text:'CoreSW-2(config)# interface vlan 10\nCoreSW-2(config-if)# standby 10 priority 110'}],correct:'D',feedback:{correct:'To route PC-1 traffic through the CoreSW-1 to CoreSW-2 link, CoreSW-2 must be the HSRP active router. HSRP active = highest priority (default 100). Setting CoreSW-2 priority to 110 makes it the HSRP active gateway, so PC-1 sends traffic to CoreSW-2, which then uses the link to CoreSW-1 to reach the internet.',wrong:'The correct answer is D. To force traffic through the CoreSW-1 to CoreSW-2 link, CoreSW-2 must be the HSRP active router, which requires the highest priority. Setting CoreSW-2 to 110 (above the default 100) achieves this. Options A and B set priority to 100 (same as default, no change). Option C lowers CoreSW-1 priority but CoreSW-2 still needs to be explicitly set higher.',correctAnswer:'D -- CoreSW-2 standby 10 priority 110 (makes CoreSW-2 HSRP active)',trick:'HSRP active = highest priority wins. To send PC-1 traffic through the CoreSW-1↔CoreSW-2 link, make CoreSW-2 the HSRP active router by setting its priority above 100.'}},
  {id:'b25',type:'single',originalNum:'Q-TLOC',tag:'SD-WAN',text:'What is a TLOC in a Cisco SD-WAN deployment?',options:[{letter:'A',text:'identifier that represents a specific service offered by nodes within the Cisco SD-WAN overlay'},{letter:'B',text:'component set by the administrator to differentiate similar nodes that offer a common service'},{letter:'C',text:'value that identifies a specific tunnel within the Cisco SD-WAN overlay'},{letter:'D',text:'attribute that acts as a next hop for network prefixes'}],correct:'D',feedback:{correct:'A TLOC (Transport Location) is an attribute that acts as a next hop for network prefixes in the SD-WAN overlay. It identifies a specific attachment point to the WAN transport and consists of three elements: system IP, color, and encapsulation.',wrong:'TLOC = Transport Location = next hop attribute for prefixes. It is made up of system IP + color + encapsulation. It is not a tunnel identifier and not a service identifier.',correctAnswer:'D -- attribute that acts as a next hop for network prefixes',trick:'TLOC = Transport LOCation = next hop attribute. Made of 3 parts: system IP + color + encapsulation. Think of it as the WAN attachment point that prefixes point to.'}},
  {id:'b26',type:'single',originalNum:'Q-CatCenter',tag:'SD-Access',text:'Which feature does Cisco Catalyst Center Assurance provide?',options:[{letter:'A',text:'application policy configuration'},{letter:'B',text:'data correlation and analysis'},{letter:'C',text:'software upgrade and management'},{letter:'D',text:'device onboarding and configuration'}],correct:'B',feedback:{correct:'Cisco Catalyst Center Assurance provides data correlation and analysis. It collects telemetry from network devices, correlates it, and provides insights into network health, performance and root cause analysis.',wrong:'Assurance = monitoring and correlation of telemetry data. Application policy and device onboarding are separate Catalyst Center modules, not Assurance.',correctAnswer:'B -- data correlation and analysis',trick:'Assurance = analytics and monitoring. Policy = separate module. Onboarding = separate module. Assurance just WATCHES and CORRELATES.'}},
  {id:'b27',type:'single',originalNum:'Q-NGFW-DC',tag:'Security',text:'What does a next-generation firewall that is deployed at the data center protect against?',options:[{letter:'A',text:'DMZ web server vulnerabilities'},{letter:'B',text:'zero-day attacks'},{letter:'C',text:'signature-based malware'},{letter:'D',text:'DDoS'}],correct:'B',feedback:{correct:'An NGFW at the data center protects against zero-day attacks through advanced threat protection, application awareness and intrusion prevention. Zero-day attacks are unknown threats that traditional firewalls cannot detect.',wrong:'NGFWs are valued for zero-day protection via advanced inspection. DMZ vulnerabilities are a web/application concern. Signature-based malware is handled by traditional AV. DDoS requires dedicated mitigation solutions.',correctAnswer:'B -- zero-day attacks',trick:'NGFW at the data center = zero-day protection via advanced inspection. Signature-based = traditional AV. DDoS = dedicated scrubbing centers. NGFW shines on unknown/zero-day threats.'}},
  {id:'b28',type:'single',originalNum:'Q-NGFW-multicontext',tag:'Security',text:'Which next generation firewall feature supports separate security services for multiple departments?',options:[{letter:'A',text:'multicontext mode with specific logical or physical interface allocation within each context and grouped into security zones'},{letter:'B',text:'state sharing mode to trade the user data sessions and replication to the neighbor firewall using a failover link'},{letter:'C',text:'virtual switch mode to provide traffic inspection capabilities for the flows entering the firewall and dropping packets based on policy configuration'},{letter:'D',text:'Layer 3 mode with resource tracking capabilities and automatic configuration synchronization between the nodes and security zones'}],correct:'A',feedback:{correct:'Multicontext mode divides a single physical NGFW into multiple virtual firewalls, each with its own interfaces, policies and security zones. This enables separate security services per department on one physical device.',wrong:'Multicontext mode = multiple virtual firewalls on one device = separate policies per department. State sharing (B) is for high availability failover. Virtual switch mode (C) is a transparent inspection mode. Layer 3 mode (D) is basic routing mode not multi-tenancy.',correctAnswer:'A -- multicontext mode with logical/physical interface allocation per context',trick:'Multicontext = one box, many virtual firewalls. Like VRFs but for firewalls. Each context = own interfaces + policies = own department security.'}},
  {id:'b29',type:'single',originalNum:'Q-NTP-broadcast',tag:'Network Services',text:'R1 is configured with: ntp server 192.168.1.1, ntp server 172.16.10.1, interface GigabitEthernet 0/1 with ip address 192.168.100.1 255.255.255.248 and ntp broadcast. What is the result of the configuration?',options:[{letter:'A',text:'It enables NTP in client mode'},{letter:'B',text:'It allows interface g0/1 to receive NTP broadcast packets'},{letter:'C',text:'It allows interface g0/1 to send and receive NTP broadcast packets'},{letter:'D',text:'It allows interface g0/1 to send NTP broadcast packets'}],correct:'D',feedback:{correct:'The "ntp broadcast" command under an interface makes that interface send NTP broadcast packets to clients on that segment. The ntp server commands make R1 a client to upstream servers, while the interface command makes R1 broadcast time to others on that subnet.',wrong:'"ntp broadcast" under an interface = SEND broadcasts outward. To RECEIVE broadcasts you use "ntp broadcast client". The ntp server commands handle upstream client sync separately.',correctAnswer:'D -- allows interface g0/1 to send NTP broadcast packets',trick:'"ntp broadcast" under an interface = SEND broadcasts. "ntp broadcast client" = RECEIVE broadcasts. "ntp server" = upstream sync. Interface command = outbound only.'}},
  {id:'b30',critical:true,type:'single',originalNum:'Q-data-modeling',tag:'Automation',text:'What is the purpose of data modeling languages?',options:[{letter:'A',text:'to translate encoded data for interoperability between different CPU architectures'},{letter:'B',text:'to provide a framework to describe data flow patterns in networks'},{letter:'C',text:'to describe a data schema convertible into any data encoding format'},{letter:'D',text:'to specify algorithms necessary to decode binary-encoded protocol data units'}],correct:'C',feedback:{correct:'Data modeling languages like YANG describe a data schema -- the structure, types and constraints of data -- that can then be encoded in different formats such as XML or JSON. The model is format-agnostic; the encoding is separate.',wrong:'Data modeling languages define the SCHEMA of data which can be converted into XML, JSON or other formats. They do not describe flow patterns, CPU interoperability, or decoding algorithms.',correctAnswer:'C -- to describe a data schema convertible into any data encoding format',trick:'Data modeling = SCHEMA definition. YANG describes the structure. The schema can be encoded as XML or JSON. Model is agnostic to encoding format.'}},
  {id:'b31',critical:true,type:'single',originalNum:'Q-vManage',tag:'SD-WAN',text:'What is a characteristic of SD-WAN Manager?',options:[{letter:'A',text:'It requires a public IP address to allow WAN Edge devices to discover fabric components.'},{letter:'B',text:'It uses NETCONF to configure vSmart devices to build the overlay network data plane.'},{letter:'C',text:'It supports protocols such as OSPF to integrate with legacy network devices.'},{letter:'D',text:'It leverages the overlay management protocol to interface with WAN Edge devices.'}],correct:'B',feedback:{correct:'SD-WAN Manager (vManage) uses NETCONF to communicate with and configure vSmart controllers and other SD-WAN components. It is the centralized management plane that pushes configurations via NETCONF/YANG.',wrong:'vManage uses NETCONF to configure SD-WAN components. Public IP is required by vBond not vManage. OMP is used between vSmart and vEdge routers not by vManage. OSPF integration is done on vEdge routers not vManage.',correctAnswer:'B -- uses NETCONF to configure vSmart devices',trick:'vManage = management plane = uses NETCONF to configure. vSmart = control plane = uses OMP with vEdge. vBond = orchestration = needs public IP.'}},
  {id:'b32',critical:true,type:'single',originalNum:'Q-API-replay',tag:'Automation / Security',text:'How can an engineer prevent basic replay attacks from people who try to brute force a system via REST API?',options:[{letter:'A',text:'Use HTTPS'},{letter:'B',text:'Add OAuth to the request in the API header'},{letter:'C',text:'Add a timestamp to the request in the API header'},{letter:'D',text:'Use a password hash'}],correct:'C',feedback:{correct:'Adding a timestamp to the API request header prevents replay attacks because each request is time-bound. If an attacker captures and replays a request the timestamp will be expired and the server will reject it.',wrong:'A timestamp prevents replay attacks by making each request time-limited. HTTPS encrypts traffic but does not prevent replaying captured requests. OAuth handles authorization not replay prevention. Password hashing protects stored credentials not API replay attacks.',correctAnswer:'C -- add a timestamp to the request in the API header',trick:'Timestamp = replay prevention. Each request has an expiry window. Replay = stale timestamp = rejected. HTTPS = encryption only, not replay prevention.'}},
  {id:'b33',type:'single',originalNum:'Q29',tag:'SD-WAN',text:'What is the role of the SD-WAN Controller in a Cisco Catalyst SD-WAN environment?',options:[{letter:'A',text:'It is the centralized network management system.'},{letter:'B',text:'It performs authentication and authorization.'},{letter:'C',text:'It manages the data plane.'},{letter:'D',text:'It manages the control plane.'}],correct:'D',feedback:{correct:'The SD-WAN Controller (vSmart) manages the control plane — distributing routing and policy information to WAN Edge devices via OMP. vManage is the centralized management system. vBond handles authentication and authorization.',wrong:'The SD-WAN Controller (vSmart) manages the CONTROL plane, not the data plane. Data plane is handled by WAN Edge routers directly. vManage = management system. vBond = authentication/authorization.',correctAnswer:'D -- It manages the control plane.',trick:'vSmart = controls the control plane. vManage = management plane. vBond = onboards/authenticates devices. WAN Edge = data plane.'}},
  {id:'b34',type:'multi',originalNum:'Q39',tag:'Automation',text:'Which two actions are recommended as security best practices to protect REST API? (Choose two)',options:[{letter:'A',text:'Enable out-of-band authentication'},{letter:'B',text:'Use SSL for encryption'},{letter:'C',text:'Enable dual authentication of the session'},{letter:'D',text:'Use TACACS+ authentication'},{letter:'E',text:'Use a password hash'}],correct:['B','E'],feedback:{correct:'SSL encrypts data in transit preventing interception. Password hashing protects credentials at rest. Both are fundamental REST API security best practices.',wrong:'B=SSL encrypts data in transit. E=password hashing protects stored credentials. TACACS+ is a network device AAA protocol, not a REST API mechanism. Out-of-band auth and dual session auth are not standard REST API security recommendations.',correctAnswer:'B and E',trick:'REST API security basics: encrypt the channel (SSL) + hash the passwords. TACACS+ is for network device AAA, not APIs.'}},
  {id:'b35',critical:true,type:'matching',originalNum:'Q60',tag:'Network Services',text:'Match the NTP descriptions to the correct NTP elements.',pairs:[{component:'broadcast client command',description:'network device listening for NTP broadcast packets'},{component:'NTP associations',description:'NTP servers propagating NTP broadcast packets'},{component:'NTP authentication',description:'uses MD5 Message Digest Algorithm'},{component:'NTP access groups',description:'used to permit or deny access privileges to a subnet or host'}],feedback:{correct:'broadcast client command=device that listens for broadcasts | NTP associations=server propagation relationships | NTP authentication=MD5 | NTP access groups=permit/deny access.',wrong:'"ntp broadcast client" = device that listens. Associations = NTP server/peer relationship tracking. Authentication = MD5. Access groups = ACL-style permit/deny.',correctAnswer:'broadcast client command=listening | associations=propagating | authentication=MD5 | access groups=permit/deny',trick:'"ntp broadcast client" on an interface = LISTEN. "ntp broadcast" on an interface = SEND. Access groups = permit/deny per subnet. Authentication = MD5 keys.'}},
  {id:'b36',type:'single',originalNum:'Q64',tag:'Automation',text:'Which security option protects credentials from sniffer attacks in a basic API authentication?',options:[{letter:'A',text:'AAA services to authenticate the API'},{letter:'B',text:'TLS or SSL for communication'},{letter:'C',text:'VPN connection between client and server'},{letter:'D',text:'next-generation firewall'}],correct:'B',feedback:{correct:'TLS/SSL encrypts communication in transit so a sniffer cannot read credentials. In basic API authentication credentials are sent in each request, so encrypting the transport layer prevents credential interception.',wrong:'TLS/SSL encrypts the channel — a sniffer only sees ciphertext. AAA is for device authentication. VPN adds overhead and is not standard for API security. NGFW inspects traffic but does not prevent sniffing of unencrypted credentials.',correctAnswer:'B -- TLS or SSL for communication',trick:'Sniffer reads unencrypted traffic. TLS/SSL = encrypts the channel = sniffer sees gibberish. Always HTTPS for APIs sending credentials.'}},
  {id:'b38',critical:true,type:'single',originalNum:'Q75',tag:'Network Services',text:'High bandwidth utilization is occurring on interface Gig0/1 of a router. An engineer must identify the flows that are consuming the most bandwidth. Cisco Catalyst Center is used as a flow exporter and is configured with the IP address 192.168.23.1 and UDP port 23000. Which configuration must be applied to set NetFlow data export and capture on the router?',options:[{letter:'A',text:'Option A:\nR1(config)# ip flow-export\nR1(config)# ip flow-export destination 192.168.23.1 23000\nR1(config)# interface Gig0/1\nR1(config-if)# ip flow monitor'},{letter:'B',text:'Option B:\nR1(config)# ip flow-export\nR1(config)# ip flow-export destination 192.168.23.1\nR1(config)# interface Gig0/1\nR1(config-if)# collect counter bytes\nR1(config-if)# collect counter packets'},{letter:'C',text:'Option C:\nR1(config)# ip flow-export version 9\nR1(config)# ip flow-export destination 192.168.23.1 23000\nR1(config)# interface Gig0/1\nR1(config-if)# ip flow ingress\nR1(config-if)# ip flow egress'},{letter:'D',text:'Option D:\nR1(config)# ip flow-export version 9\nR1(config)# ip flow-export destination 192.168.23.1 23000\nR1(config)# interface Gig0/1\nR1(config-if)# ip flow-top-talkers'}],correct:'C',feedback:{correct:'Version 9 is required for Cisco Catalyst Center (DNA Center) as a NetFlow collector. The destination includes both IP and UDP port. "ip flow ingress" and "ip flow egress" on the interface capture both directions of traffic to identify top bandwidth consumers.',wrong:'Option C is correct. You need "ip flow-export version 9" for Catalyst Center compatibility. The destination must include the UDP port (23000). "ip flow ingress/egress" captures traffic on the interface. "ip flow monitor" (A) is Flexible NetFlow syntax and missing version. Option B is missing the UDP port. Option D uses "ip flow-top-talkers" which is a display command not a capture command.',correctAnswer:'C -- ip flow-export version 9 + destination with port + ip flow ingress/egress',trick:'NetFlow for Catalyst Center = version 9. Always include UDP port in destination. "ip flow ingress" + "ip flow egress" on interface = capture both directions.'}},
  {id:'b39',type:'single',originalNum:'Q8',tag:'Security',text:'Which technique is used to protect end user devices and data from unknown file behavior?',options:[{letter:'A',text:'crypto file ransomware protection using a file hash calculation'},{letter:'B',text:'phishing file quarantine using an internal environment to store attached files'},{letter:'C',text:'file retrospection using continuous scan and analyses'},{letter:'D',text:'file sandboxing using a protected environment to analyze and simulate the behavior of unknown files'}],correct:'D',feedback:{correct:'File sandboxing executes unknown files in an isolated protected environment to observe their behavior without risking the real system. This is the primary technique for protecting against unknown/zero-day file threats.',wrong:'File sandboxing (D) runs unknown files safely in isolation to detect malicious behavior. File retrospection (C) is a post-detection technique that re-evaluates files after new threat intel — it does not proactively protect. Crypto hash protection only works for known malware signatures. Phishing quarantine is email-focused not file behavior analysis.',correctAnswer:'D -- file sandboxing using a protected environment',trick:'Unknown file behavior = sandboxing. Sandbox = safe isolated box to detonate and watch what happens. Retrospection = looking back after the fact (not proactive protection).'}},
  {id:'b40',type:'single',originalNum:'Q11',tag:'Security',text:'When firewall capabilities are considered, which feature is found only in Cisco next-generation firewalls?',options:[{letter:'A',text:'active/standby high availability'},{letter:'B',text:'malware protection'},{letter:'C',text:'stateful inspection'},{letter:'D',text:'traffic filtering'}],correct:'B',feedback:{correct:'Malware protection (integration with AMP/Cisco Secure) is a next-generation firewall capability not found in traditional firewalls. Traditional firewalls do stateful inspection, traffic filtering, and HA — but malware analysis and sandboxing are exclusive to NGFWs.',wrong:'Stateful inspection (C), traffic filtering (D), and active/standby HA (A) are all features of traditional firewalls too. Malware protection (B) is the differentiating NGFW-only feature.',correctAnswer:'B -- malware protection',trick:'NGFW adds: IPS, App awareness, URL filtering, Malware protection. Traditional FW does: stateful inspection, traffic filtering, HA. Malware protection = NGFW only.'}},
  {id:'b41',critical:true,type:'single',originalNum:'Q3',tag:'SD-Access',text:'Which nodes require VXLAN encapsulation support in a Cisco SD-Access deployment?',options:[{letter:'A',text:'aggregation nodes'},{letter:'B',text:'distribution nodes'},{letter:'C',text:'border nodes'},{letter:'D',text:'core nodes'}],correct:'C',feedback:{correct:'Border nodes in SD-Access are responsible for connecting the SD-Access fabric to external networks. They must support VXLAN encapsulation to bridge traffic between the fabric overlay and the outside world.',wrong:'Border nodes (C) require VXLAN support as they connect the fabric to external networks and must encapsulate/decapsulate VXLAN traffic. Distribution nodes are part of the traditional campus hierarchy but are not a fabric role. Core nodes forward traffic but do not perform VXLAN encapsulation. Aggregation nodes are not a defined SD-Access fabric role.',correctAnswer:'C -- border nodes',trick:'Border nodes = edge of the fabric = must speak VXLAN to cross the fabric boundary. Think: crossing a BORDER requires a passport (VXLAN encapsulation).'}},
  {id:'b42',critical:true,type:'single',originalNum:'Q5',tag:'Security',text:'Which design principle states that a user has no access by default to any resource, and unless a resource is explicitly granted, it should be denied?',options:[{letter:'A',text:'economy of mechanism'},{letter:'B',text:'complete mediation'},{letter:'C',text:'least privilege'},{letter:'D',text:'fail-safe defaults'}],correct:'D',feedback:{correct:'Fail-safe defaults means access decisions default to denial — a user has no access unless it is explicitly granted. This is the principle of defaulting to a safe (no-access) state.',wrong:'Fail-safe defaults (D) = deny by default, allow only when explicitly granted. Least privilege (C) = grant only the minimum access needed, but does not specifically address the default state. Complete mediation = every access attempt must be checked. Economy of mechanism = keep security design simple.',correctAnswer:'D -- fail-safe defaults',trick:'Fail-safe DEFAULTS = the DEFAULT is safe = no access. Least privilege = minimum needed. Complete mediation = check every access. Economy = keep it simple.'}},
  {id:'b43',type:'single',originalNum:'Q7',tag:'SD-Access',text:'What is one characteristic of Cisco SD-Access networks?',options:[{letter:'A',text:'Virtual networks are used for microsegmentation.'},{letter:'B',text:'Devices are assigned to virtual networks based on their VLAN membership.'},{letter:'C',text:'All traffic is Layer 3 within the fabric.'},{letter:'D',text:'Scalable group tags are used for macrosegmentation.'}],correct:'C',feedback:{correct:'In SD-Access, the fabric uses VXLAN to carry all traffic as Layer 3 within the fabric — even traffic that was Layer 2 at the edge is encapsulated and routed inside the overlay. This enables any-to-any connectivity without STP limitations.',wrong:'All traffic is Layer 3 inside the fabric (C). Virtual networks provide macrosegmentation, not microsegmentation (SGTs handle micro). Devices are assigned to virtual networks based on identity/policy (not VLAN). SGTs provide microsegmentation, not macrosegmentation.',correctAnswer:'C -- All traffic is Layer 3 within the fabric.',trick:'SD-Access fabric = VXLAN overlay = everything is L3 inside. No STP. SGTs = microsegmentation. VNs = macrosegmentation. Identity drives policy, not VLANs.'}},
  {id:'b44',critical:true,type:'single',originalNum:'Q11',tag:'Virtualization',text:'Which element is unique to a Type 2 hypervisor?',options:[{letter:'A',text:'VM OS'},{letter:'B',text:'memory'},{letter:'C',text:'host OS'},{letter:'D',text:'host hardware'}],correct:'C',feedback:{correct:'A Type 2 hypervisor runs on top of a host operating system — this is what makes it unique. Type 1 hypervisors run directly on bare metal hardware with no host OS. Both types have VMs with their own OS, share host hardware, and use memory.',wrong:'Host OS (C) is unique to Type 2 — it runs on top of a host OS like Windows or Linux. Type 1 has no host OS (runs on bare metal). VM OS exists in both types. Memory and host hardware are present in both types.',correctAnswer:'C -- host OS',trick:'Type 2 = TWO layers: Host OS sits between hardware and hypervisor. Type 1 = ONE layer: hypervisor sits directly on hardware. Host OS = Type 2 unique.'}},
  {id:'b45',type:'single',originalNum:'Q13',tag:'Automation',text:'What is a common trait between Ansible and Chef?',options:[{letter:'A',text:'Both rely on a declarative approach.'},{letter:'B',text:'Both require a client to be installed on hosts.'},{letter:'C',text:'Both rely on NETCONF.'},{letter:'D',text:'Both are used for mutable infrastructure.'}],correct:'D',feedback:{correct:'Both Ansible and Chef are used for mutable infrastructure — they configure and manage existing servers in place (as opposed to immutable infrastructure where servers are replaced rather than updated).',wrong:'Both Ansible and Chef target mutable infrastructure (D). Ansible uses a procedural/imperative approach; Chef uses a declarative/DSL approach — they are not both declarative (A). Ansible is agentless; Chef requires an agent on hosts — so B is wrong. Neither relies on NETCONF (C).',correctAnswer:'D -- Both are used for mutable infrastructure.',trick:'Ansible = agentless + procedural. Chef = agent-based + declarative DSL. What they SHARE: both manage mutable (existing, in-place) infrastructure. Mutable = modify the server. Immutable = replace the server.'}},
  {id:'b46',critical:true,type:'multi',originalNum:'Q17',tag:'Security',text:'Which two features are available only in next-generation firewalls? (Choose two)',options:[{letter:'A',text:'virtual private network'},{letter:'B',text:'stateful inspection'},{letter:'C',text:'packet filtering'},{letter:'D',text:'application awareness'},{letter:'E',text:'deep packet inspection'}],correct:['D','E'],feedback:{correct:'Application awareness (Layer 7 inspection) and deep packet inspection are NGFW-exclusive features. Traditional firewalls work at Layers 3–4 only and cannot identify applications or inspect payload content.',wrong:'D=application awareness and E=deep packet inspection are NGFW-only. Traditional firewalls already do: VPN (A), stateful inspection (B), and packet filtering (C). NGFWs add app-layer visibility and payload inspection on top of those.',correctAnswer:'D and E',trick:'Traditional FW = L3/L4 only (ports, IPs, stateful). NGFW adds: App awareness + DPI (looks inside the packet). If it sees WHAT the app is doing, it is NGFW.'}},
  {id:'b47',type:'single',originalNum:'Q74',tag:'Automation',text:'Refer to the exhibit. An engineer is creating a Python script to fetch the BGP configuration from a device using RESTCONF. The script gets a 404 Not Found response with error-message "uri keypath not found" and error-tag "invalid-value". What does the output indicate?\n\nScript uses: BASEURI="restconf/data/Cisco-IOS-XE-native:native", SUBURI="router/router-bgp", requests.get with HTTPBasicAuth.',options:[{letter:'A',text:'There is no BGP process running on the device.'},{letter:'B',text:'The HTTPS connection to the device could not be established.'},{letter:'C',text:'The BGP data resource identifier in the URL is incorrect.'},{letter:'D',text:'RESTCONF is not enabled on the device.'}],correct:'C',feedback:{correct:'A 404 "uri keypath not found" with error-tag "invalid-value" means the URI path does not exist on the device — the resource identifier (YANG path) in the URL is wrong. The correct RESTCONF path for BGP on IOS-XE is "Cisco-IOS-XE-bgp:bgp" not "router/router-bgp".',wrong:'404 + "uri keypath not found" = the URL path is wrong (C). If BGP were simply not configured you would get a 204 or empty response, not a 404. If HTTPS connection failed you would get a connection error before any HTTP response. If RESTCONF were disabled you would get a connection refused.',correctAnswer:'C -- The BGP data resource identifier in the URL is incorrect.',trick:'RESTCONF 404 "uri keypath not found" = wrong YANG path in the URL. 200 = success. 204 = no content (resource exists but empty). Connection error = RESTCONF disabled or unreachable.'}},
  {id:'b48',type:'single',originalNum:'Q16',tag:'Security',text:'A customer deployed an ISE solution that allows for web authentication and URL redirect enforced from the access layer. Due to control plane security concerns, only host IP 10.0.1.25 should have HTTP access to these switches. Which configuration must be applied to the switches?',options:[{letter:'A',text:'Option A:\nip access-list standard 10\n deny 10.0.1.25 0.0.0.0\n permit any\nip http server\nip http secure-server\nclass-map CoPP_Class\n match access_group 10\npolicy-map CoPP_Policy\n class CoPP_Class\n  police 100000 conform-action permit exceed-action drop violate-action drop\ncontrol-plane\n service-policy input CoPP_Policy'},{letter:'B',text:'Option B:\nip access-list standard 10\n permit 10.0.1.25 0.0.0.0\nip http server\nip http secure-server\nip http secure-active-session\nip http access-class 10'},{letter:'C',text:'Option C:\nip access-list extended HOST-ACL\n 10 permit host 10.0.1.25 any\n 20 deny any any\nno ip http server\nip http secure-server\nclass-map CoPP_Class\n match access_group HOST-ACL\npolicy-map CoPP_Policy\n class CoPP_Class\n  police 100000 conform-action permit exceed-action drop violate-action drop\ncontrol-plane\n service-policy input CoPP_Policy'},{letter:'D',text:'Option D:\nip access-list extended HOST-ACL\n 10 permit host 10.0.1.25 any\n 20 deny any any\nip http server\nip http secure-server\nip http secure-active-session\nip http active-session-modules none\nip http access-class HOST-ACL'}],correct:'B',feedback:{correct:'Option B creates a standard ACL permitting only host 10.0.1.25 and applies it directly to HTTP with "ip http access-class 10". This cleanly restricts management plane HTTP/HTTPS access to a single host — the correct approach for control plane HTTP protection.',wrong:'Option B (correct) uses "ip http access-class" to restrict HTTP access to a permitted host only. Option A incorrectly DENIES the host and uses CoPP (control plane policing) instead of restricting HTTP access directly. Option C uses CoPP without properly restricting HTTP. Option D uses an extended ACL with "ip http access-class" but adds unnecessary active-session commands.',correctAnswer:'B -- standard ACL permit host + ip http access-class',trick:'"ip http access-class" restricts who can reach the HTTP management plane. Standard ACL + permit the one allowed host + deny everything else implicitly. Simple and direct = correct answer.'}},
  {id:'b49',type:'single',originalNum:'Q18',tag:'Routing',text:'What is a difference between OSPF and EIGRP?',options:[{letter:'A',text:'OSPF is an advanced distance vector protocol, EIGRP is a link-state protocol.'},{letter:'B',text:'OSPF is a hybrid routing protocol, EIGRP is a link-state routing protocol.'},{letter:'C',text:'OSPF uses the DUAL algorithm, EIGRP uses the SPF algorithm.'},{letter:'D',text:'OSPF uses an administrative distance of 110, EIGRP uses an administrative distance of 170.'}],correct:'D',feedback:{correct:'OSPF has a default AD of 110. EIGRP has a default AD of 90 (internal) / 170 (external). The question refers to EIGRP external routes with AD 170, distinguishing it from OSPF\'s 110.',wrong:'OSPF AD=110, EIGRP internal AD=90, EIGRP external AD=170 (D is correct). OSPF uses SPF (Dijkstra) algorithm — EIGRP uses DUAL algorithm (C is backwards). OSPF is link-state; EIGRP is advanced distance vector / hybrid (A and B are swapped).',correctAnswer:'D -- OSPF AD 110, EIGRP AD 170 (external)',trick:'AD values: OSPF=110, EIGRP internal=90, EIGRP external=170. OSPF=link-state=SPF/Dijkstra. EIGRP=advanced distance vector=DUAL algorithm.'}},
  {id:'b50',critical:true,type:'multi',originalNum:'Q20',tag:'Automation',text:'Which two items are found in YANG data models? (Choose two)',options:[{letter:'A',text:'rpc statements'},{letter:'B',text:'XML schema'},{letter:'C',text:'HTTP return codes'},{letter:'D',text:'JSON schema'},{letter:'E',text:'container statements'}],correct:['A','E'],feedback:{correct:'YANG data models contain rpc statements (define remote procedure calls/operations) and container statements (group related data nodes). YANG is a data modeling language — it describes structure and operations, not encoding formats like XML or JSON schemas.',wrong:'A=rpc (operations defined in YANG) and E=container (grouping nodes in YANG) are correct. XML and JSON are encoding formats used to represent YANG-modeled data, but XML/JSON schemas are not part of YANG itself. HTTP return codes belong to RESTCONF, not YANG.',correctAnswer:'A and E',trick:'YANG building blocks: module, container, list, leaf, leaf-list, rpc, notification, grouping, typedef. XML/JSON = encoding formats, not YANG components.'}},
  {id:'b51',critical:true,type:'single',originalNum:'Q19',tag:'Switching',text:'An engineer adds a new switch to a Cisco StackWise stack. The switch that was active before the switch was added is elected as the active switch again. Which action does the active switch take?',options:[{letter:'A',text:'It suspends traffic forwarding until the new switch is updated with the current running configuration of the stack.'},{letter:'B',text:'It clears the MAC table of the stack and relearns the attached devices.'},{letter:'C',text:'It checks the IOS and running configuration of the new switch and updates them if necessary to match the other switches in the stack.'},{letter:'D',text:'It removes any Layer 3 configuration on the new switch to maintain normal Layer 2 functionality on the stack.'}],correct:'C',feedback:{correct:'When a new switch joins a StackWise stack, the active switch automatically checks the new member\'s IOS version and running configuration, then updates them if needed so all stack members run consistently. Traffic forwarding is not suspended during this process.',wrong:'The active switch checks and updates IOS + config on the new member (C). Traffic forwarding is not suspended — StackWise is non-disruptive (A is wrong). The MAC table is not cleared (B). L3 config is not removed from the new switch (D).',correctAnswer:'C -- checks IOS and running config, updates if necessary.',trick:'StackWise active switch = the manager. New member joins = active switch checks IOS version and config, auto-updates to match. Non-disruptive. Think: new employee joins, manager updates their laptop to company standard.'}},
  {id:'b52',critical:true,type:'dragdrop',originalNum:'Q29',tag:'Automation',text:'Drag and drop the snippets onto the blanks to construct an EEM applet that blocks a MAC address. The script runs "show mac address-table address 0050.7966.6800", captures the interface port, checks the regex matched, then shuts that interface down. Not all options may apply.',items:[{num:1,text:'watchdog'},{num:2,text:'(Gi[0-9/]+)'},{num:3,text:'1'}],groups:[{label:'event timer [?] time 10',correct:[1]},{label:'action 04 regexp "[?]" match Ports',correct:[2]},{label:'action 05 if $_regexp_result eq [?]',correct:[3]}],feedback:{correct:'watchdog = recurring timer that fires every 10s. (Gi[0-9/]+) = regex to capture the GigabitEthernet port from the MAC table output. eq 1 = checks that the regex match succeeded before shutting the interface.',wrong:'1=watchdog (repeating timer). 2=(Gi[0-9/]+) regex captures the interface. 3=1 verifies regex matched ($_ regexp_result=1 means match found).',correctAnswer:'Blank1=watchdog | Blank2=(Gi[0-9/]+) | Blank3=1',trick:'EEM timer watchdog = fires repeatedly. regexp result=1 means match succeeded. The captured group goes into $Ports which is used in action 07.'}},
  {id:'b53',type:'dragdrop',originalNum:'Q30',tag:'Automation',text:'Drag and drop the code snippets onto the blanks in the JSON to construct a RESTCONF request that configures policy-based routing.',items:[{num:1,text:'address'},{num:2,text:'permit'},{num:3,text:'next-hop'},{num:4,text:'set'}],groups:[{label:'"ios-route-map : operation": "[?]"',correct:[2]},{label:'"ios-route-map:[?]": { ... (outer PBR action block)',correct:[4]},{label:'"ios-route-map:[?]": {"ios-route-map : address": isp2iprmt}',correct:[3]},{label:'"ios-route-map:[?]": {"ios-route-map:access-list": "auto"}',correct:[1]}],feedback:{correct:'operation=permit | outer block=set (the PBR SET clause) | inner block=next-hop (set next-hop address) | match block=address (match ip address access-list).',wrong:'permit = route-map operation. set = outer PBR action clause. next-hop = where to forward matching traffic. address = match ip address for the access-list.',correctAnswer:'Blank1=permit | Blank2=set | Blank3=next-hop | Blank4=address',trick:'PBR JSON: operation=permit, SET next-hop (forward to IP), MATCH ip address (match the ACL). Set→next-hop. Match→address.'}},
  {id:'b54',critical:true,type:'single',originalNum:'Q31',tag:'Switching',text:'By default, which virtual MAC address does HSRP group 41 use?',options:[{letter:'A',text:'00:00:0c:07:ac:29'},{letter:'B',text:'004:41:73:18:84:29'},{letter:'C',text:'0c:5e:ac:07:0c:29'},{letter:'D',text:'00:05:0c:07:ac:41'}],correct:'A',feedback:{correct:'HSRP virtual MAC format is 0000.0c07.acXX where XX is the group number in hex. Group 41 decimal = 0x29 hex. So the MAC is 0000.0c07.ac29 = 00:00:0c:07:ac:29.',wrong:'HSRP MAC = 0000.0c07.ac[group in hex]. Group 41 = 0x29. Result: 00:00:0c:07:ac:29. The 0c:5e prefix is used by HSRPv2, not HSRPv1.',correctAnswer:'A -- 00:00:0c:07:ac:29',trick:'HSRPv1 MAC = 0000.0c07.ac + [group hex]. HSRPv2 MAC = 0000.0c9f.f + [group hex]. Group 41 → hex 29. Formula: 0000.0c07.ac29.'}},
  {id:'b55',critical:true,type:'single',originalNum:'Q33',tag:'Automation',text:'Refer to the exhibit. An EEM applet CONFIG_BACKUP runs actions 1.0 (enable), 3.0 (end), 4.0 (exit). A Tcl script write_backup.tcl copies the running config to flash:/backup.txt then TFTP. Which statement is needed to complete the EEM applet and use the Tcl script to store the backup file?',options:[{letter:'A',text:'action 2.0 cli command "flash:write_backup.tcl"'},{letter:'B',text:'action 2.0 cli command "tclsh flash:write_backup.tcl"'},{letter:'C',text:'action 2.0 cli command "write_backup.tcl tcl"'},{letter:'D',text:'action 2.0 cli command "write_backup.tcl"'}],correct:'B',feedback:{correct:'"tclsh" is the IOS command to execute a Tcl script file. "tclsh flash:write_backup.tcl" tells IOS to run the Tcl interpreter against the script stored on flash. Without tclsh the router does not know to interpret the file as Tcl.',wrong:'"tclsh flash:write_backup.tcl" is correct. Just naming the file (A, D) does not execute it as Tcl. "write_backup.tcl tcl" (C) is invalid syntax. tclsh = Tcl shell = execute this Tcl file.',correctAnswer:'B -- action 2.0 cli command "tclsh flash:write_backup.tcl"',trick:'tclsh = Tcl Shell = executes the Tcl script. Always: tclsh [path/script.tcl]. EEM + tclsh = powerful automation combo.'}},
  {id:'b56',critical:true,type:'dragdrop',originalNum:'Q41',tag:'Automation',text:'Drag and drop the statements onto the blanks to complete the Python script that appends and modifies device entries in a JSON file. The script loops collecting device input until interrupted, then writes changes back to devicesData.json. Not all options are used.',items:[{num:1,text:'while True:'},{num:2,text:'except'},{num:3,text:'import json'},{num:4,text:'File.open() — unused'},{num:5,text:'File.close()'},{num:6,text:'File = open'}],groups:[{label:'[?] — top of script (import the JSON library)',correct:[3]},{label:'[?] — begin infinite loop to collect device input',correct:[1]},{label:'[?] (KeyboardInterrupt, EOFError): — catch loop exit',correct:[2]},{label:'[?] ("devicesData.json", "r+") — open the JSON file for reading and writing',correct:[6]},{label:'[?] — close the file after writing changes',correct:[5]}],feedback:{correct:'import json at top. while True: for the input loop. except to catch KeyboardInterrupt/EOFError. File = open to open the file. File.close() at the end. File.open() is unused — Python uses open() not File.open().',wrong:'3=import json (top). 1=while True: (input loop). 2=except (catch interrupt). 6=File = open (open file). 5=File.close() (close after write). File.open() is a distractor — not valid Python.',correctAnswer:'Blank1=import json | Blank2=while True: | Blank3=except | Blank4=File = open | Blank5=File.close()',trick:'Python file pattern: open() → load → modify → seek(0) → dump → close(). File.open() does not exist in Python — it is open(). while True + except KeyboardInterrupt = standard input loop pattern.'}},
  {id:'b57',critical:true,type:'single',originalNum:'Q45',tag:'Security',text:'An engineer must configure a router to allow users to run specific configuration commands by validating the user against the router database. Which configuration must be applied?',options:[{letter:'A',text:'aaa authorization network default local'},{letter:'B',text:'aaa authentication exec default local'},{letter:'C',text:'aaa authorization exec default local'},{letter:'D',text:'aaa authentication network default local'}],correct:'C',feedback:{correct:'"aaa authorization exec" controls what commands/exec privileges a user is allowed to run, validated against the local database. Authorization = what you can DO. Authentication = who you ARE.',wrong:'"authorization" controls access to commands/exec (what you can do). "authentication" verifies identity (who you are). "exec" applies to exec shell/command authorization. "network" applies to network services like PPP — not CLI commands.',correctAnswer:'C -- aaa authorization exec default local',trick:'AAA: Authentication = WHO are you. Authorization = WHAT can you do. exec = CLI/exec shell commands. network = PPP/SLIP network services. To restrict commands = authorization exec.'}},
  {id:'b58',type:'single',originalNum:'Q50',tag:'Switching',text:'What is the architectural difference between the MAC address table and TCAM?',options:[{letter:'A',text:'TCAM entries consist of VLAN port ID and source MAC Address, and MAC address table entries consist of source MAC address and port ID'},{letter:'B',text:'TCAM entries are stored for 600 seconds, and MAC address table entries are kept for 200 seconds'},{letter:'C',text:'TCAM entries are populated using the ARP table and the MAC address table is populated dynamically from outgoing frames'},{letter:'D',text:'TCAM entries are composed of value, mask, and result and MAC address table entries are composed of value and results'}],correct:'D',feedback:{correct:'TCAM (Ternary CAM) entries have three components: value, mask (which bits to care about), and result (action/output). Standard MAC address table entries are simpler: just value (MAC+VLAN) and result (port). The ternary mask is what makes TCAM powerful for ACL and route lookups.',wrong:'TCAM = value + mask + result (ternary = 3 states: 0,1,X where X=don\'t care). MAC table = value + result (binary). TCAM is not populated from ARP. MAC table aging is 300s by default, not 200s. TCAM does not store VLAN port IDs.',correctAnswer:'D -- TCAM: value+mask+result | MAC table: value+result',trick:'TCAM = Ternary (3 states: 0,1,X). 3 components: value+mask+result. MAC table is simpler: just value+result. The MASK is what makes TCAM unique — it allows wildcard matching for ACLs and routing.'}},
  {id:'b59',critical:true,type:'multi',originalNum:'Q52',tag:'Security',text:'Which two advanced security features are available in next-generation firewalls but were not provided by standard firewalls? (Choose two)',options:[{letter:'A',text:'stateful traffic inspection'},{letter:'B',text:'remote access VPN'},{letter:'C',text:'network telemetry'},{letter:'D',text:'intrusion prevention'},{letter:'E',text:'application control'}],correct:['D','E'],feedback:{correct:'Intrusion prevention (IPS) and application control (Layer 7 app identification and policy) are NGFW-exclusive features. Standard firewalls only do stateful inspection at Layers 3-4 and VPN — they cannot identify applications or prevent intrusions.',wrong:'D=intrusion prevention and E=application control are NGFW additions. Stateful inspection (A) and remote access VPN (B) exist in traditional firewalls. Network telemetry (C) is a monitoring feature not specific to NGFWs.',correctAnswer:'D and E',trick:'NGFW adds on top of traditional FW: IPS (intrusion prevention) + App control + URL filtering + Malware protection. Traditional FW = stateful inspection + VPN + packet filtering only.'}},
  {id:'b60',critical:true,type:'single',originalNum:'Q55',tag:'Switching',text:'What is a characteristic of the HSRP SSO process?',options:[{letter:'A',text:'It reduces the amount of time routing table updates take when a failure occurs.'},{letter:'B',text:'It decrements standby router priority if the HSRP group active router fails.'},{letter:'C',text:'It enables MD5 authentication within the HSRP group.'},{letter:'D',text:'It allows the router IOS to detect an installed standby RP.'}],correct:'D',feedback:{correct:'HSRP SSO (Stateful Switchover) allows the IOS to detect that a standby Route Processor (RP) is installed and ready. This enables a non-disruptive switchover where the standby RP takes over without disrupting HSRP state.',wrong:'SSO = Stateful Switchover = IOS detects installed standby RP (D). MD5 authentication (C) is an HSRP authentication feature unrelated to SSO. Routing table update speed relates to NSF/GR. Decrementing priority relates to HSRP preempt/tracking.',correctAnswer:'D -- allows the router IOS to detect an installed standby RP',trick:'SSO = Stateful Switchover = standby RP awareness. NSF = Non-Stop Forwarding = continues forwarding during switchover. SSO enables NSF. Together they prevent outages during RP failover.'}},
  {id:'b61',critical:true,type:'multi',originalNum:'Q56',tag:'Security',text:'What are two benefits of using Cisco TrustSec? (Choose two)',options:[{letter:'A',text:'end-to-end traffic encryption'},{letter:'B',text:'advanced endpoint protection against malware'},{letter:'C',text:'simplified management of network access'},{letter:'D',text:'unknown file analysis using sandboxing'},{letter:'E',text:'consistent network segmentation'}],correct:['C','E'],feedback:{correct:'TrustSec simplifies network access management through Security Group Tags (SGTs) and provides consistent segmentation across the entire network regardless of topology or IP addressing.',wrong:'C=simplified access management (SGT-based policy replaces complex ACLs) and E=consistent segmentation (policy follows the user/device anywhere). Encryption is not TrustSec\'s purpose. Malware protection and sandboxing are AMP/file security features.',correctAnswer:'C and E',trick:'TrustSec = SGT (Security Group Tag) based policy. Benefits: simplified management (one policy, not per-VLAN ACLs) + consistent segmentation (SGT travels with the traffic). Think: TrustSec = trust the TAG, not the IP.'}},
  {id:'b62',type:'single',originalNum:'Q62',tag:'Automation',text:'Refer to the exhibit. A Python script uses NETCONF (port 830) with a get-config RPC to retrieve the extended ACL named "flp" from a Cisco IOS-XE device. The result is parsed with xmltodict.parse() into d1 which navigates to the access-list-seq-rule. What is achieved by this Python script?',options:[{letter:'A',text:'It configures access list statements.'},{letter:'B',text:'It reads access list statements into a dictionary list.'},{letter:'C',text:'It displays access list statements on a terminal screen.'},{letter:'D',text:'It converts access list statements to a human-readable format.'}],correct:'B',feedback:{correct:'The script uses get-config (read operation, not edit-config) and xmltodict.parse() which converts the XML NETCONF response into a Python dictionary. d1 holds the parsed ACL data as a dictionary — it reads the ACL into a dictionary list.',wrong:'get-config = READ (not configure). xmltodict.parse() = converts XML to Python dictionary. No print() statement = nothing displayed to terminal. The result is stored in d1 as a dictionary, not converted to a human-readable string.',correctAnswer:'B -- reads access list statements into a dictionary list',trick:'get-config = read. edit-config = write/configure. xmltodict.parse() = XML → Python dict. No print = not displayed. The data is READ into a DICT.'}},
  {id:'b63',type:'dragdrop',originalNum:'Q66',tag:'Automation',text:'Drag and drop the automation characteristics onto the appropriate tools. Not all options are used.',items:[{num:1,text:'uses Ruby'},{num:2,text:'uses pull from agent to primary'},{num:3,text:'uses push from primary to agent'},{num:4,text:'lacks high availability — unused'},{num:5,text:'uses YAML'}],groups:[{label:'Chef',correct:[1,2]},{label:'SaltStack',correct:[3,5]}],feedback:{correct:'Chef: uses Ruby DSL for recipes, uses a pull model (Chef client pulls from Chef server). SaltStack: uses a push model (master pushes to minions), uses YAML/Jinja for state files.',wrong:'Chef=Ruby+pull. SaltStack=push+YAML. Puppet also uses pull. Ansible uses push+YAML. "Lacks high availability" is a distractor not assigned to either tool.',correctAnswer:'Chef: 1(Ruby),2(pull) | SaltStack: 3(push),5(YAML)',trick:'Chef = C for Client PULLS from server (pull model) + Ruby. SaltStack = SALT pushes (push model) + YAML. Ansible = push+YAML+agentless. Puppet = pull+Ruby-like DSL.'}},
  {id:'b64',type:'multi',originalNum:'Q70',tag:'Automation',text:'Which two management protocols can be used to modify a network device configuration by using YANG data models? (Choose two)',options:[{letter:'A',text:'CLI'},{letter:'B',text:'SNMP'},{letter:'C',text:'CMIP'},{letter:'D',text:'NETCONF'},{letter:'E',text:'RESTCONF'}],correct:['D','E'],feedback:{correct:'NETCONF and RESTCONF both use YANG data models to structure configuration and operational data. NETCONF uses XML over SSH (port 830), RESTCONF uses HTTP/HTTPS with JSON or XML.',wrong:'NETCONF (D) and RESTCONF (E) are the two protocols built on YANG. CLI does not use YANG. SNMP uses MIBs, not YANG. CMIP is a legacy OSI network management protocol.',correctAnswer:'D and E',trick:'YANG = data model. NETCONF + RESTCONF = the two protocols that USE YANG. SNMP uses MIBs. CLI uses none. Remember: YANG/NETCONF/RESTCONF are a family.'}},
  {id:'b65',type:'single',originalNum:'Q73',tag:'Automation',text:'What do Chef and Ansible have in common?',options:[{letter:'A',text:'They rely on a declarative approach.'},{letter:'B',text:'They use YAML as their primary configuration syntax.'},{letter:'C',text:'They rely on a procedural approach.'},{letter:'D',text:'They are clientless architectures.'}],correct:'C',feedback:{correct:'Both Chef and Ansible use a procedural (imperative) approach — tasks and recipes are executed in a defined order, step by step. This contrasts with Puppet and Terraform which use a declarative approach.',wrong:'Both use procedural approach (C). Chef uses Ruby DSL (not YAML). Ansible uses YAML but Chef does not — so B is not true for both. Ansible is agentless but Chef requires agents (Chef clients) on managed nodes.',correctAnswer:'C -- both rely on a procedural approach',trick:'Procedural = HOW to do it, step by step. Declarative = WHAT you want, system figures out how. Chef=procedural(Ruby). Ansible=procedural(YAML). Puppet=declarative. Terraform=declarative.'}},
  {id:'b66',critical:true,type:'single',originalNum:'Q2',tag:'SD-WAN',text:'What is used by SD-WAN Manager to interact with Cisco SD-WAN devices in the fabric?',options:[{letter:'A',text:'northbound API'},{letter:'B',text:'RESTCONF'},{letter:'C',text:'southbound API'},{letter:'D',text:'IPsec'}],correct:'C',feedback:{correct:'SD-WAN Manager (vManage) uses southbound APIs to communicate downward to WAN Edge devices in the SD-WAN fabric. Southbound = controller talking to devices below it.',wrong:'Southbound APIs (C) = vManage talking down to WAN Edge devices. Northbound APIs = external applications talking UP to vManage. RESTCONF is a protocol used for device configuration but not how vManage primarily interacts with the fabric. IPsec is for data plane encryption.',correctAnswer:'C -- southbound API',trick:'vManage southbound = talks DOWN to devices (WAN Edge). vManage northbound = external apps talk UP to vManage. South = below = devices. North = above = applications/orchestrators.'}},
  {id:'b67',critical:true,type:'single',originalNum:'Q7',tag:'Virtualization',text:'What is a characteristic of VXLAN?',options:[{letter:'A',text:'Its frame encapsulation is performed by MAC-in-UDP.'},{letter:'B',text:'It uses TCP for transport.'},{letter:'C',text:'It has a 12-byte packet header.'},{letter:'D',text:'It extends Layer 2 and Layer 3 overlay networks over a Layer 2 underlay.'}],correct:'A',feedback:{correct:'VXLAN encapsulates original Layer 2 Ethernet frames inside UDP packets — this is called MAC-in-UDP encapsulation. The outer header uses UDP port 4789.',wrong:'VXLAN uses MAC-in-UDP (A). It uses UDP not TCP (B wrong). The VXLAN header is 8 bytes not 12 (C wrong). VXLAN extends L2 overlays over a L3 underlay (IP/UDP), not a L2 underlay (D wrong).',correctAnswer:'A -- MAC-in-UDP encapsulation',trick:'VXLAN = MAC-in-UDP. UDP port 4789. 8-byte VXLAN header. L2 overlay over L3 underlay. 24-bit VNI (16 million segments vs VLAN\'s 4096).'}},
  {id:'b68',type:'single',originalNum:'Q9',tag:'LISP',text:'Which device, in a LISP routing architecture, receives and de-encapsulates LISP traffic for endpoints within a LISP-capable site?',options:[{letter:'A',text:'OMS'},{letter:'B',text:'ITR'},{letter:'C',text:'MR'},{letter:'D',text:'ETR'}],correct:'D',feedback:{correct:'The ETR (Egress Tunnel Router) is the exit point of a LISP site. It receives LISP-encapsulated traffic arriving FROM outside the site and de-encapsulates it before delivering to local endpoints.',wrong:'ETR (D) = Egress = receives and de-encapsulates traffic FOR its site. ITR (B) = Ingress = takes traffic FROM local endpoints and encapsulates it going OUT. MR = Map Resolver (answers mapping queries). OMS is not a standard LISP component.',correctAnswer:'D -- ETR (Egress Tunnel Router)',trick:'ETR = Egress = Exit/inbound to site. Receives encapsulated traffic, strips LISP header, delivers to endpoint. ITR = Ingress = takes local traffic outbound and adds LISP encap. ETR registers EIDs. ITR looks up EIDs.'}},
  {id:'b69',critical:true,type:'matching',originalNum:'Q14',tag:'Virtualization',text:'Match the VXLAN definitions to their respective terminology.',pairs:[{component:'VNID',description:'24-bit segment ID that defines the broadcast domain'},{component:'VTEP',description:'does the encapsulation and de-encapsulation'},{component:'NVE',description:'logical interface where the encapsulation and de-encapsulation occur'},{component:'VXLAN',description:'provides the same Ethernet Layer 2 network services as VLAN but with greater extensibility and flexibility'}],feedback:{correct:'VNID=24-bit segment ID. VTEP=the device/function that encapsulates/de-encapsulates. NVE=logical interface where it happens. VXLAN=the L2 overlay technology itself.',wrong:'VTEP (VXLAN Tunnel Endpoint) = does the encap/decap. NVE (Network Virtualization Edge) = the logical interface on the device. Do not swap these two.',correctAnswer:'VNID=segment ID | VTEP=encap/decap function | NVE=logical interface | VXLAN=L2 overlay technology',trick:'VTEP = Tunnel EndPoint = the endpoint that does the work. NVE = logical interface on the VTEP. Think: NVE is the door, VTEP is the doorman.'}},
  {id:'b70',type:'single',originalNum:'Q15',tag:'Automation',text:'A script contains the statement "while loop != 999:". Which value terminates the loop?',options:[{letter:'A',text:'A value not equal to 999'},{letter:'B',text:'A value equal to 999'},{letter:'C',text:'A value greater than or equal to 999'},{letter:'D',text:'A value less than or equal to 999'}],correct:'B',feedback:{correct:'"while loop != 999:" means CONTINUE looping as long as loop is NOT equal to 999. The loop exits (terminates) when the condition becomes False — which happens when loop EQUALS 999.',wrong:'!= means "not equal". The loop RUNS while the condition is True (loop != 999). It STOPS when the condition is False (loop == 999). So a value of 999 terminates it.',correctAnswer:'B -- a value equal to 999',trick:'while X != 999 = keep going while X is NOT 999. Stops when X IS 999. != is the condition to CONTINUE, so the opposite (==) is what STOPS it.'}},
  {id:'b71',type:'multi',originalNum:'Q5',tag:'Routing',text:'Which two benefits result from a network design that uses small and repeatable sections? (Choose two)',options:[{letter:'A',text:'lower monitoring requirements'},{letter:'B',text:'quick failure isolation'},{letter:'C',text:'scalability'},{letter:'D',text:'low latency'},{letter:'E',text:'improved throughput'}],correct:['B','C'],feedback:{correct:'Small repeatable sections (modular design) allow failures to be isolated quickly to one section without affecting others, and enable easy scaling by simply adding more identical sections.',wrong:'B=quick failure isolation (faults are contained to small sections) and C=scalability (add more identical modules to grow). Monitoring requirements do not decrease — they may actually increase. Latency and throughput depend on hardware, not modular design.',correctAnswer:'B and E',trick:'Modular/repeatable design = LEGO blocks. Add blocks to SCALE. One broken block is isolated fast. Think: small repeatable = easy to copy (scalability) and easy to quarantine (failure isolation).'}},
  {id:'b72',type:'single',originalNum:'Q20',tag:'SD-Access',text:'Which characteristic applies to Cisco SD-Access?',options:[{letter:'A',text:'It uses VXLAN for the control plane.'},{letter:'B',text:'It uses VXLAN for the data plane.'},{letter:'C',text:'It uses dynamic routing to discover and provision border switches.'},{letter:'D',text:'It uses dynamic routing to discover and provision access switches.'}],correct:'B',feedback:{correct:'Cisco SD-Access uses VXLAN for the data plane — VXLAN encapsulates Layer 2 frames across the Layer 3 underlay fabric. LISP is used for the control plane (EID-to-RLOC mapping), not VXLAN.',wrong:'VXLAN = data plane (B). LISP = control plane (not VXLAN). Catalyst Center discovers and provisions switches using CDP/LLDP and PnP (plug and play), not dynamic routing protocols.',correctAnswer:'B -- VXLAN for the data plane',trick:'SD-Access planes: LISP = control plane (maps who is where). VXLAN = data plane (carries the traffic). Catalyst Center = management plane. Remember: LISP Locates, VXLAN eXports.'}},
  {id:'b73',critical:true,type:'single',originalNum:'Q27',tag:'Automation',text:'What is one advantage of using a data modeling language to develop an API client application?',options:[{letter:'A',text:'increase in compatibility'},{letter:'B',text:'lower resource requirements'},{letter:'C',text:'stronger security properties'},{letter:'D',text:'easier feature extensibility'}],correct:'D',feedback:{correct:'Data modeling languages like YANG make it easier to extend features because the schema clearly defines the data structure. New features can be added to the model without breaking existing clients, enabling easier extensibility.',wrong:'Easier feature extensibility (D) is the key advantage — well-defined models allow new features to be added cleanly. Data modeling does not inherently lower resource use, increase cross-vendor compatibility, or strengthen security.',correctAnswer:'D -- easier feature extensibility',trick:'Data model = blueprint. Good blueprint = easy to add rooms (features) without rebuilding the whole house. YANG models = well-structured = extensible. Think: model first = flexible later.'}},
  {id:'b74',critical:true,type:'single',originalNum:'Q44',tag:'Virtualization',text:'What is required for a VXLAN tunnel endpoint to operate?',options:[{letter:'A',text:'a VXLAN tunnel endpoint identifier'},{letter:'B',text:'at least one IP for the transit network and one IP for endpoint connectivity'},{letter:'C',text:'a VXLAN network identifier'},{letter:'D',text:'at least one Layer 2 interface and one Layer 3 interface'}],correct:'C',feedback:{correct:'A VXLAN Network Identifier (VNI) is required for a VTEP to operate. The VNI is the 24-bit segment ID that identifies which VXLAN segment the tunnel belongs to — without it the VTEP cannot distinguish which overlay network traffic belongs to.',wrong:'VNI (C) is required — it is the 24-bit segment ID that identifies the VXLAN overlay segment. VTEPs need an IP address on the underlay (one IP, not two). A VTEP operates at Layer 3 and does not require a separate L2 interface. "VXLAN tunnel endpoint identifier" is not a real term.',correctAnswer:'C -- a VXLAN network identifier (VNI)',trick:'VTEP needs a VNI to know WHICH overlay segment it belongs to. No VNI = no context = cannot operate. VNI = 24-bit = 16 million segments. VTEP = the device. VNI = the ID tag.'}},
  {id:'b75',critical:true,type:'single',originalNum:'Q1',tag:'Network Services',text:'Refer to the exhibit. A CPE router acts as a DHCP server for the locally attached LAN. After DHCP snooping is enabled on the switch where the DHCP clients are connected, clients are unable to obtain their configuration from the DHCP server. The debug shows: "DHCPD: inconsistent relay information" and "relay information option exists, but giaddr is zero." What is the cause of this issue?',options:[{letter:'A',text:'The configuration of Gi0/1 is missing the ip helper-address 192.168.255.1 command.'},{letter:'B',text:'The excluded DHCP range contains the subnet address of the entire LAN network.'},{letter:'C',text:'The IP address of the DHCP server is in the excluded DHCP range.'},{letter:'D',text:'The DHCP server drops DHCP packets carrying Option 82 and an empty relay agent IP address.'}],correct:'D',feedback:{correct:'DHCP snooping inserts Option 82 (relay agent information) into DHCP requests but leaves the giaddr (gateway IP) as zero when the switch is not acting as a relay agent. By default, IOS DHCP servers drop packets that contain Option 82 with a zero giaddr, causing clients to fail.',wrong:'Option 82 with giaddr=zero is what the DHCP server drops by default (D). The ip helper-address is for relay, not needed when DHCP server is local. The excluded range 192.168.10.0-10 does not include the subnet address. The server IP (192.168.255.1 loopback) is not in the excluded range.',correctAnswer:'D -- DHCP server drops Option 82 packets with empty giaddr',trick:'DHCP snooping + Option 82 + local DHCP server = problem! Snooping adds Option 82 but leaves giaddr=0. Local DHCP server rejects these by default. Fix: "ip dhcp relay information trust-all" or disable Option 82 insertion.'}},
  {id:'b76',type:'single',originalNum:'Q10',tag:'Security',text:'An engineer applies this configuration to router R1:\nusername cisco privilege 15 noescape secret 5 [hash]\nusername cisco autocommand show startup-config\naaa authentication login default local-case enable\naaa authorization exec default local\n\nHow does R1 respond when the user "cisco" logs in?',options:[{letter:'A',text:'It displays the startup config and then terminates the session.'},{letter:'B',text:'It displays the startup config and then permits the user to execute commands.'},{letter:'C',text:'It places the user into EXEC mode and permits the user to execute any command.'},{letter:'D',text:'It places the user into EXEC mode but permits the user to execute only the show startup-config command.'}],correct:'A',feedback:{correct:'The "autocommand" attribute automatically runs the specified command when the user logs in, then immediately closes the session. The user sees the startup-config output but cannot execute any further commands — the session terminates automatically.',wrong:'autocommand = runs the command then TERMINATES the session (A). It does not leave the user in EXEC mode. Privilege 15 would normally allow all commands, but autocommand overrides the interactive session.',correctAnswer:'A -- displays startup-config then terminates the session',trick:'autocommand = AUTO run + AUTO logout. The session opens, runs the one command, then closes. No interactive shell is given. Think: autocommand = a robot that does one job and hangs up.'}},
  {id:'b77',type:'dragdrop',originalNum:'Q13',tag:'Automation',text:'Drag and drop the code snippets onto the blanks to construct a Python script that converts a text file of device information to JSON format. Not all options are used.',items:[{num:1,text:'out_file.close(out_file)'},{num:2,text:'with open(input_file) as text:'},{num:3,text:'with open("raw-data") as text:'},{num:4,text:'out_file.close()'},{num:5,text:'out_file = open("Json-Output.json","w")'},{num:6,text:'out_file = open("Json-Output.json","r")'}],groups:[{label:'[?] — open the input file for reading (with context manager)',correct:[2]},{label:'[?] — open the JSON output file for writing',correct:[5]},{label:'[?] — close the output file after json.dump',correct:[4]}],feedback:{correct:'with open(input_file) as text: opens the input file safely. out_file = open("Json-Output.json","w") opens output for writing. out_file.close() closes it after json.dump.',wrong:'2=with open(input_file) as text (uses the variable). 5=open output "w" for write. 4=close() with no args. Item 1 passes a file to close() which is wrong. Item 6 opens "r" for read not write. Item 3 hardcodes the filename.',correctAnswer:'Blank1=item2 | Blank2=item5 | Blank3=item4',trick:'Pattern: open input (with context manager) → process → open output "w" → json.dump → close. "w" = write. close() takes no args. with statement auto-closes so no close needed for input.'}},
  {id:'b78',type:'dragdrop',originalNum:'Q17',tag:'Automation',text:'Drag and drop the automation characteristics onto the appropriate tools. All options are used.',items:[{num:1,text:'uses playbooks and plays'},{num:2,text:'uses modules and manifests'},{num:3,text:'uses cookbooks and recipes'},{num:4,text:'does not require an admin account on the client'}],groups:[{label:'Ansible',correct:[1,4]},{label:'Chef',correct:[3]},{label:'Puppet',correct:[2]}],feedback:{correct:'Ansible: uses playbooks/plays (YAML) and is agentless (no admin account needed on clients). Chef: uses cookbooks and recipes (Ruby). Puppet: uses modules and manifests (declarative DSL).',wrong:'Ansible=playbooks+agentless. Chef=cookbooks+recipes(Ruby). Puppet=modules+manifests(declarative). Ansible is the only agentless tool here — no client agent = no admin account needed.',correctAnswer:'Ansible:1,4 | Chef:3 | Puppet:2',trick:'Ansible = A for Agentless + plAybooks. Chef = C for Cookbooks. Puppet = P for manifests (Puppet shows). No agent = Ansible only.'}},
  {id:'b79',critical:true,type:'single',originalNum:'Q18',tag:'Automation',text:'What is the intent API in Cisco Catalyst Center (formerly DNA Center)?',options:[{letter:'A',text:'westbound interface, which allows the exchange of data such as ITSM, IPAM, and reporting information'},{letter:'B',text:'southbound consumer-facing RESTful API, which enables network discovery and configuration management'},{letter:'C',text:'northbound consumer-facing RESTful API, which enables network discovery and configuration management'},{letter:'D',text:'interface between the controller and the network devices, which enables network discovery and configuration management'}],correct:'C',feedback:{correct:'The Intent API is Catalyst Center\'s northbound consumer-facing RESTful API. It allows external applications and scripts to interact with Catalyst Center to perform network discovery, configuration management, and automation.',wrong:'Intent API = northbound (C). Northbound = apps talking UP to Catalyst Center. Southbound = Catalyst Center talking DOWN to devices (D describes southbound). Westbound = ITSM/IPAM integrations (A). Intent API is RESTful.',correctAnswer:'C -- northbound consumer-facing RESTful API',trick:'Intent API = Northbound = apps on TOP use it. Southbound = devices BELOW. Intent = you tell Catalyst Center what you INTEND, it figures out how. Northbound faces the consumer/application layer.'}},
  {id:'b80',type:'multi',originalNum:'Q20',tag:'QoS',text:'Which two parameters are examples of a QoS traffic descriptor? (Choose two)',options:[{letter:'A',text:'ToS'},{letter:'B',text:'DSCP'},{letter:'C',text:'bandwidth'},{letter:'D',text:'packet size'},{letter:'E',text:'MPLS EXP bits'}],correct:['B','E'],feedback:{correct:'DSCP (Differentiated Services Code Point) and MPLS EXP (Experimental) bits are QoS marking fields used to classify and prioritize traffic. They are carried in packet headers as traffic descriptors.',wrong:'DSCP (B) is the 6-bit field in the IP header for QoS marking. MPLS EXP bits (E) are the 3-bit QoS field in the MPLS label. ToS (A) is the older IP precedence field superseded by DSCP. Bandwidth and packet size are traffic characteristics, not QoS descriptor fields.',correctAnswer:'B and E',trick:'QoS traffic descriptors = fields in the HEADER used to mark/classify traffic. DSCP = IP header. MPLS EXP = MPLS label. ToS = old IP header (replaced by DSCP). Bandwidth/size = traffic properties, not markers.'}},
  {id:'b81',type:'single',originalNum:'Q21',tag:'Automation',text:'How does NETCONF YANG represent data structures?',options:[{letter:'A',text:'as modules within a tree'},{letter:'B',text:'as strict data structures defined by RFC 6020'},{letter:'C',text:'in an HTML format'},{letter:'D',text:'in an XML tree format'}],correct:'D',feedback:{correct:'NETCONF uses XML to encode and transport YANG-modeled data. The data is represented as an XML tree format, with hierarchical elements matching the YANG model structure.',wrong:'NETCONF represents data as XML tree format (D). YANG models are defined in RFC 6020/7950 but the data representation (encoding) is XML. HTML is a web markup language not used by NETCONF. "Modules within a tree" describes YANG model structure, not data representation.',correctAnswer:'D -- in an XML tree format',trick:'YANG = model (structure). NETCONF = transport. XML = encoding/representation. YANG defines the tree shape, NETCONF carries the XML-encoded data. Think: YANG draws the blueprint, XML builds it, NETCONF ships it.'}},
  {id:'b82',type:'single',originalNum:'Q-DNAC-Python',tag:'Automation',text:'Refer to the exhibit. A Python script defines dnac_login() to POST credentials and return a token, and network_device_list() to GET devices and populate a PrettyTable. Which code results in the working Python script displaying a list of network devices from Cisco Catalyst Center?',options:[{letter:'A',text:'Option A:\nlogin = dnac_login(dnac["host"], dnac["username"], dnac["password"])\nnetwork_device_list(dnac, login)\nfor item in dnac_devices:\n  print(dnac_devices.item)'},{letter:'B',text:'Option B:\nlogin = dnac_login(dnac["host"], dnac["username"], dnac["password"])\nnetwork_device_list(dnac, login)\nprint(dnac_devices)'},{letter:'C',text:'Option C:\nnetwork_device_list(dnac["host"], dnac["username"], dnac["password"])\nlogin = dnac_login(dnac)\nprint(dnac_devices)'},{letter:'D',text:'Option D:\nnetwork_device_list(dnac["host"], dnac["username"],dnac["password"])\nlogin = dnac_login(dnac)\nfor item in dnac_devices:\n  print(dnac_devices.item)'}],correct:'B',feedback:{correct:'Option B correctly: 1) calls dnac_login with host/user/pass to get the token, 2) passes dnac and login token to network_device_list which populates the PrettyTable, 3) prints the PrettyTable object directly.',wrong:'B is correct. A uses "dnac_devices.item" which is invalid — PrettyTable uses print() directly. C and D call functions in wrong order (network_device_list before login) and pass wrong args. The token from login must be passed to network_device_list.',correctAnswer:'B -- login → network_device_list(dnac, login) → print(dnac_devices)',trick:'Order matters: 1) get token (login), 2) use token to fetch devices (network_device_list), 3) print the table. PrettyTable prints with print(table_object) not .item. Wrong order = no token = auth fails.'}},
  {id:'b83',type:'single',originalNum:'Q28',tag:'Switching',text:'Refer to the exhibit. R1 has: standby 100 priority 105, standby 100 preempt, standby 100 track 26 (Serial0/0.1). R2 has only: standby 100 ip 10.10.10.1. An engineer must modify the existing configuration so R2 can take over as primary router when serial interface 0/0.1 on R1 goes down. Which command must the engineer apply?',options:[{letter:'A',text:'R2# standby 100 priority 100'},{letter:'B',text:'R2# standby 100 preempt'},{letter:'C',text:'R2# track 26 interface Serial0/0.1 line-protocol'},{letter:'D',text:'R2# standby 100 track 26 decrement 10'}],correct:'B',feedback:{correct:'When R1\'s Serial0/0.1 goes down, R1\'s priority drops from 105 to 95 (default decrement=10). For R2 to become active, R2 needs "standby 100 preempt" so it can take over when its priority (100) exceeds R1\'s reduced priority (95).',wrong:'R2 needs preempt (B) to take over when R1\'s priority drops. R1 already has the tracking configured. R2\'s default priority is 100, which beats R1\'s 95 after the decrement — but only if R2 has preempt enabled.',correctAnswer:'B -- R2# standby 100 preempt',trick:'HSRP takeover checklist: higher priority + preempt enabled = wins. R1 drops to 95 when tracked interface fails. R2 at 100 > 95, but R2 must have PREEMPT to take over. Without preempt, current active stays active.'}},
  {id:'b84',type:'single',originalNum:'Q-JSON-devices',tag:'Automation',text:'Refer to the exhibit. A Python dictionary "Devices" contains switch and router data with IPv6 addresses. Which Python snippet stores the data structure in JSON format to a file called devices.json?',options:[{letter:'A',text:'Option A:\nwith open("devices.json","w") as OutFile:\n  Devices = json.load(OutFile)'},{letter:'B',text:'Option B:\nOutFile = open("devices.json","w")\njson.dump(Devices, OutFile)\nOutFile.close()'},{letter:'C',text:'Option C:\nwith open("devices.json","w") as OutFile:\n  json.dumps(Devices)'},{letter:'D',text:'Option D:\nOutFile = open("devices.json","w")\nOutFile.write(str(Devices))\nOutFile.close()'}],correct:'B',feedback:{correct:'Option B correctly opens the file in write mode, uses json.dump() to serialize the Devices dictionary into the file object, then closes the file. json.dump() writes JSON directly to a file object.',wrong:'B is correct. A uses json.load() which READS from a file (not writes). C uses json.dumps() which returns a string but does not write it to the file. D uses str() which creates a Python string representation, not valid JSON format.',correctAnswer:'B -- json.dump(Devices, OutFile)',trick:'json.dump() = dump to FILE. json.dumps() = dump to STRING (s=string). json.load() = load from FILE. json.loads() = load from STRING. Dump to file = json.dump(data, file_object).'}},
  {id:'b85',type:'single',originalNum:'Q52',tag:'Network Services',text:'An engineer must configure a multicast UDP jitter operation. Which configuration should be applied?',options:[{letter:'A',text:'Router(config)#ip sla 1\nRouter(config)#udp-jitter 192.0.2.115 65051 num-packets 20'},{letter:'B',text:'Router(config)#ip sla 1\nRouter(config)#udp-jitter 192.0.2.115 65051'},{letter:'C',text:'Router(config)#ip sla 1\nRouter(config)#udp jitter 10.0.0.1 source-ip 192.168.1.1'},{letter:'D',text:'Router(config)#ip sla 1\nRouter(config)#udp jitter 239.1.1.1 65051 end-point list List source-ip 192.168.1.1'}],correct:'D',feedback:{correct:'Multicast UDP jitter requires a multicast destination address (239.x.x.x), a UDP port, an end-point list specifying the receivers, and a source IP. Option D uses all these required elements correctly.',wrong:'D is correct for multicast. A and B use unicast addresses (192.0.2.x) without end-point list — these are unicast jitter, not multicast. C uses wrong syntax (missing port and multicast address). Multicast IP SLA requires a multicast group address and end-point list.',correctAnswer:'D -- udp jitter [multicast-addr] [port] end-point list [List] source-ip [ip]',trick:'Multicast UDP jitter needs: multicast address (224.x.x.x or 239.x.x.x) + UDP port + end-point list (the receivers) + source-ip. Unicast jitter just needs destination IP + port. Multicast = group address + list.'}},
  {id:'b86',type:'single',originalNum:'Q-Python-type',tag:'Automation',text:'Refer to the exhibit. A Python interactive session defines: customer1 = {"inventory": {"device": [{"hostname": "asr9k-01", "ver": "16.09", "vendor": "Cisco", ...}]}}. Which class type is returned for the command "type(customer1)"?',options:[{letter:'A',text:'str'},{letter:'B',text:'tuple'},{letter:'C',text:'list'},{letter:'D',text:'dict'}],correct:'D',feedback:{correct:'customer1 is defined using {} curly braces at the top level, making it a dictionary (dict). type(customer1) returns <class "dict">.',wrong:'customer1 = {...} — the outermost structure is {} = dictionary. type() returns dict. A list uses []. A tuple uses (). A str is a text string.',correctAnswer:'D -- dict',trick:'{} = dict. [] = list. () = tuple. "text" = str. Always look at the OUTERMOST brackets. customer1 = { ... } = dict, regardless of what is inside.'}},
  {id:'b87',type:'single',originalNum:'Q63',tag:'Automation',text:'In Cisco Catalyst Center (formerly DNA Center) Inventory, the Software Version of a network device displays a status of OUTDATED. What does it mean?',options:[{letter:'A',text:'The current software image does not match the selected Golden Image for this type of network device.'},{letter:'B',text:'The current type of software image does not match the type of the network device.'},{letter:'C',text:'There is a later software version available at www.cisco.com website.'},{letter:'D',text:'There is a later software version available on Cisco Catalyst Center.'}],correct:'A',feedback:{correct:'"OUTDATED" in Catalyst Center Inventory means the device\'s running software does not match the designated Golden Image for that device type. The Golden Image is the administrator-approved standard version.',wrong:'OUTDATED = does not match the Golden Image (A). It is not about cisco.com or local Catalyst Center having newer versions. It is not about image type mismatch (that would be a different error). Golden Image = the approved standard version configured by the admin.',correctAnswer:'A -- does not match the selected Golden Image',trick:'Catalyst Center image statuses: CURRENT = matches Golden Image. OUTDATED = running version differs from Golden Image. Golden Image = the approved standard. Think: OUTDATED = not golden enough.'}},
