  {id:'b88',type:'single',originalNum:'Q64',tag:'Security',text:'Which algorithms are used to secure REST API from brute force attacks and minimize the impact?',options:[{letter:'A',text:'MD5 algorithm-128 and SHA-384'},{letter:'B',text:'SHA-1, SHA-256, and SHA-512'},{letter:'C',text:'SHA-512 and SHA-384'},{letter:'D',text:'PBKDF2, BCrypt, and SCrypt'}],correct:'D',feedback:{correct:'PBKDF2, BCrypt, and SCrypt are password hashing algorithms specifically designed to be computationally expensive (slow), making brute-force attacks impractical. They include salting and key-stretching to resist attacks.',wrong:'PBKDF2, BCrypt, and SCrypt (D) are designed to slow down brute-force attacks through key stretching and salting. SHA algorithms are fast cryptographic hashes — fast hashing makes brute-force easier, not harder. MD5 is weak and broken.',correctAnswer:'D -- PBKDF2, BCrypt, and SCrypt',trick:'Brute-force resistance = SLOW hashing. PBKDF2/BCrypt/SCrypt = intentionally slow + salted = brute-force impractical. SHA-1/256/512 = fast = easy to brute-force. For passwords: slower = safer.'}},
  {id:'b89',critical:true,type:'single',originalNum:'Q66',tag:'Security',text:'Which configuration enables a Cisco router to send information to a TACACS+ server for individual EXEC commands associated with privilege level 15?',options:[{letter:'A',text:'Router(config)# aaa authorization exec default group tacacs+'},{letter:'B',text:'Router(config)# aaa authorization commands 15 default group tacacs+'},{letter:'C',text:'Router(config)# aaa accounting exec default start-stop group tacacs+'},{letter:'D',text:'Router(config)# aaa accounting commands 15 default start-stop group tacacs+'}],correct:'D',feedback:{correct:'"aaa accounting" records/logs activity. "commands 15" specifies privilege level 15 commands. "start-stop" sends records at start and end. "group tacacs+" sends to the TACACS+ server. This logs every privilege 15 EXEC command to TACACS+.',wrong:'D is correct. "accounting" = LOGGING/RECORDING (not authorization). "commands 15" = privilege level 15 commands. "start-stop" = send accounting records. C uses "exec" which logs exec sessions, not individual commands. B uses "authorization" which controls access, not logging.',correctAnswer:'D -- aaa accounting commands 15 default start-stop group tacacs+',trick:'AAA: Authentication=WHO. Authorization=WHAT. Accounting=LOGGING. To LOG commands = accounting. "commands 15" = priv level 15 commands. "start-stop" = full record. Accounting sends data TO the server for auditing.'}},
  {id:'b90',critical:true,type:'single',originalNum:'Q67',tag:'Security',text:'A network engineer is enabling HTTPS access to a core switch, which requires a certificate signed by the corporate CA. Which configuration commands are required to issue a certificate signing request from the core switch?',options:[{letter:'A',text:'Core-Switch(config)#crypto pki trustpoint Core-Switch\nCore-Switch(ca-trustpoint)#enrollment terminal\nCore-Switch(config)#crypto pki enroll Core-Switch'},{letter:'B',text:'Core-Switch(config)#ip http secure-trustpoint Core-Switch\nCore-Switch(config)#crypto pki enroll Core-Switch'},{letter:'C',text:'Core-Switch(config)#crypto pki enroll Core-Switch\nCore-Switch(config)#ip http secure-trustpoint Core-Switch'},{letter:'D',text:'Core-Switch(config)#crypto pki trustpoint Core-Switch\nCore-Switch(ca-trustpoint)#enrollment terminal\nCore-Switch(config)#ip http secure-trustpoint Core-Switch'}],correct:'A',feedback:{correct:'To issue a CSR: 1) define the trustpoint with "crypto pki trustpoint", 2) set "enrollment terminal" to copy/paste the CSR, 3) generate the CSR with "crypto pki enroll". The ip http secure-trustpoint is only needed after the cert is installed.',wrong:'A is correct: trustpoint → enrollment terminal → enroll (generates CSR). B skips the trustpoint definition. C runs enroll before defining trustpoint. D defines trustpoint but uses "ip http secure-trustpoint" instead of "crypto pki enroll" to generate the CSR.',correctAnswer:'A -- crypto pki trustpoint → enrollment terminal → crypto pki enroll',trick:'PKI CSR order: 1) crypto pki trustpoint [name] 2) enrollment terminal 3) crypto pki enroll [name]. Think: define → specify how → generate. "enrollment terminal" = manual copy/paste mode for the CSR.'}},
  {id:'b91',critical:true,type:'single',originalNum:'Q75',tag:'Security',text:'Which NGFW mode blocks flows crossing the firewall?',options:[{letter:'A',text:'Tap'},{letter:'B',text:'Inline tap'},{letter:'C',text:'Inline'},{letter:'D',text:'Passive'}],correct:'C',feedback:{correct:'Inline mode places the NGFW directly in the traffic path so it can actively inspect and BLOCK flows. Traffic must pass through the firewall, enabling enforcement of security policies.',wrong:'Inline (C) = in the path = can block. Tap (A) = receives a copy of traffic = passive, cannot block. Inline tap (B) = copies traffic inline but does not block (like a bypass). Passive (D) = out-of-band monitoring only, cannot block.',correctAnswer:'C -- Inline',trick:'Inline = IN the line = traffic MUST go through = CAN block. Tap/Passive = watching from the side = CANNOT block. Think: Inline = like a security checkpoint. Tap = like a security camera. Cameras watch, checkpoints block.'}},
  {id:'b92',type:'single',originalNum:'Q-ACL-Telnet',tag:'Security',text:'A network engineer must block Telnet traffic from hosts in the range 10.100.2.248 to 10.100.2.255 to network 10.100.3.0 and permit everything else. Which configuration must the engineer apply on Router B?',options:[{letter:'A',text:'access-list 101 permit tcp 10.100.2.0 0.0.0.252 10.100.3.0 0.0.0.255\nint g0/0/2\nip access-group 101 in'},{letter:'B',text:'access-list 101 deny tcp 10.100.2.0 0.0.0.248 10.100.3.0 0.0.0.255 eq 22\naccess-list 101 permit any any\nint g0/0/2\nip access-group 101 in'},{letter:'C',text:'access-list 101 deny icmp 10.100.2.0 0.0.0.248 10.100.2.0 0.0.0.248\naccess-list 101 permit any any\nint g0/0/2\nip access-group 101 in'},{letter:'D',text:'access-list 101 deny tcp 10.100.2.0 0.0.0.248 10.100.3.0 0.0.0.255 eq 23\naccess-list 101 permit any any\nint g0/0/2\nip access-group 101 in'}],correct:'D',feedback:{correct:'Telnet = port 23 (eq 23). The source range .248-.255 uses wildcard 0.0.0.7 from base .248 (or 0.0.0.248 matching the bit pattern). Applied inbound on g0/0/2 to block before routing. Permit any any allows everything else.',wrong:'D is correct: deny tcp + correct source range + destination 10.100.3.0 + eq 23 (Telnet). B uses eq 22 (SSH not Telnet). C uses ICMP (wrong protocol). A only permits without denying Telnet.',correctAnswer:'D -- deny tcp [source] [destination] eq 23 + permit any any',trick:'Telnet = TCP port 23. SSH = TCP port 22. Block Telnet = deny tcp ... eq 23. Always add "permit any any" after the deny or implicit deny blocks everything. Apply inbound on the interface closest to the source.'}},
  {id:'b93',type:'matching',originalNum:'Q86',tag:'Network Services',text:'Match the steps to configure NTP in client mode to the correct order.',pairs:[{component:'Step 1',description:'Configure an authentication key pair for NTP and specify whether the key will be trusted or untrusted'},{component:'Step 2',description:'Set the IP address of the NTP server and the public key'},{component:'Step 3',description:'Enable NTP client mode'},{component:'Step 4',description:'Enable NTP authentication'}],feedback:{correct:'NTP client mode order: Step 1=configure auth key pair, Step 2=set NTP server IP and public key, Step 3=enable NTP client mode, Step 4=enable NTP authentication.',wrong:'Step 1=key pair first. Step 2=NTP server IP + key. Step 3=enable client mode. Step 4=enable authentication. Authentication is enabled last after everything is configured.',correctAnswer:'Step1=key pair | Step2=server IP+key | Step3=client mode | Step4=authentication',trick:'NTP client setup order: KEY first (step1), then SERVER (step2), then CLIENT mode (step3), then AUTH on (step4). Think: build the lock (key pair) → find the locksmith (server) → open the door (client mode) → activate security (auth).'}},
  {id:'b94',type:'single',originalNum:'Q87',tag:'Security',text:'Which feature does Cisco TrustSec use to provide scalable, secure communication throughout a network?',options:[{letter:'A',text:'security group tag ACL assigned to each router on a network'},{letter:'B',text:'security group tag number assigned to each user on a switch'},{letter:'C',text:'security group tag ACL assigned to each port on a switch'},{letter:'D',text:'security group tag number assigned to each port on a network'}],correct:'B',feedback:{correct:'TrustSec assigns a Security Group Tag (SGT) number to each USER (or endpoint) when they authenticate through ISE. This SGT travels with the traffic and is used to enforce policy throughout the network.',wrong:'TrustSec assigns SGT to each USER/endpoint (B), not to ports or routers. The SGT follows the user, not the port — this is identity-based, not location-based. ACLs (SGACLs) are applied based on the SGT, not the other way around.',correctAnswer:'B -- SGT number assigned to each user on a switch',trick:'TrustSec = TAG the USER not the port. SGT follows the person, not the cable. ISE assigns SGT at authentication. Policy = source SGT → destination SGT. User moves = tag moves with them. Identity-based not location-based.'}},
  {id:'b95',type:'single',originalNum:'Q88',tag:'Security',text:'Refer to the exhibit. Router B connects to Router A (G0/0/0), Router C (G0/0/1), Network 10.100.2.0/24 (G0/0/2), and Network 10.100.3.0/24 (G0/0/3). A network administrator must configure Router B to allow traffic only from network 10.100.2.0 to networks outside of Router B. Which configuration must be applied?',options:[{letter:'A',text:'Option A:\naccess-list 101 permit ip 10.100.2.0 0.0.0.255 any\naccess-list 101 deny any\nint g0/0/0\nip access-group 101 out'},{letter:'B',text:'Option B:\naccess-list 101 permit ip 10.100.3.0 0.0.0.255 any\naccess-list 101 deny any\nint g0/0/0\nip access-group 101 out\nint g0/0/1\nip access-group 101 out'},{letter:'C',text:'Option C:\naccess-list 101 permit ip 10.100.2.0 0.0.0.255 any\naccess-list 101 deny any\nint g0/0/2\nip access-group 101 in'},{letter:'D',text:'Option D:\naccess-list 101 permit ip 10.100.2.0 0.0.0.255 any\naccess-list 101 deny any\nint g0/0/0\nip access-group 101 out\nint g0/0/1\nip access-group 101 out'}],correct:'D',feedback:{correct:'To block all non-10.100.2.0 traffic leaving Router B, apply the ACL outbound on ALL external interfaces (G0/0/0 to Router A and G0/0/1 to Router C). Option D correctly applies outbound on both external interfaces.',wrong:'D is correct — outbound on BOTH external interfaces G0/0/0 and G0/0/1. A only applies on G0/0/0, missing G0/0/1. B permits 10.100.3.0 instead of 10.100.2.0. C applies inbound on G0/0/2 which would block incoming traffic from 10.100.2.0, not outgoing other traffic.',correctAnswer:'D -- permit 10.100.2.0, outbound on G0/0/0 and G0/0/1',trick:'Outbound ACL = filter traffic LEAVING the interface. Apply outbound on ALL external exits. Inbound on source interface would block the allowed traffic coming in. Must cover ALL exit points or traffic sneaks out another interface.'}},
  {id:'b96',type:'single',originalNum:'Q98',tag:'Automation',text:'Refer to the exhibit. An EEM applet "config-alert" triggers on "event cli pattern conf t.* sync yes". A network engineer must be notified when a user switches to configuration mode via SNMP trap AND a critical-level log message. Which script should be applied?',options:[{letter:'A',text:'action 1.0 snmp-trap strdata "Configuration change alarm"\naction 1.1 syslog priority critical msg "Configuration change alarm"'},{letter:'B',text:'action 1.0 snmp-trap strdata "Configuration change critical alarm"'},{letter:'C',text:'action 1.0 snmp-trap strdata "Configuration change alarm"\naction 1.0 syslog priority critical msg "Configuration change alarm"'},{letter:'D',text:'action 1.0 snmp-trap strdata "Configuration change alarm"\naction 2.0 syslog msg "Configuration change alarm"'}],correct:'A',feedback:{correct:'Two separate actions are needed with unique action numbers. action 1.0 sends the SNMP trap. action 1.1 sends the critical syslog message with "priority critical". Both must have different action numbers.',wrong:'A is correct: unique action numbers (1.0 and 1.1) + SNMP trap + syslog with priority critical. B has only one action. C uses duplicate action number 1.0 which is invalid. D is missing "priority critical" in the syslog command.',correctAnswer:'A -- action 1.0 snmp-trap + action 1.1 syslog priority critical',trick:'EEM actions need UNIQUE numbers. 1.0 ≠ 1.0 — cannot reuse! Syslog criticality = "priority critical". SNMP trap = "snmp-trap strdata". Two notifications = two action numbers (1.0 and 1.1).'}},
  {id:'b106',type:'single',originalNum:'Q21',tag:'Security',text:'Which security feature does stateless authentication and authorization use for REST API calls?',options:[{letter:'A',text:'API keys'},{letter:'B',text:'Cookie-based session authentication'},{letter:'C',text:'SSL/TLS certificate encryption'},{letter:'D',text:'OAuth 2 token'}],correct:'D',feedback:{correct:'OAuth 2.0 tokens enable stateless authentication — the server does not store session state. Each API request carries a self-contained token (e.g. a JWT) that includes all the information needed to authenticate and authorize the caller without a server-side session lookup.',wrong:'D is correct. OAuth 2 tokens are stateless — the token carries all auth info, no session needed server-side. Cookie-based sessions (B) are stateful — the server must maintain session state. API keys (A) are static credentials, not stateless auth in the OAuth sense. SSL/TLS (C) is transport encryption, not an authentication mechanism.',correctAnswer:'D -- OAuth 2 token',trick:'Stateless = no server-side session. Token carries everything. JWT = self-contained. Cookie sessions = stateful (server remembers you). REST APIs love stateless because any server can handle the request — just validate the token. SSL/TLS = encryption, not authentication.'}},
  {id:'b107',type:'single',originalNum:'Q22',tag:'Network Services',text:'Refer to the exhibit.\nflow record NetFlow-Record\n match ipv4 protocol\n match ipv4 source address\n match ipv4 destination address\n match transport source-port\n match transport destination-port\n collect counter bytes\n collect counter packets\n\nflow exporter NetFlow-Exporter\n destination 192.168.0.254\n transport udp 2055\n\nflow monitor NetFlow-Monitor\n exporter NetFlow-Exporter\n record NetFlow-Record\n\ninterface GigabitEthernet0/0\n ip flow monitor NetFlow-Monitor input\n\nThe DevOps team noticed missing NetFlow data during peak utilization times for remote branches. Which configuration allows for this issue to be minimized or resolved?',options:[{letter:'A',text:'Change the transport type from UDP to TCP.'},{letter:'B',text:'Configure long byte counters when specifying a flow record.'},{letter:'C',text:'Change the flow monitor to IPv6 from IPv4.'},{letter:'D',text:'Configure NetFlow on the in and outbound directions.'}],correct:'B',feedback:{correct:'During peak utilization, byte counters can overflow if only standard 32-bit counters are used, causing NetFlow records to wrap around and lose accuracy. Configuring "collect counter bytes long" uses 64-bit counters which handle high-throughput links without overflow, preventing missing or inaccurate data.',wrong:'B is correct. Long byte counters (64-bit) prevent counter overflow on high-bandwidth links — the root cause of missing data at peak times. Changing UDP to TCP (A) does not solve counter overflow. IPv6 (C) is irrelevant to the overflow issue. Adding outbound direction (D) captures more flows but does not fix the overflow problem causing missing data.',correctAnswer:'B -- Configure long byte counters when specifying a flow record',trick:'NetFlow missing data at peak = counter overflow. Standard counters are 32-bit and wrap at ~4GB. "collect counter bytes long" = 64-bit = no overflow. Remote branches with high traffic hit this limit. Think: long = bigger bucket = no spill.'}},
  {id:'b108',type:'single',originalNum:'Q28',tag:'Switching',text:'Refer to the exhibit.\nvlan 222\n remote-span\n!\nvlan 223\n remote-span\n!\nmonitor session 1 source interface FastEthernet0/1 tx\nmonitor session 1 source interface FastEthernet0/2 rx\nmonitor session 1 source interface port-channel 5\nmonitor session 1 destination remote vlan 222\n\nWhat happens to access interfaces where VLAN 222 is assigned?',options:[{letter:'A',text:'STP BPDU guard is enabled'},{letter:'B',text:'They cannot provide PoE'},{letter:'C',text:'A description "RSPAN" is added'},{letter:'D',text:'They are placed into an inactive state'}],correct:'D',feedback:{correct:'When a VLAN is configured as a remote-span (RSPAN) VLAN, any access ports assigned to that VLAN are automatically placed into an inactive state. RSPAN VLANs carry only mirrored traffic between switches and cannot carry normal user traffic.',wrong:'D is correct. RSPAN VLANs are special-purpose — access interfaces assigned to them go inactive because the VLAN cannot carry normal data traffic. No description is automatically added (C). BPDU guard and PoE (A, B) are unrelated to RSPAN VLAN assignment.',correctAnswer:'D -- They are placed into an inactive state',trick:'RSPAN VLAN = reserved for mirrored traffic only. Normal users CANNOT use it. So any access port assigned to an RSPAN VLAN is automatically shut down (inactive). Think: RSPAN VLAN = VIP-only lane. Regular traffic gets blocked at the door.'}},
  {id:'b115',type:'multi',originalNum:'Q35',tag:'Network Services',text:'Which two mechanisms are available to secure NTP? (Choose two)',options:[{letter:'A',text:'IPsec'},{letter:'B',text:'IP access list-based'},{letter:'C',text:'Encrypted authentication'},{letter:'D',text:'TACACS-based authentication'},{letter:'E',text:'IP prefix list-based'}],correct:['B','C'],feedback:{correct:'NTP can be secured using IP access lists (to restrict which hosts can query or sync with the NTP server) and encrypted authentication (MD5-based NTP authentication using a shared key). These are the two native NTP security mechanisms.',wrong:'B and C are correct. IP access list-based (B) = restrict NTP peers/servers by source IP. Encrypted authentication (C) = MD5 authentication key between NTP peers. IPsec (A) is not a native NTP security feature. TACACS+ (D) is for device login AAA, not NTP. IP prefix lists (E) are for routing policy, not NTP security.',correctAnswer:'B and C -- IP access list-based and Encrypted authentication',trick:'NTP security = two tools: (1) ACCESS LISTS = control who can talk NTP to you. (2) AUTHENTICATION = MD5 key to verify the NTP source is trusted. Prefix lists = BGP/routing. TACACS = admin login. IPsec = VPN tunnel. NTP stays in its own lane.'}},
  {id:'b116',type:'single',originalNum:'Q48',tag:'Switching',text:'When is GLBP preferred over HSRP?',options:[{letter:'A',text:'When encrypted helms are required between gateways in a single group'},{letter:'B',text:'When clients need the gateway MAC address to be the same between multiple gateways'},{letter:'C',text:'When the traffic load needs to be shared between multiple gateways using a single virtual IP'},{letter:'D',text:'When the gateway routers are a mix of Cisco and non-Cisco routers'}],correct:'C',feedback:{correct:'GLBP (Gateway Load Balancing Protocol) is preferred over HSRP when you need load balancing across multiple gateways while still presenting a single virtual IP to clients. GLBP assigns different virtual MAC addresses to each gateway so traffic is distributed, unlike HSRP where only one gateway is active.',wrong:'C is correct. GLBP = load sharing with ONE virtual IP but MULTIPLE virtual MACs (one per gateway). HSRP = one active gateway at a time, no load sharing. Use GLBP when you want all gateways active simultaneously under a single VIP. Non-Cisco routers (D) cannot run GLBP — it is Cisco proprietary, making HSRP/VRRP better for mixed environments.',correctAnswer:'C -- traffic load sharing between multiple gateways using a single virtual IP',trick:'GLBP = Gateway LOAD BALANCING Protocol. Key word: LOAD BALANCING. One virtual IP, multiple virtual MACs, all gateways active. HSRP = one active, one standby, no load sharing. Choose GLBP when you want to use ALL gateways at once. Non-Cisco = use VRRP (open standard), not GLBP (Cisco only).'}},
  {id:'b112',critical:true,type:'multi',originalNum:'Q9',tag:'Security',text:'Which two threats does AMP4E have the ability to block? (Choose two)',options:[{letter:'A',text:'ransomware'},{letter:'B',text:'SQL injection'},{letter:'C',text:'Microsoft Word macro attack'},{letter:'D',text:'email phishing'},{letter:'E',text:'DDoS'}],correct:['A','C'],feedback:{correct:'AMP for Endpoints (AMP4E) is Cisco\'s endpoint malware protection. It specifically blocks file-based threats like ransomware and macro-based attacks (e.g. malicious Word macros). It uses file analysis, sandboxing, and retrospective detection.',wrong:'A and C are correct. AMP4E blocks file-based endpoint malware: ransomware (A) and macro-based document attacks (C). SQL injection (B) is a web application attack — blocked by WAF, not AMP4E. Email phishing (D) is blocked by email security products (Cisco ESA/SEG), not AMP4E. DDoS (E) is blocked by network-layer tools.',correctAnswer:'A and C -- ransomware and Microsoft Word macro attack',trick:'AMP4E = endpoint malware. Think: what runs ON a PC? Ransomware encrypts your files. Word macros execute on your PC. AMP4E watches what files do. SQL injection = web server problem. Phishing = email gateway problem. DDoS = network problem. AMP4E only cares about what happens ON the endpoint.'}},
  {id:'b113',type:'multi',originalNum:'Q18',tag:'SD-Access',text:'Which two features does the Cisco SD-Access architecture add to a traditional campus network? (Choose two)',options:[{letter:'A',text:'private VLANs'},{letter:'B',text:'modular QoS'},{letter:'C',text:'identity services'},{letter:'D',text:'software-defined segmentation'},{letter:'E',text:'SD-WAN'}],correct:['C','D'],feedback:{correct:'SD-Access adds identity services (policy based on who the user is, using ISE and SGTs) and software-defined segmentation (micro-segmentation using VNs and SGTs instead of VLANs). These are the two defining capabilities SD-Access brings on top of a traditional campus.',wrong:'C and D are correct. Identity services (C) = ISE-based user/device identity for policy. Software-defined segmentation (D) = VXLAN fabric with SGT-based micro-segmentation. Private VLANs (A) and modular QoS (B) exist in traditional campus networks already. SD-WAN (E) is a WAN technology, not a campus SD-Access feature.',correctAnswer:'C and D -- identity services and software-defined segmentation',trick:'SD-Access adds WHAT traditional campus lacks: WHO are you (identity services via ISE) and SEPARATE them flexibly (software-defined segmentation via SGT/VXLAN). Private VLANs and QoS already existed. SD-WAN is for WAN, not campus fabric.'}},
  {id:'b114',type:'single',originalNum:'Q19',tag:'Automation',text:'An engineer must export the contents of the devices object in JSON format. Which statement must be used?\n\nimport json\nfrom json import dumps, loads\n\nDevices=[\n{\n  \'name\' : \'distsw1\',\n  \'ip\' : \'192.168.255.1\',\n  \'type\' : \'Catalyst C9407R\',\n  \'user\' : \'netadmin\',\n  \'pass\' : \'383847459c9484940373dc038484943\'\n}]',options:[{letter:'A',text:'json.loads(Devices)'},{letter:'B',text:'json.dumps(Devices)'},{letter:'C',text:'json.repr(Devices)'},{letter:'D',text:'json.print(Devices)'}],correct:'B',feedback:{correct:'json.dumps() serializes a Python object (like a list or dictionary) into a JSON-formatted string. "dumps" = dump to String. This converts the Devices list into a JSON string that can be exported or transmitted.',wrong:'B is correct. json.dumps() = convert Python object TO JSON string (d=dump, s=string). json.loads() = parse a JSON string INTO a Python object (l=load, s=string). json.repr() and json.print() do not exist in the json module.',correctAnswer:'B -- json.dumps(Devices)',trick:'json.dumps() = Dump to String = Python → JSON string. json.loads() = Load from String = JSON string → Python. json.dump() (no s) = write to FILE. json.load() (no s) = read from FILE. "s" = string, no "s" = file. You want to EXPORT as JSON = dumps().'}},
  {id:'b109',type:'single',originalNum:'Q32',tag:'Automation',text:'Which language can be used to model configuration and state data?',options:[{letter:'A',text:'JSON'},{letter:'B',text:'XML'},{letter:'C',text:'YANG'},{letter:'D',text:'XDR'}],correct:'C',feedback:{correct:'YANG (Yet Another Next Generation) is a data modeling language specifically designed to model the configuration and state data of network devices managed by NETCONF and RESTCONF. It defines the structure, syntax, and semantics of the data.',wrong:'C is correct. YANG = data MODELING language (defines structure). JSON and XML are data ENCODING/serialization formats used to carry the data — not modeling languages. XDR (External Data Representation) is a serialization format, not a modeling language.',correctAnswer:'C -- YANG',trick:'YANG models the DATA STRUCTURE (what fields exist, what types, what constraints). JSON and XML are formats for CARRYING that data. Think: YANG = the blueprint/schema. JSON/XML = the building materials. You cannot model with JSON — you only format with it.'}},
  {id:'b110',type:'single',originalNum:'Q41',tag:'Switching',text:'Refer to the exhibit.\nvlan 222\n remote-span\n!\nvlan 223\n remote-span\n!\nmonitor session 1 source interface FastEthernet0/1 tx\nmonitor session 1 source interface FastEthernet0/2 rx\nmonitor session 1 source interface port-channel 5\nmonitor session 1 destination remote vlan 222\n\nThese commands have been added to the configuration of a switch. Which command flags an error if it is added to this configuration?',options:[{letter:'A',text:'monitor session 1 source interface port-channel 7, port-channel 8'},{letter:'B',text:'monitor session 1 source vlan 10'},{letter:'C',text:'monitor session 1 source interface FastEthernet0/1 rx'},{letter:'D',text:'monitor session 1 source interface port-channel 6'}],correct:'B',feedback:{correct:'You cannot mix source interfaces and source VLANs in the same SPAN/RSPAN session. Since session 1 already has source interfaces configured, adding "source vlan 10" will generate an error. The switch will reject it because interface-based and VLAN-based sources are mutually exclusive in a single session.',wrong:'B is correct. RSPAN sessions cannot mix source interfaces and source VLANs. Session 1 already uses source interfaces (Fa0/1 tx, Fa0/2 rx, port-channel 5), so adding a source VLAN causes a conflict error. You can add more source interfaces (A, D) or modify the direction of an existing one (C — adding rx to Fa0/1 which is currently tx-only is allowed).',correctAnswer:'B -- monitor session 1 source vlan 10',trick:'SPAN rule: one session = EITHER source interfaces OR source VLANs, never both. Mixing them throws an error. Adding more interfaces (A, D) = fine. Adding rx to an existing tx interface (C) = allowed. Adding a VLAN when interfaces exist (B) = ERROR.'}},
  {id:'b111',type:'single',originalNum:'Q46',tag:'Automation',text:'An engineer must create an EEM script to enable OSPF debugging in the event the OSPF neighborship goes down. Which script must the engineer apply?\n\nOption A:\nevent manager applet ENABLE_OSPF_DEBUG\nevent syslog pattern "%OSPF-5-ADJCHG: Process 6, Nbr 1.1.1.1 on Serial0/0 from FULL to DOWN"\naction 1.0 cli command "enable"\naction 2.0 cli command "debug ip ospf event"\naction 3.0 cli command "debug ip ospf adj"\naction 4.0 syslog priority informational msg "ENABLE_OSPF_DEBUG"\n\nOption B:\nevent manager applet ENABLE OSPF_DEBUG\nevent syslog pattern "%OSPF-5-ADJCHG: Process 5, Nbr 1.1.1.1 on Serial0/0 from LOADING to FULL"\naction 1.0 cli command "debug ip ospf event"\naction 2.0 cli command "debug ip ospf adj"\naction 3.0 syslog priority informational msg "ENABLE_OSPF_DEBUG"\n\nOption C:\nevent manager applet ENABLE_OSPF_DEBUG\nevent syslog pattern "%OSPF-1-ADJCHG: Process 5, Nbr 1.1.1.1 on Serial0/0 from FULL to DOWN"\naction 1.0 cli command "debug ip ospf event"\naction 2.0 cli command "debug ip ospf adj"\naction 3.0 syslog priority informational msg "ENABLE_OSPF_DEBUG\n\nOption D:\nevent manager applet ENABLE_OSPF_DEBUG\nevent syslog pattern "%OSPF-5-ADJCHG: Process 5, Nbr 1.1.1.1 on Serial0/0 from LOADING to FULL"\naction 1.0 cli command "enable"\naction 2.0 cli command "debug ip ospf event"\naction 3.0 cli command "debug ip ospf adj"\naction 4.0 syslog priority informational msg "ENABLE_OSPF_DEBUG"',options:[{letter:'A',text:'Option A'},{letter:'B',text:'Option B'},{letter:'C',text:'Option C'},{letter:'D',text:'Option D'}],correct:'A',feedback:{correct:'Option A is correct: it triggers on "%OSPF-5-ADJCHG" (severity 5 = correct for OSPF adjacency changes) with "from FULL to DOWN" (neighborship going DOWN). It includes "action 1.0 cli command enable" which is required before running debug commands. Options B and D trigger on "LOADING to FULL" which is the neighborship coming UP, not down. Option C uses severity level 1 (%OSPF-1-ADJCHG) which is incorrect.',wrong:'A is correct. Three things to check: (1) severity = 5 not 1 (%OSPF-5-ADJCHG). (2) Direction = FULL to DOWN (going down), not LOADING to FULL (coming up). (3) Must include "cli command enable" before debug commands. Option C fails on severity (uses -1-). Options B and D fail on direction (LOADING to FULL = coming up).',correctAnswer:'A -- Option A',trick:'OSPF neighborship DOWN = syslog %OSPF-5-ADJCHG ... from FULL to DOWN. Severity = 5 always. Must include "enable" action before debugging. LOADING to FULL = coming UP (wrong trigger). -1-ADJCHG does not exist for OSPF.'}},
  {id:'b103',type:'single',originalNum:'Q20',tag:'Security',text:'What are the main components of Cisco TrustSec?',options:[{letter:'A',text:'Cisco ISE, network switches, firewalls, and routers'},{letter:'B',text:'Cisco ISE and TACACS+'},{letter:'C',text:'Cisco ISE and Enterprise Directory Services'},{letter:'D',text:'Cisco ASA and Cisco Firepower Threat Defense'}],correct:'A',feedback:{correct:'Cisco TrustSec requires Cisco ISE as the policy server, plus network enforcement points — switches, firewalls, and routers — that can understand and enforce SGT-based policies.',wrong:'A is correct. TrustSec = ISE (policy engine) + enforcement devices (switches, firewalls, routers). TACACS+ (B) is AAA, not TrustSec. Enterprise Directory Services (C) is an identity source, not a TrustSec component. ASA/FTD (D) are just two of many enforcement devices.',correctAnswer:'A -- Cisco ISE, network switches, firewalls, and routers',trick:'TrustSec = ISE (the brain) + enforcement devices (the muscles). ISE issues SGTs. Switches/firewalls/routers enforce the SGT policies. You need both: the policy engine AND the enforcement points.'}},
  {id:'b104',type:'single',originalNum:'Q21',tag:'Security',text:'When should the MAC authentication bypass feature be used on a switch port?',options:[{letter:'A',text:'when the attached host supports limited 802.1X'},{letter:'B',text:'when authentication should be bypassed for select hosts based on their MAC address'},{letter:'C',text:'when authentication is required, but the attached host does not support 802.1X'},{letter:'D',text:'when the attached host supports 802.1X and must authenticate itself based on its MAC address instead of user credentials'}],correct:'C',feedback:{correct:'MAC Authentication Bypass (MAB) is used when a device cannot perform 802.1X authentication — for example, printers, IP phones, and IoT devices that have no 802.1X supplicant. The switch authenticates using the device\'s MAC address as a fallback.',wrong:'C is correct. MAB = fallback for devices that CANNOT do 802.1X. It is not for devices that support 802.1X (D — that is just regular 802.1X). It does not bypass authentication entirely (B). "Limited 802.1X support" (A) is vague and not the correct use case.',correctAnswer:'C -- when authentication is required, but the attached host does not support 802.1X',trick:'MAB = MAC Auth Bypass = for dumb devices (printers, IoT, IP phones) that cannot run 802.1X. The switch uses the MAC address as the credential since the device has no supplicant. MAB = last resort for non-802.1X devices, not a way to skip auth entirely.'}},
  {id:'b105',type:'single',originalNum:'Q29',tag:'Security',text:'Which mechanism does OAuth use to strengthen REST API security when compared to BasicAuth?',options:[{letter:'A',text:'Token'},{letter:'B',text:'SSL'},{letter:'C',text:'TLS'},{letter:'D',text:'Authentication'}],correct:'A',feedback:{correct:'OAuth uses tokens (access tokens) instead of sending raw credentials with every request. Once authenticated, the client receives a token that is used for subsequent API calls. This avoids transmitting the username and password repeatedly, greatly reducing exposure.',wrong:'A is correct. OAuth = token-based. BasicAuth = sends Base64(username:password) with every request. OAuth replaces repeated credential transmission with a short-lived access token. SSL and TLS (B, C) are transport-layer encryption used by both BasicAuth and OAuth — they are not what differentiates OAuth. Authentication (D) is what both methods do.',correctAnswer:'A -- Token',trick:'BasicAuth = sends credentials EVERY time (risky). OAuth = authenticate ONCE, get a TOKEN, use the token for requests. Token = limited time, limited scope. Even if the token is stolen, it expires. Credentials never leave after the first exchange.'}},
  {id:'b99',type:'single',originalNum:'Q12',tag:'Automation',text:'To which category does a REST API that has been developed for IP address management integration belong?',options:[{letter:'A',text:'southbound'},{letter:'B',text:'westbound'},{letter:'C',text:'northbound'},{letter:'D',text:'eastbound'}],correct:'B',feedback:{correct:'Westbound APIs handle peer-to-peer integrations between the SDN controller and other systems such as IPAM (IP Address Management), ITSM, and reporting tools. IP address management is a classic westbound integration use case.',wrong:'B is correct. Westbound = integrations with peer systems like IPAM, ITSM, monitoring. Northbound = apps/scripts talking UP to the controller. Southbound = controller talking DOWN to devices. Eastbound = distributed controller communication. "East" and "west" = peer-to-peer/horizontal integrations.',correctAnswer:'B -- westbound',trick:'North/South = vertical (apps above, devices below). East/West = horizontal (peer systems on the same level). IPAM is a PEER system integrating alongside the controller = westbound. Think: West = partnerships with equals like IPAM.'}},
  {id:'b100',type:'single',originalNum:'Q16',tag:'Virtualization',text:'What is a characteristic of a virtual machine?',options:[{letter:'A',text:'It provides an environment completely isolated from the host OS.'},{letter:'B',text:'It shares the host OS kernel, binaries, and libraries.'},{letter:'C',text:'It is more lightweight than a container.'},{letter:'D',text:'It is more resource efficient than a container.'}],correct:'A',feedback:{correct:'A virtual machine runs its own complete OS, completely isolated from the host OS. Each VM has its own kernel, memory, storage, and networking — the hypervisor provides hardware abstraction with full isolation.',wrong:'A is correct. VMs are fully isolated with their own OS (A). Containers share the host OS kernel, binaries, and libraries (B — that is a container characteristic, not VM). Containers are lighter and more efficient than VMs (C and D are container advantages).',correctAnswer:'A -- completely isolated from the host OS',trick:'VM = Full isolation. Has its own OS kernel. Heavy but secure. Container = shares host kernel. Lightweight and fast. If a question says "shares host OS kernel" = CONTAINER. If "completely isolated" = VM. You chose C (lightweight) — that is a CONTAINER advantage, not a VM.'}},
  {id:'b101',type:'single',originalNum:'Q18',tag:'Security',text:'Which encoding is used to protect a username and login with RESTful API basic authentication?',options:[{letter:'A',text:'MD5'},{letter:'B',text:'Type-7'},{letter:'C',text:'SHA-1'},{letter:'D',text:'Base64'}],correct:'D',feedback:{correct:'RESTful API Basic Authentication encodes the username and password as Base64 and sends it in the HTTP Authorization header. Note: Base64 is encoding, not encryption — it is easily decoded, which is why HTTPS is always required alongside it.',wrong:'D is correct. Basic Auth = Base64 encoding of username:password. MD5 and SHA-1 are hashing algorithms (one-way). Type-7 is Cisco password obfuscation. Base64 is NOT encryption — it is just encoding, which is why HTTPS is required to protect it in transit.',correctAnswer:'D -- Base64',trick:'REST Basic Auth = Base64(username:password) in the Authorization header. Remember: Base64 is NOT encryption — it is just encoding and is easily reversed. Always needs HTTPS to be secure. MD5/SHA = hashing (one-way). Base64 = encoding (reversible).'}},
  {id:'b102',type:'single',originalNum:'Q19',tag:'Automation',text:'Refer to the exhibit.\nhttps://192.168.43.103/restconf/data/ietf-interfaces/interfaces/interface-Loopback100\n\nWhat does the response "204 No Content" mean for the REST API request?',options:[{letter:'A',text:'The DELETE method is not supported.'},{letter:'B',text:'Interface loopback 100 is not found in the configuration.'},{letter:'C',text:'Interface loopback 100 is removed from the configuration.'},{letter:'D',text:'Interface loopback 100 is not removed from the configuration.'}],correct:'C',feedback:{correct:'HTTP 204 No Content is the standard success response for a DELETE operation. It means the resource was successfully deleted and there is no content to return. The URL targets interface-Loopback100, so a 204 response confirms Loopback100 was successfully removed.',wrong:'C is correct. 204 No Content = success with no body returned = DELETE succeeded. 404 = not found (B). 405 = method not supported (A). 200 = success with body returned. The URL targets a DELETE on Loopback100, so 204 confirms successful removal.',correctAnswer:'C -- Interface loopback 100 is removed from the configuration',trick:'HTTP codes: 200=OK with data. 201=Created. 204=No Content (DELETE success). 400=Bad request. 404=Not found. 405=Method not allowed. 204 after a DELETE URL = it worked and nothing to send back. You chose B (not found = 404), but 204 means SUCCESS not found.'}},
  {id:'b97',type:'single',originalNum:'Q8',tag:'SD-WAN',text:'What is the primary responsibility of the SD-WAN Validator?',options:[{letter:'A',text:'to facilitate start-up by performing authentication and authorization of all elements into the network'},{letter:'B',text:'to provide centralized management and provisioning of all elements into the network'},{letter:'C',text:'to provide configuration synchronization of an WAN Edge devices'},{letter:'D',text:'to configure NAT communication on WAN Edge routers'}],correct:'A',feedback:{correct:'The SD-WAN Validator (vBond) authenticates and authorizes all SD-WAN components when they come online. It is the first point of contact for every device joining the SD-WAN fabric.',wrong:'A is correct. vBond (Validator) = authentication and authorization of ALL elements. vManage = centralized management and provisioning (B). vSmart = control plane / routing policy (not C). NAT traversal is a feature, not the primary role (D).',correctAnswer:'A -- authentication and authorization of all elements into the network',trick:'vBond = Bond = security gatekeeper. Think of it as the bouncer that authenticates every device before they can join. vManage = management. vSmart = smart routing decisions. vBond = WHO ARE YOU? Let me check your credentials first.'}},
  {id:'b98',type:'single',originalNum:'Q5',tag:'NETCONF',text:'Refer to the exhibit.\n<?xml version="1.0"?>\n<nc:rpc message-id="101" xmlns:nc="urn:ietf:params:xml:ns:netconf:base:1.0">\n  <nc:get>\n    <nc:filter type="subtree">\n      <native xmlns="http://cisco.com/ns/yang/ned/ios">\n        <interface>\n          <GigabitEthernet>\n            <name>1</name>\n            <ip></ip>\n          </GigabitEthernet>\n        </interface>\n      </native>\n    </nc:filter>\n  </nc:get>\n</nc:rpc>\n]]>]]\n\nThe NETCONF object is sent to a Cisco IOS XE switch. What is the purpose of the object?',options:[{letter:'A',text:'Set the description of interface GigabitEthernet1 to "1".'},{letter:'B',text:'Discover the IP address of interface GigabitEthernet.'},{letter:'C',text:'Remove the IP address from interface GigabitEthernet1.'},{letter:'D',text:'View the configuration of all GigabitEthernet interfaces.'}],correct:'B',feedback:{correct:'This is a NETCONF <nc:get> (read) operation — not a configuration change. The subtree filter selects interface GigabitEthernet1 and the empty <ip></ip> element acts as a filter to retrieve the IP address configuration of that interface.',wrong:'B is correct. <nc:get> = READ/retrieve operation (not set or delete). The filter targets GigabitEthernet with <name>1</name> = only GigabitEthernet1, not all interfaces (D). Empty <ip></ip> = retrieve the IP sub-tree. There is no <description> element (A). No delete/remove operation present (C).',correctAnswer:'B -- Discover the IP address of interface GigabitEthernet',trick:'NETCONF operations: <get> or <get-config> = READ. <edit-config> = WRITE/modify. Empty XML tag inside a get filter = retrieve that leaf. Here <ip></ip> inside <get> = fetch the IP config. No edit-config = no changes being made.'}},
  {id:'b117',type:'single',originalNum:'Q-OSPF-CR1',tag:'Routing',text:'CR1 must form OSPF adjacencies with CR2 and CR3 only using specific connected subnets, and must not advertise OSPF on interfaces connected to other devices or on any newly added interfaces. Which configuration should be applied on CR1?',options:[{letter:'A',text:'router ospf 1\n network 0.0.0.0 255.255.255.255 area 0'},{letter:'B',text:'router ospf 1\n network 10.165.231.0 0.0.0.255 area 0\n network 172.27.206.0 0.0.0.255 area 0\n network 172.24.206.0 0.0.0.255 area 0'},{letter:'C',text:'router ospf 1\n network 10.165.231.0 0.0.0.255 area 0\n network 172.27.206.0 0.0.0.255 area 0\n network 172.24.206.0 0.0.0.255 area 0\n passive-interface GigabitEthernet0/2'},{letter:'D',text:'router ospf 1\n network 0.0.0.0 255.255.255.255 area 0\n passive-interface GigabitEthernet0/2'}],correct:'C',feedback:{correct:'Specific network statements restrict OSPF to only the interfaces connecting to CR2 and CR3 (10.165.231.0, 172.27.206.0, 172.24.206.0). The passive-interface GigabitEthernet0/2 command prevents OSPF hellos on that interface, ensuring OSPF adjacencies are not formed with unintended devices.',wrong:'C is correct. Specific network statements + passive-interface. Option A enables OSPF on ALL interfaces using the catch-all wildcard. Option B has specific networks but is missing passive-interface — OSPF hellos still go out on Gi0/2. Option D uses the catch-all network command, adding every interface to OSPF.',correctAnswer:'C -- specific network statements + passive-interface GigabitEthernet0/2',trick:'Control OSPF scope: (1) specific network statements = only those subnets participate. (2) passive-interface = blocks hellos on that interface. Catch-all "network 0.0.0.0" = OSPF on everything including future interfaces = dangerous. Use BOTH specific networks AND passive-interface to lock down adjacencies.'}},
  {id:'b118',type:'single',originalNum:'Q26',tag:'Switching',text:'Refer to the exhibit. An engineer is configuring an ERSPAN session on a switch. The session has "origin ip address 10.10.0.1" configured but the session is not functioning. Which set of commands must the engineer apply inside the ERSPAN destination section to fix the issue?',options:[{letter:'A',text:'ip address 10.10.0.1'},{letter:'B',text:'no origin ip address 10.10.0.1\n ip address 10.10.0.1'},{letter:'C',text:'no ip address 10.10.0.1\n origin ip address 10.10.0.1'},{letter:'D',text:'origin ip address 10.10.0.2\n ip address 10.10.0.1'}],correct:'B',feedback:{correct:'ERSPAN requires two IP settings in the destination block: "origin ip address" (the source/sender IP of ERSPAN packets) and "ip address" (the destination/collector IP). The existing "origin ip address 10.10.0.1" must be removed first with "no", then the destination "ip address 10.10.0.1" must be added. Without the destination IP, ERSPAN cannot deliver packets.',wrong:'B is correct. First remove the origin ip address with "no origin ip address 10.10.0.1", then configure the destination collector IP with "ip address 10.10.0.1". Option A only adds ip address without removing origin — conflict exists. Option C removes the wrong command. Option D sets a different origin IP but still lacks proper destination.',correctAnswer:'B -- no origin ip address 10.10.0.1 + ip address 10.10.0.1',trick:'ERSPAN destination block: "origin ip address" = source IP that ERSPAN packets will come FROM. "ip address" = where to SEND the ERSPAN packets (collector). If only origin is set and destination is wrong/missing, ERSPAN is broken. Always "no" old config first before re-adding.'}},
  {id:'b119',type:'single',originalNum:'Q-CoPP',tag:'Security',text:'Refer to the exhibit. A CoPP policy is configured with class_telnet_copp matching ACL copp_ssh (entry 10: deny tcp host 10.0.0.5 any eq 22; entry 20: permit tcp any any eq 22). The policy-map has conform-action transmit and exceed-action drop at 8000 bps. Show policy-map output shows class_telnet_copp: 33 packets conformed, 0 packets exceeded. What is true about SSH traffic from host 10.0.0.5 to the router?',options:[{letter:'A',text:'The traffic is dropped because ACL entry 10 denies it.'},{letter:'B',text:'The traffic is rate-limited together with all other SSH traffic at 8000 bps.'},{letter:'C',text:'The traffic is always transmitted because entry 10 matches the class and the conformed action is transmit.'},{letter:'D',text:'The traffic bypasses CoPP entirely because it is explicitly denied in the ACL.'}],correct:'C',feedback:{correct:'In CoPP, ACL "deny" within a class-map match-first means the traffic IS classified to that class (inverse of normal ACL logic). Entry 10 matches SSH from 10.0.0.5. The policer shows 33 packets all conformed (under 8000 bps), so the conform-action transmit applies — all traffic gets through.',wrong:'C is correct. CoPP ACL deny = classified to this class (not dropped). The POLICER decides fate, not the ACL. All 33 packets conformed = all transmitted. ACL deny in CoPP does NOT drop the traffic — it controls classification. The traffic is not bypassed and not rate-limited with other traffic; it is in its own class with all packets conforming.',correctAnswer:'C -- always transmitted because entry 10 classifies it and conformed action is transmit',trick:'CoPP ACL logic is REVERSED: "deny" = traffic IS matched to the class. "permit" = not matched, falls through. Once classified, the POLICER decides: conformed rate = transmit/mark, exceeded = drop. 33 conformed packets = under the rate = transmit. ACL deny in CoPP ≠ drop. It just means "this traffic belongs to this class."'}},
  {id:'b120',critical:true,type:'multi',originalNum:'Q30',tag:'Network Services',text:'In which two ways does PIM dense mode function in the network? (Choose two)',options:[{letter:'A',text:'It waits to forward multicast traffic until a downstream router requests the traffic.'},{letter:'B',text:'It utilizes the designated forwarder election to avoid multicast packet loops.'},{letter:'C',text:'It received traffic from only one Reverse Path Forwarding interface.'},{letter:'D',text:'It forwards multicast traffic on all interfaces until a downstream router requests that forwarding stop.'},{letter:'E',text:'It uses a push method, and fallback occurs when RP information is lost.'}],correct:['C','D'],feedback:{correct:'PIM Dense Mode uses a flood-and-prune model. It immediately forwards traffic on ALL interfaces (D), then routers without interested receivers send prune messages to stop forwarding. Traffic is always accepted from only one RPF interface (C) to prevent routing loops.',wrong:'C and D are correct. PIM-DM floods first, prunes later (D). It always uses one RPF interface for receiving to prevent loops (C). Option A describes PIM Sparse Mode — it waits for explicit joins. Option B (designated forwarder election) applies to PIM-SM on multi-access segments, not PIM-DM. Option E mixes PIM-DM push behavior with PIM-SM RP fallback concepts.',correctAnswer:'C and D -- one RPF interface + floods all interfaces until pruned',trick:'PIM-DM = Dense Mode = PUSH = flood and prune. Assume everyone wants multicast, flood everywhere, then prune away the branches with no receivers. RPF = one receiving interface only (anti-loop). PIM-SM = pull = explicit join needed. Dense assumes interest. Sparse assumes no interest.'}},
  {id:'b121',critical:true,type:'single',originalNum:'Q31',tag:'Network Services',text:'What is the function of an RP in a PIM-SM network?',options:[{letter:'A',text:'to connect multicast sources with receivers'},{letter:'B',text:'to automate the distribution of group-to-rendezvous point mappings'},{letter:'C',text:'to provide routing to the PIM leaf routers'},{letter:'D',text:'to track sources and receivers on the shared distribution tree'}],correct:'A',feedback:{correct:'The Rendezvous Point (RP) in PIM-SM is the meeting point between multicast sources and receivers. Sources register with the RP, and receivers send PIM join messages toward the RP. The RP maintains the shared tree (RPT) and connects sources to receivers.',wrong:'A is correct. RP = meeting point between sources and receivers. Sources register → RP. Receivers join → toward RP. RP connects them. Option B describes Auto-RP or BSR — mechanisms to distribute which RP handles which group. Options C and D are incorrect descriptions of RP function.',correctAnswer:'A -- to connect multicast sources with receivers',trick:'RP = Rendezvous Point = the matchmaker. Sources announce to the RP, receivers ask the RP. RP connects them on the shared tree (*.G). Think: RP is the dating app — sources post profiles, receivers swipe. Without RP in PIM-SM, sources and receivers cannot find each other.'}},
  {id:'b122',type:'single',originalNum:'Q46',tag:'Security',text:'An engineer must configure router R1 to validate user logins via RADIUS and fall back to the local user database if the RADIUS server is not available. Which configuration must be applied?',options:[{letter:'A',text:'aaa authentication exec default radius local'},{letter:'B',text:'aaa authorization exec default radius'},{letter:'C',text:'aaa authorization exec default radius local'},{letter:'D',text:'aaa authentication exec default radius'}],correct:'A',feedback:{correct:'"aaa authentication" verifies who you are (login). "exec" applies to EXEC-mode access. "default" is the default method list applied to all lines. "radius local" means: try RADIUS first, fall back to local database if RADIUS is unreachable — exactly matching the requirement.',wrong:'A is correct. "authentication" = login verification. "radius local" = RADIUS first, local as fallback. Options B and C use "authorization" which controls what an already-authenticated user can do — not used for login validation. Option D uses "authentication" correctly but omits "local", so if RADIUS is down there is no fallback and login fails.',correctAnswer:'A -- aaa authentication exec default radius local',trick:'AAA trio: Authentication=WHO (login). Authorization=WHAT (privileges). Accounting=LOGGING. For login with fallback: authentication + list your methods left to right (radius local). If radius is down, try local. Omitting local = no fallback = locked out when RADIUS fails. Always add local at the end as safety net.'}},
  {id:'b123',type:'single',originalNum:'Q48',tag:'SD-Access',text:'What is a consideration when designing a Cisco SD-Access underlay network?',options:[{letter:'A',text:'End user subnets and endpoints are part of the underlay network'},{letter:'B',text:'It must support IPv4 and IPv6 underlay networks'},{letter:'C',text:'The underlay switches provide endpoint physical connectivity for users'},{letter:'D',text:'Static routing is a requirement'}],correct:'C',feedback:{correct:'In SD-Access, the underlay provides physical IP connectivity between fabric nodes. Underlay switches physically connect endpoint devices to the network fabric. The overlay (VXLAN tunnels) handles segmentation and policy, while the underlay handles actual physical reachability.',wrong:'C is correct. Underlay = physical infrastructure that connects endpoints to fabric nodes. Option A is wrong — end users live in the OVERLAY (segmented into VNs by SGTs), not the underlay. Option B is wrong — SD-Access underlay uses IPv4 only (IS-IS for routing). Option D is wrong — IS-IS is the recommended underlay routing protocol, not static routing.',correctAnswer:'C -- the underlay switches provide endpoint physical connectivity for users',trick:'SD-Access layers: UNDERLAY = physical IPv4 fabric (IS-IS, routed access). OVERLAY = VXLAN tunnels + SGTs + VNs for segmentation. Users connect PHYSICALLY through underlay switches, but their traffic is segmented in the OVERLAY. Static routing = bad for underlay. IPv6 underlay = not required. IS-IS = correct underlay IGP.'}},
  {id:'b124',type:'single',originalNum:'Q14',tag:'Routing',text:'Refer to the exhibit. BR1 and BR2 are in AS 100. BR1 peers with PE1 (AS 200) and BR2 peers with PE2 (AS 300). BR2 currently shows: B 209.165.201.0 [20/0] via 209.165.200.230 (via PE2). Which configuration change will force BR2 to reach 209.165.201.0/27 via BR1?',options:[{letter:'A',text:'Set the MED to 1 on PE2 toward BR2 outbound'},{letter:'B',text:'Set the origin to igp on BR2 toward PE2 inbound'},{letter:'C',text:'Set the weight attribute to 65,535 on BR1 toward PE1'},{letter:'D',text:'Set the local preference to 150 on PE1 toward BR1 outbound'}],correct:'A',feedback:{correct:'The current MED shown is 0 ([20/0]). Setting MED=1 on PE2\'s outbound advertisement to BR2 increases the metric for the PE2 path. Lower MED is preferred, so the PE2 path (MED=1) becomes worse than the iBGP path from BR1 (MED=0 from PE1). BR2 then selects the path via BR1.',wrong:'A is correct. Higher MED = less preferred. Setting MED=1 on PE2 makes that path worse than the BR1 iBGP path (MED=0). Option D is wrong because local preference is only meaningful within an AS — PE1 is in AS 200 and cannot influence path selection inside AS 100 with local-pref. Option C sets weight on BR1 outbound to PE1 which affects BR1\'s own decision, not BR2\'s. Option B (origin igp) does not change the path preference significantly.',correctAnswer:'A -- Set MED to 1 on PE2 toward BR2 outbound',trick:'MED (lower=better) influences which entry point an external AS uses. MED=0 is current; setting MED=1 makes PE2\'s path worse. Local-preference only works WITHIN an AS (cannot cross AS boundaries). Weight is local to the router that sets it. MED = the right tool to influence inbound path from a neighboring AS.'}},
  {id:'b125',type:'single',originalNum:'Q23',tag:'Automation',text:'Refer to the exhibit. An administrator writes a Python script to fetch the list of devices registered with Cisco DNA Center. The script POSTs credentials to "https://dna-center/dna/system/api/v1/auth/token" with verify=False and receives status code 401. Why does the execution abort?',options:[{letter:'A',text:'The "dna-center" hostname cannot be resolved to an IP address'},{letter:'B',text:'The authentication URL is incorrect'},{letter:'C',text:'The TLS certificate of DNA Center is invalid'},{letter:'D',text:'The username or the password is incorrect'}],correct:'D',feedback:{correct:'HTTP 401 Unauthorized means the server received the request but rejected the credentials. The username or password provided is incorrect. The server DID respond (so DNS and connectivity work), verify=False bypasses TLS certificate errors, and an incorrect URL would return 404 not 401.',wrong:'D is correct. 401 = Unauthorized = wrong credentials (username/password). If the hostname could not be resolved, Python would throw a ConnectionError before any HTTP response. If the URL were wrong, the response would be 404 Not Found. verify=False explicitly bypasses TLS certificate validation, so C is not the cause.',correctAnswer:'D -- The username or the password is incorrect',trick:'HTTP status codes: 401=Unauthorized (bad credentials). 403=Forbidden (no permission). 404=Not Found (wrong URL). Connection error = DNS failure or no route. 401 after a POST to an auth endpoint = the password is wrong. verify=False = TLS errors ignored.'}},
  {id:'b126',type:'single',originalNum:'Q28',tag:'Security',text:'An engineer must configure interface and sensor monitoring on a router. The NMS server is at IP 10.15.2.19 in a trusted zone. Communication must be encrypted and password-protected using the most secure algorithms. Access must be allowed only for the NMS server and with minimum permission levels. Which configuration must the engineer apply?',options:[{letter:'A',text:'Option A:\nip access-list extended nms\n permit 1 host 10.15.2.19 any\nsnmp-server view ro internet included\nsnmp-server view ro ifEntry included\nsnmp server group nms v3 priv notify ro access nms\nsnmp-server user user1 nms v3 encrypted auth md5 Password1 pri 3des Password123'},{letter:'B',text:'Option B:\nip access-list standard nms\n permit 10.15.2.19 0.0.0.0\nsnmp-server view ro iso included\nsnmp-server view ro ifEntry included\nsnmp server group nms v3 priv read ro access nms\nsnmp-server user user1 nms v3 auth sha Password1 pri aes 256 Password123'},{letter:'C',text:'Option C:\nip access-list standard nms\n permit 10.15.2.19 0.0.0.0\nsnmp-server view rw iso included\nsnmp view rw ifEntry included\nsnmp-server group nms v3 priv write rw access nms\nsnmp server user user1 nms v3 auth des Password1 pri des Password123'},{letter:'D',text:'Option D:\nip access list standard nms\n permit 10.15.2.19 255.255.255.255\nsnmp server view ro cisco included\nsnmp server view ro ifEntry included\nsnmp server group nms v3 priv read ro access nms\nsnmp server user user1 nms v3 auth 3des Password1 pri aes 192 Password123'}],correct:'B',feedback:{correct:'Option B uses: standard ACL (sufficient to permit a single host), SNMPv3 priv (encryption enabled), SHA for authentication (more secure than MD5), AES-256 for privacy (most secure), read-only access (minimum permissions required), and "iso included" view (covers all OIDs including interface/sensor data).',wrong:'B is correct. SHA + AES-256 = most secure SNMPv3. Read-only (ro) = minimum permissions. Standard ACL = correct for restricting access by source IP. Option A uses MD5 + 3DES (less secure than SHA + AES-256) and an extended ACL (unnecessary). Option C uses rw (read-write = too many permissions) and DES (weakest encryption). Option D has syntax errors (missing hyphens) and uses AES-192 instead of AES-256.',correctAnswer:'B -- standard ACL + SNMPv3 priv + SHA auth + AES-256 + ro access',trick:'SNMPv3 most secure: auth=SHA (not MD5, not 3DES). priv=AES-256 (not DES, not 3DES, not AES-192). Minimum permissions=ro (read-only). Standard ACL = enough to permit one host by IP. SHA > MD5. AES-256 > AES-192 > 3DES > DES.'}},
  {id:'b127',critical:true,type:'single',originalNum:'Q31',tag:'Automation',text:'What is a characteristic of the Cisco Catalyst Center (formerly DNA Center) Template Editor feature?',options:[{letter:'A',text:'It provides a high-level overview of the health of every network device.'},{letter:'B',text:'It uses a predefined configuration through parameterized elements or variables.'},{letter:'C',text:'It facilitates software upgrades to network devices from a central point.'},{letter:'D',text:'It facilitates a vulnerability assessment of the network devices.'}],correct:'B',feedback:{correct:'The Template Editor in Cisco Catalyst Center allows engineers to create reusable configuration templates with parameterized variables. When deploying, the variables are filled in per-device, enabling consistent and automated configuration across many devices.',wrong:'B is correct. Template Editor = parameterized configuration templates. Option A describes the Assurance module (network health overview). Option C describes Software Image Management (SWIM). Option D (vulnerability assessment) is not a Catalyst Center feature — that is handled by security products like Cisco Secure.',correctAnswer:'B -- predefined configuration through parameterized elements or variables',trick:'Catalyst Center modules: Assurance = health/analytics. SWIM = software upgrades. Template Editor = config templates with variables. Design/Policy = network intent. Template Editor is about AUTOMATION via reusable parameterized configs.'}},
  {id:'b128',type:'single',originalNum:'Q43',tag:'Security',text:'What is provided by the Stealthwatch component of the Cisco Cyber Threat Defense solution?',options:[{letter:'A',text:'real-time awareness of users, devices and traffic on the network'},{letter:'B',text:'real-time threat management to stop DDoS attacks to the core and access networks'},{letter:'C',text:'malware control'},{letter:'D',text:'dynamic threat control for web traffic'}],correct:'A',feedback:{correct:'Cisco Stealthwatch (now Cisco Secure Network Analytics) provides real-time visibility into who is on the network, what devices are present, and what traffic flows exist. It uses NetFlow and behavioral analytics to detect anomalies.',wrong:'A is correct. Stealthwatch = network visibility and behavioral analytics (who, what devices, what traffic). DDoS protection (B) is handled by Cisco DDoS mitigation tools. Malware control (C) is AMP/Cisco Secure Endpoint. Web traffic control (D) is Cisco Secure Web Appliance (WSA).',correctAnswer:'A -- real-time awareness of users, devices and traffic on the network',trick:'Stealthwatch = flow analytics = SEE everything on the network in real time. Uses NetFlow. Think: Stealthwatch = network surveillance camera. AMP = endpoint malware killer. WSA = web proxy. Stealthwatch watches TRAFFIC FLOWS, not malware files.'}},
  {id:'b129',type:'matching',originalNum:'Q7',tag:'Automation',text:'Match the REST API authentication method to the correct description.',pairs:[{component:'no authentication',description:'public API resource'},{component:'HTTP basic authentication',description:'username and password in an encoded string'},{component:'API key',description:'API-dependent secret'},{component:'OAuth',description:'authorization through identity provider'}],feedback:{correct:'no authentication = public resource (no credentials needed). HTTP basic auth = Base64-encoded username:password. API key = a secret value specific to the calling application. OAuth = delegates authentication to an identity provider.',wrong:'Public API = no authentication required. username:password encoded = HTTP basic auth (Base64). API-dependent secret = API key (a pre-shared app secret). Identity provider = OAuth (third-party authorization). Token-based auth is a general category; secure vault stores secrets but is not itself an auth method.',correctAnswer:'public resource→no auth | encoded credentials→HTTP basic | API secret→API key | identity provider→OAuth',trick:'REST API auth methods: (1) No auth = public. (2) Basic = user:pass in Base64 header. (3) API key = app-specific secret token. (4) OAuth = delegate to identity provider (Google, AD, etc.). Secure vault STORES secrets but is not an auth method itself.'}},
  {id:'b130',critical:true,type:'dragdrop',originalNum:'Q9',tag:'Automation',text:'Drag and drop the code snippets to complete the Python script that reads a JSON file, changes an IP address, and saves the result as new JSON files. Not all options are used.\n\nwith open("json_ios_xe.json", "r") as json_file:\n    json_file_content = json_file.[BLANK1]()\n\ndecoded_json = json.[BLANK2](json_file_content)\n\ndecoded_json[\'Cisco-IOS-XE-native:interface\'][\'GigabitEthernet\'][0][\'ip\'][\'address\'][\'primary\'][\'address\'] = "192.168.1.2"\n\nencoded_json_compact = json.[BLANK3](decoded_json)\nencoded_json_indented = json.dumps(decoded_json, indent=4)\n\nwith open("json_ios_xe_compact.json", "w") as json_file:\n    json_file.[BLANK4](encoded_json_compact)',items:[{num:1,text:'dumps'},{num:2,text:'loads'},{num:3,text:'open'},{num:4,text:'read'},{num:5,text:'load'},{num:6,text:'write'}],groups:[{label:'json_file.[BLANK1]() — read file contents as string',correct:[4]},{label:'json.[BLANK2](json_file_content) — parse JSON string to Python object',correct:[2]},{label:'json.[BLANK3](decoded_json) — convert Python object to JSON string',correct:[1]},{label:'json_file.[BLANK4](encoded_json_compact) — write string to file',correct:[6]}],feedback:{correct:'BLANK1=read (reads raw file content as a string). BLANK2=loads (parses JSON string → Python dict). BLANK3=dumps (Python dict → JSON string, compact). BLANK4=write (writes the JSON string to the output file). Correct answer: 4216.',wrong:'4216 is the correct answer. read()=read file as string. loads()=string→Python (l=load, s=string). dumps()=Python→string (d=dump, s=string). write()=write string to file. load() reads directly from a file object (skip the read step). open() is already in the code.',correctAnswer:'BLANK1=read(4) | BLANK2=loads(2) | BLANK3=dumps(1) | BLANK4=write(6) = 4216',trick:'File pipeline: read() → string → loads() → Python dict → modify → dumps() → JSON string → write() → file. loads() and dumps() work with STRINGS. load() and dump() work with FILE OBJECTS directly.'}},
  {id:'b131',type:'single',originalNum:'Q-ncclient',tag:'Automation',text:'A Python script uses the ncclient library to establish a NETCONF connection to a network device. Running the script produces the expected output. What should be the first line of the script?',options:[{letter:'A',text:'import manager'},{letter:'B',text:'import ncclient manager'},{letter:'C',text:'from ncclient import manager'},{letter:'D',text:'from ncclient import *'}],correct:'C',feedback:{correct:'"from ncclient import manager" imports specifically the manager module from the ncclient package. This is the standard import for NETCONF scripting — the manager module provides the connect() function used to establish NETCONF sessions.',wrong:'C is correct. "from ncclient import manager" = import only the manager module (best practice). "import manager" (A) would fail because manager is not a standalone module. "import ncclient manager" (B) is invalid Python syntax — multiple names cannot follow import without "from". "from ncclient import *" (D) imports everything which is bad practice and not the standard pattern.',correctAnswer:'C -- from ncclient import manager',trick:'ncclient pattern: "from ncclient import manager" then manager.connect(host=..., port=830, ...). The manager module has the connect() function. "from X import Y" = import specific module Y from package X. Always use this targeted import for ncclient.'}},
  {id:'b132',type:'single',originalNum:'Q38',tag:'Routing',text:'After a redundant route processor failure occurs on a Layer 3 device, which mechanism allows for packets to be forwarded from a neighboring router based on the most recent tables?',options:[{letter:'A',text:'RP failover'},{letter:'B',text:'NSF'},{letter:'C',text:'RPVST+'},{letter:'D',text:'BFD'}],correct:'B',feedback:{correct:'NSF (Non-Stop Forwarding) enables a router that has experienced an RP failure or switchover to continue forwarding packets using the most recently known CEF/FIB tables. Neighboring NSF-aware routers assist by continuing to advertise routes during the convergence period.',wrong:'B is correct. NSF = Non-Stop Forwarding = packets keep flowing during and after RP failure using the last-known forwarding tables. RP failover (A) is the event itself, not the forwarding mechanism. RPVST+ (C) is a Layer 2 spanning tree protocol — unrelated to RP failure. BFD (D) is for DETECTING link failures, not for maintaining forwarding.',correctAnswer:'B -- NSF (Non-Stop Forwarding)',trick:'NSF = Non-Stop Forwarding = forwarding continues during control plane restart. Pairs with SSO (Stateful Switchover) and GR (Graceful Restart). Think: NSF = the FIB keeps working even when the routing brain hiccups. BFD = detects failures. NSF = survives them.'}},
  {id:'b133',type:'single',originalNum:'Q29',tag:'Automation',text:'Refer to the exhibit. Which action does the Python script accomplish?\n\nclient.connect(ip, port=22, username=usr, password=pswd)\nstdin, stdout, stderr = client.exec_command("show ip bgp 192.168.10.100 bestpath\\n")\nprint(stdout)',options:[{letter:'A',text:'connects to a Cisco device using Telnet and exports the routing table information'},{letter:'B',text:'displays the output of the show command in a formatted way'},{letter:'C',text:'connects to a Cisco device using SSH and exports the routing table information'},{letter:'D',text:'displays the output of the show command in an unformatted way'}],correct:'D',feedback:{correct:'The script uses port=22 (SSH, not Telnet) and exec_command() to run the show command. print(stdout) prints the raw Paramiko stdout channel object without any formatting or decoding — the output is unformatted. To get readable formatted output you would use stdout.read().decode().',wrong:'D is correct. Port 22 = SSH (eliminates A which says Telnet). print(stdout) prints the raw channel object without formatting (eliminates B which says formatted). The script does not export to a file — it prints to the screen (eliminates C which says "exports"). D correctly identifies both SSH and unformatted output.',correctAnswer:'D -- displays the output of the show command in an unformatted way',trick:'Paramiko SSH: port=22=SSH (not Telnet). exec_command() runs the command. print(stdout) = raw unformatted output (prints the object). For formatted/readable output you need stdout.read().decode(). No file write = not exported, just printed.'}},
  {id:'b134',type:'single',originalNum:'Q34',tag:'Automation',text:'Which method does Cisco Catalyst Center use to allow management of non-Cisco devices through southbound protocols?',options:[{letter:'A',text:'It uses an API call to interrogate the devices and register the returned data.'},{letter:'B',text:'It imports available APIs for the non-Cisco device in a CSV format.'},{letter:'C',text:'It creates device packs through the use of an SDK.'},{letter:'D',text:'It obtains MIBs from each vendor that details the APIs available.'}],correct:'C',feedback:{correct:'Cisco Catalyst Center manages non-Cisco devices via southbound protocols by using an SDK to create device packs. Device packs are vendor-specific packages that define how Catalyst Center communicates with non-Cisco network equipment.',wrong:'C is correct. Device packs via SDK = how Catalyst Center extends southbound management to non-Cisco devices. API interrogation (A) is how northbound apps talk to Catalyst Center. CSV import (B) is not a southbound management method. MIBs (D) are for SNMP — Catalyst Center uses YANG/NETCONF/REST, not MIBs, for southbound management.',correctAnswer:'C -- It creates device packs through the use of an SDK',trick:'Catalyst Center southbound: Cisco devices = NETCONF/YANG natively. Non-Cisco devices = device packs built with an SDK. Device packs are "adapters" that translate Catalyst Center operations to what the non-Cisco device understands. Think: SDK builds the translator.'}},
  {id:'b135',type:'multi',originalNum:'Q35',tag:'SD-WAN',text:'What are two characteristics of vManage APIs? (Choose two)',options:[{letter:'A',text:'Northbound API is RESTful, using JSON'},{letter:'B',text:'Northbound API is based on RESTCONF and JSON'},{letter:'C',text:'Southbound API is based on RESTCONF and JSON'},{letter:'D',text:'Southbound API is based on OMP and DTLS'},{letter:'E',text:'Southbound API is based on NETCONF and XML'}],correct:['A','E'],feedback:{correct:'vManage northbound API is RESTful and uses JSON — this is how external applications and scripts interact with vManage (REST calls with JSON payloads). The southbound API uses NETCONF and XML to communicate with WAN Edge devices for configuration and monitoring.',wrong:'A and E are correct. Northbound = RESTful + JSON (apps talk to vManage via REST). Southbound = NETCONF + XML (vManage talks to WAN Edge devices via NETCONF). Option B is wrong because RESTCONF is not used for vManage northbound. Option C and D are wrong — southbound uses NETCONF/XML, not RESTCONF/JSON or OMP/DTLS (OMP and DTLS are the SD-WAN control plane protocols between vSmart and vEdge, not vManage southbound APIs).',correctAnswer:'A and E -- Northbound RESTful+JSON | Southbound NETCONF+XML',trick:'vManage APIs: Northbound = REST + JSON (open API for external systems). Southbound = NETCONF + XML (manages WAN Edge devices). OMP = routing protocol between vSmart and vEdge (not an API). DTLS = encrypts control plane traffic. REST is for apps talking TO vManage. NETCONF is vManage talking DOWN to devices.'}},
  {id:'b136',type:'single',originalNum:'Q31',tag:'SD-Access',text:'Which Cisco DNA Center application is responsible for group-based access control permissions?',options:[{letter:'A',text:'Policy'},{letter:'B',text:'Assurance'},{letter:'C',text:'Design'},{letter:'D',text:'Provision'}],correct:'A',feedback:{correct:'The Policy application in Cisco DNA Center (Catalyst Center) is responsible for defining and managing group-based access control — including SGT-based policies and access contracts that determine which security groups can communicate with each other.',wrong:'A is correct. Policy = group-based access control (SGT policies, access contracts). Assurance = network health monitoring and analytics. Design = network hierarchy, IP addressing, device profiles. Provision = deploying configs to devices.',correctAnswer:'A -- Policy',trick:'DNA Center apps: Policy = WHO can talk to WHO (SGTs, access contracts). Assurance = health/analytics (is it working?). Design = blueprint (addresses, hierarchy). Provision = deploy it. Group-based access = Policy.'}},
  {id:'b137',type:'single',originalNum:'Q3',tag:'Security',text:'Which network devices secure API platform?',options:[{letter:'A',text:'next-generation intrusion detection systems'},{letter:'B',text:'web application firewalls'},{letter:'C',text:'content switches'},{letter:'D',text:'Layer 3 transit network devices'}],correct:'B',feedback:{correct:'Web Application Firewalls (WAFs) are specifically designed to protect API platforms and web applications. They inspect HTTP/HTTPS traffic, enforce API policies, block injection attacks, apply rate limiting, and filter malicious requests targeting API endpoints.',wrong:'B is correct. WAFs are purpose-built for securing web/API traffic at Layer 7. NGIDS (A) detect threats passively but do not specifically secure API platforms. Content switches (C) are load balancers, not security devices. Layer 3 transit devices (D) are routers that forward traffic but do not inspect or secure API calls.',correctAnswer:'B -- web application firewalls',trick:'API security = WAF (Web Application Firewall). WAF = Layer 7 = understands HTTP methods, headers, payloads. Can block SQL injection, XSS, rate abuse on APIs. NGIDS = detection only (no block). Routers = transit only. WAF = the API bodyguard.'}},
  {id:'b138',type:'single',originalNum:'Q9',tag:'SD-WAN',text:'Why does the vBond orchestrator have a public IP?',options:[{letter:'A',text:'to provide access to Cisco Smart Licensing servers for license enablement'},{letter:'B',text:'to facilitate downloading and distribution of operational and security patches'},{letter:'C',text:'to allow for global reachability from all WAN Edges in the Cisco SD-WAN and to facilitate NAT traversal'},{letter:'D',text:'to enable vBond to learn the public IP of WAN Edge devices that are behind NAT gateways or in private address space'}],correct:'C',feedback:{correct:'vBond must have a public IP address so that every WAN Edge device — including those behind NAT or in private address space — can reach it to onboard into the SD-WAN fabric. vBond also facilitates NAT traversal by acting as a STUN-like broker, helping WAN Edge devices discover their own public IP and port mappings.',wrong:'C is correct. vBond public IP = reachable by ALL WAN Edges globally + NAT traversal. Smart Licensing (A) is handled separately. Patch distribution (B) is vManage\'s function. Option D describes something vBond does, but it is not the primary reason for the public IP — reachability is the main reason.',correctAnswer:'C -- global reachability from all WAN Edges and NAT traversal',trick:'vBond = the front door of the SD-WAN fabric. Every new device knocks on vBond first. If vBond had a private IP, devices behind NAT or in other networks could not find it. Public IP = always reachable + NAT traversal broker. Think: vBond is the receptionist with a known public address.'}},
  {id:'b139',critical:true,type:'single',originalNum:'Q13',tag:'Automation',text:'A Cisco Catalyst Center (formerly DNA Center) REST API sends a PUT to the /dna/intent/api/v1/network-device endpoint. A response code of 504 is received. What does the code indicate?',options:[{letter:'A',text:'The response timed out based on a configured interval'},{letter:'B',text:'The user does not have authorization to access this endpoint'},{letter:'C',text:'The web server is not available'},{letter:'D',text:'The username and password are not correct'}],correct:'A',feedback:{correct:'HTTP 504 Gateway Timeout means the server acting as a gateway or proxy did not receive a timely response from an upstream server within a configured timeout period. The request was received but the backend could not respond in time.',wrong:'A is correct. 504 = Gateway Timeout = the server timed out waiting for an upstream response. 401 = Unauthorized = wrong username/password (D). 403 = Forbidden = no authorization (B). 503 = Service Unavailable = server not available (C). 504 ≠ credentials issue, it is a timeout.',correctAnswer:'A -- The response timed out based on a configured interval',trick:'HTTP codes: 401=wrong credentials. 403=no permission. 404=not found. 503=server down. 504=Gateway Timeout=upstream server too slow. The 5xx codes are server errors. 504 specifically = timeout waiting for upstream. Catalyst Center 504 = API request took too long to process.'}},
